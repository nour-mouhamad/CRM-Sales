.dtp-day.sel{background:var(--accent); color:var(--on-accent); font-weight:800; box-shadow:none}
.dtp-day:disabled{opacity:.26; cursor:default}
.dtp-times{display:flex; flex-direction:column; gap:8px; max-height:312px; overflow-y:auto; padding:2px 4px 2px 0}
.dtp-time{width:100%; padding:11px 0; border-radius:9px; border:1.5px solid var(--b1); background:var(--surface); color:var(--t1); font-size:13.5px; font-weight:700; font-variant-numeric:tabular-nums; cursor:pointer; transition:background var(--speed),border-color var(--speed),color var(--speed)}

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ====================== SUPABASE ====================== */

/* ====================== CALENDIQ (agenda externe, par closer) ======================
   CalendIQ est une app indépendante (Lovable + Supabase). Chaque closer = un « organizer »
   identifié par un slug public (…/cal/<slug>). On lit son agenda en LECTURE SEULE via la
   clé anon publique de CalendIQ (présente dans son bundle). L'écriture (prise / replanif /
   annulation / dispos) se fait dans le dashboard CalendIQ embarqué en iframe. */
const CALENDIQ = {
  app:'https://calendiq.lovable.app',
  api:'https://bmqzavwqbvxxdhgvsxms.supabase.co',
  anon:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtcXphdndxYnZ4eGRoZ3ZzeG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNzEzNTYsImV4cCI6MjA4Njg0NzM1Nn0.sApN8hlehCw9zYOQaiAJ7iVtCSjEtIRHot6mxci-qo8'
};
async function cqGet(path){
  const r = await fetch(CALENDIQ.api+'/rest/v1/'+path, { headers:{ apikey:CALENDIQ.anon, Authorization:'Bearer '+CALENDIQ.anon } });
  if(!r.ok) throw new Error('CalendIQ '+r.status);
  return r.json();
}
// extrait le slug d'un lien public CalendIQ (…/cal/<slug>) ou accepte un slug brut
function cqParseSlug(input){
  let s=(input||'').trim();
  if(!s) return '';
  if(s.indexOf('/cal/')>=0){ s=s.split('/cal/')[1]; }
  else if(/^https?:\/\//i.test(s) || s.indexOf('calendiq')>=0){
    try{ const u=new URL(s.startsWith('http')?s:'https://'+s); const parts=u.pathname.split('/').filter(Boolean); s=parts[parts.length-1]||''; }catch(e){}
  }
  s=s.split('?')[0].split('#')[0].split('/')[0];
  try{ s=decodeURIComponent(s); }catch(e){}
  return s.trim().toLowerCase();
}
// slug -> profil organisateur CalendIQ ({id, full_name, slug, timezone, avatar_url})
async function cqResolveSlug(slug){
  if(!slug) return null;
  const rows=await cqGet('profiles?slug=eq.'+encodeURIComponent(slug)+'&select=id,full_name,slug,timezone,avatar_url&limit=1');
  return (rows&&rows[0])||null;
}
// rendez-vous d'un organisateur (lecture seule, triés)
async function cqMeetingsFor(organizerId){
  if(!organizerId) return [];
  const cols='id,title,start_at,duration_minutes,booker_name,booker_email,booker_phone,status,meet_link,payment_status';
  return cqGet('meetings?organizer_id=eq.'+encodeURIComponent(organizerId)+'&select='+cols+'&order=start_at.asc');
}
// crée un RDV dans CalendIQ (même insert anon que la page de booking publique) → retourne la ligne
async function cqCreateMeeting(organizerId, m){
  const body={ organizer_id:organizerId, title:m.title, start_at:m.start_at, duration_minutes:m.duration_minutes,
    booker_name:m.booker_name||'', booker_email:m.booker_email||null, booker_phone:m.booker_phone||null,
    booker_timezone:m.booker_timezone||'Europe/Paris', status:'confirmed' };
  const r=await fetch(CALENDIQ.api+'/rest/v1/meetings',{ method:'POST',
    headers:{ apikey:CALENDIQ.anon, Authorization:'Bearer '+CALENDIQ.anon, 'Content-Type':'application/json', Prefer:'return=representation' },
    body: JSON.stringify(body) });
  if(!r.ok){ let t=''; try{ const j=await r.json(); t=j.message||j.hint||''; }catch(e){} throw new Error(t||('CalendIQ '+r.status)); }
  const rows=await r.json(); return Array.isArray(rows)?rows[0]:rows;
}
// appelle une edge function CalendIQ (même chemin que la page de booking publique, clé anon)
async function cqInvoke(name, body){
  const r=await fetch(CALENDIQ.api+'/functions/v1/'+name,{ method:'POST',
    headers:{ apikey:CALENDIQ.anon, Authorization:'Bearer '+CALENDIQ.anon, 'Content-Type':'application/json' },
    body: JSON.stringify(body) });
  if(!r.ok){ let t=''; try{ t=await r.text(); }catch(e){} throw new Error(t||('fn '+name+' '+r.status)); }
  try{ return await r.json(); }catch(e){ return {}; }
}
async function cqUpdateMeeting(id, patch){
  await fetch(CALENDIQ.api+'/rest/v1/meetings?id=eq.'+id,{ method:'PATCH',
    headers:{ apikey:CALENDIQ.anon, Authorization:'Bearer '+CALENDIQ.anon, 'Content-Type':'application/json', Prefer:'return=minimal' },
    body: JSON.stringify(patch) });
}
// crée un RDV CalendIQ COMPLET : insert + event Google (lien Meet) + email au prospect — comme la page de booking.
// Renvoie { id, meet_link }. Les étapes Google/email sont best-effort (si l'organizer n'a pas connecté Google, pas de Meet).
async function cqBookMeeting(organizerId, m){
  const row=await cqCreateMeeting(organizerId, m);
  let meetLink=null, meetError=null;
  try{
    const res=await cqInvoke('google-calendar-create-event', { organizer_id:organizerId, meeting_id:row.id, title:m.title, description:m.description||null, start_at:m.start_at, duration_minutes:m.duration_minutes, attendee_email:m.booker_email||null, organizer_timezone:m.booker_timezone||'Europe/Paris' });
    meetLink=(res&&res.meetLink)||null;
    cqUpdateMeeting(row.id, { meet_link:meetLink }).catch(()=>{}); // best-effort (l'UPDATE anon est souvent bloqué par RLS CalendIQ ; le lien est stocké côté CRM)
  }catch(e){ meetError=e.message||'Meet non généré'; console.warn('GCal create-event', e); }
  if(m.booker_email){
    cqInvoke('send-booking-emails', { organizer_id:organizerId, booker_name:m.booker_name||'', booker_email:m.booker_email, title:m.title, description:m.description||null, start_at:m.start_at, duration_minutes:m.duration_minutes, total_cost:0, participant_count:1, meet_link:meetLink, booker_timezone:m.booker_timezone||'Europe/Paris', organizer_timezone:m.booker_timezone||'Europe/Paris' }).catch(()=>{});
  }
  return { id:row.id, meet_link:meetLink, meetError };
}
// helpers d'affichage agenda
function cqDayKey(iso){ const d=new Date(iso); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function cqSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function cqDayLabel(iso){
  const d=new Date(iso), now=new Date(), tom=new Date(); tom.setDate(now.getDate()+1);
  if(cqSameDay(d,now)) return "Aujourd'hui";
  if(cqSameDay(d,tom)) return 'Demain';
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
function cqTime(iso){ try{ return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
// téléphone -> 9 derniers chiffres (matche +33 6… et 06…)
function cqPhoneKey(p){ const d=(p||'').replace(/\D/g,''); return d.length>=9?d.slice(-9):''; }
function cqGroupByDay(list){
  const g=[], idx={};
  list.forEach(m=>{ const k=cqDayKey(m.start_at); if(idx[k]===undefined){ idx[k]=g.length; g.push({key:k,label:cqDayLabel(m.start_at),items:[]}); } g[idx[k]].items.push(m); });
  return g;
}

// pipeline : la DB stocke directement la clé de colonne (fallback null -> 'contacter')
const COL_DB2UI = c => c || 'contacter';
const COL_UI2DB = c => c;

function fmtWhen(ts){
  if(!ts) return '';
  try{ const d=new Date(ts); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; }
}
// libellé RDV homogène (« mer. 04 juin · 14:30 ») — fiche / picker / poll

// ligne Supabase -> objet lead attendu par l'UI (aucun champ inventé : vide reste vide)
function dbToLead(r, acts){
  const acts2 = acts||[]; // triés created_at desc (cf loadLeads)
  const rdvMeta = (r.rdv_meta && typeof r.rdv_meta==='object' && !Array.isArray(r.rdv_meta)) ? r.rdv_meta : {};
  // noShow dérivé de rdv_meta = LA source de vérité unique de la présence (même donnée que les cartes RDV).
  // Le statut posé le plus récemment (outcome_at) décide → un « Présent » ultérieur efface le tag, un clear aussi.
  let noShow=false; { let latest=null;
    for(const k in rdvMeta){ const v=rdvMeta[k]; if(v && (v.outcome==='present'||v.outcome==='no_show')){ if(!latest || String(v.outcome_at||'')>String(latest.outcome_at||'')) latest=v; } }
    noShow = !!(latest && latest.outcome==='no_show');
  }
  return {
    id:r.id, prenom:r.prenom||'', nom:r.nom||'', tel:r.telephone||'', email:r.email||'',
    source:r.source, heat:r.heat||null, column:COL_DB2UI(r.colonne), owner:r.owner_closer_id||null,
    nextAction:r.next_action||'À contacter', actionDoneFor:r.action_done_for||null, extraActions:Array.isArray(r.extra_actions)?r.extra_actions:[], live:false, noShow,
    offer:r.montant||0, paid:r.statut_paiement==='paye',
    cpf:r.cpf_dispo||0, metier:r.metier||'', veut:r.objectif||'', budget:r.budget||'',
    rdv_at:r.rdv_at||null, rdvType:r.rdv_type||null, rdvMeetLink:r.rdv_meet_link||null, rdvMeta, hubspot_deal_id:r.hubspot_deal_id||null,
    timeline:acts2.map(a=>({id:a.id, type:a.type, when:fmtWhen(a.created_at), at:a.created_at||null, title:a.titre||'', text:a.contenu||'', paid:a.type==='paiement', result:a.result||null, conclusion:a.conclusion||null, callKind:a.call_kind||null, rdvOutcome:a.rdv_outcome||null}))
  };
}

// lecture live : tous les leads + leur historique
async function loadLeads(){
  const [{data:rows}, {data:acts}] = await Promise.all([
    SB.from('leads').select('*').is('deleted_at', null).order('date_creation',{ascending:false}),
    SB.from('activites').select('*').order('created_at',{ascending:false})
  ]);
  const byLead={};
  (acts||[]).forEach(a=>{ (byLead[a.lead_id]=byLead[a.lead_id]||[]).push(a); });
  return (rows||[]).map(r=>dbToLead(r, byLead[r.id]));
}

// écriture ciblée d'un champ pilotage (UI -> colonnes DB)
async function saveLead(id, uiPatch){
  const m={};
  if('column' in uiPatch) m.colonne=COL_UI2DB(uiPatch.column);
  if('nextAction' in uiPatch) m.next_action=uiPatch.nextAction;
  if('actionDoneFor' in uiPatch) m.action_done_for=uiPatch.actionDoneFor;
  if('extraActions' in uiPatch) m.extra_actions=uiPatch.extraActions;
  if('heat' in uiPatch) m.heat=uiPatch.heat;
  if('offer' in uiPatch) m.montant=uiPatch.offer;
  if('owner' in uiPatch) m.owner_closer_id=uiPatch.owner;
  if('paid' in uiPatch) m.statut_paiement=uiPatch.paid?'paye':'aucun';
  if('statut_paiement' in uiPatch) m.statut_paiement=uiPatch.statut_paiement;
  if('metier' in uiPatch) m.metier=uiPatch.metier;
  if('objectif' in uiPatch) m.objectif=uiPatch.objectif;
  if('budget' in uiPatch) m.budget=uiPatch.budget;
  if('cpf' in uiPatch) m.cpf_dispo=uiPatch.cpf;
  if('rdv_at' in uiPatch) m.rdv_at=uiPatch.rdv_at;
  if('rdvType' in uiPatch) m.rdv_type=uiPatch.rdvType;
  if('rdvMeetLink' in uiPatch) m.rdv_meet_link=uiPatch.rdvMeetLink;
  if('rdvMeta' in uiPatch) m.rdv_meta=uiPatch.rdvMeta;
  try{ if(Object.keys(m).length) await SB.from('leads').update(m).eq('id',id); }catch(e){ console.warn('saveLead',e); }
}
// écriture DÉDIÉE du résultat de RDV (rdv_meta) qui REMONTE l'erreur (≠ saveLead silencieux) → permet rollback + toast.
async function saveLeadRdvMeta(id, map){
  const { error } = await SB.from('leads').update({ rdv_meta:map }).eq('id',id).select('id').single();
  if(error) throw error;
}

// crée un lead manuellement (retourne l'objet UI) — RLS authenticated requise (connecté)
async function createLead(fields){
  const row = {
    prenom: (fields.prenom||'').trim()||null,
    nom: (fields.nom||'').trim()||null,
    email: (fields.email||'').trim()||null,
    telephone: (fields.telephone||'').trim()||null,
    source: 'manuel',
    colonne: COL_UI2DB(fields.column||'contacter'),
    date_creation: new Date().toISOString().slice(0,10),
  };
  const { data, error } = await SB.from('leads').insert(row).select().single();
  if(error) throw new Error(error.message||'Création échouée');
  return dbToLead(data, []);
}

// ajoute une ligne d'historique (note/appel/rdv/mail/paiement)
async function addActivite(lead_id, type, titre, contenu, montant, extra){
  const row={lead_id, type, titre:titre||null, contenu:contenu||null, montant:montant||null};
  if(extra){ if(extra.result!=null) row.result=extra.result; if(extra.conclusion!=null) row.conclusion=extra.conclusion; if(extra.call_kind!=null) row.call_kind=extra.call_kind; if(extra.rdv_outcome!=null) row.rdv_outcome=extra.rdv_outcome; }
  const { data, error } = await SB.from('activites').insert(row).select('id').single();
  if(error){ console.warn('addActivite',error); throw error; } // supabase-js ne throw pas : on remonte explicitement
  return data && data.id;
}
// modifier / supprimer une entrée d'historique
async function updateActivite(id, contenu){
  try{ await SB.from('activites').update({contenu}).eq('id',id); }catch(e){ console.warn('updateActivite',e); }
}
async function deleteActivite(id){
  try{ await SB.from('activites').delete().eq('id',id); }catch(e){ console.warn('deleteActivite',e); }
}

// Avancée d'étape automatique quand un RDV est fixé : SEUL le R1 → « 1er RDV pris ».
// Le R2 (et au-delà) NE change PAS l'étape (décision Nour-Mouhamad). Garde anti-rétrogradation : on n'avance
// jamais un lead déjà plus loin (qualifié/closing/à encaisser/gagné/perdu/désabonné).
const STAGE_ORDER = {contacter:0, perso:0, atc:1, rdv1:2, contacte:3, qualifie:4, closing:5, encaisser:6, won:7, lost:7, desabonne:7};
const RDV_STAGE_TERMINAL = {closing:1, encaisser:1, won:1, lost:1, desabonne:1};
function rdvTargetStage(type, cur){
  if(type!=='r1') return null;                              // R2/R3 : on ne touche pas à l'étape
  if(RDV_STAGE_TERMINAL[cur]) return null;                  // lead déjà plus avancé → intact
  return STAGE_ORDER.rdv1 > (STAGE_ORDER[cur]||0) ? 'rdv1' : null; // seulement si ça AVANCE
}

// ===== RÉSULTAT D'UN RDV (présence) — fait structuré, stocké chez nous (CalendIQ = lecture seule) =====
// présent = le prospect était là (« RDV terminé ») · no-show = absent. C'est la DONNÉE qui pilote l'UI.
const OUTCOME_META = {
  present: {label:'Présent', color:'var(--ok)'},
  no_show: {label:'No-show', color:'var(--danger)'},
};
const RDV_DEBRIEF_DELAY_MIN = 0; // le bloc « à traiter » apparaît DÈS la fin du RDV (pas pendant le call)
// fin estimée d'un RDV (start + durée). CalendIQ fournit duration_minutes ; sinon fallback par type.
function rdvEndMs(rdv){ const s=new Date(rdv.start_at).getTime(); const d=rdv.duration_minutes||RDV_DUR[rdv.type]||45; return s + d*60000; }
// machine d'états d'une carte RDV : outcome (présent/no_show) prime ; sinon dérivé du temps.
//  upcoming (avant l'heure) · live (en cours + 10 min de grâce après la fin) · todo (à traiter)
function rdvState(rdv, now){
  if(rdv.outcome==='present'||rdv.outcome==='no_show') return rdv.outcome;
  const s=new Date(rdv.start_at).getTime();
  if(now < s) return 'upcoming';
  if(now < rdvEndMs(rdv) + RDV_DEBRIEF_DELAY_MIN*60000) return 'live';
  return 'todo';
}
// quel RDV un débrief concerne : on cible le RDV passé du bon type (sinon le plus récent passé), jamais à l'aveugle.
function pickRecapTargetRdv(rdvs, callKind){
  if(!rdvs || !rdvs.length) return null;
  const now=Date.now();
  const past=rdvs.filter(r=>new Date(r.start_at).getTime()<=now);
  if(!past.length) return null; // un débrief concerne un RDV PASSÉ — jamais auto-taguer un créneau à venir
  const typed=callKind?past.filter(r=>r.type===callKind):[];
  const cand=typed.length?typed:past;
  return cand.slice().sort((a,b)=>new Date(b.start_at)-new Date(a.start_at))[0]||null;
}

function fmtPhone(t){
  if(!t) return '';
  const d=String(t).replace(/[^\d+]/g,'');
  let m=d.match(/^\+33(\d)(\d\d)(\d\d)(\d\d)(\d\d)$/);
  if(m) return '+33 '+m[1]+' '+m[2]+' '+m[3]+' '+m[4]+' '+m[5];
  m=d.match(/^0(\d)(\d\d)(\d\d)(\d\d)(\d\d)$/);
  if(m) return '0'+m[1]+' '+m[2]+' '+m[3]+' '+m[4]+' '+m[5];
  return t;
}

// ISO -> valeur d'un <input type="datetime-local"> (heure locale) — pour pré-remplir la reprogrammation
function toLocalInput(iso){ const d=new Date(iso); if(isNaN(d)) return ''; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

// Modale « Ajouter un RDV CalendIQ » : type R1/R2 (durée par défaut R1=45 / R2=30, modifiable) + date/heure,
// pré-remplie avec les infos du lead. Crée un VRAI RDV dans le CalendIQ du closer connecté.
// Sélecteur date + heure connecté aux VRAIES dispos CalendIQ (comme leur page de booking) :
// jours filtrés sur les horaires de l'organizer (profiles.availability), créneaux filtrés sur
// l'occupation réelle (google-busy-slots = Google Calendar + RDV existants). Layout 2 colonnes.
const DTP_WD=['lun','mar','mer','jeu','ven','sam','dim'];
const DTP_WDKEY=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DTP_MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const dtpPad=n=>String(n).padStart(2,'0');
function DateTimePicker({ organizerId, duration, value, onChange }){
  const v0 = value? new Date(value) : null;
  const [day,setDay]=useState(v0? new Date(v0.getFullYear(),v0.getMonth(),v0.getDate()) : null);
  const [hm,setHm]=useState(v0? {h:v0.getHours(),m:v0.getMinutes()} : null);
  const base0 = day||v0||new Date();
  const [vy,setVy]=useState(base0.getFullYear());
  const [vm,setVm]=useState(base0.getMonth());
  const [avail,setAvail]=useState(null);   // {monday:{enabled,start,end},…} (null = pas encore chargé)
  const [busy,setBusy]=useState([]);        // [{start,end}] du jour sélectionné
  const [loading,setLoading]=useState(false);

  // horaires de travail de l'organizer (1 fois)
  useEffect(()=>{ if(!organizerId) return; let on=true;
    cqGet('profiles?id=eq.'+encodeURIComponent(organizerId)+'&select=availability').then(r=>{ if(on&&r&&r[0]) setAvail(r[0].availability||{}); }).catch(()=>{ if(on) setAvail({}); });
    return ()=>{on=false;};
  },[organizerId]);
  // émet la valeur combinée
  useEffect(()=>{ onChange( (day&&hm)? `${day.getFullYear()}-${dtpPad(day.getMonth()+1)}-${dtpPad(day.getDate())}T${dtpPad(hm.h)}:${dtpPad(hm.m)}` : '' ); },[day,hm]);
  // créneaux occupés du jour sélectionné (Google + RDV existants)
  useEffect(()=>{ if(!day||!organizerId){ setBusy([]); return; } let on=true; setLoading(true);
    const ds=`${day.getFullYear()}-${dtpPad(day.getMonth()+1)}-${dtpPad(day.getDate())}`;
    cqInvoke('google-busy-slots',{ organizer_id:organizerId, date:ds, organizer_timezone:'Europe/Paris' })
      .then(r=>{ if(on) setBusy((r&&r.busy)||[]); }).catch(()=>{ if(on) setBusy([]); }).finally(()=>{ if(on) setLoading(false); });
    return ()=>{on=false;};
  },[day,organizerId]);

  const today=new Date(); today.setHours(0,0,0,0);
  const winFor=(dt)=>{ const a=avail&&avail[DTP_WDKEY[dt.getDay()]]; return (a&&a.enabled!==false)?a:null; };
  const dayDisabled=(d)=>{ const dt=new Date(vy,vm,d); if(dt<today) return true; if(avail) return !winFor(dt); return false; };
  const first=new Date(vy,vm,1); const lead=(first.getDay()+6)%7; const dim=new Date(vy,vm+1,0).getDate();
  const cells=[]; for(let i=0;i<lead;i++) cells.push(null); for(let d=1;d<=dim;d++) cells.push(d);
  const isSelDay=d=> day && day.getFullYear()===vy && day.getMonth()===vm && day.getDate()===d;
  const isTodayCell=d=> +new Date(vy,vm,d)===+today;
  const canPrev = +new Date(vy,vm,1) > +new Date(today.getFullYear(),today.getMonth(),1);
  const prevMonth=()=>{ if(vm<=0){ setVm(11); setVy(vy-1); } else setVm(vm-1); };
  const nextMonth=()=>{ if(vm>=11){ setVm(0); setVy(vy+1); } else setVm(vm+1); };

  // créneaux libres = fenêtre de travail × pas(durée) − occupés − passé
  const slots = useMemo(()=>{
    if(!day) return [];
    const win = winFor(day) || { start:'09:00', end:'18:00' }; // fallback si dispo absente
    const [sh,sm]=win.start.split(':').map(Number); const [eh,em]=win.end.split(':').map(Number);
    const wStart=new Date(day); wStart.setHours(sh,sm,0,0);
    const wEnd=new Date(day); wEnd.setHours(eh,em,0,0);
    const now=Date.now(), step=Math.max(15,duration)*60000;
    const bz=busy.map(b=>[+new Date(b.start),+new Date(b.end)]);
    const out=[];
    for(let t=+wStart; t+duration*60000<=+wEnd+1; t+=step){
      const s=t, e=t+duration*60000;
      if(s<=now) continue;
      if(bz.some(([bs,be])=> s<be && e>bs)) continue;
      const d=new Date(s); out.push({h:d.getHours(),m:d.getMinutes()});
    }
    return out;
  },[day,busy,duration,avail]);
  // si l'heure choisie n'est plus libre (durée changée, RDV repris) → on la déselectionne
  useEffect(()=>{ if(hm && !slots.some(s=>s.h===hm.h&&s.m===hm.m)) setHm(null); },[slots]);

  return (
    <div className="dtp">
      <div className="dtp-cal">
        <div className="dtp-head">
          <button type="button" className="dtp-nav" disabled={!canPrev} onClick={prevMonth} aria-label="Mois précédent">‹</button>
          <span className="dtp-title">{DTP_MONTHS[vm]} {vy}</span>
          <button type="button" className="dtp-nav" onClick={nextMonth} aria-label="Mois suivant">›</button>
        </div>
        <div className="dtp-wd">{DTP_WD.map(w=><span key={w}>{w}</span>)}</div>
        <div className="dtp-grid">
          {cells.map((d,i)=> d===null
            ? <span key={i} className="dtp-empty"></span>
            : <button type="button" key={i} disabled={dayDisabled(d)} onClick={()=>{ setHm(null); setDay(new Date(vy,vm,d)); }}
                className={'dtp-day'+(isSelDay(d)?' sel':'')+(isTodayCell(d)?' today':'')}>{d}</button>)}
        </div>
      </div>
      <div className="dtp-times">
        {!day ? <div className="dtp-hint">Choisis un jour</div>
          : loading ? <div className="dtp-hint">Chargement des créneaux…</div>
          : slots.length===0 ? <div className="dtp-hint">Aucun créneau libre ce jour</div>
          : slots.map(({h,m})=> <button type="button" key={h+':'+m}
              className={'dtp-time'+(hm&&hm.h===h&&hm.m===m?' sel':'')} onClick={()=>setHm({h,m})}>{dtpPad(h)}:{dtpPad(m)}</button>)}
      </div>
    </div>
  );
}

/* Carte RDV unique — machine d'états présent/no-show. Présentation pure : tous les faits viennent de `rdv`,
   toutes les actions remontent via props. Partagée par RdvList (CalendIQ) et ManualRdvField (saisie manuelle). */
function RdvCard({ rdv, onModify, onCancel, onOutcome, onClearOutcome }){
  const [tick,setTick]=useState(0);
  // re-render PILE au prochain seuil (début / fin+10min) sans interval global → zéro jank sur le board.
  useEffect(()=>{
    if(rdv.outcome==='present'||rdv.outcome==='no_show') return; // figé : aucun timer
    const now=Date.now();
    const thr=[new Date(rdv.start_at).getTime(), rdvEndMs(rdv)+RDV_DEBRIEF_DELAY_MIN*60000].filter(t=>t>now);
    if(!thr.length) return;
    const ms=Math.min(Math.min(...thr)-now+500, 2147483000);
    const id=setTimeout(()=>setTick(n=>n+1), ms);
    return ()=>clearTimeout(id);
  },[rdv.start_at, rdv.duration_minutes, rdv.outcome, tick]);
  const st=rdvState(rdv, Date.now());
  const settled = st==='present'||st==='no_show';
  const oc = settled ? OUTCOME_META[st] : null;
  const typeLabel=(rdv.type||'r1').toUpperCase();
  const dur=rdv.duration_minutes||RDV_DUR[rdv.type]||45;
  const canJoin = rdv.meet_link && (st==='upcoming'||st==='live');
  const showTools = (onModify||onCancel) && st!=='present';
  const cls='rdvcard'+(st==='live'?' rdv-live':'')+(st==='todo'?' rdv-todo':'')+(st==='present'?' rdv-present':'')+(st==='no_show'?' rdv-noshow':'');
  return (
    <div className={cls}>
      <div className="rdvcard-top">
        <span className="rdvcard-ic">{settled ? (st==='present'?I.check({}):I.noshow({})) : I.agenda({})}</span>
        <div className="rdvcard-info">
          <b>{typeLabel} · {cqDayLabel(rdv.start_at)}</b>
          <span>{I.clock({})}{cqTime(rdv.start_at)} · {dur} min{st==='live'?' · en cours':''}</span>
        </div>
        {oc && <span className="rdv-verdict" style={{color:oc.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{oc.label}</span>}
      </div>
      {st==='todo' && <div className="rdv-ask">Ce RDV est passé — que s’est-il passé ?</div>}
      <div className="rdvcard-actions">
        {canJoin && <a className="rdvcard-join" href={rdv.meet_link} target="_blank" rel="noreferrer" title="Rejoindre le Google Meet">{I.video({})}Rejoindre</a>}
        {!settled && (
          <div className={'rdv-oc'+(st==='todo'?' prom':'')}>
            <button className="rdv-oc-btn present" onClick={()=>onOutcome('present')} title="Le prospect était présent (RDV terminé)">{I.check({})}Présent</button>
            <button className="rdv-oc-btn noshow" onClick={()=>onOutcome('no_show')} title="Le prospect ne s’est pas présenté">{I.noshow({})}No-show</button>
          </div>
        )}
        {settled && onClearOutcome && <button className="rdv-redo" onClick={onClearOutcome} title="Corriger le résultat">{I.pencil({})}Modifier</button>}
        {showTools && (
          <div className="rdvcard-tools">
            {onModify && <button className="rdvcard-btn" title="Reprogrammer" onClick={()=>onModify(rdv)}>{I.pencil({})}</button>}
            {onCancel && <button className="rdvcard-btn del" title="Annuler ce RDV" onClick={()=>onCancel(rdv)}>{I.trash({})}</button>}
          </div>
        )}
      </div>
    </div>
  );
}

  const save=()=>{ if(!dt) return; onSave(type, new Date(dt).toISOString(), meet.trim()||null); setEditing(false); };

        </div>
      </div>
    );
  }
  if(has){
    const key='manual:'+lead.id;
    const meta=(lead.rdvMeta&&lead.rdvMeta[key])||{};
    const rdv={ id:key, source:'manual', type:lead.rdvType||'r1', start_at:lead.rdv_at, duration_minutes:RDV_DUR[lead.rdvType||'r1']||45, meet_link:lead.rdvMeetLink||null, outcome:meta.outcome||null };
    return (

        </div>
      </div>
    );
  }
  return (
    <div className="field">
      <span className="eyebrow">Rendez-vous</span>
      <div className="rdvcard empty">
        <span>Pas de rendez-vous</span>
        <button className="rdvcard-btn" style={{marginLeft:'auto'}} title="Indiquer un rendez-vous" onClick={open}>{I.pencil({})}</button>
      </div>
    </div>
  );
}

function ActionCard({ label, done, editing, onToggle, onEditStart, onEditCancel, onEditSave, onDelete, placeholder }){
  const [v,setV]=useState(label||'');
  useEffect(()=>{ if(editing) setV(label||''); },[editing]);

    return (

          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); onEditSave(v.trim()); } if(e.key==='Escape') onEditCancel(); }}/>
        <button className="actcard-btn ok" title="Valider" onClick={()=>onEditSave(v.trim())}>{I.check({})}</button>
        <button className="actcard-btn" title="Annuler" onClick={onEditCancel}>{I.x({})}</button>
      </div>
    );
  }
  return (
    <div className={'actcard'+(done?' done':'')}>
      <span className="actcard-box" onClick={onToggle} role="checkbox" aria-checked={done} title={done?'Marquer non fait':'Marquer comme fait'}>{I.check({})}</span>
      <span className="actcard-tx" onClick={onEditStart} title="Cliquer pour modifier">{label||placeholder}</span>
      <button className="actcard-btn" title="Modifier" onClick={onEditStart}>{I.pencil({})}</button>
      <button className="actcard-btn del" title="Supprimer" onClick={onDelete}>{I.trash({})}</button>
    </div>
  );
}

/* ============================================================= LEAD CARD */
const LeadCard = React.memo(function LeadCard({lead, onOpen, onDragStart, onDragEnd, dragging, onCardDragOver, dropPos, onDelete}){
  const col = lead.column;
  let actionEl;
  if(col==='apayer'){
    actionEl = <div className="card-action money"><span className="amt">{eur(lead.offer)}</span> envoyé — en attente</div>;
  } else if(col==='paye'){
    actionEl = <div className="card-action paid"><I.check style={{width:13,height:13,strokeWidth:2.4}}/><span className="amt">{eur(lead.offer)}</span> payé</div>;
  } else if(col==='cpf'){
    actionEl = <div className="card-action"><span className="live idle"></span>{lead.admStatus==='secured'?'Dossier sécurisé':'Dossier CPF — admission'}</div>;
  } else {
    actionEl = <div className="card-action"><span className={`live ${lead.live?'':'idle'}`}></span>{lead.nextAction}</div>;
  }
  return (
    <div className={`card ${dragging?'dragging':''} ${dropPos?('drop-'+dropPos):''}`} draggable
         onDragStart={()=>onDragStart(lead.id)} onDragEnd={onDragEnd}
         onDragOver={e=>{ e.preventDefault(); e.stopPropagation();
           const r=e.currentTarget.getBoundingClientRect();
           onCardDragOver(lead.id, (e.clientY-r.top)<r.height/2?'before':'after', col); }}
         onClick={()=>onOpen(lead.id)} tabIndex={0} role="button"
         onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); onOpen(lead.id);}}}>
      <button className="card-del" title="Supprimer ce lead" aria-label="Supprimer ce lead" draggable={false}
              onClick={e=>{ e.stopPropagation(); onDelete(lead.id); }} onKeyDown={e=>e.stopPropagation()}>{I.trash({})}</button>
      <div className="card-top">
        <Avatar lead={lead} size="sz-sm"/>
        <div className="card-id">
          <div className="card-name">{lead.prenom} {lead.nom}
            {lead.noShow && <span className="tag tag-noshow">No-show</span>}
          </div>
          <div className="card-sub"><Src source={lead.source}/></div>
        </div>
      </div>
      {actionEl}
      {lead.calendiqRdv && new Date(lead.calendiqRdv.start_at).getTime()>=Date.now()-3600000 && (
        <div className="card-rdv">{I.agenda({})}<span>{cqDayLabel(lead.calendiqRdv.start_at)} · {cqTime(lead.calendiqRdv.start_at)}</span></div>
      )}
    </div>
  );
});

/* ============================================================= KANBAN BOARD */
function Board({leads, search, setSearch, onOpenLead, onReorder, onAddLead, onDelete}){
  const [dragId, setDragId] = useState(null);
  const [overCol, setOverCol] = useState(null);
  const [over, setOver] = useState(null); // {cardId, pos}
  // ATC est désormais une COLONNE à part entière -> retiré du filtre source
  const SRC_TABS=[{k:'all',label:'Tous'},{k:'lead_gen',label:'Lead gen'},{k:'webinaire',label:'Webinaire'},{k:'mff',label:'MFF'}];
  const [src, setSrc] = useState(()=>{ const s=persistedState('iqcrm_src','all'); return SRC_TABS.some(o=>o.k===s)?s:'all'; }); // filtre par source (persiste)
  const [srcOpen, setSrcOpen] = useState(false); // menu du sélecteur ouvert
  useEffect(()=>localStorage.setItem('iqcrm_src',JSON.stringify(src)),[src]);

  // compteurs par source — calculés sur la SEULE colonne « Lead à contacter »
  const srcCounts = useMemo(()=>{
    const base = leads.filter(l=>l.column==='contacter');
    const c={all:base.length, lead_gen:0, webinaire:0, mff:0};
    base.forEach(l=>{ if(c[l.source]!==undefined) c[l.source]++; });
    return c;
  },[leads]);

  const visible = useMemo(()=> leads.filter(l=>{
    // manager : voit tout (filtrage par closer ajouté au câblage des comptes)
    if(search.trim()){
      const q=search.toLowerCase();
      if(!(`${l.prenom} ${l.nom} ${l.metier} ${l.email} ${l.tel}`.toLowerCase().includes(q))) return false;
    }
    return true;
  }),[leads,search]);

  // handlers STABLES (useCallback) + regroupement mémoïsé : avec ~949 cartes, seules
  // les cartes réellement concernées (carte tirée / survolée) se re-rendent pendant un drag.
  const handleCardDragOver=useCallback((cardId,pos,colId)=>{ setOver({cardId,pos}); setOverCol(c=>c!==colId?colId:c); },[]);
  const startDrag=useCallback((id)=>setDragId(id),[]);
  const endDrag=useCallback(()=>{ setDragId(null); setOverCol(null); setOver(null); },[]);
  const openCard=useCallback((id)=>onOpenLead(id),[onOpenLead]);
  const byCol=useMemo(()=>{ const m={}; for(const c of COLUMNS) m[c.id]=[]; visible.forEach(l=>{ (m[l.column]||(m[l.column]=[])).push(l); }); return m; },[visible]);

  const dropOn=(e,colId)=>{
    e.preventDefault();
    if(dragId){
      let beforeId=null;
      if(over && over.cardId && over.cardId!==dragId){
        const colItems = visible.filter(l=>l.column===colId && l.id!==dragId);
        const idx = colItems.findIndex(l=>l.id===over.cardId);
        if(idx!==-1) beforeId = over.pos==='before' ? over.cardId : (colItems[idx+1]?colItems[idx+1].id:null);
      }
      onReorder(dragId, colId, beforeId);
    }
    setDragId(null); setOverCol(null); setOver(null);
  };

  return (
    <>
      <div className="screen-head">
        <div className="screen-title">
          <h1>Mes leads</h1>
          <p>Pipeline de closing</p>
        </div>
        <div className="head-tools">
          <div className="search">
            <I.search/><input placeholder="Rechercher un lead…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
      </div>
      <div style={{padding:'0 26px 8px'}}>
        <span className="hint"><I.leads/>Glissez une carte pour changer de colonne ou la réordonner</span>
      </div>
      <div className="board-wrap">
        <div className="board">
          {COLUMNS.map(c=>{
            const colItems = byCol[c.id]||[];        // total colonne (compteur du titre — non filtré par source)
            const items = (c.id==='contacter' && src!=='all' && !search.trim()) ? colItems.filter(l=>l.source===src) : colItems; // cartes affichées (filtre source ignoré pendant une recherche)
            return (
              <div key={c.id}
                className={`col ${overCol===c.id?'drag-over':''}`}
                onDragOver={e=>{e.preventDefault(); if(overCol!==c.id) setOverCol(c.id); setOver(null);}}
                onDragLeave={e=>{ if(e.currentTarget===e.target){ setOverCol(null); setOver(null); } }}
                onDrop={e=>dropOn(e,c.id)}>
                <div className="col-head">
                  <span className="col-dot"></span>
                  <h3>{c.label}</h3>
                  <span className="col-count">{colItems.length}</span>
                  <button className="col-add" title="Ajouter un lead" aria-label="Ajouter un lead" onClick={()=>onAddLead(c.id)}><I.plus/></button>
                </div>
                {c.id==='contacter' && (()=>{ const cur=SRC_TABS.find(o=>o.k===src)||SRC_TABS[0]; return (
                  <div className="srcdd">
                    <button className={`srcdd-btn ${srcOpen?'open':''}`} onClick={()=>setSrcOpen(o=>!o)}>
                      <span className="srcdd-pre">Source</span>
                      <span>{cur.label}</span>
                      <span className="srcdd-n">{srcCounts[cur.k]||0}</span>
                      <svg className="srcdd-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    {srcOpen && (<>
                      <div className="srcdd-ov" onClick={()=>setSrcOpen(false)}></div>
                      <div className="srcdd-menu">
                        {SRC_TABS.map(o=>(
                          <button key={o.k} className={`srcdd-item ${src===o.k?'active':''}`} onClick={()=>{ setSrc(o.k); setSrcOpen(false); }}>
                            <span>{o.label}</span><span className="n">{srcCounts[o.k]||0}</span>
                          </button>
                        ))}
                      </div>
                    </>)}
                  </div>
                ); })()}
                <div className="col-body">
                  {items.length===0 && <div className="col-empty">—</div>}
                  {items.map(l=>(
                    <LeadCard key={l.id} lead={l} dragging={dragId===l.id}
                      dropPos={dragId && over && over.cardId===l.id && over.cardId!==dragId ? over.pos : null}
                      onCardDragOver={handleCardDragOver}
                      onOpen={openCard}
                      onDragStart={startDrag}
                      onDragEnd={endDrag}
                      onDelete={onDelete}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

// appel d'une Edge Function avec le jeton Supabase de l'utilisateur connecté (validé côté serveur)
const FN_URL = SUPABASE_URL + '/functions/v1';
async function callFn(name, body){
  let token = SUPABASE_ANON;
  try{ const { data } = await SB.auth.getSession(); if(data && data.session) token = data.session.access_token; }catch(e){}
  const r = await fetch(`${FN_URL}/${name}`, { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'apikey':SUPABASE_ANON, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
  let j={}; try{ j = await r.json(); }catch(e){}
  if(!r.ok) throw new Error(j.error || ('Erreur '+name+' ('+r.status+')'));
  return j;
}

// rendu markdown léger (gras, titres ##, puces) — pas de HTML brut, on construit du React.
function mdInline(s){
  return String(s).split(/(\*\*[^*]+\*\*)/g).map((p,i)=> p.startsWith('**')&&p.endsWith('**') ? <b key={i}>{p.slice(2,-2)}</b> : p);
}
function MdText({ text }){
  const lines=String(text||'').split('\n');
  return (<div className="recap-md">{lines.map((ln,i)=>{
    const t=ln.trim();
    if(!t) return <div key={i} className="recap-sp"/>;
    if(t.startsWith('## ')) return <div key={i} className="recap-h">{t.slice(3)}</div>;
    if(t.startsWith('# ')) return <div key={i} className="recap-h">{t.slice(2)}</div>;
    if(t.startsWith('- ')||t.startsWith('• ')||t.startsWith('* ')) return <div key={i} className="recap-li">{mdInline(t.slice(2))}</div>;
    return <div key={i} className="recap-p">{mdInline(t)}</div>;
  })}</div>);
}

// Colle un transcript -> Edge Function `recap` (Gemini) -> récap adaptatif.
// Auto-applique : remplit les champs VIDES, signale les conflits sans écraser,
// sauve le récap en note datée, fait avancer l'étape R1/R2 UNIQUEMENT si un RDV est calé.
function RecapModal({ lead, onClose, onEditField, onNote, onAdvanceStage, onSetRdvOutcome }){
  const [text,setText]=useState('');
  const [phase,setPhase]=useState('input'); // input | loading | result | error
  const [result,setResult]=useState(null);
  const [applied,setApplied]=useState({filled:[], stage:{msg:''}});
  const [recapText,setRecapText]=useState('');
  const [editActions,setEditActions]=useState([]);
  const [err,setErr]=useState('');
  const alive=useRef(true);
  useEffect(()=>()=>{ alive.current=false; },[]);
  const norm=s=>(s==null?'':String(s)).trim().toLowerCase();

  async function analyze(){
    const tx=text.trim();
    if(tx.length<20) return;
    setPhase('loading'); setErr('');
    try{
      const out=await callFn('recap',{ transcript:tx, lead:{prenom:lead.prenom, nom:lead.nom, source:lead.source, column:lead.column} });
      if(!alive.current) return; // modale fermée pendant l'analyse -> on n'applique rien
      const F=out.fields||{};
      const filled=[], conflicts=[];
      const consider=(newVal, uiKey, saveKey, label, isNum)=>{
        if(newVal==null || newVal==='' || (isNum && !Number(newVal))) return;
        const cur = isNum ? (lead[uiKey]||0) : (lead[uiKey]||'');
        const curEmpty = isNum ? !cur : !String(cur).trim();
        if(curEmpty){ onEditField(uiKey, saveKey, newVal); filled.push({label, value:newVal}); }
        else if(isNum ? Number(cur)!==Number(newVal) : norm(cur)!==norm(newVal)){
          conflicts.push({label, uiKey, saveKey, cur, neu:newVal, isNum});
        }
      };
      consider(F.metier,'metier','metier','Métier',false);
      consider(F.objectif,'veut','objectif','Objectif',false);
      consider(F.cpf,'cpf','cpf','CPF dispo',true);
      consider(F.budget,'budget','budget','Budget',false);
      // récap + actions -> état ÉDITABLE (la sauvegarde en note se fait au clic "Confirmer")
      setRecapText((out.recap_markdown||'').trim());
      setEditActions((out.actions||[]).map(a=>({label:a.label, priority:a.priority||'moyenne'})));
      // étape : avance UNIQUEMENT contacter/atc -> R1 si un RDV est calé (rdv_at présent).
      // Un seul champ rdv_at ne permet pas de certifier qu'un R2 distinct est calé :
      // le passage en R2 (et toute avancée depuis un état déjà avancé) reste donc manuel.
      let stage={msg:''};
      const sg=out.suggested_stage;
      const earlyCols=['contacter','perso','atc'];
      if((sg==='r1'||sg==='r2') && earlyCols.includes(lead.column)){
        if(lead.rdv_at){ onAdvanceStage('rdv1'); stage={msg:'Étape → 1er RDV pris 🗓️'}; }
        else stage={msg:'Avancée non appliquée : aucun RDV calé (à faire à la main).', warn:true};
      }
      setApplied({filled, stage});
      setResult(out); setPhase('result');
    }catch(e){ if(!alive.current) return; setErr(e.message||'Erreur inconnue'); setPhase('error'); }
  }

  // "Confirmer" : enregistre le récap ÉDITÉ (résumé + actions) en note datée, puis ferme.
  function confirm(){
    const acts=editActions.filter(a=>a.label.trim());
    const actTxt = acts.length ? ('\n\n— Actions —\n'+acts.map(a=>'• '+a.label.trim()+(a.priority==='haute'?' (prioritaire)':'')).join('\n')) : '';
    const body=(recapText.trim()+actTxt).trim();
    const res = (result && RESULT_META[result.result]) ? result.result : null;
    const concl = (result && result.conclusion) || (res ? RESULT_META[res].label : null);
    const call_kind = inferCallKind(lead, result && result.call_type);
    if(body || res) onNote('recap', 'Récap · '+((result&&result.call_type_label)||'Call'), body, {result:res, conclusion:concl, call_kind});
    // AUTO-TAG présence : un verdict (sauf no_show) ⇒ le prospect était présent. On pose le statut sur le BON RDV.
    // Le manuel prime (le handler ignore l'IA si un statut a déjà été posé à la main). Rien si verdict absent / aucune cible.
    if(res && onSetRdvOutcome){
      const rdvs = (lead.rdvs && lead.rdvs.length) ? lead.rdvs
        : (lead.rdv_at ? [{id:'manual:'+lead.id, source:'manual', type:lead.rdvType||'r1', start_at:lead.rdv_at}] : []);
      const target = pickRecapTargetRdv(rdvs, call_kind);
      if(target) onSetRdvOutcome(target, res==='no_show'?'no_show':'present');
    }
    // l'action prioritaire du call devient l'Action du lead (catégorie Action + carte board)
    const prio = acts.find(a=>a.priority==='haute') || acts[0];
    if(prio) onEditField('nextAction','nextAction', prio.label.trim());
    onClose();
  }

  return (<>
    <div className="backdrop" onClick={onClose}></div>
    <div className="modal recap-modal" onClick={e=>e.stopPropagation()}>
      <button className="x-btn" onClick={onClose}><I.x/></button>
      <div className="m-fixhead"><div style={{fontSize:20,fontWeight:800,letterSpacing:'-.02em'}}>Récap IQ</div></div>
      {phase==='input' && (<>
        <textarea className="note-ta recap-ta" autoFocus placeholder="Colle ici le transcript du call (Granola, Zoom, notes…)" value={text} onChange={e=>setText(e.target.value)}/>
        <div className="modal-note">L'IA détecte le type de call, remplit les champs vides et propose les actions.</div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-accent" disabled={text.trim().length<20} onClick={analyze}>Résumer le call</button></div>
      </>)}
      {phase==='loading' && <div className="recap-loading"><div className="recap-spin"></div>Analyse du call en cours…</div>}
      {phase==='error' && (<>
        <div className="recap-err">{err}</div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={()=>setPhase('input')}>Réessayer</button><button className="btn btn-accent" onClick={onClose}>Fermer</button></div>
      </>)}
      {phase==='result' && result && (<>
        {(()=>{ const rk=RESULT_META[result.result]; const ck=inferCallKind(lead, result.call_type); return (
          <div className="recap-concl">
            <span className="eyebrow">Conclusion</span>
            <div className="recap-concl-row">
              {rk
                ? <span className="chip" style={{color:rk.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{ck?(callKindLabel(ck)+' · '):''}{rk.label}</span>
                : <span className="recap-type">{result.call_type_label||'Call'}</span>}
              {result.conclusion && <span className="recap-concl-tx">{result.conclusion}</span>}
            </div>
          </div>); })()}
        <textarea className="recap-edit" value={recapText} onChange={e=>setRecapText(e.target.value)} placeholder="Résumé du call (modifiable)…"/>
        <div className="recap-actions">
          <div className="recap-actions-h">Actions</div>
          {editActions.map((a,i)=>(
            <div key={i} className="recap-action-edit">
              <span className="ra-dot" style={{background: a.priority==='haute'?'var(--bad,#e5484d)':(a.priority==='basse'?'var(--t4)':'var(--accent)')}}></span>
              <input value={a.label} onChange={e=>setEditActions(arr=>arr.map((x,j)=>j===i?{...x,label:e.target.value}:x))} placeholder="Action…"/>
              <button className="ra-del" title="Retirer" onClick={()=>setEditActions(arr=>arr.filter((_,j)=>j!==i))}><I.x/></button>
            </div>
          ))}
          <button className="recap-add" onClick={()=>setEditActions(arr=>[...arr,{label:'',priority:'moyenne'}])}>+ Ajouter une action</button>
        </div>
        {applied.filled.length>0 && <div className="recap-meta"><b>Champs remplis :</b> {applied.filled.map(f=>f.label).join(', ')}</div>}
        {applied.stage.msg && <div className={`recap-stage ${applied.stage.warn?'warn':''}`}>{applied.stage.msg}</div>}
        <div className="modal-foot"><button className="btn btn-accent" onClick={confirm}>Confirmer</button></div>
      </>)}
    </div>
  </>);
}

  const Icon = isRecap ? I.spark : (tlIcon[ev.type] || I.note);
  const canEdit = !!ev.id && !isRecap;
  const startEdit=(e)=>{ e.stopPropagation(); setDraft(ev.text||''); setEditing(true); setOpen(true); };
  const save=()=>{ onEditNote(ev.id, draft.trim()); setEditing(false); };
  const toggle=()=>{ if(editing) return; if(hasBody) setOpen(o=>!o); };

    <div className={`tl-recap ${tone}`}>

          {isRecap && ev.result && RESULT_META[ev.result] && (()=>{ const rk=RESULT_META[ev.result]; return <span className="chip sm" style={{color:rk.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{rk.label}</span>; })()}
          <span className="tl-when">{ev.when}</span>
          {ev.id && <span className="tl-recap-actions">
            {canEdit && <button title="Modifier" onClick={startEdit}>{I.pencil({})}</button>}
            <button className="del" title="Supprimer" onClick={e=>{ e.stopPropagation(); onDeleteNote(ev.id); }}>{I.trash({})}</button>
          </span>}
        </span>
      </div>
      {(editing || (open && hasBody)) && (
        <div className="tl-recap-body">

                  {ev.conclusion && <span className="recap-concl-tx">{ev.conclusion}</span>}
                </div>
              </div>); })()}
            {ev.text && <MdText text={ev.text}/>}
            {ev.granola && (
              <div className="tl-granola">
                <div className="g-head"><I.spark style={{width:13,height:13,strokeWidth:2,color:'var(--accent)'}}/><span className="eyebrow">Recap Granola</span></div>
                <div className="g-line"><b>Contexte —</b> {ev.granola.contexte}</div>
                <div className="g-line"><b>Pain point —</b> {ev.granola.pain}</div>
                <div className="g-line"><b>Angle —</b> {ev.granola.angle}</div>
              </div>
            )}
          </>) : (<>
            {ev.text && <div className="tl-card-text">{ev.text}</div>}
            {ev.granola && (
              <div className="tl-granola">
                <div className="g-head"><I.spark style={{width:13,height:13,strokeWidth:2,color:'var(--accent)'}}/><span className="eyebrow">Recap Granola</span></div>

function CqMeetingRow({ m, isAdmin, onOpenLead, meetingLeadId }){

  const past = new Date(m.start_at).getTime() < Date.now();
  const open=()=>{ if(leadId) onOpenLead(leadId); };
  return (
    <div className={'cq-ev'+(past?' past':'')+(leadId?' has-lead':'')} onClick={open} role={leadId?'button':undefined} tabIndex={leadId?0:undefined}
      onKeyDown={e=>{ if(leadId&&(e.key==='Enter'||e.key===' ')){ e.preventDefault(); open(); } }}>
      <div className="cq-ev-time"><b>{cqTime(m.start_at)}</b><span>{m.duration_minutes||30} min</span></div>
      <div className="cq-ev-main">
        <b>{m.booker_name||'Sans nom'}</b>
        <span>{m.title||'Rendez-vous'}{isAdmin&&m._closerName?(' · '+m._closerName):''}</span>
      </div>
      <div className="cq-ev-act" onClick={e=>e.stopPropagation()}>
        {m.meet_link && <a className="cq-pill" href={m.meet_link} target="_blank" rel="noreferrer" title="Ouvrir le lien visio">{I.video({})}Meet</a>}
        {leadId ? <span className="cq-pill lead">Fiche{I.arrowR({})}</span> : <span className="cq-pill ghost" title="Aucun lead CRM correspondant">Hors CRM</span>}
      </div>
    </div>
  );
}

function Agenda({ meetings, sources, loading, error, isAdmin, profile, onConnect, onDisconnect, onRefresh, onOpenLead, meetingLeadId }){
  const connected = !!(sources && sources.length);
  const ownConnected = !!(profile && profile.calendiq_organizer_id);
  const [tab,setTab]=useState('rdv');   // 'rdv' = liste CRM | 'cal' = dashboard CalendIQ (closer)
  const [manage,setManage]=useState(false);
  const now=Date.now();
  const upcoming = meetings.filter(m=>m.status==='confirmed' && new Date(m.start_at).getTime()>=now-3600000)
                           .sort((a,b)=>new Date(a.start_at)-new Date(b.start_at));
  const days = cqGroupByDay(upcoming);
  const sub = isAdmin
    ? ('Agenda de l’équipe · '+sources.length+' closer'+(sources.length>1?'s':'')+' connecté'+(sources.length>1?'s':''))
    : (ownConnected ? 'Tes rendez-vous CalendIQ' : 'Connecte ton agenda CalendIQ');

  return (
    <>
      <div className="screen-head">
        <div className="screen-title"><h1>Agenda</h1><p>{sub}</p></div>
        <div className="head-tools cq-tools">
          {connected && !isAdmin && (
            <div className="seg">
              <button className={tab==='rdv'?'on':''} onClick={()=>setTab('rdv')}>Mes RDV</button>
              <button className={tab==='cal'?'on':''} onClick={()=>setTab('cal')}>CalendIQ</button>
            </div>
          )}
          {connected && <button className="btn btn-soft" onClick={onRefresh} disabled={loading}>{loading?'…':'Rafraîchir'}</button>}
          {ownConnected && <button className="icon-btn" title="Gérer la connexion CalendIQ" onClick={()=>setManage(m=>!m)}>{I.gear({})}</button>}
        </div>
      </div>

      <div className="cq-wrap">
      {error && <div className="cq-banner err">CalendIQ indisponible : {error}</div>}

      {manage && ownConnected && (
        <div className="cq-manage">
          <div className="cq-manage-row">
            <span className="ag-dot"></span>
            <div className="ag-meta"><b>{profile.calendiq_name||profile.calendiq_slug}</b><span>{CALENDIQ.app+'/cal/'+profile.calendiq_slug}</span></div>
            <button className="btn btn-ghost" onClick={async()=>{ await onDisconnect(); setManage(false); }}>Déconnecter</button>
          </div>
          <div className="ag-sep"></div>
          <CalendiqConnect onConnect={onConnect} onCancel={()=>setManage(false)}/>
        </div>
      )}

      {/* pas encore connecté */}
      {!connected && !isAdmin && !manage && (
        <div className="cq-hero"><CalendiqConnect onConnect={onConnect} hero/></div>
      )}
      {!connected && isAdmin && (
        <div className="empty-screen"><I.agenda/><p>Aucun closer n’a connecté son CalendIQ.</p>
          <span style={{fontSize:13,color:'var(--t3)',maxWidth:400,textAlign:'center',lineHeight:1.5}}>Chaque closer connecte son agenda depuis son onglet Agenda. Leurs rendez-vous s’afficheront ici, agrégés et reliés aux leads.</span></div>
      )}

      {/* connecté · closer · dashboard CalendIQ embarqué */}
      {connected && !isAdmin && tab==='cal' && (
        <div className="cq-frame">
          <div className="cq-frame-note">{I.spark({})}<span>Gère tes créneaux, replanifie ou annule directement ici. Première fois ? Connecte-toi à CalendIQ dans le cadre — une seule fois.</span></div>
          <iframe className="cq-iframe" src={CALENDIQ.app+'/dashboard'} title="CalendIQ" allow="clipboard-read; clipboard-write"></iframe>
        </div>
      )}

      {/* connecté · liste des RDV (closer onglet RDV + admin agrégé) */}
      {connected && (isAdmin || tab==='rdv') && (
        <div className="cq-agenda">
          {isAdmin && (
            <div className="cq-closers">
              {sources.map(s=>{ const n=upcoming.filter(m=>m._closerId===s.id).length; return (
                <div className="cq-closer-chip" key={s.id}><span className="ag-dot"></span><b>{s.name}</b><span className="cq-closer-n">{n}</span></div>
              ); })}
            </div>
          )}
          {loading && !meetings.length ? <div className="cq-empty">Chargement de l’agenda…</div>
            : days.length===0 ? <div className="cq-empty">Aucun rendez-vous à venir.</div>
            : days.map(d=>(
              <div className="cq-day" key={d.key}>
                <div className="cq-day-h">{d.label}<span>{d.items.length} RDV</span></div>
                {d.items.map(m=>(
                  <CqMeetingRow key={m.id} m={m} isAdmin={isAdmin} onOpenLead={onOpenLead} meetingLeadId={meetingLeadId}/>
                ))}
              </div>
            ))}
        </div>
      )}
      </div>
    </>
  );
}
