<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cockpit · CRM Closing IQ Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================== TOKENS ============================== */
:root{
  --page:#f7f7f8; --surface:#ffffff; --surface-2:#f7f7f8; --surface-3:#ececee;
  --b1:#ececee; --b2:#d2d2d4; --b3:#a8a8aa;
  --t1:#1d1d1e; --t2:#565658; --t3:#7a7a7c; --t4:#a8a8aa;
  --accent:#f35c04; --accent-h:#d45606; --on-accent:#ffffff;
  --accent-tint:rgba(243,92,4,.10); --accent-tint-2:rgba(243,92,4,.16);
  --hot:#f35c04; --warm:#ff9b40; --cold:#a8a8aa;
  --danger:#d4452a; --danger-tint:rgba(212,69,42,.10);
  --ok:#2e9e5b; --ok-tint:rgba(46,158,91,.12);
  --r-card:14px; --r-panel:18px; --r-pill:999px;
  --sh-card:0 1px 2px rgba(29,29,30,.06), 0 1px 3px rgba(29,29,30,.05);
  --sh-pop:0 18px 50px rgba(29,29,30,.18), 0 2px 8px rgba(29,29,30,.08);
  --sh-lift:0 8px 24px rgba(29,29,30,.12);
  --glow:0 10px 40px rgba(243,92,4,.30);
  --grad-brand:linear-gradient(96deg,#1d1d1e 0%,#1d1d1e 40%,#5a2e14 60%,#a8460c 78%,#e2580a 92%,#f86a06 100%);
  --rail:188px;
  --pad:14px;
  --speed:.22s; --ease:cubic-bezier(0.22,1,0.36,1);
}
[data-theme="dark"]{
  --page:#1d1d1e; --surface:#2c2c2e; --surface-2:#232324; --surface-3:#3a3a3c;
  --b1:rgba(255,255,255,.14); --b2:rgba(255,255,255,.20); --b3:rgba(255,255,255,.28);
  --t1:#ffffff; --t2:rgba(255,255,255,.66); --t3:rgba(255,255,255,.42); --t4:rgba(255,255,255,.30);
  --accent:#f35c04; --accent-h:#ff6f12; --on-accent:#ffffff;
  --accent-tint:rgba(243,92,4,.16); --accent-tint-2:rgba(243,92,4,.24);
  --hot:#ff7a00; --warm:#ff9b40; --cold:#7a7a7c;
  --danger:#f2685c; --danger-tint:rgba(242,104,92,.16);
  --ok:#6fcf8e; --ok-tint:rgba(111,207,142,.16);
  --sh-card:0 1px 2px rgba(0,0,0,.30), 0 1px 3px rgba(0,0,0,.25);
  --sh-pop:0 18px 50px rgba(0,0,0,.55), 0 2px 10px rgba(0,0,0,.4);
  --sh-lift:0 6px 20px rgba(0,0,0,.45);
  --glow:0 10px 40px rgba(243,92,4,.38);
}
[data-density="compact"]{ --pad:10px; }
[data-density="cozy"]{ --pad:18px; }

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:var(--page); color:var(--t1);
  font-size:14.5px; line-height:1.45; -webkit-font-smoothing:antialiased;
  letter-spacing:-.006em; overflow:hidden;
}
#root{height:100vh}
.mono{font-family:'JetBrains Mono',monospace; font-feature-settings:"tnum" 1; letter-spacing:-.01em}
h1,h2,h3,h4{font-family:'Gabarito',system-ui,sans-serif; letter-spacing:-.02em; line-height:1.08; font-weight:800}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
button:disabled{cursor:not-allowed}
input,textarea{font-family:inherit; color:inherit}
::selection{background:var(--accent-tint-2)}
:focus-visible{outline:2.5px solid var(--accent); outline-offset:2px; border-radius:6px}
::-webkit-scrollbar{height:11px; width:11px}
::-webkit-scrollbar-thumb{background:var(--b2); border-radius:99px; border:3px solid transparent; background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--b3); background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ============================== APP SHELL ============================== */
.app{display:grid; grid-template-columns:var(--rail) 1fr; height:100vh; overflow:hidden}

/* ----- nav rail ----- */
.rail{
  background:var(--surface); border-right:1px solid var(--b1);
  display:flex; flex-direction:column; padding:16px 12px; gap:3px; min-width:0;
}
.logo{display:flex; align-items:center; padding:4px 6px 18px}
.logo-img{width:100%; max-width:152px; height:auto; display:block}
.logo-mark{
  width:30px; height:30px; border-radius:9px; flex:none;
  display:grid; place-items:center;
  box-shadow:0 4px 14px rgba(255,122,0,.35);
}
.logo-txt{font-weight:800; font-size:14px; letter-spacing:-.03em}
.logo-txt span{display:block; font-size:10.5px; font-weight:500; color:var(--t3); letter-spacing:.02em}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:9px;
  color:var(--t2); font-weight:600; font-size:14px; width:100%; text-align:left;
  position:relative; transition:background var(--speed), color var(--speed);
}
.nav-item svg{width:18px; height:18px; flex:none; stroke-width:1.8}
.nav-item:hover{background:var(--surface-2); color:var(--t1)}
.nav-item.active{background:var(--accent-tint); color:var(--accent)}
.nav-item.active::before{
  content:''; position:absolute; left:-12px; top:8px; bottom:8px; width:3px;
  background:var(--accent); border-radius:0 3px 3px 0;
}
.nav-badge{margin-left:auto; font-size:11px; font-weight:700; background:var(--accent); color:var(--on-accent);
  border-radius:99px; min-width:19px; height:19px; padding:0 6px; display:grid; place-items:center}
.rail-spacer{flex:1}
.rail-tools{display:flex; gap:6px; padding:0 4px 8px}
.icon-btn{
  width:34px; height:34px; border-radius:9px; display:grid; place-items:center; color:var(--t2);
  border:1px solid transparent; transition:all var(--speed);
}
.icon-btn:hover{background:var(--surface-2); color:var(--t1); border-color:var(--b1)}
.icon-btn svg{width:17px; height:17px; stroke-width:1.8}
.profile{
  display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; border:1px solid var(--b1);
  background:var(--surface-2); width:100%; text-align:left; transition:all var(--speed);
}
.profile:hover{border-color:var(--b2)}
.profile-meta{min-width:0}
.profile-meta b{font-size:13px; display:block; font-weight:700}
.profile-meta span{font-size:10.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; font-weight:600}

/* ----- avatar ----- */
.avatar{
  border-radius:9px; display:grid; place-items:center; font-weight:700; flex:none;
  font-size:12px; letter-spacing:-.02em; color:var(--accent); background:var(--accent-tint);
  border:1px solid var(--accent-tint-2);
}
.avatar.sz-sm{width:30px; height:30px; font-size:11px; border-radius:8px}
.avatar.sz-md{width:38px; height:38px}
.avatar.sz-lg{width:46px; height:46px; font-size:15px; border-radius:11px}
.avatar.muted{color:var(--t2); background:var(--surface-3); border-color:var(--b1)}

/* ----- work area ----- */
.work{min-width:0; min-height:0; display:flex; flex-direction:column; overflow:hidden; position:relative}
.screen-head{padding:20px 26px 14px; display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap}
.screen-title h1{font-size:23px}
.screen-title p{color:var(--t3); font-size:13px; margin-top:3px; font-weight:500}
.head-tools{margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap}

/* ----- inputs ----- */
.search{
  display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--b1);
  border-radius:9px; padding:8px 12px; min-width:230px; transition:border var(--speed), box-shadow var(--speed);
}
.search:focus-within{border-color:var(--b3); box-shadow:0 0 0 3px var(--accent-tint)}
.search svg{width:16px; height:16px; color:var(--t3); flex:none; stroke-width:1.9}
.search input{border:none; background:none; outline:none; width:100%; font-size:13.5px}
.search input::placeholder{color:var(--t4)}

.seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:3px; gap:2px}
.seg button{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font-size:12.5px; font-weight:600; color:var(--t2); transition:all var(--speed)}
.seg button svg{width:14px; height:14px; stroke-width:2}
.seg button.on{background:var(--surface); color:var(--t1); box-shadow:var(--sh-card)}

.btn{display:inline-flex; align-items:center; gap:8px; padding:10px 17px; border-radius:var(--r-pill); font-weight:700; font-size:13.5px; transition:all var(--speed); border:1px solid transparent}
.btn svg{width:16px; height:16px; stroke-width:2}
.btn-accent{background:var(--accent); color:var(--on-accent); box-shadow:var(--glow)}
.btn-accent:hover{background:var(--accent-h)}
.btn-ghost{background:var(--surface); border-color:var(--b1); color:var(--t1)}
.btn-ghost:hover{border-color:var(--b3); background:var(--surface-2)}
.btn-soft{background:var(--surface-2); color:var(--t1); border-color:var(--b1)}
.btn-soft:hover{background:var(--surface-3)}
.btn .dot{width:7px; height:7px; border-radius:99px; background:currentColor}
.pulse-dot{position:relative}
.pulse-dot::after{content:''; position:absolute; inset:-4px; border-radius:99px; border:1.5px solid currentColor; opacity:.6; animation:ring 1.6s ease-out infinite}
@keyframes ring{0%{transform:scale(.6); opacity:.7}100%{transform:scale(1.9); opacity:0}}

.hint{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; color:var(--t3); font-weight:500; padding:5px 11px; background:var(--surface-2); border:1px dashed var(--b2); border-radius:99px}
.hint svg{width:13px; height:13px; stroke-width:1.8}

/* ----- meta / mono labels ----- */
.eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:var(--t3)}
.src{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3)}


/* ----- badges ----- */
.tag{font-family:'JetBrains Mono',monospace; font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:3px 7px; border-radius:6px; display:inline-flex; align-items:center; gap:4px}
.tag-noshow{background:var(--danger-tint); color:var(--danger)}
.tag-ok{background:var(--ok-tint); color:var(--ok)}
.tag-prefilled{background:var(--surface-3); color:var(--t2); border:1px solid var(--b1)}
.tag-wait{background:var(--accent-tint); color:var(--accent)}

/* ============================== KANBAN ============================== */
.board-wrap{flex:1; min-height:0; overflow-x:auto; overflow-y:hidden; padding:4px 26px 24px}
.board{display:flex; gap:16px; height:100%; min-height:0; width:max-content}
.col{
  width:282px; flex:none; display:flex; flex-direction:column; min-height:0;
  background:var(--surface-2); border:1px solid var(--b1); border-radius:var(--r-panel);
  transition:background var(--speed), border-color var(--speed), box-shadow var(--speed);
}
.col.drag-over{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); background:var(--accent-tint)}
.col-head{display:flex; align-items:center; gap:8px; padding:13px 14px 10px}
.col-dot{width:8px; height:8px; border-radius:99px; background:var(--b3)}
.col-head h3{font-size:13px; font-weight:700; letter-spacing:-.01em}
.col-count{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:1px 7px}
.col-add{margin-left:auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:var(--t3)}
.col-add:hover{background:var(--surface); color:var(--t1)}
.col-add svg{width:15px; height:15px; stroke-width:2}
.col-body{flex:1; min-height:0; overflow-y:auto; padding:4px 10px 12px; display:flex; flex-direction:column; gap:9px}
.col-empty{margin:6px 4px; padding:18px 12px; border:1px dashed var(--b2); border-radius:10px; text-align:center; color:var(--t4); font-size:12px; font-weight:500}

.card{
  background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-card);
  padding:11px 12px; cursor:pointer; transition:transform var(--speed), box-shadow var(--speed), border-color var(--speed);
  box-shadow:var(--sh-card); position:relative;
}
.card:hover{border-color:var(--b3); box-shadow:var(--sh-lift); transform:translateY(-1px)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.35; transform:scale(.98)}
.card.drop-before::before,.card.drop-after::after{content:''; position:absolute; left:0; right:0; height:3px; background:var(--accent); border-radius:3px; box-shadow:0 0 0 3px var(--accent-tint)}
.card.drop-before::before{top:-6px}
.card.drop-after::after{bottom:-6px}
.card-top{display:flex; gap:10px; align-items:flex-start}
.card-id{min-width:0; flex:1}
.card-name{font-weight:700; font-size:14px; letter-spacing:-.02em; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.card-sub{display:flex; align-items:center; gap:7px; margin-top:3px}
.card-action{margin-top:10px; display:flex; align-items:center; gap:7px; font-size:12px; color:var(--t2); background:var(--surface-2); border-radius:8px; padding:6px 9px; font-weight:600}
.card-action .live{width:6px; height:6px; border-radius:99px; background:var(--accent); flex:none}
.card-action .live.idle{background:var(--b3)}
.card-action.money{color:var(--accent)}
.card-action.paid{color:var(--ok)}
.card-action.confirmed{color:var(--ok)}
.card-action.confirmed .live{background:var(--ok)}
.card-action .amt{font-family:'JetBrains Mono',monospace; font-weight:700}

/* ============================== FICHE ============================== */
.fiche{flex:1; min-height:0; overflow-y:auto; padding:0 26px 30px}
.fiche-head{display:flex; align-items:center; gap:16px; padding:18px 0 16px; flex-wrap:wrap; border-bottom:1px solid var(--b1); margin-bottom:18px}
.back{display:inline-flex; align-items:center; gap:6px; color:var(--t2); font-weight:600; font-size:13px; padding:6px 10px; border-radius:8px}
.back:hover{background:var(--surface-2); color:var(--t1)}
.back svg{width:15px; height:15px; stroke-width:2}
.fiche-id h1{font-size:22px; display:flex; align-items:center; gap:9px}
.fiche-contacts{display:flex; align-items:center; gap:14px; margin-top:6px; flex-wrap:wrap}
.contact{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--t2); font-weight:500}
.contact svg{width:14px; height:14px; stroke-width:1.9; color:var(--t3)}
.contact.phone{cursor:pointer; color:var(--t1)}
.contact.phone:hover{color:var(--accent)}
.contact.phone:hover svg{color:var(--accent)}
.contact .mono{color:var(--t1); font-weight:500}
.status-pill{margin-left:auto; display:inline-flex; align-items:center; gap:7px; padding:7px 13px; border-radius:99px; background:var(--surface-2); border:1px solid var(--b1); font-weight:700; font-size:12.5px}
.status-pill .sdot{width:8px; height:8px; border-radius:99px}

.fiche-grid{display:grid; grid-template-columns:1fr 1.15fr .9fr; gap:16px; align-items:start}
@media(max-width:1180px){.fiche-grid{grid-template-columns:1fr 1fr}}
.panel{background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-panel); overflow:hidden}
.panel-head{display:flex; align-items:center; justify-content:space-between; gap:8px; min-height:55px; box-sizing:border-box; padding:10px 16px; border-bottom:1px solid var(--b1); background:var(--surface-2)}
.panel-head .eyebrow{font-size:10.5px}
.panel-head .btn-soft{background:var(--surface); border-color:var(--b2)}
.panel-head .btn-soft:hover{background:var(--surface-3); border-color:var(--b3)}
.panel-body{padding:6px 16px 16px}

.field{padding:13px 0; border-bottom:1px solid var(--b1)}
.field:last-child{border-bottom:none}
.field .eyebrow{display:block; margin-bottom:5px}
.field .val{font-size:15px; font-weight:600}
.field .val-sub{font-size:12.5px; color:var(--t3); margin-top:3px; font-weight:500}
.todo-line{display:flex; align-items:center; gap:9px; font-size:13px; color:var(--t2); padding:4px 0; font-weight:500}
.todo-dot{width:13px; height:13px; border-radius:5px; border:1.5px solid var(--b3); flex:none}
.field .val.big{font-size:21px; font-weight:800; letter-spacing:-.03em}
.field .val.mono{font-family:'JetBrains Mono',monospace}
.field .val .unit{font-size:13px; color:var(--t3); font-weight:600; margin-left:5px}
/* catégorie Action (panneau Situation) — action éditable + case « réalisée » */
.action-row{display:flex; align-items:center; gap:11px; padding:2px 0}
.action-box{flex:none; width:20px; height:20px; border-radius:6px; border:2px solid var(--b3); display:grid; place-items:center; cursor:pointer; transition:all var(--speed)}
.action-box svg{width:12px; height:12px; stroke-width:3.2; color:var(--on-accent); opacity:0; transform:scale(.5); transition:all var(--speed)}
.action-box:hover{border-color:var(--accent)}
.action-row.done .action-box{background:var(--accent); border-color:var(--accent)}
.action-row.done .action-box svg{opacity:1; transform:scale(1)}
.action-tx{flex:1; min-width:0; font-size:14px; font-weight:600; color:var(--t1); line-height:1.4; cursor:pointer; padding:3px 6px; margin:-3px -6px; border-radius:6px; transition:background var(--speed)}
.action-tx:hover{background:var(--surface-2)}
.action-row.done .action-tx{color:var(--t3); text-decoration:line-through}
.action-edit{flex:1; min-width:0; background:var(--surface); border:1px solid var(--accent); border-radius:7px; padding:5px 9px; color:var(--t1); font-size:14px; font-weight:600; font-family:inherit; outline:none}
.action-edit-li{flex:1; min-width:0; background:none; border:1px solid transparent; border-radius:7px; padding:5px 6px; margin:-1px -6px; color:var(--t1); font-size:14px; font-weight:600; font-family:inherit; outline:none; transition:border-color var(--speed)}
.action-edit-li::placeholder{color:var(--t4)}
.action-edit-li:hover{border-color:var(--b1)}
.action-edit-li:focus{border-color:var(--accent); background:var(--surface)}
.action-row.done .action-edit-li{color:var(--t3); text-decoration:line-through}
.action-del{flex:none; width:22px; height:22px; border-radius:6px; display:grid; place-items:center; color:var(--t4); cursor:pointer; background:none; opacity:0; transition:all var(--speed)}
.action-row:hover .action-del{opacity:1}
.action-del:hover{color:var(--danger); background:var(--surface-2)}
.action-del svg{width:13px; height:13px}
.action-add{margin-top:6px; font-size:12.5px; color:var(--accent); background:none; cursor:pointer; font-weight:600; padding:4px 2px}
.action-add:hover{text-decoration:underline}
/* cartes action (format rectangle, comme les notes Historique) */
.actlist{display:flex; flex-direction:column; gap:8px}
.actcard{display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid var(--b1); border-radius:10px; background:var(--surface-2); transition:border-color var(--speed)}
.actcard:hover{border-color:var(--b3)}
.actcard.done{opacity:.6}
.actcard.done .actcard-tx{text-decoration:line-through; color:var(--t3)}
.actcard-box{width:22px; height:22px; flex:none; border-radius:7px; border:1.8px solid var(--b3); display:grid; place-items:center; color:transparent; cursor:pointer; transition:background var(--speed),border-color var(--speed)}
.actcard-box svg{width:13px; height:13px; stroke-width:3}
.actcard:hover .actcard-box{border-color:var(--accent)}
.actcard.done .actcard-box{background:var(--accent); border-color:var(--accent); color:var(--on-accent)}
.actcard-tx{flex:1; min-width:0; font-size:13.5px; font-weight:600; color:var(--t1); line-height:1.4; cursor:text; word-break:break-word}
.actcard-btn{width:26px; height:26px; flex:none; border-radius:7px; display:grid; place-items:center; color:var(--t3); background:none; cursor:pointer; opacity:0; transition:opacity var(--speed),color var(--speed),background var(--speed)}
.actcard:hover .actcard-btn{opacity:1}
.actcard-btn:hover{color:var(--t1); background:var(--surface)}
.actcard-btn.del:hover{color:var(--danger)}
.actcard-btn.ok{opacity:1; color:var(--accent)}
.actcard-btn svg{width:14px; height:14px; stroke-width:2}
.actcard.editing{padding:7px 9px; gap:7px}
.actcard-input{flex:1; min-width:0; background:var(--surface); border:1.5px solid var(--accent); border-radius:7px; padding:6px 9px; color:var(--t1); font-size:13.5px; font-weight:600; font-family:inherit; outline:none}
/* Parcours — historique des étapes du lead */
.parcours{padding:14px 0 2px; border-top:1px solid var(--b1); margin-top:14px}
.parcours .eyebrow{display:block; margin-bottom:9px}
.parcours-list{display:flex; flex-direction:column; gap:7px}
.parcours-step{display:flex; align-items:center; gap:10px}
.parcours-dot{flex:none; width:8px; height:8px; border-radius:50%; background:var(--accent)}
.parcours-lbl{flex:1; min-width:0; font-size:13px; font-weight:600; color:var(--t1)}
.parcours-when{font-size:11.5px; color:var(--t3); font-weight:500; white-space:nowrap}
.parcours-step.current .parcours-lbl{color:var(--accent); font-weight:700}
.parcours-step.current .parcours-dot{box-shadow:0 0 0 3px var(--accent-tint)}
/* Appropriation du lead par le closer */
.claim{display:flex; align-items:center; gap:11px; cursor:pointer; padding:7px 9px; margin:0 -9px; border-radius:9px; border:1px solid transparent; transition:all var(--speed)}
.claim:hover{background:var(--surface-2); border-color:var(--b1)}
.claim-box{flex:none; width:20px; height:20px; border-radius:6px; border:2px solid var(--b3); display:grid; place-items:center; color:transparent; transition:all var(--speed)}
.claim:hover .claim-box{border-color:var(--accent)}
.claim-box.on{background:var(--accent); border-color:var(--accent); color:#fff}
.claim-box svg{width:13px; height:13px; stroke-width:3}
.claim-tx{display:flex; flex-direction:column; line-height:1.3}
.claim-tx b{font-size:14px; font-weight:600; color:var(--t1)}
.claim-tx span{font-size:11.5px; color:var(--t3); font-weight:500}
.claim.done .claim-tx b{color:var(--accent)}
.claim.other{cursor:default}
.claim.other:hover{background:none; border-color:transparent}
.claim.other .claim-box.on{background:var(--t3); border-color:var(--t3)}
.claim.other .claim-tx b{color:var(--t2)}
/* Rendez-vous (saisie manuelle) */
.rdv-set{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
.rdv-badge{flex:none; font-size:11px; font-weight:800; letter-spacing:.04em; color:#fff; background:var(--accent); border-radius:6px; padding:3px 8px}
.rdv-when{font-size:14px; font-weight:600; color:var(--t1)}
.rdv-link{font-size:12px; color:var(--t3); background:none; cursor:pointer; font-weight:600; padding:2px}
.rdv-link:hover{color:var(--accent); text-decoration:underline}
.rdv-link.del:hover{color:var(--danger)}
.rdv-edit{display:flex; flex-direction:column; gap:9px}
.rdv-types{display:inline-flex; gap:6px}
.rdv-types button{flex:1; padding:7px 0; border-radius:8px; border:1.5px solid var(--b2); background:var(--surface); color:var(--t2); font-weight:700; font-size:13px; cursor:pointer; transition:all var(--speed)}
.rdv-types button.on{border-color:var(--accent); background:var(--accent); color:#fff}
.rdv-input{width:100%; box-sizing:border-box; background:var(--surface); border:1.5px solid var(--b2); border-radius:9px; padding:9px 11px; color:var(--t1); font-size:14px; font-family:inherit; outline:none}
.rdv-input:focus{border-color:var(--accent)}
.rdv-foot{display:flex; gap:8px}
.rdv-foot .btn{padding:7px 13px; font-size:12.5px}
/* Écran Closers (admin) */
.team-pad{padding:26px 30px; max-width:1080px; width:100%; box-sizing:border-box; height:100%; overflow:auto}
.team-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px}
.team-head h1{font-size:24px; font-weight:800; letter-spacing:-.02em}
.team-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start}
@media(max-width:900px){.team-grid{grid-template-columns:1fr}}
.team-row{display:flex; align-items:center; gap:11px; padding:10px 2px; border-bottom:1px solid var(--b1)}
.team-row:last-child{border-bottom:none}
.team-tag{font-size:11px; font-weight:700; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:2px 8px}
.team-tok{font-size:12px; color:var(--t3); flex:1; min-width:0}

/* ===== Cockpit manager ===== */
.mgr-pad{padding:24px 30px 40px; max-width:1240px; width:100%; box-sizing:border-box; height:100%; overflow:auto}
.mgr-head{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:18px}
.mgr-head h1{font-size:25px; font-weight:800; letter-spacing:-.02em}
.mgr-head p{color:var(--t3); font-size:13px; margin-top:3px; font-weight:500}
.mgr-kpis{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px}
@media(max-width:1000px){.mgr-kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface); border:1px solid var(--b1); border-radius:14px; padding:14px 15px; position:relative; overflow:hidden}
.kpi .kpi-ic{position:absolute; top:12px; right:12px; width:16px; height:16px; color:var(--t4); stroke-width:1.9}
.kpi .kpi-n{font-family:'Gabarito',sans-serif; font-size:26px; font-weight:800; letter-spacing:-.02em; line-height:1}
.kpi .kpi-l{font-size:11.5px; color:var(--t3); font-weight:600; margin-top:6px; text-transform:uppercase; letter-spacing:.04em}
.kpi.accent .kpi-n{color:var(--accent)} .kpi.ok .kpi-n{color:var(--ok)}
.mgr-sec{display:flex; align-items:center; gap:9px; margin:4px 0 12px}
.mgr-sec .eyebrow{color:var(--t3)}
.mgr-sec .mgr-count{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:1px 8px}
.lb-list{display:flex; flex-direction:column; gap:10px; margin-bottom:28px}
.lb-card{background:var(--surface); border:1px solid var(--b1); border-radius:14px; overflow:hidden; transition:border-color var(--speed) var(--ease)}
.lb-card.open{border-color:var(--b3)}
.lb-head{display:flex; align-items:center; gap:14px; padding:13px 16px; width:100%; text-align:left; cursor:pointer}
.lb-head:hover{background:var(--surface-2)}
.lb-rank{font-family:'Gabarito',sans-serif; font-weight:800; font-size:15px; color:var(--t4); width:20px; text-align:center; flex:none}
.lb-card:first-child .lb-rank{color:var(--accent)}
.lb-id{display:flex; align-items:center; gap:11px; min-width:170px; flex:none}
.lb-id b{font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.lb-metrics{display:flex; gap:22px; flex:1; min-width:0}
@media(max-width:760px){.lb-metrics{display:none}}
.lb-m{display:flex; flex-direction:column; gap:2px}
.lb-m b{font-family:'Gabarito',sans-serif; font-size:17px; font-weight:800; letter-spacing:-.02em; line-height:1}
.lb-m span{font-size:10px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em}
.lb-m.warn b{color:var(--warm)} .lb-m.won b{color:var(--ok)}
.lb-ca{display:flex; flex-direction:column; gap:5px; width:150px; flex:none}
.lb-ca-top{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
.lb-ca-top b{font-family:'Gabarito',sans-serif; font-size:17px; font-weight:800; color:var(--accent); letter-spacing:-.02em}
.lb-ca-top span{font-size:10px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em}
.lb-bar{height:5px; background:var(--surface-3); border-radius:99px; overflow:hidden}
.lb-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--accent-h),var(--accent)); border-radius:99px}
.lb-chev{color:var(--t4); transition:transform var(--speed) var(--ease); flex:none}
.lb-chev svg{width:18px; height:18px}
.lb-card.open .lb-chev{transform:rotate(90deg)}
.lb-body{border-top:1px solid var(--b1); padding:8px 10px; background:var(--surface-2)}
.lb-empty{font-size:12.5px; color:var(--t3); padding:12px 8px}
.cl-lead{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:9px 10px; border-radius:9px; cursor:pointer; transition:background var(--speed) var(--ease)}
.cl-lead:hover{background:var(--surface)}
.cl-lead-name{font-size:13.5px; font-weight:700; width:150px; flex:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.chip{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap; flex:none; display:inline-flex; align-items:center; gap:5px}
.chip .cdot{width:6px; height:6px; border-radius:99px; background:currentColor}
.chip.sm{font-size:10px; padding:1px 7px; gap:4px}
.chip-rdv{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap; flex:none; background:var(--accent-tint); color:var(--accent); display:inline-flex; align-items:center; gap:5px}
.chip-rdv svg{width:11px; height:11px; stroke-width:2}
.chip-rdv.todo{background:var(--surface-3); color:var(--warm)}
.cl-amt{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--t1); flex:none}
.cl-concl{font-size:12px; color:var(--t3); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic}
.cl-arrow{color:var(--t4); flex:none} .cl-arrow svg{width:15px; height:15px}
.cl-lead:hover .cl-arrow{color:var(--accent)}

/* timeline */
.tl{display:flex; flex-direction:column; gap:10px}
.tl-empty{font-size:12.5px; color:var(--t3); padding:4px 2px}
.tl-when{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--t3); flex:none}
.tl-card-text{font-size:13px; color:var(--t2); line-height:1.5; white-space:pre-wrap; word-break:break-word}
.tl-granola{margin-top:8px; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:10px 11px}
.tl-granola .g-head{display:flex; align-items:center; gap:7px; margin-bottom:6px}
.tl-granola .g-head .eyebrow{color:var(--accent)}
.tl-granola .g-line{font-size:12.5px; color:var(--t2); display:flex; gap:7px; padding:2px 0}
.tl-granola .g-line b{color:var(--t1); font-weight:600}
/* ---- édition inline d'une entrée d'historique ---- */
.tl-edit{margin-top:2px}
.tl-edit textarea{width:100%; min-height:58px; resize:vertical; background:var(--surface); border:1.5px solid var(--b2); border-radius:9px; padding:9px 11px; color:var(--t1); font-size:13px; font-family:inherit; line-height:1.5; box-sizing:border-box}
.tl-edit textarea:focus{border-color:var(--accent); outline:none}
.tl-edit-actions{display:flex; gap:8px; margin-top:8px}
.tl-edit-actions .btn{padding:7px 13px; font-size:12.5px}

/* actions column */
.actions{display:flex; flex-direction:column; gap:9px}
.act{
  display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:11px;
  border:1px solid var(--b1); background:var(--surface-2); text-align:left; width:100%;
  transition:all var(--speed); position:relative;
}
.act:hover{border-color:var(--b3); background:var(--surface-3)}
.act:disabled{opacity:.45; cursor:not-allowed}
.act:disabled:hover{border-color:var(--b1); background:var(--surface-2)}
.act-ic{width:34px; height:34px; border-radius:9px; display:grid; place-items:center; background:var(--surface); border:1px solid var(--b1); flex:none}
.act-ic svg{width:17px; height:17px; stroke-width:1.9; color:var(--t2)}
.act-tx b{display:block; font-weight:700; font-size:14px}
.act-tx span{font-size:11.5px; color:var(--t3); font-weight:500}
.act .chev{margin-left:auto; color:var(--t3)}
.act .chev svg{width:16px; height:16px; stroke-width:2}
.act.primary{background:var(--accent); border-color:var(--accent); box-shadow:var(--glow)}
.act.primary .act-ic{background:rgba(255,255,255,.16); border-color:transparent}
.act.primary .act-ic svg{color:var(--on-accent)}
.act.primary .act-tx b{color:var(--on-accent)}
.act.primary .act-tx span{color:rgba(255,255,255,.78)}
.act.primary:hover{background:var(--accent-h)}

/* ============================== OVERLAYS ============================== */
.backdrop{position:fixed; inset:0; background:rgba(30,20,8,.42); backdrop-filter:blur(2px); z-index:80; animation:fade .2s ease}
[data-theme="dark"] .backdrop{background:rgba(0,0,0,.6)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0; transform:translateY(8px) scale(.985)}to{opacity:1; transform:none}}
@keyframes popcenter{from{opacity:0; transform:translate(-50%,-50%) scale(.97)}to{opacity:1; transform:translate(-50%,-50%) scale(1)}}
@keyframes slideR{from{transform:translateX(24px); opacity:0}to{transform:none; opacity:1}}

/* dropdown (offre menu) */
.menu{
  position:absolute; z-index:70; background:var(--surface); border:1px solid var(--b2); border-radius:var(--r-panel);
  box-shadow:var(--sh-pop); padding:8px; min-width:268px; animation:pop .16s ease;
}
.menu-h{padding:6px 8px 8px}
.menu-item{display:flex; align-items:center; justify-content:space-between; padding:10px 11px; border-radius:9px; width:100%; transition:background var(--speed)}
.menu-item:hover{background:var(--surface-2)}
.menu-item .amt{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px}
.menu-item .tg{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--t3); font-weight:500}
.menu-sep{height:1px; background:var(--b1); margin:6px 4px}
.menu-custom{display:flex; align-items:center; gap:8px; padding:10px 11px; border-radius:9px; color:var(--t2); font-weight:600; font-size:13px; width:100%}
.menu-custom:hover{background:var(--surface-2); color:var(--t1)}
.menu-custom svg{width:15px; height:15px; stroke-width:2}

/* payment modal */
.modal{position:fixed; z-index:90; left:50%; top:50%; transform:translate(-50%,-50%);
  width:480px; max-width:calc(100vw - 40px); background:var(--surface); border:1px solid var(--b2);
  border-radius:18px; box-shadow:var(--sh-pop); padding:26px 26px 22px; animation:popcenter .18s ease}
.modal .m-eye{margin-bottom:10px}
.modal .m-amt{font-family:'JetBrains Mono',monospace; font-size:44px; font-weight:700; letter-spacing:-.04em; line-height:1}
.modal .m-for{color:var(--t3); font-size:13.5px; margin-top:6px; font-weight:500}
.amt-input{font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:700; letter-spacing:-.04em; width:200px; border:none; border-bottom:2px solid var(--b2); background:none; outline:none; padding:0 0 4px}
.amt-input:focus{border-color:var(--accent)}

.chan{display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--b1); border-radius:11px; background:var(--surface-2); margin-top:10px}
.chan.main{border-color:var(--b3); background:var(--surface)}
.chan.soon{opacity:.6}
.chan-ic{width:36px; height:36px; border-radius:9px; background:var(--surface); border:1px solid var(--b1); display:grid; place-items:center; flex:none}
.chan-ic svg{width:18px; height:18px; stroke-width:1.9; color:var(--t2)}
.chan-tx{min-width:0; flex:1}
.chan-tx b{display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px}
.chan-tx span{font-size:12px; color:var(--t3); display:block}
.chan-tx .mono{color:var(--t2)}
.soon-pill{font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--surface-3); color:var(--t3); padding:2px 7px; border-radius:99px; border:1px solid var(--b1)}
.chan-main-pill{font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--accent-tint); color:var(--accent); padding:2px 7px; border-radius:99px}

.mail-prev{margin-top:14px; border:1px solid var(--b1); border-radius:11px; overflow:hidden}
.mail-prev .mp-bar{display:flex; align-items:center; gap:7px; padding:9px 12px; background:var(--surface-2); border-bottom:1px solid var(--b1)}
.mail-prev .mp-bar .eyebrow{font-size:9.5px}
.mail-prev .mp-body{padding:12px 14px; font-size:12.5px; color:var(--t2); line-height:1.6; max-height:172px; overflow:auto; white-space:pre-line}
.mail-prev .mp-subj{font-weight:700; color:var(--t1); font-size:13px; margin-bottom:8px}
.mail-prev .mp-link{color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:11.5px; word-break:break-all}
.modal-note{margin-top:14px; font-size:11.5px; color:var(--t3); text-align:center; font-weight:500}
.modal-foot{display:flex; gap:10px; margin-top:14px}
.modal-foot .btn{flex:1; justify-content:center; padding:12px}
.x-btn{position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--t3)}
.x-btn:hover{background:var(--surface-2); color:var(--t1)}
.x-btn svg{width:16px; height:16px; stroke-width:2}

/* recap call (IA) */
.head-btns{display:flex; align-items:center; gap:8px}
.modal.recap-modal{width:580px; max-height:90vh; overflow-y:auto}
.recap-ta{min-height:200px}
.recap-loading{display:flex; flex-direction:column; align-items:center; gap:14px; padding:44px 0; color:var(--t2); font-size:13.5px; font-weight:500}
.recap-spin{width:30px; height:30px; border:3px solid var(--b2); border-top-color:var(--accent); border-radius:50%; animation:recap-rot .8s linear infinite}
@keyframes recap-rot{to{transform:rotate(360deg)}}
.recap-err{margin-top:14px; padding:12px 14px; border-radius:11px; background:var(--surface-2); border:1px solid var(--b2); color:var(--t1); font-size:13px}
.recap-type{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--accent-tint); color:var(--accent); padding:3px 9px; border-radius:99px; margin-bottom:12px}
.recap-concl{margin-bottom:13px}
.recap-concl .eyebrow{display:block; margin-bottom:7px}
.recap-concl-row{display:flex; align-items:center; gap:11px; flex-wrap:wrap}
.recap-concl-tx{font-size:13.5px; color:var(--t1); font-weight:600}
.recap-box{border:1px solid var(--b1); border-radius:12px; padding:14px 16px; max-height:240px; overflow:auto; background:var(--surface-2)}
.recap-md{font-size:13px; color:var(--t2); line-height:1.6}
.recap-h{font-weight:800; color:var(--t1); font-size:13px; margin:11px 0 4px; letter-spacing:-.01em}
.recap-h:first-child{margin-top:0}
.recap-p{margin:3px 0}
.recap-li{margin:2px 0 2px 15px; position:relative}
.recap-li:before{content:'•'; position:absolute; left:-13px; color:var(--accent)}
.recap-sp{height:7px}
.recap-edit{width:100%; min-height:150px; max-height:240px; resize:vertical; box-sizing:border-box; border:1px solid var(--b2); border-radius:12px; padding:12px 14px; background:var(--surface-2); color:var(--t1); font-family:inherit; font-size:12.5px; line-height:1.6}
.recap-edit:focus{border-color:var(--accent); outline:none}
.recap-action-edit{display:flex; align-items:center; gap:9px; padding:3px 0}
.recap-action-edit input{flex:1; min-width:0; background:var(--surface); border:1px solid var(--b1); border-radius:7px; padding:6px 9px; color:var(--t1); font-size:13px; font-family:inherit}
.recap-action-edit input:focus{border-color:var(--accent); outline:none}
.recap-action-edit .ra-del{flex:none; width:24px; height:24px; border-radius:6px; display:grid; place-items:center; color:var(--t3); cursor:pointer; background:none}
.recap-action-edit .ra-del:hover{color:var(--danger); background:var(--surface)}
.recap-action-edit .ra-del svg{width:14px; height:14px}
.recap-add{margin-top:8px; font-size:12px; color:var(--accent); background:none; cursor:pointer; font-weight:600; padding:4px 0}
.recap-add:hover{text-decoration:underline}
.recap-actions{margin-top:14px; border:1px solid var(--accent); border-radius:12px; padding:12px 15px; background:var(--accent-tint)}
.recap-actions-h{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:9px}
.recap-action{display:flex; align-items:flex-start; gap:9px; font-size:13px; color:var(--t1); font-weight:600; padding:4px 0; line-height:1.45}
.ra-dot{width:7px; height:7px; border-radius:50%; background:var(--accent); flex:none; margin-top:6px}
.recap-action.prio-haute .ra-dot{background:var(--bad,#e5484d)}
.recap-action.prio-basse .ra-dot{background:var(--t4)}
.recap-meta{margin-top:12px; font-size:12.5px; color:var(--t2)}
.recap-conflicts{margin-top:12px; border:1px solid var(--warm); border-radius:11px; padding:10px 12px; background:var(--surface-2)}
.rc-h{font-size:10.5px; font-weight:700; color:var(--warm); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px}
.rc-row{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12.5px}
.rc-lbl{font-weight:700; color:var(--t1); min-width:80px}
.rc-vs{flex:1; color:var(--t3); min-width:0}
.rc-cur{text-decoration:line-through; opacity:.8}
.rc-new{color:var(--t1); font-weight:600}
.rc-btn{padding:4px 10px !important; font-size:11.5px !important}
.recap-stage{margin-top:12px; font-size:12.5px; color:var(--t2); font-weight:500}
.recap-stage.warn{color:var(--warm)}

/* récap dans l'historique : accordéon repliable (carte autonome, pas de point de timeline) */
.tl-recap{border:1px solid var(--b2); border-radius:11px; overflow:hidden; background:var(--surface-2)}
.tl-recap-head{display:flex; align-items:center; gap:9px; padding:11px 13px; cursor:pointer; user-select:none; transition:background var(--speed)}
.tl-recap-head:hover{background:var(--surface-3)}
.tl-recap-head.nochev{cursor:default}
.tl-recap-head.nochev:hover{background:transparent}
.tl-recap-head.nochev .tl-recap-chev{visibility:hidden}
.tl-recap-chev{flex:none; color:var(--t3); transition:transform .2s ease}
.tl-recap-head.open .tl-recap-chev{transform:rotate(90deg)}
.tl-recap-ic{flex:none; display:grid; place-items:center; color:var(--t3)}
.tl-recap-ic svg{width:14px; height:14px}
.tl-recap.accent .tl-recap-ic{color:var(--accent)}
.tl-recap.ok .tl-recap-ic{color:var(--ok)}
.tl-recap.danger .tl-recap-ic{color:var(--danger)}
.tl-recap-title{font-weight:700; font-size:13px; color:var(--t1); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tl-recap-right{display:flex; align-items:center; gap:8px; flex:none}
.tl-recap-actions{display:inline-flex; gap:3px; opacity:0; transition:opacity var(--speed)}
.tl-recap:hover .tl-recap-actions{opacity:1}
.tl-recap-actions button{width:23px; height:23px; border-radius:6px; display:grid; place-items:center; color:var(--t3); background:none; cursor:pointer}
.tl-recap-actions button:hover{background:var(--surface); color:var(--t1)}
.tl-recap-actions button.del:hover{color:var(--danger)}
.tl-recap-actions svg{width:13.5px; height:13.5px; stroke-width:2}
.tl-recap-body{padding:11px 14px 13px; border-top:1px solid var(--b1)}
.tl-recap-body .recap-md{font-size:12.5px}

/* email copiable + tel dans la fiche */
.contact.copy{cursor:pointer; color:var(--t1); background:var(--surface-2); border:1px solid var(--b1); padding:6px 11px; border-radius:8px; transition:all var(--speed)}
.contact.copy:hover{border-color:var(--accent); color:var(--accent)}
.contact.copy:hover svg{color:var(--accent)}
.contact.copy .copy-ic{width:13px; height:13px; color:var(--t3); margin-left:2px}
.contact.copy.copied{border-color:var(--ok); color:var(--ok)}
.contact.copy.copied svg{color:var(--ok)}

/* modale large + scrollable */
.modal.wide{width:720px; padding:0; max-height:calc(100vh - 60px); display:flex; flex-direction:column}
.modal .m-scroll{overflow-y:auto; padding:24px 26px}
.modal .m-fixhead{padding:22px 26px 14px; border-bottom:1px solid var(--b1)}
.modal .m-fixfoot{padding:14px 26px; border-top:1px solid var(--b1); display:flex; gap:10px; background:var(--surface); border-radius:0 0 18px 18px}
.modal .m-fixfoot .btn{flex:1; justify-content:center; padding:12px}

/* sélection d'offre paiement */
.pay-offers{display:flex; flex-direction:column; gap:10px}
.pay-offer{display:flex; align-items:center; gap:14px; padding:15px 16px; border:1.5px solid var(--b1); border-radius:12px; background:var(--surface-2); text-align:left; width:100%; transition:all var(--speed)}
.pay-offer:hover{border-color:var(--b3); background:var(--surface-3)}
.pay-offer.sel{border-color:var(--accent); background:var(--accent-tint)}
.pay-offer .po-amt{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; letter-spacing:-.03em; flex:none; min-width:96px}
.pay-offer .po-tx b{display:block; font-weight:700; font-size:14px}
.pay-offer .po-tx span{font-size:12px; color:var(--t3)}
.pay-offer .po-check{margin-left:auto; width:22px; height:22px; border-radius:99px; border:2px solid var(--b3); display:grid; place-items:center; flex:none}
.pay-offer.sel .po-check{background:var(--accent); border-color:var(--accent)}
.pay-offer .po-check svg{width:13px; height:13px; stroke-width:3; color:var(--on-accent); opacity:0}
.pay-offer.sel .po-check svg{opacity:1}

/* champs éditables mail */
.edit-field{margin-top:14px}
.edit-field .eyebrow{display:block; margin-bottom:6px}
.edit-input{width:100%; border:1px solid var(--b1); border-radius:9px; background:var(--surface-2); padding:10px 12px; font-size:13.5px; font-weight:600; outline:none; transition:border var(--speed)}
.edit-input:focus{border-color:var(--accent); background:var(--surface)}
.edit-body{width:100%; min-height:170px; border:1px solid var(--b1); border-radius:9px; background:var(--surface-2); padding:11px 13px; font-size:13px; line-height:1.6; resize:vertical; outline:none; transition:border var(--speed)}
.edit-body:focus{border-color:var(--accent); background:var(--surface)}
.link-tag{display:inline-flex; align-items:center; gap:7px; margin-top:10px; padding:8px 12px; border:1px dashed var(--b2); border-radius:9px; background:var(--surface-2)}
.link-tag .mono{color:var(--accent); font-size:12px; word-break:break-all}

/* sélecteur de créneaux (agenda) */
.slot-intro{font-size:13px; color:var(--t2); margin-bottom:16px; line-height:1.5}
.slot-intro b{color:var(--t1)}
.slot-week{display:grid; grid-template-columns:repeat(5,1fr); gap:10px}
.slot-day{min-width:0}
.slot-day h5{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--t2); text-align:center; padding-bottom:9px; border-bottom:1px solid var(--b1); margin-bottom:9px}
.slot-day h5 span{display:block; font-weight:500; font-size:10px; color:var(--t3); margin-top:2px}
.slot-col{display:flex; flex-direction:column; gap:6px}
.slot{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; padding:8px 4px; border:1px solid var(--b1); border-radius:8px; background:var(--surface); color:var(--t1); transition:all var(--speed); text-align:center}
.slot:hover:not(.busy):not(.sel){border-color:var(--accent); color:var(--accent)}
.slot.busy{color:var(--t4); background:var(--surface-3); cursor:not-allowed; text-decoration:line-through; opacity:.6}
.slot.sel{background:var(--accent); border-color:var(--accent); color:var(--on-accent); box-shadow:0 2px 8px rgba(243,92,4,.3)}
.slot-noon{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--t4); text-align:center; padding:5px 0 2px}
.slot-sel-bar{margin-top:16px; padding:13px 15px; border:1px solid var(--accent-tint-2); border-radius:11px; background:var(--accent-tint); display:flex; align-items:center; gap:10px}
.slot-sel-bar .ssb-ic{width:30px; height:30px; border-radius:8px; background:var(--surface); display:grid; place-items:center; flex:none}
.slot-sel-bar .ssb-ic svg{width:16px; height:16px; color:var(--accent)}
.slot-sel-bar b{font-weight:700; font-size:14px; color:var(--accent)}
.slot-sel-bar span{font-size:12px; color:var(--t2); display:block}

/* explainer Granola */
.info-box{margin-top:14px; border:1px solid var(--b1); border-radius:11px; background:var(--surface-2); padding:12px 14px; font-size:12.5px; color:var(--t2); line-height:1.55}
.info-box b{color:var(--t1)}
.info-box .ib-head{display:flex; align-items:center; gap:7px; font-weight:700; color:var(--t1); margin-bottom:6px; font-size:13px}
.info-box .ib-head svg{width:14px; height:14px; color:var(--accent)}

/* side panels (rappeler / call / settings) */
.side{
  position:fixed; top:0; right:0; bottom:0; width:430px; max-width:calc(100vw - 60px); z-index:85;
  background:var(--surface); border-left:1px solid var(--b2); box-shadow:var(--sh-pop);
  display:flex; flex-direction:column; animation:slideR .22s cubic-bezier(.2,.8,.2,1);
}
.side-head{display:flex; align-items:center; gap:11px; padding:16px 18px; border-bottom:1px solid var(--b1)}
.side-head h3{font-size:16px; flex:1}
.side-body{flex:1; min-height:0; overflow-y:auto; padding:14px 18px}

/* à rappeler rows */
.rap-row{display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--b1); border-radius:11px; margin-bottom:9px; background:var(--surface-2); transition:border var(--speed)}
.rap-row:hover{border-color:var(--b3)}
.rap-tx{min-width:0; flex:1}
.rap-tx b{font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:6px}
.rap-tx span{font-size:11.5px; color:var(--t3); display:flex; align-items:center; gap:6px; margin-top:2px}
.rap-prio{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; width:20px; text-align:center; color:var(--t4)}


/* settings */
.set-row{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--b1)}
.set-row:last-child{border-bottom:none}
.set-row .lab b{display:block; font-weight:700; font-size:13.5px}
.set-row .lab span{font-size:11.5px; color:var(--t3)}
.swatches{display:flex; gap:8px}
.swatch{width:30px; height:30px; border-radius:8px; border:2px solid var(--b2); cursor:pointer; position:relative}
.swatch.on{border-color:var(--accent)}
.swatch.on::after{content:''; position:absolute; inset:0; border-radius:6px; box-shadow:0 0 0 2px var(--surface) inset}

/* incoming lead notification */
.incoming-wrap{position:fixed; top:18px; left:calc(var(--rail) + 50%); transform:translateX(-50%); z-index:95; width:540px; max-width:calc(100vw - var(--rail) - 40px)}
.incoming{
  background:var(--surface); border:1px solid var(--accent); border-radius:14px; box-shadow:var(--sh-pop);
  padding:14px 16px; display:flex; align-items:center; gap:14px; position:relative; overflow:hidden;
  animation:dropIn .4s cubic-bezier(.2,.9,.2,1);
}
@keyframes dropIn{from{transform:translateY(-24px); opacity:0}to{transform:none; opacity:1}}
.incoming::before{content:''; position:absolute; inset:0; border-radius:14px; box-shadow:0 0 0 0 var(--accent); animation:halo 1.8s ease-out infinite; pointer-events:none}
@keyframes halo{0%{box-shadow:0 0 0 0 rgba(243,92,4,.4)}100%{box-shadow:0 0 0 14px rgba(243,92,4,0)}}
.incoming .av{position:relative; z-index:1}
.incoming-tx{flex:1; min-width:0; z-index:1}
.incoming-tx .eyebrow{display:flex; align-items:center; gap:7px; color:var(--accent)}
.incoming-tx .sonner{width:6px; height:6px; border-radius:99px; background:var(--accent); animation:blink 1s infinite}
.incoming-tx h4{font-size:16px; margin-top:3px}
.incoming-tx .sub{display:flex; align-items:center; gap:9px; margin-top:3px; font-size:12px; color:var(--t2)}
.incoming-take{z-index:1}
.incoming-dismiss{z-index:1; flex:none; width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--t3); background:var(--surface-2); border:1px solid var(--b1); transition:all var(--speed)}
.incoming-dismiss:hover{color:var(--t1); background:var(--surface-3); border-color:var(--b2)}
.incoming-dismiss svg{width:15px; height:15px; stroke-width:2}

/* toasts */
.toasts{position:fixed; bottom:20px; right:20px; z-index:120; display:flex; flex-direction:column; gap:10px; align-items:flex-end}
.toast{display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--b2); border-radius:11px; box-shadow:var(--sh-pop); padding:12px 15px; min-width:260px; max-width:360px; animation:pop .22s ease}
.toast .t-ic{width:30px; height:30px; border-radius:8px; display:grid; place-items:center; flex:none}
.toast .t-ic svg{width:16px; height:16px; stroke-width:2}
.toast.ok .t-ic{background:var(--ok-tint); color:var(--ok)}
.toast.accent .t-ic{background:var(--accent-tint); color:var(--accent)}
.toast.info .t-ic{background:var(--surface-3); color:var(--t2)}
.toast .t-tx b{display:block; font-weight:700; font-size:13.5px}
.toast .t-tx span{font-size:12px; color:var(--t3)}

/* recherche */
.search-grid{display:flex; flex-direction:column; gap:8px; max-width:780px}
.search-row{display:flex; align-items:center; gap:14px; padding:12px 16px; background:var(--surface); border:1px solid var(--b1); border-radius:11px; cursor:pointer; transition:all var(--speed)}
.search-row:hover{border-color:var(--b3); box-shadow:var(--sh-card)}
.search-row .sr-tx{flex:1; min-width:0}
.search-row .sr-tx b{font-weight:700}
.search-row .sr-tx span{font-size:12px; color:var(--t3); display:flex; gap:8px; align-items:center; margin-top:2px}
.stage-chip{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:4px 9px; border-radius:7px; background:var(--surface-2); border:1px solid var(--b1); color:var(--t2)}

/* agenda */
.agenda{display:flex; flex-direction:column; gap:0; max-width:720px; border:1px solid var(--b1); border-radius:var(--r-panel); overflow:hidden; background:var(--surface)}
.ag-row{display:flex; gap:16px; padding:14px 18px; border-bottom:1px solid var(--b1); align-items:center}
.ag-row:last-child{border-bottom:none}
.ag-time{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; width:56px; flex:none; color:var(--accent)}
.ag-time.past{color:var(--t4)}
.ag-tx{flex:1}
.ag-tx b{font-weight:700; font-size:14px}
.ag-tx span{font-size:12px; color:var(--t3)}
.ag-day{padding:11px 18px; background:var(--surface-2); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); border-bottom:1px solid var(--b1)}

/* ----- agenda CalendIQ ----- */
.cq-tools{display:flex; align-items:center; gap:10px}
.cq-banner{font-size:12.5px; font-weight:600; padding:10px 14px; border-radius:10px; margin-bottom:14px}
.cq-banner.err{background:var(--danger-tint); color:var(--danger)}
.cq-wrap{flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; padding:8px 26px 24px}
.cq-hero{flex:1; display:grid; place-items:center; padding:40px 16px}
.cq-connect{width:100%; max-width:480px; background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-panel); padding:26px 26px 22px; text-align:center; box-shadow:var(--sh-card)}
.cq-connect.hero{box-shadow:var(--sh-pop)}
.cq-connect-ic{width:52px; height:52px; border-radius:14px; background:var(--accent-tint); color:var(--accent); display:grid; place-items:center; margin:0 auto 14px}
.cq-connect-ic svg{width:26px; height:26px}
.cq-connect h3{font-size:18px; font-weight:800; letter-spacing:-.01em; margin-bottom:6px}
.cq-connect p{font-size:13px; color:var(--t3); line-height:1.55; margin:0 auto 16px; max-width:380px}
.cq-connect .ag-input{text-align:center}
.cq-connect-foot{display:flex; gap:10px; margin-top:14px}
.cq-connect-foot .btn{flex:1; justify-content:center; padding:11px}
.cq-manage{background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-panel); padding:16px 18px; margin-bottom:16px; box-shadow:var(--sh-card)}
.cq-manage-row{display:flex; align-items:center; gap:10px}
.cq-manage .cq-connect{max-width:none; box-shadow:none; border:none; padding:0; text-align:left}
.cq-manage .cq-connect-ic, .cq-manage .cq-connect h3{display:none}
.cq-manage .cq-connect p{margin:0 0 12px; text-align:left}
.cq-manage .cq-connect .ag-input{text-align:left}
.cq-manage .cq-connect-foot{justify-content:flex-start}
.cq-manage .cq-connect-foot .btn{flex:none; padding:10px 18px}
.cq-frame{display:flex; flex-direction:column; gap:12px}
.cq-frame-note{display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--t2); background:var(--surface-2); border:1px solid var(--b1); border-radius:10px; padding:10px 13px}
.cq-frame-note svg{width:16px; height:16px; color:var(--accent); flex:none}
.cq-iframe{width:100%; height:calc(100vh - 230px); min-height:520px; border:1px solid var(--b1); border-radius:var(--r-panel); background:var(--surface); box-shadow:var(--sh-card)}
.cq-agenda{display:flex; flex-direction:column; gap:18px; max-width:780px}
.cq-closers{display:flex; flex-wrap:wrap; gap:8px}
.cq-closer-chip{display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border:1px solid var(--b1); border-radius:99px; background:var(--surface); font-size:12.5px; font-weight:700}
.cq-closer-n{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-tint); border-radius:6px; padding:1px 7px}
.cq-empty{font-size:13px; color:var(--t3); padding:30px 4px; text-align:center; border:1px dashed var(--b2); border-radius:var(--r-panel)}
.cq-day{display:flex; flex-direction:column; gap:8px}
.cq-day-h{display:flex; align-items:baseline; gap:10px; font-size:13.5px; font-weight:800; color:var(--t1); text-transform:capitalize; padding-bottom:4px}
.cq-day-h span{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); text-transform:none}
.cq-ev{display:flex; align-items:center; gap:14px; padding:12px 14px; border:1px solid var(--b1); border-radius:12px; background:var(--surface); transition:border var(--speed),box-shadow var(--speed),transform var(--speed)}
.cq-ev.has-lead{cursor:pointer}
.cq-ev.has-lead:hover{border-color:var(--accent); box-shadow:var(--sh-lift); transform:translateY(-1px)}
.cq-ev.past{opacity:.55}
.cq-ev-time{flex:none; width:62px; display:flex; flex-direction:column; line-height:1.2}
.cq-ev-time b{font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:var(--accent)}
.cq-ev-time span{font-size:10.5px; color:var(--t3)}
.cq-ev-main{flex:1; min-width:0}
.cq-ev-main b{display:block; font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.cq-ev-main span{display:block; font-size:12px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.cq-ev-act{display:flex; align-items:center; gap:7px; flex:none}
.cq-pill{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:8px; border:1px solid var(--b1); background:var(--surface-2); color:var(--t2); text-decoration:none; cursor:pointer; white-space:nowrap}
.cq-pill svg{width:13px; height:13px}
.cq-pill.lead{color:var(--accent); border-color:var(--accent); background:var(--accent-tint)}
.cq-pill.ghost{color:var(--t4); cursor:default}
a.cq-pill:hover{border-color:var(--accent); color:var(--accent)}
/* RDV CalendIQ sur la fiche + badge carte */
/* carte rendez-vous (design) */
.rdvcard{background:var(--surface-2); border:1px solid var(--b1); border-left:3px solid var(--accent); border-radius:12px; padding:12px 13px; display:flex; flex-direction:column; gap:11px}
.rdvcard.past{border-left-color:var(--b3); opacity:.6}
.rdvcard.empty{flex-direction:row; align-items:center; gap:10px; border-left-color:var(--b2); color:var(--t3); font-size:13px; font-weight:600}
.rdvcard-top{display:flex; align-items:center; gap:11px}
.rdvcard-ic{width:38px; height:38px; flex:none; border-radius:10px; background:var(--accent-tint); color:var(--accent); display:grid; place-items:center}
.rdvcard-ic svg{width:18px; height:18px; stroke-width:2}
.rdvcard-info{min-width:0; display:flex; flex-direction:column; gap:3px}
.rdvcard-info b{font-size:14px; font-weight:700; letter-spacing:-.01em; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:capitalize}
.rdvcard-info > span{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--t2); font-variant-numeric:tabular-nums}
.rdvcard-info > span svg{width:13px; height:13px; opacity:.7}
.rdvcard-actions{display:flex; align-items:center; gap:8px}
.rdvcard-join{display:inline-flex; align-items:center; justify-content:center; gap:6px; height:34px; padding:0 16px; border-radius:9px; background:var(--accent-tint); color:var(--accent); font-size:13px; font-weight:700; text-decoration:none; cursor:pointer; transition:background var(--speed),color var(--speed)}
.rdvcard-join:hover{background:var(--accent); color:var(--on-accent)}
.rdvcard-join svg{width:15px; height:15px}
.rdvcard-tools{display:flex; gap:8px; margin-left:auto}
.rdvcard-btn{width:34px; height:34px; flex:none; border-radius:9px; display:grid; place-items:center; color:var(--t3); background:var(--surface); border:1px solid var(--b1); cursor:pointer; transition:color var(--speed),border-color var(--speed)}
.rdvcard-btn:hover{color:var(--t1); border-color:var(--b3)}
.rdvcard-btn.del:hover{color:var(--danger); border-color:var(--danger)}
.rdvcard-btn svg{width:15px; height:15px; stroke-width:2}
.card-rdv{display:inline-flex; align-items:center; gap:5px; margin-top:8px; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-tint); border-radius:7px; padding:3px 8px}
.card-rdv svg{width:12px; height:12px}

/* liste de RDV (R1 + R2 …) + machine d'états présent/no-show */
.rdvlist{display:flex; flex-direction:column; gap:9px}
/* états de la carte (surbrillance DOUCE, pas criarde) */
.rdvcard.rdv-live{border-left-color:var(--accent)}
.rdvcard.rdv-todo{border-left-color:var(--warm); background:color-mix(in srgb, var(--warm) 7%, var(--surface-2))}
.rdvcard.rdv-present{border-left-color:var(--ok); opacity:1}
.rdvcard.rdv-present .rdvcard-ic{background:var(--ok-tint); color:var(--ok)}
.rdvcard.rdv-noshow{border-left-color:var(--danger)}
.rdvcard.rdv-noshow .rdvcard-ic{background:var(--danger-tint); color:var(--danger)}
.rdvcard.rdv-noshow .rdvcard-info b{color:var(--t2)}
/* verdict (badge à droite de l'en-tête) */
.rdv-verdict{margin-left:auto; flex:none; display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; white-space:nowrap}
.rdv-verdict .cdot{width:6px; height:6px; border-radius:99px; background:currentColor}
/* prompt « que s'est-il passé ? » */
.rdv-ask{font-size:12px; font-weight:600; color:var(--warm); padding:1px 1px 0}
/* boutons résultat (présent / no-show) */
.rdv-oc{display:inline-flex; gap:7px}
.rdv-oc-btn{display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 13px; border-radius:9px; border:1.5px solid var(--b1); background:var(--surface); color:var(--t2); font-size:12.5px; font-weight:700; cursor:pointer; transition:all var(--speed)}
.rdv-oc-btn svg{width:14px; height:14px; stroke-width:2.4}
.rdv-oc-btn.present:hover{border-color:var(--ok); color:var(--ok); background:var(--ok-tint)}
.rdv-oc-btn.noshow:hover{border-color:var(--danger); color:var(--danger); background:var(--danger-tint)}
/* en mode « à traiter » les boutons sont proéminents */
.rdv-oc.prom .rdv-oc-btn.present{border-color:var(--ok); color:var(--ok)}
.rdv-oc.prom .rdv-oc-btn.noshow{border-color:var(--danger); color:var(--danger)}
/* corriger le résultat */
.rdv-redo{display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 11px; border-radius:9px; background:none; border:1px solid transparent; color:var(--t3); font-size:12px; font-weight:600; cursor:pointer; transition:all var(--speed)}
.rdv-redo:hover{color:var(--t1); background:var(--surface-2)}
.rdv-redo svg{width:13px; height:13px}

/* admission */
.adm-list{display:flex; flex-direction:column; gap:14px; max-width:980px}
.adm-card{background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-panel); overflow:hidden; transition:opacity var(--speed)}
.adm-card.secured{opacity:.62}
.adm-top{display:flex; align-items:center; gap:14px; padding:16px 18px}
.adm-top .a-tx{flex:1; min-width:0}
.adm-top .a-tx b{font-weight:800; font-size:16px; display:flex; align-items:center; gap:8px}
.adm-top .a-tx span{font-size:12.5px; color:var(--t3)}
.adm-grid{display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--b1)}
.adm-cell{padding:12px 16px; border-right:1px solid var(--b1)}
.adm-cell:last-child{border-right:none}
.adm-cell .eyebrow{display:block; margin-bottom:4px}
.adm-cell .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px}
.adm-cell .v.txt{font-family:'Hanken Grotesk',sans-serif; font-weight:600}
.adm-cell .v.secured{color:var(--ok)}
.btn-validate{background:var(--accent); color:var(--on-accent); padding:9px 18px; border-radius:9px; font-weight:700; font-size:13.5px; display:inline-flex; align-items:center; gap:8px; box-shadow:0 2px 8px rgba(243,92,4,.3)}
.btn-validate:hover{background:var(--accent-h)}
.btn-validate svg{width:16px; height:16px; stroke-width:2.2}
.btn-secured{background:var(--ok-tint); color:var(--ok); padding:9px 18px; border-radius:9px; font-weight:700; font-size:13.5px; display:inline-flex; align-items:center; gap:8px}
.btn-secured svg{width:16px; height:16px; stroke-width:2.2}
.count-pill{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; background:var(--t1); color:var(--page); padding:7px 14px; border-radius:99px}

.empty-screen{display:grid; place-items:center; flex:1; color:var(--t3); text-align:center; gap:10px}
.empty-screen svg{width:34px; height:34px; stroke-width:1.5; color:var(--t4)}

/* login */
.login-wrap{height:100vh; display:grid; place-items:center; background:var(--page); padding:20px}
.login-card{width:380px; max-width:100%; background:var(--surface); border:1px solid var(--b1); border-radius:18px; box-shadow:var(--sh-pop); padding:34px 30px; display:flex; flex-direction:column; gap:12px}
.login-logo{width:150px; height:auto; margin-bottom:8px}
.login-card h2{font-family:'Gabarito',system-ui,sans-serif; font-size:24px; font-weight:800; letter-spacing:-.02em}
.login-sub{color:var(--t3); font-size:13px; margin:-6px 0 10px; font-weight:500}
.login-input{border:1px solid var(--b2); border-radius:10px; background:var(--surface-2); padding:12px 14px; font-size:14px; outline:none; transition:border var(--speed)}
.login-input:focus{border-color:var(--accent); background:var(--surface)}
.login-msg{font-size:12.5px; padding:9px 12px; border-radius:9px; font-weight:500}
.login-msg.err{background:var(--danger-tint); color:var(--danger)}
.login-msg.ok{background:var(--ok-tint); color:var(--ok)}
.login-switch{margin-top:4px; font-size:12.5px; color:var(--t2); font-weight:600; background:none}
.login-switch:hover{color:var(--accent)}

/* ---- filtre par source : sélecteur unique (colonne « Lead à contacter ») ---- */
.srcdd{position:relative; padding:0 2px 10px}
.srcdd-btn{display:flex; align-items:center; gap:8px; width:100%; padding:8px 12px; border-radius:10px; border:1.5px solid var(--b1); background:var(--surface); color:var(--t1); font-size:13px; font-weight:600; cursor:pointer; transition:all var(--speed) var(--ease)}
.srcdd-btn:hover{border-color:var(--b3)}
.srcdd-pre{color:var(--t3); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em}
.srcdd-n{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--t3); background:var(--surface-2); border:1px solid var(--b1); border-radius:6px; padding:1px 6px}
.srcdd-chev{margin-left:auto; transition:transform var(--speed)}
.srcdd-btn.open .srcdd-chev{transform:rotate(180deg)}
.srcdd-ov{position:fixed; inset:0; z-index:40}
.srcdd-menu{position:absolute; top:calc(100% - 6px); left:2px; right:2px; z-index:50; background:var(--surface); border:1px solid var(--b1); border-radius:12px; padding:6px; box-shadow:0 14px 34px rgba(0,0,0,.32)}
.srcdd-item{display:flex; align-items:center; gap:10px; width:100%; padding:9px 10px; border-radius:8px; background:none; color:var(--t2); font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:background var(--speed),color var(--speed)}
.srcdd-item:hover{background:var(--surface-2); color:var(--t1)}
.srcdd-item.active{color:var(--accent)}
.srcdd-item .n{margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--t3)}
.srcdd-item.active .n{color:var(--accent)}

/* ---- confirmation d'appel (log seulement si l'appel a vraiment eu lieu) ---- */
.callconfirm{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:90; width:min(420px,92vw); background:var(--surface); border:1px solid var(--b1); border-radius:18px; padding:26px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.42); animation:fade .2s ease}
.cc-ic{width:54px; height:54px; border-radius:14px; background:var(--accent-tint); color:var(--accent); display:grid; place-items:center; margin:0 auto 14px}
.cc-ic svg{width:26px; height:26px}
.callconfirm h3{font-size:17px; font-weight:800; margin-bottom:4px}
.cc-num{font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--t2); margin-bottom:12px}
.cc-sub{font-size:13px; color:var(--t3); line-height:1.45; margin-bottom:20px}
.cc-actions{display:flex; gap:10px}
.cc-actions .btn{flex:1; justify-content:center; padding:12px}

/* ---- sélecteur d'étape dans la fiche (déplacer le lead sans sortir) ---- */
.movesel{position:relative; margin-bottom:14px}
.movesel-lbl{display:block; font-size:11px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.04em; margin-bottom:7px}
.movesel-btn{display:flex; align-items:center; gap:9px; width:100%; padding:11px 13px; border-radius:11px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t1); font-size:14px; font-weight:700; cursor:pointer; transition:all var(--speed) var(--ease)}
.movesel-btn:hover{border-color:var(--b3)}
.movesel-btn .sdot{width:9px; height:9px; border-radius:99px; flex:none}
.movesel-chev{margin-left:auto; transition:transform var(--speed)}
.movesel-btn.open .movesel-chev{transform:rotate(180deg)}
.movesel-ov{position:fixed; inset:0; z-index:40}
.movesel-menu{position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50; background:var(--surface); border:1px solid var(--b1); border-radius:12px; padding:6px; box-shadow:0 14px 34px rgba(0,0,0,.32); max-height:340px; overflow:auto}
.movesel-item{display:flex; align-items:center; gap:10px; width:100%; padding:10px; border-radius:8px; background:none; color:var(--t2); font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:background var(--speed),color var(--speed)}
.movesel-item:hover{background:var(--surface-2); color:var(--t1)}
.movesel-item.active{color:var(--accent); background:var(--accent-tint)}
.movesel-item .sdot{width:8px; height:8px; border-radius:99px; flex:none}
/* ---- bloc qualification (fiche, identique pour tous les pipes) ---- */
.qline{display:flex; justify-content:space-between; align-items:baseline; gap:14px; padding:6px 0; border-bottom:1px solid var(--b1); font-size:13px}
.qline:last-child{border-bottom:none}
.qk{color:var(--t3); font-weight:600; flex:none}
.qv{color:var(--t1); font-weight:600; text-align:right}
.qv-edit{cursor:text; border-radius:5px; padding:1px 5px; margin:-1px -5px; transition:background var(--speed)}
.qv-edit:hover{background:var(--surface-2)}
.qedit{width:150px; max-width:62%; text-align:right; background:var(--surface-2); border:1.5px solid var(--accent); border-radius:7px; padding:4px 8px; color:var(--t1); font-size:13px; font-weight:600; font-family:inherit; outline:none}
/* ---- RDV picker (Google Agenda) ---- */
.rdv-opts{display:flex; align-items:center; gap:14px; margin-top:14px; flex-wrap:wrap}
.rdv-seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:3px}
.rdv-seg button{padding:6px 18px; border-radius:7px; font-size:13px; font-weight:700; color:var(--t2); background:none; cursor:pointer}
.rdv-seg button.on{background:var(--accent); color:var(--on-accent)}
.rdv-durs{display:inline-flex; gap:6px; flex-wrap:wrap}
.rdv-dur{padding:6px 11px; border-radius:8px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t2); font-size:12.5px; font-weight:600; cursor:pointer}
.rdv-dur.on{border-color:var(--accent); color:var(--accent); background:var(--accent-tint)}
.rdv-agenda{display:inline-flex; align-items:center; gap:8px; margin-left:auto}
.rdv-agenda-lbl{font-size:11px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.04em}
.rdv-agenda select{padding:7px 10px; border-radius:8px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t1); font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer}
/* connecter un agenda */
.ag-list{display:flex; flex-direction:column; gap:8px}
.ag-row{display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid var(--b1); border-radius:10px; background:var(--surface-2)}
.ag-dot{width:8px; height:8px; border-radius:50%; background:#3fb950; flex:none}
.ag-meta{flex:1; min-width:0}
.ag-meta b{display:block; font-size:13px; font-weight:700}
.ag-meta span{display:block; font-size:11.5px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.ag-ok{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; color:#3fb950; flex:none}
.ag-empty{font-size:12.5px; color:var(--t3); padding:8px 2px}
.ag-refresh{align-self:flex-start; margin-top:2px}
.ag-sep{height:1px; background:var(--b1); margin:14px 0}
.ag-input{width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t1); font-size:13px; font-family:inherit; box-sizing:border-box}
.ag-actions{display:flex; gap:8px; margin-top:10px}
.ag-actions .btn{flex:1; justify-content:center; text-decoration:none}
.ag-note{font-size:11.5px; color:var(--t3); line-height:1.5; margin:12px 0 0}
/* prise de RDV façon Calendly — panneau jours (gauche) + créneaux 15 min (droite) */
.rdv-cal{display:grid; grid-template-columns:190px 1fr; gap:16px; align-items:start}
.rdv-cal-days{display:flex; flex-direction:column; gap:6px; max-height:380px; overflow-y:auto; padding-right:4px}
.rdv-day{display:flex; flex-direction:column; align-items:flex-start; gap:1px; padding:9px 12px; border:1.5px solid var(--b1); border-radius:10px; background:var(--surface); color:var(--t1); cursor:pointer; transition:all var(--speed); text-align:left}
.rdv-day:hover:not(.on):not(.empty){border-color:var(--accent)}
.rdv-day.on{border-color:var(--accent); background:var(--accent-tint)}
.rdv-day.empty{opacity:.4; cursor:default}
.rdv-day-wd{font-size:13px; font-weight:700; text-transform:capitalize}
.rdv-day-dm{font-size:11.5px; color:var(--t3)}
.rdv-day-cnt{font-size:10px; font-weight:700; color:var(--accent); margin-top:2px; letter-spacing:.02em}
.rdv-day.empty .rdv-day-cnt{color:var(--t4)}
.rdv-cal-times{display:flex; flex-direction:column; min-width:0}
.rdv-times-head{font-size:13.5px; font-weight:800; color:var(--t1); text-transform:capitalize; padding-bottom:10px; border-bottom:1px solid var(--b1); margin-bottom:12px}
.rdv-times-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(82px,1fr)); gap:8px; max-height:330px; overflow-y:auto; padding-right:4px}
.rdv-time{font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; padding:10px 6px; border:1.5px solid var(--b1); border-radius:9px; background:var(--surface-2); color:var(--t1); cursor:pointer; transition:all var(--speed); text-align:center}
.rdv-time:hover:not(.sel){border-color:var(--accent); color:var(--accent)}
.rdv-time.sel{background:var(--accent); border-color:var(--accent); color:var(--on-accent)}
.rdv-times-empty{font-size:13px; color:var(--t3); padding:26px 4px; text-align:center}
/* ---- ajout manuel d'un lead ---- */
.addlead-form{padding:18px 22px 22px; display:flex; flex-direction:column; gap:11px}
.addlead-row{display:flex; gap:10px}
.addlead-form input{flex:1; width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t1); font-size:14px; font-family:inherit; outline:none; box-sizing:border-box}
.addlead-form input:focus{border-color:var(--accent)}
.addlead-foot{display:flex; gap:10px; margin-top:6px}
.addlead-foot .btn{flex:1; justify-content:center; padding:12px}
/* ---- modale Note (note écrite / NRP) ---- */
.note-body{padding:16px 22px 22px; display:flex; flex-direction:column; gap:12px}
.note-ta{width:100%; min-height:110px; resize:vertical; background:var(--surface-2); border:1.5px solid var(--b2); border-radius:10px; padding:11px 13px; color:var(--t1); font-size:14px; font-family:inherit; line-height:1.5; outline:none; box-sizing:border-box}
.note-ta:focus{border-color:var(--accent)}
.note-sub{font-size:13px; color:var(--t3)}
.note-foot{display:flex; gap:10px}
.note-foot .btn{flex:1; justify-content:center; padding:11px}
/* ---- supprimer un lead (carte) ---- */
.card-del{position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:7px; display:grid; place-items:center; color:var(--t3); background:var(--surface-2); border:1px solid var(--b1); opacity:0; transition:opacity var(--speed),color var(--speed),border-color var(--speed); cursor:pointer; z-index:3}
.card:hover .card-del, .card:focus-within .card-del{opacity:1}
.card-del:hover{color:var(--danger); border-color:var(--danger)}
.card-del svg{width:14px; height:14px; stroke-width:2}
/* ---- bouton Annuler dans un toast ---- */
.t-undo{margin-left:auto; flex:none; padding:6px 12px; border-radius:8px; border:1px solid var(--b3); background:transparent; color:var(--t1); font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap}
.t-undo:hover{background:var(--surface-3); border-color:var(--accent); color:var(--accent)}
.rdv-connect{text-align:center; padding:26px 10px}
.rdv-connect p{color:var(--t2); font-size:14px; line-height:1.55; margin-bottom:16px; max-width:440px; margin:0 auto 16px}
.rdv-err{margin-top:12px; background:var(--danger-tint); color:var(--danger); font-size:12.5px; padding:9px 12px; border-radius:9px}
/* ---- modale Ajouter un RDV CalendIQ ---- */
.rdvm{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:90; width:min(600px,95vw); max-height:92vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--b1); border-radius:18px; box-shadow:0 24px 60px rgba(0,0,0,.42); animation:fade .2s ease; overflow:hidden}
.rdvm-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 4px; flex:none}
.rdvm-head h3{font-size:17px; font-weight:800}
.rdvm-body{padding:14px 20px 18px; display:flex; flex-direction:column; gap:8px; overflow-y:auto}
/* sélecteur date/heure — 2 colonnes (calendrier | créneaux) comme CalendIQ */
.dtp{display:grid; grid-template-columns:1fr 168px; gap:14px; align-items:start}
.dtp-cal{background:var(--surface-2); border:1px solid var(--b1); border-radius:12px; padding:11px 12px}
.dtp-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.dtp-title{font-size:14px; font-weight:800; text-transform:capitalize}
.dtp-nav{width:30px; height:30px; border-radius:8px; border:1px solid var(--b1); background:var(--surface); color:var(--t1); font-size:18px; line-height:1; cursor:pointer; display:grid; place-items:center}
.dtp-nav:hover:not(:disabled){border-color:var(--accent); color:var(--accent)}
.dtp-nav:disabled{opacity:.3; cursor:default}
.dtp-wd{display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:5px}
.dtp-wd span{text-align:center; font-size:10px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.03em}
.dtp-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px}
.dtp-empty{height:36px}
.dtp-day{height:36px; border-radius:8px; border:1px solid transparent; background:var(--surface); color:var(--t1); font-size:13.5px; font-weight:600; cursor:pointer; transition:background var(--speed),border-color var(--speed),color var(--speed)}
.dtp-day:hover:not(:disabled):not(.sel){border-color:var(--accent); color:var(--accent)}
.dtp-day.today{box-shadow:inset 0 0 0 1.5px var(--b3)}
