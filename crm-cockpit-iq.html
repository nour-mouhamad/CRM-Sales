/* ============================================================= SOUND */
let audioCtx=null;
function ping(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    [880,1175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(audioCtx.destination);
      const t=now+i*0.13;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

/* ============================================================= APP */
function persistedState(key,fallback){
  try{ const v=localStorage.getItem(key); return v!==null?JSON.parse(v):fallback; }catch(e){ return fallback; }
}

function App({session, onLogout}){
  const userEmail = session.user.email;
  const userId = session.user.id;
  const isDev = userId===DEV_ID;
  const [profile,setProfile]=useState(isDev?{role:'admin',name:'Manager (dev)'}:null);
  useEffect(()=>{ if(isDev) return; let alive=true; SB.from('profiles').select('role,name,calendiq_slug,calendiq_organizer_id,calendiq_name').eq('id',userId).single().then(({data})=>{ if(alive&&data) setProfile(data); }); return ()=>{alive=false;}; },[userId,isDev]);
  const isAdmin = (profile?.role||'closer')==='admin';
  const [leads,setLeads]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [screen,setScreen]=useState(()=>{ const s=persistedState('iqcrm_screen','leads'); return ['leads','fiche','agenda','team','console'].includes(s)?s:'leads'; });
  const [selId,setSelId]=useState(()=>persistedState('iqcrm_sel',null));
  const [theme,setTheme]=useState(()=>persistedState('iqcrm_theme_v2','dark'));
  const [density,setDensity]=useState(()=>persistedState('iqcrm_density','standard'));
  const [search,setSearch]=useState('');

  const [payTarget,setPayTarget]=useState(null); // {lead}
  const [showSettings,setShowSettings]=useState(false);
  const [addTarget,setAddTarget]=useState(null); // colonne où ajouter un lead manuellement
  const [incoming,setIncoming]=useState(null);
  const [toasts,setToasts]=useState([]);
  const incomingIdx=useRef(0);
  const tid=useRef(0);

  // chargement initial depuis Supabase (tables leads + activites)
  const reload=useCallback(()=>{ loadLeads().then(d=>{ setLeads(d); setLoaded(true); }); },[]);
  useEffect(()=>{ reload(); },[reload]);
  // pendant une synchro HubSpot (init / envoi groupé) on suspend le realtime puis on recharge 1 fois (anti-flicker)
  const syncBusyRef=useRef(false);
  const reloadT=useRef(0);
  const reloadDebounced=useCallback(()=>{ if(syncBusyRef.current) return; clearTimeout(reloadT.current); reloadT.current=setTimeout(reload,400); },[reload]);
  const setSyncBusy=useCallback((b)=>{ syncBusyRef.current=!!b; if(!b) reload(); },[reload]);
  // temps réel : toute modif (autre closer, manager, réimport) rafraîchit l'écran (debounce 400 ms)
  useEffect(()=>{
    const ch=SB.channel('crm-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'leads'},reloadDebounced)
      .on('postgres_changes',{event:'*',schema:'public',table:'activites'},reloadDebounced)
      .subscribe();
    return ()=>{ SB.removeChannel(ch); clearTimeout(reloadT.current); };
  },[reloadDebounced]);
  useEffect(()=>localStorage.setItem('iqcrm_screen',JSON.stringify(screen)),[screen]);
  useEffect(()=>localStorage.setItem('iqcrm_sel',JSON.stringify(selId)),[selId]);
  useEffect(()=>{ localStorage.setItem('iqcrm_theme_v2',JSON.stringify(theme)); document.documentElement.setAttribute('data-theme',theme); },[theme]);
  useEffect(()=>{ localStorage.setItem('iqcrm_density',JSON.stringify(density)); document.documentElement.setAttribute('data-density',density); },[density]);

  const toast=useCallback((title,sub,tone='info',action)=>{
    const id=++tid.current;
    setToasts(t=>[...t,{id,title,sub,tone,action}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), action?6500:3800);
  },[]);

  // pile d'annulation invisible + Ctrl/Cmd+Z
  const undoRef=useRef([]);
  const pushUndo=useCallback((label,fn,leadId)=>{ const e={label,fn,leadId:leadId||null,t:Date.now()}; undoRef.current.push(e); if(undoRef.current.length>25) undoRef.current.shift(); return e; },[]);
  const runUndo=useCallback((entry)=>{ const arr=undoRef.current; const i=entry?arr.indexOf(entry):arr.length-1; if(i<0){ toast('Rien à annuler',null,'info'); return; } const e=arr.splice(i,1)[0]; Promise.resolve(e.fn()).catch(()=>{}); toast('Action annulée',e.label,'ok'); },[toast]);
  // Cmd/Ctrl+Z : n'annule qu'une action TRÈS récente (≤15 s) ET du contexte affiché — sur une fiche : seulement
  // CE lead ; sur le board : la dernière action. Jamais une vieille action, jamais un autre lead (modèle Google).
  const undoHotkey=useCallback(()=>{
    const arr=undoRef.current, now=Date.now(), WINDOW=15000;
    let target=null;
    for(let k=arr.length-1;k>=0;k--){ const e=arr[k]; if(now-(e.t||0)>WINDOW) break; if(screen==='fiche' ? e.leadId===selId : true){ target=e; break; } }
    if(!target){ toast('Rien à annuler', screen==='fiche'?'Aucune action récente sur ce lead':'Aucune action récente (15 s)','info'); return; }
    runUndo(target);
  },[screen,selId,toast,runUndo]);
  useEffect(()=>{ const h=(e)=>{ if((e.metaKey||e.ctrlKey)&&(e.key==='z'||e.key==='Z')){ const tg=e.target; if(tg&&(tg.tagName==='INPUT'||tg.tagName==='TEXTAREA'||tg.isContentEditable)) return; e.preventDefault(); undoHotkey(); } }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[undoHotkey]);

  const patch=useCallback((id,fn)=>setLeads(ls=>ls.map(l=>l.id===id?{...l,...(typeof fn==='function'?fn(l):fn)}:l)),[]);

  /* ---------- CalendIQ : agendas externes des closers ---------- */
  const [cqMeetings,setCqMeetings]=useState([]);   // RDV (closer = les siens ; admin = tous, agrégés)
  const [cqSources,setCqSources]=useState([]);     // [{id,name,organizer,slug}]
  const [cqLoading,setCqLoading]=useState(false);
  const [cqError,setCqError]=useState(null);
  const loadCalendiq=useCallback(async()=>{
    let sources=[];
    try{
      if(isAdmin){
        const { data } = await SB.from('profiles').select('id,name,calendiq_name,calendiq_slug,calendiq_organizer_id').not('calendiq_organizer_id','is',null);
        sources=(data||[]).map(p=>({ id:p.id, name:p.name||p.calendiq_name||'Closer', organizer:p.calendiq_organizer_id, slug:p.calendiq_slug }));
      } else if(profile && profile.calendiq_organizer_id){
        sources=[{ id:userId, name:profile.name||profile.calendiq_name||'Moi', organizer:profile.calendiq_organizer_id, slug:profile.calendiq_slug }];
      }
    }catch(e){ /* admin sans droit / réseau : on retombe sur vide */ }
    setCqSources(sources);
    if(!sources.length){ setCqMeetings([]); setCqError(null); return; }
    setCqLoading(true);
    try{
      const arrs=await Promise.all(sources.map(s=>cqMeetingsFor(s.organizer).then(ms=>(ms||[]).map(m=>({...m,_closerName:s.name,_closerId:s.id}))).catch(()=>[])));
      setCqMeetings(arrs.flat()); setCqError(null);
    }catch(e){ setCqError(e.message||'lecture impossible'); }
    finally{ setCqLoading(false); }
  },[isAdmin,profile,userId]);
  useEffect(()=>{ loadCalendiq(); },[loadCalendiq]);
  // rafraîchit l'agenda tant qu'on le regarde (RDV pris/déplacés dans CalendIQ)
  // RDV pris dans CalendIQ (ex : rush post-webi) → visibles dans le CRM en quelques secondes, sur TOUS les écrans.
  // Polling 20 s tant que l'onglet est visible + refresh instantané au focus ; en pause si onglet caché.
  useEffect(()=>{
    let timer=null;
    const start=()=>{ if(!timer) timer=setInterval(loadCalendiq,20000); };
    const stop=()=>{ if(timer){ clearInterval(timer); timer=null; } };
    const onVis=()=>{ if(document.visibilityState==='visible'){ loadCalendiq(); start(); } else stop(); };
    if(document.visibilityState==='visible') start();
    window.addEventListener('focus',loadCalendiq);
    document.addEventListener('visibilitychange',onVis);
    return ()=>{ stop(); window.removeEventListener('focus',loadCalendiq); document.removeEventListener('visibilitychange',onVis); };
  },[loadCalendiq]);

  const connectCalendiq=useCallback(async(input)=>{
    const slug=cqParseSlug(input);
    if(!slug) throw new Error('Colle ton lien CalendIQ (…/cal/ton-nom)');
    const org=await cqResolveSlug(slug);
    if(!org) throw new Error('Agenda introuvable pour « '+slug+' »');
    const p={ calendiq_slug:org.slug, calendiq_organizer_id:org.id, calendiq_name:org.full_name||null, calendiq_connected_at:new Date().toISOString() };
    const { error }=await SB.from('profiles').update(p).eq('id',userId);
    if(error) throw new Error(error.message||'Sauvegarde impossible');
    setProfile(prev=>({ ...(prev||{}), ...p }));
    toast('CalendIQ connecté', org.full_name||org.slug, 'ok');
    return org;
  },[userId,toast]);
  const disconnectCalendiq=useCallback(async()=>{
    const p={ calendiq_slug:null, calendiq_organizer_id:null, calendiq_name:null, calendiq_connected_at:null };
    const { error }=await SB.from('profiles').update(p).eq('id',userId);
    if(error){ toast('Déconnexion impossible', error.message, 'info'); return; }
    setProfile(prev=>({ ...(prev||{}), ...p }));
    setCqMeetings([]); setCqSources([]);
    toast('CalendIQ déconnecté',null,'info');
  },[userId,toast]);

  // index leads par email/téléphone -> id (pour relier un RDV CalendIQ à sa fiche)
  const leadIndex=useMemo(()=>{
    const em=new Map(), ph=new Map();
    for(const l of leads){ const e=(l.email||'').trim().toLowerCase(); if(e&&!em.has(e)) em.set(e,l.id); const k=cqPhoneKey(l.tel); if(k&&!ph.has(k)) ph.set(k,l.id); }
    return { em, ph };
  },[leads]);
  const meetingLeadId=useCallback((m)=>{ const e=(m.booker_email||'').trim().toLowerCase(); if(e&&leadIndex.em.has(e)) return leadIndex.em.get(e); const k=cqPhoneKey(m.booker_phone); if(k&&leadIndex.ph.has(k)) return leadIndex.ph.get(k); return null; },[leadIndex]);

  // leads enrichis de LEURS RDV CalendIQ (liste R1, R2…) + prochain RDV pour le badge kanban — sans toucher la DB.
  // lead.rdvs = liste triée des meetings confirmés matchés (chacun avec type chrono + statut depuis rdv_meta).
  const leadsCq=useMemo(()=>{
    if(!cqMeetings.length) return leads;
    const tnow=Date.now();
    const emM=new Map(), phM=new Map();
    for(const m of cqMeetings){ if(m.status!=='confirmed') continue;
      const e=(m.booker_email||'').trim().toLowerCase(); if(e){ if(!emM.has(e)) emM.set(e,[]); emM.get(e).push(m); }
      const k=cqPhoneKey(m.booker_phone); if(k){ if(!phM.has(k)) phM.set(k,[]); phM.get(k).push(m); }
    }
    const pickNext=arr=>{ const up=arr.filter(m=>new Date(m.start_at).getTime()>=tnow-3600000).sort((a,b)=>new Date(a.start_at)-new Date(b.start_at)); if(up.length) return up[0]; return arr.slice().sort((a,b)=>new Date(b.start_at)-new Date(a.start_at))[0]; };
    return leads.map(l=>{
      let cand=[]; const e=(l.email||'').trim().toLowerCase(); if(e&&emM.has(e)) cand=cand.concat(emM.get(e));
      const k=cqPhoneKey(l.tel); if(k&&phM.has(k)) cand=cand.concat(phM.get(k));
      if(!cand.length) return l;
      const seen=new Set(); cand=cand.filter(m=>seen.has(m.id)?false:(seen.add(m.id),true));
      // tri stable (start_at, puis id) → numérotation chrono r1/r2/r3 déterministe même à start_at égal
      cand.sort((a,b)=> (new Date(a.start_at)-new Date(b.start_at)) || (a.id<b.id?-1:a.id>b.id?1:0));
      const meta=l.rdvMeta||{};
      const rdvs=cand.map((m,i)=>{
        const mm=meta[m.id]||{};
        const type=mm.type || (i===0?'r1':i===1?'r2':'r3'); // override explicite (booking CRM) sinon ordre chrono
        // lien Meet : celui du meeting > celui qu'on a stocké > legacy single (UNIQUEMENT le meeting de même horaire)
        const legacy = (l.rdvMeetLink && l.rdv_at && Math.abs(new Date(m.start_at)-new Date(l.rdv_at))<60000) ? l.rdvMeetLink : null;
        return { id:m.id, source:'calendiq', type, start_at:m.start_at, duration_minutes:m.duration_minutes||null, meet_link:m.meet_link||mm.meet_link||legacy||null, outcome:(mm.outcome==='present'||mm.outcome==='no_show')?mm.outcome:null };
      });
      const next=pickNext(cand);
      return { ...l, rdvs, calendiqRdv:{ ...next, meet_link: next.meet_link || l.rdvMeetLink || null } };
    });
  },[leads,cqMeetings]);
  const sel = leadsCq.find(l=>l.id===selId);

  // (faux lead entrant de démo désactivé — on n'affiche que la vraie donnée)

  // esc closes overlays
  useEffect(()=>{
    const h=(e)=>{ if(e.key==='Escape'){ setPayTarget(null); setSlotTarget(null); setShowRappeler(false); setShowSettings(false); setIncoming(null); setAddTarget(null); } };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[]);

  /* ---------- actions ---------- */
  const openLead=(id)=>{ setSelId(id); setScreen('fiche'); setSearch(''); }; // vide la recherche à l'ouverture d'un lead

  const reorderLead=(id,col,beforeId,opts)=>{
    const l=leads.find(x=>x.id===id); if(!l) return;
    const changedCol = l.column!==col;
    setLeads(ls=>{
      const dragged=ls.find(x=>x.id===id); if(!dragged) return ls;
      const moved={...dragged, column:col,
        nextAction: changedCol ? (NEXT_BY_COL[col] || dragged.nextAction) : dragged.nextAction};
      const rest=ls.filter(x=>x.id!==id);
      let at;
      if(beforeId && beforeId!==id){ at=rest.findIndex(x=>x.id===beforeId); if(at===-1) at=rest.length; }
      else { let last=-1; rest.forEach((x,i)=>{ if(x.column===col) last=i; }); at = last===-1?rest.length:last+1; }
      const out=[...rest]; out.splice(at,0,moved); return out;
    });
    if(changedCol){
      const na = NEXT_BY_COL[col] || null;
      const claim = (col==='rdv1' && !l.owner && !isAdmin);
      saveLead(id,{column:col, ...(na?{nextAction:na}:{}), ...(claim?{owner:userId}:{})});
      if(claim) patch(id,{owner:userId});
      const stTitle='Étape : '+(COL_LABEL[col]||col);
      const stActP=addActivite(id,'note',stTitle,null).catch(()=>null);
      patch(id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]}));
      if(!(opts && opts.silent)){
        const fromCol=l.column, fromNa=l.nextAction, fromOwner=l.owner;
        const entry=pushUndo(`Déplacement · ${(l.prenom||'')+' '+(l.nom||'')}`.trim(), async()=>{ patch(id,prev=>({column:fromCol, nextAction:fromNa, owner:fromOwner, timeline:prev.timeline.filter(e=>!(e.title===stTitle && !e.id))})); try{ const stActId=await stActP; if(stActId) await deleteActivite(stActId); }catch(e){} await saveLead(id,{column:fromCol, nextAction:fromNa, owner:fromOwner}); reload(); }, id);
        toast(`${l.prenom} → ${COL_LABEL[col]}`,'Carte déplacée','accent',{label:'Annuler', fn:()=>runUndo(entry)});
      }
    }
  };


  // VRAI appel : un clic -> ouvre le dialer du Mac (tel:). On NE log PAS ici :
  // le navigateur ne peut pas savoir si l'appel a vraiment eu lieu -> on demande confirmation.
  const placeCall=(l)=>{
    if(!l) return;
    const num=(l.tel||'').replace(/[^+\d]/g,'');
    if(!num){ toast('Pas de numéro',`${l.prenom||'Ce lead'} n’a pas de téléphone`,'info'); return; }
    const a=document.createElement('a'); a.href='tel:'+num; document.body.appendChild(a); a.click(); a.remove();
    toast('Appel lancé', l.tel, 'accent'); // pas de pop-up : la trace d'appel se fait via « + Note » → Appel
  };
  // entrée d'historique depuis la modale Note : note écrite OU NRP (appel sans réponse)
  const addNote=async(type,title,text,extra)=>{
    if(!sel) return;
    const lid=sel.id;
    const optimistic={type,when:'à l’instant',at:new Date().toISOString(),title,text:text||'',result:extra?.result||null,conclusion:extra?.conclusion||null,callKind:extra?.call_kind||null};
    patch(lid,prev=>({timeline:[optimistic,...prev.timeline]})); // affichage instantané
    try{
      const id=await addActivite(lid, type, title, text||null, null, extra);
      if(id) patch(lid,prev=>({timeline:prev.timeline.map(e=>e===optimistic?{...e,id}:e)})); // attache l'id réel (édit/suppr avant reload)
      toast(type==='recap'?'Débrief enregistré':(type==='appel'?(title&&title.indexOf('NRP')===0?'NRP enregistré':'Appel enregistré'):'Note ajoutée'), title, 'ok');
    }catch(e){
      patch(lid,prev=>({timeline:prev.timeline.filter(e=>e!==optimistic)})); // rollback : on n'a pas menti
      toast('Échec de l’enregistrement', e.message||'Réessaie', 'info');
    }
  };

  // ajout manuel d'un lead — annulable (Ctrl+Z / Annuler → corbeille douce)
  const addLead=async(fields)=>{
    const lead=await createLead(fields); setLeads(ls=>[lead,...ls]); setAddTarget(null);
    const name=(lead.prenom||lead.nom||lead.email||'').toString().trim();
    const entry=pushUndo(`Ajout · ${name}`, async()=>{ setLeads(ls=>ls.filter(x=>x.id!==lead.id)); await SB.from('leads').update({deleted_at:new Date().toISOString()}).eq('id',lead.id); }, lead.id);
    toast('Lead ajouté', name, 'ok', {label:'Annuler', fn:()=>runUndo(entry)});
  };
  // suppression d'un lead en 1 clic — corbeille DOUCE (deleted_at) → récupérable via Annuler / Ctrl+Z
  const deleteLead=async(id)=>{
    const l=leads.find(x=>x.id===id);
    setLeads(ls=>ls.filter(x=>x.id!==id));
    if(selId===id){ setSelId(null); setScreen('leads'); }
    try{ const { error }=await SB.from('leads').update({deleted_at:new Date().toISOString()}).eq('id',id); if(error) throw error; }
    catch(e){ toast('Échec suppression', e.message, 'info'); reload(); return; }
    const name = l?(`${l.prenom||''} ${l.nom||''}`.trim()||l.email||''):'';
    const entry=pushUndo(`Suppression · ${name}`, async()=>{ if(l) setLeads(ls=> ls.some(x=>x.id===id)?ls:[l,...ls]); await SB.from('leads').update({deleted_at:null}).eq('id',id); reload(); }, id);
    toast('Lead supprimé', name, 'info', { label:'Annuler', fn:()=>runUndo(entry) });
  };

  // modifier / supprimer une entrée d'historique (optimiste local + Supabase)
  const editNote=(actId,text)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.map(e=> e.id===actId?{...e,text}:e)})); updateActivite(actId,text); };
  const deleteNote=(actId)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.filter(e=> e.id!==actId)})); deleteActivite(actId); toast('Entrée supprimée',null,'info'); };
  // édition d'un champ de qualification (uiKey = champ local, saveKey = clé attendue par saveLead -> colonne DB)
  const editField=(uiKey,saveKey,value)=>{ if(!sel) return; patch(sel.id,{[uiKey]:value}); saveLead(sel.id,{[saveKey]:value}); };
  const toggleAction=(checked)=>{ if(!sel) return; const v=checked?(sel.nextAction||null):null; patch(sel.id,{actionDoneFor:v}); saveLead(sel.id,{actionDoneFor:v}); };
  const setActions=(arr,persist)=>{ if(!sel) return; patch(sel.id,{extraActions:arr}); if(persist) saveLead(sel.id,{extraActions:arr}); };
  // appropriation du lead par le closer connecté (toggle) — owner_closer_id = id de l'utilisateur auth
  // 3 états : libre -> je m'approprie ; à moi -> je libère ; à un autre closer -> bloqué (pas de vol)
  const claimLead=()=>{ if(!sel) return; const uid=session.user.id; if(sel.owner && sel.owner!==uid){ toast('Lead déjà approprié','Par un autre closer','info'); return; } const next=sel.owner?null:uid; patch(sel.id,{owner:next}); saveLead(sel.id,{owner:next}); toast(next?'Lead approprié':'Lead libéré', `${sel.prenom||''} ${sel.nom||''}`.trim()||null, next?'ok':'info'); };
  // Ajouter / reprogrammer un RDV : crée un VRAI RDV dans le CalendIQ du closer (insert + Meet + email).
  // Si replaceMeetingId fourni (reprogrammation) : on booke le nouveau PUIS on annule l'ancien (ordre sûr =
  // jamais de lead sans RDV). Reflète côté CRM (rdv_at + type + auto-claim R1 + note + refresh).
  const addCalendiqRdv=useCallback(async(type, durationMin, startIso, replaceMeetingId)=>{
    if(!sel) return;
    const orgId = profile && profile.calendiq_organizer_id;
    if(!orgId){ toast('Connecte ton CalendIQ d’abord','Onglet Agenda','info'); throw new Error('CalendIQ non connecté'); }
    const name=`${sel.prenom||''} ${sel.nom||''}`.trim()||sel.email||'Lead';
    // 1) booke le nouveau créneau (insert + event Google/Meet + email) — comme la page de booking
    const booked=await cqBookMeeting(orgId, { title:'IQ Project × '+(sel.prenom||name), description:null, start_at:startIso, duration_minutes:durationMin,
      booker_name:name, booker_email:sel.email||null, booker_phone:sel.tel||null, booker_timezone:'Europe/Paris' });
    // 2) reprogrammation : annule l'ancien RDV via CalendIQ (supprime event Google + email d'annulation)
    if(replaceMeetingId){ try{ await cqInvoke('cancel-meeting',{ meeting_id:replaceMeetingId }); }catch(e){ console.warn('cancel old',e); } setCqMeetings(ms=>ms.filter(m=>m.id!==replaceMeetingId)); }
    const claim = type==='r1' && !sel.owner && !isAdmin;
    const tgt = rdvTargetStage(type, sel.column); // RDV fixé → avance l'étape (R1→1er RDV pris, R2→Closing), jamais en arrière
    const stagePatch = tgt ? { column:tgt, nextAction:NEXT_BY_COL[tgt]||null } : {};
    // fige le TYPE choisi (R1/R2) + le Meet sur ce meeting précis (clé = id CalendIQ) → l'UI ne renumérote pas en cas d'annulation amont
    const baseMeta = sel.rdvMeta||{};
    const nextMeta = { ...baseMeta };
    if(replaceMeetingId) delete nextMeta[replaceMeetingId]; // reprogrammation : purge l'ancienne clé (cohérent avec cancelCalendiqRdv, zéro orphelin)
    nextMeta[booked.id] = { ...(baseMeta[booked.id]||{}), type, ...(booked.meet_link?{meet_link:booked.meet_link}:{}) };
    // le lien Meet est stocké dans crm-sales (rdvMeetLink) car l'UPDATE anon sur la base CalendIQ est bloqué
    const p={ rdv_at:startIso, rdvType:type, rdvMeetLink:booked.meet_link||null, rdvMeta:nextMeta, ...(claim?{owner:userId}:{}), ...stagePatch };
    // reflet immédiat du RDV (avec le lien Meet) sur la fiche, sans attendre le refetch
    patch(sel.id,prev=>({ ...p, calendiqRdv:{ id:booked.id, title:'IQ Project × '+(sel.prenom||name), start_at:startIso, duration_minutes:durationMin, status:'confirmed', meet_link:booked.meet_link||null } }));
    saveLead(sel.id,p);
    if(tgt){ const stTitle='Étape : '+(COL_LABEL[tgt]||tgt); addActivite(sel.id,'note',stTitle,null).catch(()=>null); patch(sel.id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]})); }
    const verb=replaceMeetingId?'reprogrammé':'calé';
    const title='RDV CalendIQ '+verb+' — '+(type||'r1').toUpperCase()+' · '+fmtRdv(startIso);
    const actP=addActivite(sel.id,'rdv',title,null).catch(()=>null);
    patch(sel.id,prev=>({timeline:[{type:'rdv',when:'à l’instant',title,text:''},...prev.timeline]}));
    loadCalendiq();
    if(booked.meet_link) toast((type||'r1').toUpperCase()+' '+verb+' + Meet'+(claim?' — lead approprié':''), fmtRdv(startIso),'ok');
    else toast((type||'r1').toUpperCase()+' '+verb+' (sans Meet)', booked.meetError?('CalendIQ : '+booked.meetError):'Connecte Google dans CalendIQ pour le lien Meet','info');
    return actP;
  },[sel,profile,isAdmin,userId,toast,patch,loadCalendiq]);
  // Annuler un RDV : passe par CalendIQ (cancel-meeting → supprime l'event Google + email), puis nettoie le CRM.
  const cancelCalendiqRdv=useCallback(async(meetingId)=>{
    if(!sel) return;
    try{ await cqInvoke('cancel-meeting',{ meeting_id:meetingId }); }
    catch(e){ toast('Annulation impossible', e.message, 'info'); return; }
    setCqMeetings(ms=>ms.filter(m=>m.id!==meetingId));
    const cBase=sel.rdvMeta||{}; const cNext={...cBase}; delete cNext[meetingId]; // pas d'orphelin dans rdv_meta
    patch(sel.id,{ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:cNext, calendiqRdv:null });
    saveLead(sel.id,{ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:cNext });
    const title='RDV CalendIQ annulé';
    addActivite(sel.id,'rdv',title,null).catch(()=>{});
    patch(sel.id,prev=>({timeline:[{type:'rdv',when:'à l’instant',title,text:''},...prev.timeline]}));
    loadCalendiq();
    toast('RDV annulé','CalendIQ a retiré le créneau','info');
  },[sel,toast,patch,loadCalendiq]);
  // RDV saisi à la main : CRM UNIQUEMENT (rdv_at/rdvType/rdvMeetLink). Aucun appel CalendIQ, aucun email, aucun Meet généré.
  const setManualRdv=useCallback((type, iso, meetLink)=>{ if(!sel) return; const tgt=rdvTargetStage(type, sel.column);
    // nouveau créneau = repart à zéro : on purge le statut présence de l'ancien (sinon no-show fantôme sur la nouvelle date)
    const mk='manual:'+sel.id; const base=sel.rdvMeta||{}; const nm={...base}; if(nm[mk]){ const e={...nm[mk]}; delete e.outcome; delete e.outcome_at; delete e.by; if(Object.keys(e).length) nm[mk]=e; else delete nm[mk]; }
    const p={ rdv_at:iso, rdvType:type, rdvMeetLink:meetLink||null, rdvMeta:nm, ...(tgt?{column:tgt, nextAction:NEXT_BY_COL[tgt]||null}:{}) }; patch(sel.id,p); saveLead(sel.id,p); if(tgt){ const stTitle='Étape : '+(COL_LABEL[tgt]||tgt); addActivite(sel.id,'note',stTitle,null).catch(()=>null); patch(sel.id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]})); } toast('Rendez-vous enregistré', (type||'r1').toUpperCase()+' · '+fmtRdv(iso),'ok'); },[sel,patch,toast]);
  const removeManualRdv=useCallback(()=>{ if(!sel) return; const base=sel.rdvMeta||{}; const next={...base}; delete next['manual:'+sel.id]; const p={ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:next }; patch(sel.id,p); saveLead(sel.id,p); toast('Rendez-vous retiré',null,'info'); },[sel,patch,toast]);

  // ---- Résultat d'un RDV (présent / no-show) — fait structuré, SOURCE DE VÉRITÉ UNIQUE = leads.rdv_meta ----
  // rdvMetaRef = miroir SYNCHRONE du rdv_meta de chaque lead. On lit/écrit dessus dans le handler (ordre garanti),
  // donc deux marquages rapprochés (R1 puis R2, ou manuel + IA) FUSIONNENT au lieu de s'écraser → invariant #1 garanti.
  const rdvMetaRef=useRef({});
  useEffect(()=>{ const m={}; for(const l of leads) m[l.id]=l.rdvMeta||{}; rdvMetaRef.current=m; },[leads]);
  // saveLeadRdvMeta REMONTE l'erreur → rollback optimiste (ref + UI) + toast (jamais de faux « enregistré »).
  const writeRdvMeta=useCallback(async(leadId, mutator)=>{
    const prev = rdvMetaRef.current[leadId] || {};
    const next = mutator(prev);
    if(next===prev) return 'noop';
    rdvMetaRef.current = { ...rdvMetaRef.current, [leadId]:next }; // autorité synchrone (avant tout await)
    patch(leadId,{rdvMeta:next});                                  // reflet UI optimiste
    try{ await saveLeadRdvMeta(leadId, next); return true; }
    catch(e){ rdvMetaRef.current = { ...rdvMetaRef.current, [leadId]:prev }; patch(leadId,{rdvMeta:prev}); toast('Échec de l’enregistrement', e.message||'Réessaie','info'); return false; }
  },[patch,toast]);
  const setRdvOutcome=useCallback(async(rdv, outcome, by='manual')=>{
    if(!sel || !rdv) return;
    const id=sel.id, key=rdv.id;
    let changed=false;
    const res=await writeRdvMeta(id, m=>{
      const ex=m[key]||{};
      if(by==='ia' && new Date(rdv.start_at).getTime()>Date.now()) return m;                       // l'IA ne tague jamais un RDV à venir
      if(by==='ia' && ex.by==='manual' && (ex.outcome==='present'||ex.outcome==='no_show')) return m; // le manuel prime
      if(ex.outcome===outcome){                                                                     // déjà ce statut
        if(by==='manual' && ex.by!=='manual') return { ...m, [key]:{ ...ex, by:'manual' } };        // confirme = verrouille en manuel (silencieux)
        return m;                                                                                   // sinon no-op
      }
      changed=true;
      return { ...m, [key]:{ ...ex, outcome, outcome_at:new Date().toISOString(), by, ...(rdv.type?{type:rdv.type}:{}) } };
    });
    if(res===true && changed && by==='manual')
      toast(outcome==='present'?'RDV marqué présent':'RDV marqué no-show', (rdv.type||'r1').toUpperCase()+' · '+cqDayLabel(rdv.start_at), outcome==='present'?'ok':'info');
  },[sel,writeRdvMeta,toast]);
  const clearRdvOutcome=useCallback(async(rdv)=>{
    if(!sel || !rdv) return;
    const id=sel.id, key=rdv.id;
    await writeRdvMeta(id, m=>{
      const cur=m[key]; if(!cur || !cur.outcome) return m;
      const e={...cur}; delete e.outcome; delete e.outcome_at; delete e.by;
      const n={...m}; if(Object.keys(e).length) n[key]=e; else delete n[key]; return n;
    });
  },[sel,writeRdvMeta]);

  // payment send → À payer, then auto Payé (id capturé, transition garantie)
  const sendPayment=(amount,tag)=>{
    const l=payTarget.lead; const id=l.id; setPayTarget(null);
    patch(id,prev=>({column:'encaisser', offer:amount, nextAction:`${eur(amount)} envoyé — en attente`,
      timeline:[{type:'paiement',when:'à l’instant',title:`Lien de paiement envoyé — ${eur(amount)}`,text:`Email envoyé à ${l.email}. En attente de paiement.`},...prev.timeline]}));
    saveLead(id,{column:'encaisser', offer:amount, statut_paiement:'lien_envoye', nextAction:`${eur(amount)} envoyé — en attente`});
    addActivite(id,'paiement',`Lien de paiement envoyé — ${eur(amount)}`,`Email envoyé à ${l.email}. En attente de paiement.`,amount).catch(()=>{});
    toast(`Lien envoyé · ${eur(amount)}`,`Email parti à ${l.prenom}`,'accent');
  };

  const takeIncoming=()=>{
    const inc=incoming; if(!inc) return;
    const id='lead'+Date.now();
    const newLead={...inc, id, owner:'Léo', column:'contacter', noShow:false, live:true, nextAction:'1er appel à passer',
      timeline:[{type:'note',when:'à l’instant',title:'Lead pris',text:`Tu es propriétaire de ce lead (course au lead remportée).`}]};
    setLeads(ls=>[newLead,...ls]);
    setIncoming(null);
    localStorage.setItem('iqcrm_sarahDone',JSON.stringify(true));
    toast(`Lead attribué · ${inc.prenom}`,'Atterri dans ta colonne Nouveau','ok');
    setScreen('leads');
  };

  const simulate=()=>{
    incomingIdx.current=(incomingIdx.current+1)%INCOMING_POOL.length;
    setIncoming({...INCOMING_POOL[incomingIdx.current]}); ping(); setShowSettings(false);
  };

  const resetData=()=>{
    setLeads(SEED); setSelId(null); setScreen('leads'); setShowSettings(false);
    localStorage.removeItem('iqcrm_sarahDone');
    toast('Données réinitialisées',null,'info');
  };

  const rappelerCount = useMemo(()=> leads.filter(l=>l.owner===userId && ['contacter','perso','atc','rdv1','contacte','qualifie','closing','encaisser'].includes(l.column) && (l.heat==='chaud'||l.noShow)).length,[leads,userId]);

  const navItems=[
    {id:'leads', label:'Mes leads', icon:I.leads, badge:rappelerCount},
    {id:'agenda', label:'Agenda', icon:I.agenda},
    ...(isAdmin?[{id:'team', label:'Closers', icon:I.users},{id:'console', label:'Synchro HubSpot', icon:I.sync}]:[]),
  ];
  useEffect(()=>{ if(!isAdmin && (screen==='team'||screen==='console')) setScreen('leads'); },[isAdmin,screen]);
  const navActive = screen==='fiche'?'leads':screen;

  return (
    <div className="app">
      {/* RAIL */}
      <nav className="rail">
        <div className="logo">
          <svg className="logo-img" viewBox="0 0 208 58" role="img" aria-label="IQ Project — by IQ Education">
              <rect x="0" y="7" width="60" height="44" rx="9" fill="#f35c04"/>
              <text x="30" y="40" textAnchor="middle" fill="#fff" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="900" fontSize="30" letterSpacing="-1">IQ</text>
              <text x="69" y="40" fill="var(--t1)" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="800" fontSize="30" letterSpacing="-1">Project.</text>
              <text x="206" y="55" textAnchor="end" fill="#f35c04" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="700" fontSize="8.5" letterSpacing="1.5">BY IQ EDUCATION</text>
            </svg>
        </div>
        {navItems.map(n=>(
          <button key={n.id} className={`nav-item ${navActive===n.id?'active':''}`} onClick={()=>{setScreen(n.id);}}>
            {n.icon({})}<span>{n.label}</span>{n.badge?<span className="nav-badge">{n.badge}</span>:null}
          </button>
        ))}
        <div className="rail-spacer"></div>
        <div className="rail-tools">
          <button className="icon-btn" title="Thème" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?I.moon({}):I.sun({})}</button>
          <button className="icon-btn" title="Réglages" onClick={()=>setShowSettings(true)}>{I.gear({})}</button>
        </div>
        <div className="profile">
          <div className="avatar sz-sm">{(userEmail[0]||'L').toUpperCase()}</div>
          <div className="profile-meta" style={{flex:1,minWidth:0}}><b style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{userEmail}</b><span>{profile?(isAdmin?'Admin':'Closer'):'…'}</span></div>
          <button className="icon-btn" title="Déconnexion" onClick={onLogout} style={{width:30,height:30}}>{I.logout({})}</button>
        </div>
      </nav>

      {/* WORK */}
      <main className="work">
        {screen==='leads' && <Board leads={leadsCq} search={search} setSearch={setSearch}
            onOpenLead={openLead} onReorder={reorderLead} onAddLead={(col)=>setAddTarget(col)} onDelete={deleteLead}/>}
        {screen==='fiche' && sel && <Fiche lead={sel} onBack={()=>setScreen('leads')} onCall={()=>placeCall(sel)} onMove={(col)=>reorderLead(sel.id, col, null)} onEditNote={editNote} onDeleteNote={deleteNote} onEditField={editField} onNote={addNote}
            onPay={()=>setPayTarget({lead:sel})} onAdvanceStage={(col)=>reorderLead(sel.id, col, null, {silent:true})} onToggleAction={toggleAction} onActions={setActions} onClaim={claimLead} meId={session.user.id} onAddRdv={addCalendiqRdv} onCancelRdv={cancelCalendiqRdv} onManualRdv={setManualRdv} onManualRemoveRdv={removeManualRdv} onRdvOutcome={setRdvOutcome} onClearRdvOutcome={clearRdvOutcome} calendiqReady={!!(profile&&profile.calendiq_organizer_id)} calendiqOrganizer={profile&&profile.calendiq_organizer_id}/>}
        {screen==='fiche' && !sel && <div className="empty-screen"><I.leads/><p>Lead introuvable.</p><button className="btn btn-ghost" onClick={()=>setScreen('leads')}>Retour au board</button></div>}
        {screen==='agenda' && <Agenda meetings={cqMeetings} sources={cqSources} loading={cqLoading} error={cqError}
            isAdmin={isAdmin} profile={profile} onConnect={connectCalendiq} onDisconnect={disconnectCalendiq}
            onRefresh={loadCalendiq} onOpenLead={openLead} meetingLeadId={meetingLeadId}/>}
        {screen==='team' && isAdmin && <TeamScreen userId={userId} toast={toast} leads={leadsCq} onOpenLead={openLead}/>}
        {screen==='console' && isAdmin && <Console toast={toast} onOpenLead={openLead} setSyncBusy={setSyncBusy} reloadLeads={reload}/>}
      </main>

      {/* OVERLAYS */}
      {addTarget && <AddLeadModal column={addTarget} onClose={()=>setAddTarget(null)} onAdd={addLead}/>}
      {showSettings && <div className="backdrop" onClick={()=>setShowSettings(false)}><Settings theme={theme} setTheme={setTheme} density={density} setDensity={setDensity} onSimulate={simulate} onReset={resetData} onClose={()=>setShowSettings(false)}/></div>}
      {payTarget && <PaymentModal lead={payTarget.lead} onClose={()=>setPayTarget(null)} onSend={sendPayment}/>}
      {incoming && <Incoming lead={incoming} onTake={takeIncoming} onDismiss={()=>{setIncoming(null); localStorage.setItem('iqcrm_sarahDone',JSON.stringify(true));}}/>}

      <Toasts toasts={toasts}/>
    </div>
  );
}

/* ====================== ÉCRAN MANAGER : COCKPIT CLOSERS ====================== */
// statut dérivé d'un lead (aucune donnée inventée — vide reste vide)
const LB_LOST=['lost','perdu','desabonne','desabo'], LB_WON=['won','paye'], LB_CLOSING=['closing','encaisser','apayer','cpf'];
function leadStatus(l){
  const col=l.column;
  const recap=(l.timeline||[]).find(t=>t.type==='recap');
  const result = (recap && RESULT_META[recap.result]) ? recap.result : null;
  const isWon = l.paid===true || LB_WON.includes(col) || result==='close';
  const isLost = !isWon && (LB_LOST.includes(col) || result==='pas_interesse');
  const isClosing = !isWon && !isLost && (LB_CLOSING.includes(col) || result==='a_closer');
  const rdvUpcoming = !!l.rdv_at && new Date(l.rdv_at).getTime()>Date.now();
  return { col, label:COL_LABEL[col]||col, color:COL_COLOR[col]||'var(--t3)',
    isWon, isLost, isClosing, rdvUpcoming, rdvType:l.rdvType||null, rdv_at:l.rdv_at||null,
    montant:l.offer||0,
    result, callKind: recap?(recap.callKind||null):null,
    conclusion: recap?(recap.conclusion||recap.text||''):'' };
}
// faut-il caler un RDV ? (étape amont, aucun RDV à venir)
const RDV_TODO_COLS=['contacter','perso','atc','contacte'];
function leadAttn(s){ if(s.isClosing) return 0; if(s.rdvUpcoming) return 1; if(!s.isWon&&!s.isLost) return 2; if(s.isWon) return 3; return 4; }

function ManagerLeadRow({ lead, onOpenLead }){
  const s=leadStatus(lead);
  const rdvLabel = s.rdvUpcoming ? ((s.rdvType||'r1').toUpperCase()+' · '+cqDayLabel(s.rdv_at)+' '+cqTime(s.rdv_at)) : null;
  const todo = !s.rdvUpcoming && !s.isWon && !s.isLost && RDV_TODO_COLS.includes(s.col);
  return (
    <button className="cl-lead" onClick={()=>onOpenLead(lead.id)}>
      <span className="cl-lead-name">{lead.prenom} {lead.nom}</span>
      <span className="chip" style={{color:s.color, background:'color-mix(in srgb, currentColor 12%, transparent)'}}><span className="cdot"></span>{s.label}</span>
      {s.result && (()=>{ const rk=RESULT_META[s.result]; return <span className="chip" style={{color:rk.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{s.callKind?(callKindLabel(s.callKind)+' · '):''}{rk.label}</span>; })()}
      {rdvLabel && <span className="chip-rdv">{I.agenda({})}{rdvLabel}</span>}
      {todo && <span className="chip-rdv todo">{I.clock({})}RDV à caler</span>}
      {s.montant>0 && <span className="cl-amt">{eur(s.montant)}</span>}
      {s.conclusion && <span className="cl-concl">« {s.conclusion} »</span>}
      <span className="cl-arrow">{I.chev({})}</span>
    </button>
  );
}

function CloserCard({ rank, name, leads, maxCa, onOpenLead, defaultOpen }){
  const [open,setOpen]=useState(!!defaultOpen);
  const m=useMemo(()=>{
    let rdv=0,closing=0,won=0,ca=0,lost=0;
    leads.forEach(l=>{ const s=leadStatus(l);
      if(s.isWon){ won++; ca+=s.montant; }
      else if(s.isLost) lost++;
      else if(s.isClosing) closing++;
      if(s.rdvUpcoming) rdv++;
    });
    return { n:leads.length, rdv, closing, won, ca, lost, taux: leads.length?Math.round(won/leads.length*100):0 };
  },[leads]);
  const sorted=useMemo(()=>leads.slice().sort((a,b)=>leadAttn(leadStatus(a))-leadAttn(leadStatus(b))),[leads]);
  const caPct = maxCa>0 ? Math.max(4, Math.round(m.ca/maxCa*100)) : 0;
  return (
    <div className={'lb-card'+(open?' open':'')}>
      <button className="lb-head" onClick={()=>setOpen(o=>!o)}>
        <span className="lb-rank">{rank}</span>
        <div className="lb-id"><span className="avatar sz-sm">{((name||'?')[0]||'?').toUpperCase()}</span><b>{name}</b></div>
        <div className="lb-metrics">
          <div className="lb-m"><b>{m.n}</b><span>Leads</span></div>
          <div className={'lb-m'+(m.rdv?' warn':'')}><b>{m.rdv}</b><span>RDV à venir</span></div>
          <div className="lb-m"><b>{m.closing}</b><span>En closing</span></div>
          <div className={'lb-m'+(m.won?' won':'')}><b>{m.won}</b><span>Gagnés</span></div>
          <div className="lb-m"><b>{m.taux}%</b><span>Taux close</span></div>
        </div>
        <div className="lb-ca">
          <div className="lb-ca-top"><b>{eur(m.ca)}</b><span>encaissé</span></div>
          <div className="lb-bar"><i style={{width:caPct+'%'}}></i></div>
        </div>
        <span className="lb-chev">{I.chev({})}</span>
      </button>
      {open && (
        <div className="lb-body">
          {sorted.length===0 ? <div className="lb-empty">Aucun lead attribué.</div>
            : sorted.map(l=><ManagerLeadRow key={l.id} lead={l} onOpenLead={onOpenLead}/>)}
        </div>
      )}
    </div>
  );
}

function TeamScreen({ userId, toast, leads, onOpenLead }){
  const [profiles,setProfiles]=useState([]);
  const [invites,setInvites]=useState([]);
  const [busy,setBusy]=useState(false);
  const base = (typeof location!=='undefined') ? (location.origin+location.pathname) : '';
  const linkFor = t => base+'?invite='+t;
  const load=()=>{
    SB.from('profiles').select('id,name,role,created_at').order('created_at').then(({data})=>setProfiles(data||[]));
    SB.from('invites').select('token,email,name,used_at,created_at').order('created_at',{ascending:false}).then(({data})=>setInvites(data||[]));
  };
  useEffect(load,[]);
  const gen=async()=>{ setBusy(true); try{
    const {data,error}=await SB.from('invites').insert({created_by:userId}).select('token').single();
    if(error) throw error;
    try{ await navigator.clipboard.writeText(linkFor(data.token)); }catch(e){}
    toast('Lien d’invitation créé','Copié — envoie-le au closer','ok'); load();
  }catch(e){ toast('Erreur', e.message, 'info'); } finally{ setBusy(false); } };
  const copy=t=>{ try{ navigator.clipboard.writeText(linkFor(t)); toast('Lien copié',null,'ok'); }catch(e){} };
  const pending = invites.filter(i=>!i.used_at);

  const all = leads||[];
  // roster : profils closer (même à 0 lead) ∪ propriétaires réels présents dans les leads ; le manager (userId) exclu
  const { rosterClosers, unassigned } = useMemo(()=>{
    const nameById={}; profiles.forEach(p=>{ nameById[p.id]=p.name; });
    const byKey={};
    profiles.filter(p=>p.role==='closer').forEach(p=>{ byKey[p.id]={key:p.id, name:p.name||'—', leads:[]}; });
    const un=[];
    all.forEach(l=>{
      if(!l.owner){ un.push(l); return; }
      if(l.owner===userId) return; // les leads du manager lui-même ne comptent pas comme « closer »
      if(!byKey[l.owner]) byKey[l.owner]={key:l.owner, name:nameById[l.owner]||l.owner, leads:[]};
      byKey[l.owner].leads.push(l);
    });
    return { rosterClosers:Object.values(byKey), unassigned:un };
  },[all,profiles,userId]);

  const ranked = useMemo(()=>rosterClosers.slice().sort((a,b)=>{
    const ca=x=>x.leads.reduce((t,l)=>{const s=leadStatus(l); return t+(s.isWon?s.montant:0);},0);
    const wn=x=>x.leads.filter(l=>leadStatus(l).isWon).length;
    return (ca(b)-ca(a)) || (wn(b)-wn(a)) || (b.leads.length-a.leads.length);
  }),[rosterClosers]);
  const maxCa = useMemo(()=>Math.max(0,...ranked.map(c=>c.leads.reduce((t,l)=>{const s=leadStatus(l); return t+(s.isWon?s.montant:0);},0))),[ranked]);

  // KPIs équipe (tous les closers, hors leads du manager)
  const team = useMemo(()=>{
    const ls=ranked.flatMap(c=>c.leads);
    let rdv=0,closing=0,won=0,ca=0;
    ls.forEach(l=>{ const s=leadStatus(l); if(s.isWon){won++;ca+=s.montant;} else if(s.isClosing) closing++; if(s.rdvUpcoming) rdv++; });
    return { n:ls.length, rdv, closing, won, ca };
  },[ranked]);

  return (
    <div className="mgr-pad">
      <div className="mgr-head">
        <div><h1>Cockpit closers</h1><p>Vue manager — performance, pipeline et leads de chaque closer en un coup d’œil.</p></div>
        <button className="btn btn-accent" disabled={busy} onClick={gen}><I.plus style={{width:15,height:15}}/>Inviter un closer</button>
      </div>

      <div className="mgr-kpis">
        <div className="kpi"><span className="kpi-ic">{I.leads({})}</span><div className="kpi-n">{team.n}</div><div className="kpi-l">Leads suivis</div></div>
        <div className="kpi accent"><span className="kpi-ic">{I.agenda({})}</span><div className="kpi-n">{team.rdv}</div><div className="kpi-l">RDV à venir</div></div>
        <div className="kpi"><span className="kpi-ic">{I.euro({})}</span><div className="kpi-n">{team.closing}</div><div className="kpi-l">En closing</div></div>
        <div className="kpi ok"><span className="kpi-ic">{I.check({})}</span><div className="kpi-n">{team.won}</div><div className="kpi-l">Gagnés</div></div>
        <div className="kpi accent"><span className="kpi-ic">{I.euro({})}</span><div className="kpi-n">{eur(team.ca)}</div><div className="kpi-l">CA encaissé</div></div>
      </div>

      <div className="mgr-sec"><span className="eyebrow">Performance · classement</span><span className="mgr-count">{ranked.length}</span></div>
      <div className="lb-list">
        {ranked.length===0
          ? <div className="lb-card"><div className="lb-empty" style={{padding:'18px 16px'}}>Aucun closer pour l’instant. Clique « Inviter un closer » pour démarrer.</div></div>
          : ranked.map((c,i)=><CloserCard key={c.key} rank={i+1} name={c.name} leads={c.leads} maxCa={maxCa} onOpenLead={onOpenLead} defaultOpen={i===0&&ranked.length<=2}/>)}
      </div>

      <div className="mgr-sec"><span className="eyebrow">Invitations en attente</span><span className="mgr-count">{pending.length}</span></div>
      <div className="lb-list">
        <div className="lb-card"><div className="lb-body" style={{borderTop:'none'}}>
          {pending.length===0 ? <div className="lb-empty">Aucun lien en attente. Clique « Inviter un closer ».</div>
            : pending.map(i=>(
              <div key={i.token} className="cl-lead" style={{cursor:'default'}}>
                <span className="mono" style={{fontSize:12,color:'var(--t3)',flex:1}}>invite …{String(i.token).slice(-6)}{i.name?(' · '+i.name):''}</span>
                <button className="btn btn-soft" style={{padding:'5px 11px',fontSize:12}} onClick={()=>copy(i.token)}>Copier le lien</button>
              </div>
            ))}
        </div></div>
      </div>
    </div>
  );
}

/* ====================== CONSOLE SYNCHRO HUBSPOT (admin) ====================== */
// Page de contrôle : la fonction Edge 'hubspot-sync' calcule le diff (Sortants / Entrants / Conflits) et exécute
// les écritures. Ici on AFFICHE et on déclenche — le navigateur n'envoie que des décisions (jamais de champ brut).
const SYNC_FK = { dealstage:'Étape', colonne:'Étape', amount:'Montant', montant:'Montant', firstname:'Prénom', prenom:'Prénom', lastname:'Nom', nom:'Nom', email:'Email', phone:'Téléphone', telephone:'Téléphone' };
const syncVal = (k,v)=> (v===null||v===undefined||v==='') ? '—' : ((k==='amount'||k==='montant') ? (v+' €') : String(v));

function Console({ toast, onOpenLead, setSyncBusy, reloadLeads }){
  const [data,setData]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(null);
  const [tab,setTab]=React.useState('sortants');
  const [busy,setBusy]=React.useState({});      // key -> en cours
  const [colSel,setColSel]=React.useState({});   // dealId nouveau lead -> colonne choisie
  const [confl,setConfl]=React.useState({});     // leadId -> { champ: 'crm'|'hubspot' }
  const [bulk,setBulk]=React.useState(null);     // { done, total } pendant un envoi groupé
  const oneCommit=React.useRef(false);

  const load=React.useCallback(async(silent)=>{
    if(!silent) setLoading(true); setError(null);
    try{ const d=await callFn('hubspot-sync',{action:'diff'}); setData(d); }
    catch(e){ setError(e.message||'Lecture impossible'); }
    finally{ setLoading(false); }
  },[]);
  React.useEffect(()=>{ load(); },[load]);

  const doInit=async()=>{
    setLoading(true); setSyncBusy(true);
    try{ const r=await callFn('hubspot-sync',{action:'seed'}); toast('Synchro initialisée',(r.seeded||0)+' leads photographiés (rien écrit dans HubSpot)','ok'); }
    catch(e){ toast('Initialisation échouée', e.message||'', 'info'); }
    finally{ setSyncBusy(false); await load(); }
  };

  // envoie une liste d'items à la fonction Edge (par paquets de 8), rafraîchit, garde les échecs visibles
  const push=React.useCallback(async(items,label)=>{
    if(!items.length) return;
    const keys=items.map(i=>i.key);
    setBusy(b=>{ const n={...b}; keys.forEach(k=>n[k]=true); return n; });
    setSyncBusy(true);
    let ok=0, fail=0;
    if(items.length>1) setBulk({done:0,total:items.length});
    try{
      for(let i=0;i<items.length;i+=8){
        const chunk=items.slice(i,i+8);
        const r=await callFn('hubspot-sync',{action:'push',items:chunk,confirmBulk:true});
        (r.results||[]).forEach(res=>{ if(res.ok) ok++; else fail++; });
        if(items.length>1) setBulk({done:Math.min(i+chunk.length,items.length),total:items.length});
      }
    }catch(e){ toast('Envoi échoué', e.message||'', 'info'); fail+=items.length-ok-fail; }
    setBulk(null);
    setBusy(b=>{ const n={...b}; keys.forEach(k=>delete n[k]); return n; });
    if(ok) oneCommit.current=true;
    setSyncBusy(false);
    toast(ok+' envoyé'+(ok>1?'s':'')+(fail?(' · '+fail+' échec'+(fail>1?'s':'')):''), label||null, fail?'info':'ok');
    await load(true);
    if(reloadLeads) reloadLeads();
  },[load,reloadLeads,setSyncBusy,toast]);

  const sortItem = r => r.mode==='lost'
    ? { key:'l:'+r.leadId, mode:'lost', leadId:r.leadId, token:r.lastModified }
    : { key:'s:'+r.leadId, mode:'commit', leadId:r.leadId, token:r.lastModified };
  const entrItem = r => r.kind==='new'
    ? { key:'en:'+r.dealId, mode:'accept_new', dealId:r.dealId, column:(colSel[r.dealId]||r.proposedColumn) }
    : { key:'eu:'+r.leadId, mode:'accept_entrant', leadId:r.leadId };
  const conflItem = r => ({ key:'c:'+r.leadId, mode:'conflict', leadId:r.leadId, conflict:(confl[r.leadId]||{}), token:r.lastModified });

  const commitAllSortants=()=>{
    const rows=(data.sortants||[]).filter(r=>r.mode!=='lost');
    if(!rows.length) return;
    if(!oneCommit.current){ toast('Valide 1 lead d’abord','Sécurité : un envoi unitaire réussi avant le « Tout envoyer »','info'); return; }
    if(rows.length>10){ const a=window.prompt('Tu vas écrire dans HubSpot sur '+rows.length+' deals.\nTape '+rows.length+' pour confirmer :'); if(String(a||'').trim()!==String(rows.length)){ toast('Annulé',null,'info'); return; } }
    push(rows.map(sortItem),'Tout envoyé vers HubSpot');
  };

  const head=(
    <div className="screen-head">
      <div className="screen-title"><h1>CRM — Synchro HubSpot</h1><p>Page de contrôle : tu valides chaque changement avant qu’il parte dans HubSpot. Rien ne part sans ton clic.</p></div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost" disabled={loading} onClick={()=>load()}>{loading?'…':'Rafraîchir'}</button>
      </div>
    </div>
  );

  if(loading && !data) return <div className="mgr-pad">{head}<div className="empty-screen"><div className="spin"/><p>Lecture de HubSpot…</p></div></div>;
  if(error) return <div className="mgr-pad">{head}<div className="sync-banner"><h3>Connexion HubSpot impossible</h3><p>{error}</p><button className="btn btn-accent" onClick={()=>load()}>Réessayer</button></div></div>;

  if(data && data.needInit) return (
    <div className="mgr-pad">{head}
      <div className="sync-banner">
        <h3>Première synchro requise</h3>
        <p>On prend d’abord une <b>photo de référence</b> des {data.initCount} leads liés à HubSpot. C’est instantané et <b>ça n’écrit rien dans HubSpot</b> : ça sert juste à détecter, ensuite, ce qui change. Après ça, cette page restera vide tant que personne ne modifie un lead.</p>
        <button className="btn btn-accent" disabled={loading} onClick={doInit}>{loading?'Initialisation…':('Initialiser la synchro ('+data.initCount+' leads)')}</button>
      </div>
    </div>
  );

  const sortants=(data&&data.sortants)||[], entrants=(data&&data.entrants)||[], conflits=(data&&data.conflits)||[];
  const sortNormal=sortants.filter(r=>r.mode!=='lost'), sortLost=sortants.filter(r=>r.mode==='lost');
  const total=sortants.length+entrants.length+conflits.length;

  const tabs=[
    {id:'sortants', label:'À envoyer', n:sortants.length},
    {id:'entrants', label:'Reçus de HubSpot', n:entrants.length},
    {id:'conflits', label:'Conflits', n:conflits.length, warn:true},
  ];

  return (
    <div className="mgr-pad">{head}
      {total===0 ? (
        <div className="sync-ok">{I.check({})}<div><b style={{fontSize:16,color:'var(--t1)'}}>Tout est synchronisé</b><div style={{fontSize:13,marginTop:4}}>CRM et HubSpot sont alignés. Cette page s’animera dès qu’un lead change.</div></div></div>
      ) : (<>
        <div className="sync-tabs">
          {tabs.map(t=>(
            <button key={t.id} className={'sync-tab'+(t.warn?' warn':'')+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>
              {t.label}<span className="ct">{t.n}</span>
            </button>
          ))}
        </div>
        {bulk && <div className="sync-toolbar"><div className="spin"/><span className="sync-prog">Envoi… {bulk.done}/{bulk.total}</span></div>}

        {tab==='sortants' && (
          sortants.length===0 ? <div className="lb-empty">Aucun changement à envoyer.</div> : <>
            {sortNormal.length>0 && (
              <div className="sync-toolbar">
                <button className="btn btn-accent" disabled={!!bulk} onClick={commitAllSortants}>Tout envoyer ({sortNormal.length})</button>
                <span className="sync-prog">Vérifie chaque ligne avant d’envoyer.</span>
              </div>
            )}
            <div className="sync-list">
              {sortNormal.map(r=>{ const k='s:'+r.leadId; return (
                <div key={k} className="syncrow">
                  <div className="sync-main" onClick={()=>onOpenLead(r.leadId)}>
                    <b>{r.name}</b>
                    <div className="sync-reasons">{(r.reasons||[]).map((x,i)=><span key={i} className={'sync-chip'+(/note|rdv|paiement|appel/i.test(x)?' note':'')}>{x}</span>)}</div>
                    {r.fields&&r.fields.length>0 && <div className="sync-chg">{r.fields.map((f,i)=><span key={i}><span className="k">{SYNC_FK[f.k]||f.k} :</span> {syncVal(f.k,f.from)}<span className="ar">→</span>{syncVal(f.k,f.to)}</span>)}</div>}
                  </div>
                  <div className="sync-act"><button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([sortItem(r)],'Envoyé vers HubSpot')}>{busy[k]?'…':'Envoyer'}</button></div>
                </div>
              );})}
            </div>
            {sortLost.length>0 && <>
              <div className="sync-sec">Suppressions — à marquer « Perdu » dans HubSpot</div>
              <div className="sync-list">
                {sortLost.map(r=>{ const k='l:'+r.leadId; return (
                  <div key={k} className="syncrow danger">
                    <div className="sync-main"><b>{r.name}</b><div className="sync-reasons"><span className="sync-chip">{(r.reasons||[])[0]||'supprimé'}</span></div></div>
                    <div className="sync-act"><button className="btn btn-soft" disabled={!!busy[k]} onClick={()=>{ if(window.confirm('Marquer ce deal « Perdu » dans HubSpot ? (jamais supprimé)')) push([sortItem(r)],'Marqué Perdu'); }}>{busy[k]?'…':'Marquer Perdu'}</button></div>
                  </div>
                );})}
              </div>
            </>}
          </>
        )}

        {tab==='entrants' && (
          entrants.length===0 ? <div className="lb-empty">Rien de nouveau côté HubSpot.</div> : (
            <div className="sync-list">
              {entrants.map(r=>{ const k=r.kind==='new'?('en:'+r.dealId):('eu:'+r.leadId); return (
                <div key={k} className="syncrow">
                  <div className="sync-main" onClick={()=>r.leadId&&onOpenLead(r.leadId)}>
                    <b>{r.name}</b>
                    <div className="sync-reasons">{r.kind==='new'?<span className="sync-chip note">Nouveau lead</span>:<span className="sync-chip">Modifié dans HubSpot</span>}</div>
                    {r.kind==='new' ? (
                      <div className="sync-chg"><span><span className="k">Contact :</span> {r.email||'—'}{r.phone?(' · '+r.phone):''}</span></div>
                    ) : (
                      <div className="sync-chg">{(r.fields||[]).map((f,i)=><span key={i}><span className="k">{SYNC_FK[f.k]||f.k} :</span> {syncVal(f.k,f.from)}<span className="ar">→</span>{syncVal(f.k,f.to)}</span>)}</div>
                    )}
                  </div>
                  <div className="sync-act">
                    {r.kind==='new' && (
                      <select className="sync-sel" value={colSel[r.dealId]||r.proposedColumn} onChange={e=>setColSel(s=>({...s,[r.dealId]:e.target.value}))}>
                        {COLUMNS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                      </select>
                    )}
                    <button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([entrItem(r)], r.kind==='new'?'Lead ajouté au CRM':'Modif acceptée')}>{busy[k]?'…':'Accepter'}</button>
                  </div>
                </div>
              );})}
            </div>
          )
        )}

        {tab==='conflits' && (
          conflits.length===0 ? <div className="lb-empty">Aucun conflit. 👌</div> : (
            <div className="sync-list">
              {conflits.map(r=>{ const k='c:'+r.leadId; const ch=confl[r.leadId]||{}; return (
                <div key={k} className="syncrow" style={{display:'block'}}>
                  <div className="sync-main" style={{cursor:'default'}}><b>{r.name}</b><div className="sync-reasons"><span className="sync-chip" style={{background:'rgba(229,72,77,.12)',color:'var(--danger)'}}>Modifié des deux côtés</span></div></div>
                  <div className="confl-fields">
                    {(r.fields||[]).map((f,i)=>{ const pick=ch[f.k]||'crm'; return (
                      <div key={i} className="confl-f">
                        <div className="k">{SYNC_FK[f.k]||f.k}</div>
                        <div className="confl-opts">
                          <div className={'confl-opt'+(pick==='crm'?' on':'')} onClick={()=>setConfl(s=>({...s,[r.leadId]:{...(s[r.leadId]||{}),[f.k]:'crm'}}))}><span className="src">Ton CRM</span><b>{syncVal(f.k,f.mine)}</b></div>
                          <div className={'confl-opt'+(pick==='hubspot'?' on':'')} onClick={()=>setConfl(s=>({...s,[r.leadId]:{...(s[r.leadId]||{}),[f.k]:'hubspot'}}))}><span className="src">HubSpot</span><b>{syncVal(f.k,f.theirs)}</b></div>
                        </div>
                      </div>
                    );})}
                  </div>
                  <div className="sync-act" style={{marginTop:12,justifyContent:'flex-end'}}><button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([conflItem(r)],'Conflit résolu')}>{busy[k]?'…':'Valider'}</button></div>
                </div>
              );})}
            </div>
          )
        )}
      </>)}
    </div>
  );
}

/* ====================== LOGIN ====================== */
function LoginScreen({ inviteToken }){
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [name,setName]=useState('');
  const [msg,setMsg]=useState(null);
  const [busy,setBusy]=useState(false);
  const [invite,setInvite]=useState(inviteToken?{state:'loading'}:null); // null = connexion normale
  useEffect(()=>{ if(!inviteToken) return; SB.rpc('invite_info',{p_token:inviteToken}).then(({data,error})=>{
    const row=Array.isArray(data)?data[0]:data;
    if(error||!row){ setInvite({state:'invalid'}); }
    else if(!row.valid){ setInvite({state:'used'}); }
    else { setInvite({state:'valid'}); if(row.email) setEmail(row.email); if(row.name) setName(row.name); }
  }); },[inviteToken]);
  const isSignup = !!invite && invite.state==='valid';
  const submit=async(e)=>{
    e.preventDefault(); setMsg(null); setBusy(true);
    try{
      if(isSignup){
        const {data,error}=await SB.auth.signUp({email,password:pwd,options:{data:{name, invite:inviteToken}}});
        if(error) throw error;
        if(!data.session) setMsg({t:'ok',m:'Compte créé. Confirme ton email puis reviens te connecter.'});
        // si session → onAuthStateChange (Root) prend le relais
      } else {
        const {error}=await SB.auth.signInWithPassword({email,password:pwd});
        if(error) throw error;
      }
    }catch(err){
      const m=err.message||'Erreur';
      setMsg({t:'err', m: /confirm/i.test(m)?'Email non confirmé — clique le lien reçu par mail.': /credential/i.test(m)?'Email ou mot de passe incorrect.': /registered/i.test(m)?'Cet email a déjà un compte — connecte-toi.':m});
    }finally{ setBusy(false); }
  };
  const badInvite = invite && invite.state!=='valid' && invite.state!=='loading';
  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <svg viewBox="0 0 208 58" className="login-logo" aria-label="IQ Project">
          <rect x="0" y="7" width="60" height="44" rx="9" fill="#f35c04"/>
          <text x="30" y="40" textAnchor="middle" fill="#fff" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="900" fontSize="30" letterSpacing="-1">IQ</text>
          <text x="69" y="40" fill="var(--t1)" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="800" fontSize="30" letterSpacing="-1">Project.</text>
        </svg>
        {invite && invite.state==='loading' ? (
          <><h2>Invitation</h2><p className="login-sub">Vérification du lien…</p></>
        ) : badInvite ? (
          <><h2>Invitation</h2><p className="login-sub">{invite.state==='used'?'Ce lien a déjà été utilisé.':'Lien d’invitation invalide.'}</p>
          <a className="login-switch" href={typeof location!=='undefined'?location.pathname:'#'}>Aller à la connexion</a></>
        ) : (<>
          <h2>{isSignup?'Crée ton compte closer':'Connexion'}</h2>
          <p className="login-sub">{isSignup?'Tu as été invité — choisis ton mot de passe':'Cockpit closing'}</p>
          {isSignup && <input className="login-input" type="text" placeholder="Ton nom" value={name} onChange={e=>setName(e.target.value)} autoFocus required/>}
          <input className="login-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus={!isSignup} required/>
          <input className="login-input" type="password" placeholder="Mot de passe" value={pwd} onChange={e=>setPwd(e.target.value)} required minLength={6}/>
          {msg && <div className={`login-msg ${msg.t}`}>{msg.m}</div>}
          <button className="btn btn-accent" type="submit" disabled={busy} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
            {busy?'…':(isSignup?'Créer mon compte':'Se connecter')}
          </button>
        </>)}
      </form>
    </div>
  );
}

/* ====================== ROOT (auth gate) ====================== */
function Root(){
  const isDev = typeof location!=='undefined' && (location.hash.indexOf('dev')>=0 || location.search.indexOf('dev')>=0);
  const [session,setSession]=useState(isDev ? {user:{id:DEV_ID,email:'manager · dev'}} : undefined); // undefined=loading, null=déconnecté
  useEffect(()=>{
    if(isDev) return; // mode dev : pas d'auth Supabase
    SB.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub}=SB.auth.onAuthStateChange((_e,s)=>setSession(s||null));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  const inviteToken = (typeof location!=='undefined') ? new URLSearchParams(location.search).get('invite') : null;
  if(session===undefined) return <div className="login-wrap"><div className="login-card" style={{textAlign:'center'}}>Chargement…</div></div>;
  if(session===null) return <LoginScreen inviteToken={inviteToken}/>;
  return <App session={session} onLogout={()=>SB.auth.signOut()}/>;
}

/* ===== Filet de sécurité : affiche l'erreur au lieu d'un écran noir ===== */
class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if(this.state.err){
      const e=this.state.err;
      return (<div style={{padding:'28px',fontFamily:'ui-monospace,Menlo,monospace',color:'#fff',background:'#1d1d1e',minHeight:'100vh',whiteSpace:'pre-wrap',lineHeight:1.5}}>
        <div style={{color:'#f35c04',fontSize:20,fontWeight:800,marginBottom:14}}>⚠️ Erreur CRM capturée (envoie-moi ce texte)</div>
        <div style={{fontSize:13}}>{String((e&&e.stack)||(e&&e.message)||e)}</div>
      </div>);
    }
    return this.props.children;
  }
}
// erreurs asynchrones (chargement / temps réel) qui n'atteignent pas React
function showFatal(label,detail){
  let el=document.getElementById('fatal-overlay');
  if(!el){ el=document.createElement('div'); el.id='fatal-overlay';
    el.setAttribute('style','position:fixed;left:0;right:0;bottom:0;max-height:45vh;overflow:auto;padding:16px 20px;background:#2a0f06;color:#ffd9c2;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;z-index:99999;border-top:3px solid #f35c04');
    document.body.appendChild(el); }
  el.textContent += '\n['+label+'] '+detail;
}
window.addEventListener('error',ev=>showFatal('JS', (ev.error&&ev.error.stack)||ev.message));
window.addEventListener('unhandledrejection',ev=>showFatal('PROMISE', (ev.reason&&(ev.reason.stack||ev.reason.message))||String(ev.reason)));

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
