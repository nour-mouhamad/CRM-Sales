/* ============================================================= SOUND */
let audioCtx=null;
function ping(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    [880,1175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(audioCtx.destination);
      const t=now+i*0.13;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

/* ============================================================= APP */
function persistedState(key,fallback){
  try{ const v=localStorage.getItem(key); return v!==null?JSON.parse(v):fallback; }catch(e){ return fallback; }
}

function App({session, onLogout}){
  const userId = session.user.id;
  const userEmail = session.user.email;
  const [leads,setLeads]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [screen,setScreen]=useState(()=>{ const s=persistedState('iqcrm_screen','leads'); return ['leads','fiche','agenda'].includes(s)?s:'leads'; });
  const [selId,setSelId]=useState(()=>persistedState('iqcrm_sel',null));
  const [theme,setTheme]=useState(()=>persistedState('iqcrm_theme_v2','dark'));
  const [density,setDensity]=useState(()=>persistedState('iqcrm_density','standard'));
  const [search,setSearch]=useState('');

  const [callId,setCallId]=useState(null);
  const [payTarget,setPayTarget]=useState(null); // {lead}
  const [slotTarget,setSlotTarget]=useState(null); // {lead, mode}
  const [showRappeler,setShowRappeler]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [confirmCall,setConfirmCall]=useState(null); // {lead} en attente de confirmation après dial
  const [incoming,setIncoming]=useState(null);
  const [toasts,setToasts]=useState([]);
  const incomingIdx=useRef(0);
  const tid=useRef(0);

  // chargement initial depuis Supabase (tables leads + activites)
  const reload=useCallback(()=>{ loadLeads().then(d=>{ setLeads(d); setLoaded(true); }); },[]);
  useEffect(()=>{ reload(); },[reload]);
  // temps réel : toute modif (autre closer, manager, réimport) rafraîchit l'écran
  useEffect(()=>{
    const ch=SB.channel('crm-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'leads'},reload)
      .on('postgres_changes',{event:'*',schema:'public',table:'activites'},reload)
      .subscribe();
    return ()=>{ SB.removeChannel(ch); };
  },[reload]);
  useEffect(()=>localStorage.setItem('iqcrm_screen',JSON.stringify(screen)),[screen]);
  useEffect(()=>localStorage.setItem('iqcrm_sel',JSON.stringify(selId)),[selId]);
  useEffect(()=>{ localStorage.setItem('iqcrm_theme_v2',JSON.stringify(theme)); document.documentElement.setAttribute('data-theme',theme); },[theme]);
  useEffect(()=>{ localStorage.setItem('iqcrm_density',JSON.stringify(density)); document.documentElement.setAttribute('data-density',density); },[density]);

  const toast=useCallback((title,sub,tone='info')=>{
    const id=++tid.current;
    setToasts(t=>[...t,{id,title,sub,tone}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3800);
  },[]);

  const patch=useCallback((id,fn)=>setLeads(ls=>ls.map(l=>l.id===id?{...l,...(typeof fn==='function'?fn(l):fn)}:l)),[]);
  const sel = leads.find(l=>l.id===selId);
  const callLead = leads.find(l=>l.id===callId);

  // (faux lead entrant de démo désactivé — on n'affiche que la vraie donnée)

  // esc closes overlays
  useEffect(()=>{
    const h=(e)=>{ if(e.key==='Escape'){ setPayTarget(null); setSlotTarget(null); setShowRappeler(false); setShowSettings(false); setCallId(null); setIncoming(null); setConfirmCall(null); } };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[]);

  /* ---------- actions ---------- */
  const openLead=(id)=>{ setSelId(id); setScreen('fiche'); };

  const reorderLead=(id,col,beforeId)=>{
    const l=leads.find(x=>x.id===id); if(!l) return;
    const changedCol = l.column!==col;
    setLeads(ls=>{
      const dragged=ls.find(x=>x.id===id); if(!dragged) return ls;
      const moved={...dragged, column:col,
        nextAction: changedCol ? (col==='perdu'?'Prospect perdu': col==='cpf'?'Transmis admission': col==='nonqualifie'?'Non qualifié — à retravailler': col==='contacter'?'À contacter': col==='atc'?'Sans réponse — à relancer': col==='r1'?'R1 à faire': col==='r2'?'R2 à faire': col==='r3'?'R3 à faire': dragged.nextAction) : dragged.nextAction};
      const rest=ls.filter(x=>x.id!==id);
      let at;
      if(beforeId && beforeId!==id){ at=rest.findIndex(x=>x.id===beforeId); if(at===-1) at=rest.length; }
      else { let last=-1; rest.forEach((x,i)=>{ if(x.column===col) last=i; }); at = last===-1?rest.length:last+1; }
      const out=[...rest]; out.splice(at,0,moved); return out;
    });
    if(changedCol){
      const na = col==='perdu'?'Prospect perdu': col==='cpf'?'Transmis admission': col==='nonqualifie'?'Non qualifié — à retravailler': col==='contacter'?'À contacter': col==='atc'?'Sans réponse — à relancer': col==='r1'?'R1 à faire': col==='r2'?'R2 à faire': col==='r3'?'R3 à faire': null;
      saveLead(id,{column:col, ...(na?{nextAction:na}:{})});
      toast(`${l.prenom} → ${COL_LABEL[col]}`,'Carte déplacée','accent');
    }
  };

  const startCall=(id)=>{ setSelId(id); setCallId(id); if(screen!=='fiche') setScreen('fiche'); toast('Appel lancé','Granola enregistre','accent'); };

  // VRAI appel : un clic -> ouvre le dialer du Mac (tel:). On NE log PAS ici :
  // le navigateur ne peut pas savoir si l'appel a vraiment eu lieu -> on demande confirmation.
  const placeCall=(l)=>{
    if(!l) return;
    const num=(l.tel||'').replace(/[^+\d]/g,'');
    if(!num){ toast('Pas de numéro',`${l.prenom||'Ce lead'} n’a pas de téléphone`,'info'); return; }
    const a=document.createElement('a'); a.href='tel:'+num; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>setConfirmCall(l), 3000); // modale de confirmation 3 s après l'ouverture du dialer
  };
  // résout l'appel selon le choix : 'none' (rien) | 'nrp' | 'appele' -> historique
  const closeCall=(outcome)=>{
    const l=confirmCall; setConfirmCall(null); if(!l) return;
    if(outcome==='none') return;
    const title = outcome==='nrp' ? 'NRP — ne répond pas' : 'Appelé';
    addActivite(l.id,'appel',title,l.tel);
    patch(l.id,prev=>({timeline:[{type:'appel',when:'à l’instant',title,text:l.tel},...prev.timeline]}));
    toast(outcome==='nrp'?'NRP enregistré':'Appel enregistré',`${l.prenom} ${l.nom}`,'ok');
  };

  // modifier / supprimer une entrée d'historique (optimiste local + Supabase)
  const editNote=(actId,text)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.map(e=> e.id===actId?{...e,text}:e)})); updateActivite(actId,text); };
  const deleteNote=(actId)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.filter(e=> e.id!==actId)})); deleteActivite(actId); toast('Entrée supprimée',null,'info'); };

  // raccrocher → recap auto rempli (Granola). Reçoit le lead via callId capturé au moment de l'appel.
  const hangup=(notes,checks)=>{
    const id=callId; const l=leads.find(x=>x.id===id);
    setCallId(null);
    if(!l) return;
    const txt=(notes&&notes.trim())?notes.trim():'Appel passé.';
    patch(id,prev=>({ live:false,
      timeline:[{type:'appel', when:'à l’instant', title:'Appel terminé', text:txt}, ...prev.timeline] }));
    addActivite(id,'appel','Appel terminé',txt);
    toast('Appel terminé','Ajouté à l’historique','ok');
  };

  const doAction=(type)=>{
    if(!sel) return;
    if(type==='note'){
      const txt=window.prompt('Nouvelle note :'); if(!txt) return;
      patch(sel.id,prev=>({timeline:[{type:'note',when:'à l’instant',title:'Note',text:txt},...prev.timeline]}));
      addActivite(sel.id,'note','Note',txt);
      toast('Note ajoutée',null,'info'); return;
    }
    if(type==='meet'){ window.open(sel.meet_link||'https://meet.google.com/new','_blank'); toast('Google Meet ouvert',null,'accent'); return; }
    if(type==='rdv'){ setSlotTarget({lead:sel, mode:'rdv'}); return; }
    if(type==='cpf'){ setSlotTarget({lead:sel, mode:'cpf'}); return; }
    if(type==='mail'){
      patch(sel.id,prev=>({timeline:[{type:'mail',when:'à l’instant',title:'Email post-R1 envoyé',text:'Brochure + dates + devoirs.'},...prev.timeline]}));
      addActivite(sel.id,'mail','Email post-R1 envoyé','Brochure + dates + devoirs.');
      toast('Email post-R1 envoyé','Modèle pré-rempli','ok'); return;
    }
  };

  // confirmation d'un créneau (RDV closing ou RDV admission CPF)
  const confirmSlot=(label)=>{
    const {lead:l, mode}=slotTarget; setSlotTarget(null);
    if(mode==='rdv'){
      const col = l.column==='contacter'?'r1':l.column;
      patch(l.id,prev=>({nextAction:`RDV ${label}`, column:col,
        timeline:[{type:'rdv',when:'à l’instant',title:`RDV calé — ${label}`,text:'Invitation envoyée au prospect.'},...prev.timeline]}));
      saveLead(l.id,{column:col, nextAction:`RDV ${label}`});
      addActivite(l.id,'rdv',`RDV calé — ${label}`,'Invitation envoyée au prospect.');
      toast('RDV calé',`${label} · invitation envoyée`,'accent');
    } else {
      patch(l.id,prev=>({column:'cpf', nextAction:`RDV admission ${label}`,
        timeline:[{type:'rdv',when:'à l’instant',title:`RDV admission CPF calé — ${label}`,text:`Créneau 30 min avec Nour.`},...prev.timeline]}));
      saveLead(l.id,{column:'cpf', nextAction:`RDV admission ${label}`});
      addActivite(l.id,'rdv',`RDV admission CPF calé — ${label}`,'Créneau 30 min avec Nour.');
      toast('RDV admission calé',`${label}`,'ok');
    }
  };

  // payment send → À payer, then auto Payé (id capturé, transition garantie)
  const sendPayment=(amount,tag)=>{
    const l=payTarget.lead; const id=l.id; setPayTarget(null);
    patch(id,prev=>({column:'apayer', offer:amount, nextAction:`${eur(amount)} envoyé — en attente`,
      timeline:[{type:'paiement',when:'à l’instant',title:`Lien de paiement envoyé — ${eur(amount)}`,text:`Email envoyé à ${l.email}. En attente de paiement.`},...prev.timeline]}));
    saveLead(id,{column:'apayer', offer:amount, statut_paiement:'lien_envoye', nextAction:`${eur(amount)} envoyé — en attente`});
    addActivite(id,'paiement',`Lien de paiement envoyé — ${eur(amount)}`,`Email envoyé à ${l.email}. En attente de paiement.`,amount);
    toast(`Lien envoyé · ${eur(amount)}`,`Email parti à ${l.prenom}`,'accent');
  };

  const validateAdm=(id)=>{
    patch(id,prev=>({admStatus:'secured', nextAction:'Vente sécurisée',
      timeline:[{type:'doc',when:'à l’instant',title:'Dossier CPF validé',text:'CPF vérifié EDOF. Vente sécurisée.',paid:true},...prev.timeline]}));
    const l=leads.find(x=>x.id===id);
    toast('Dossier validé',`${l.prenom} ${l.nom} — Vente sécurisée`,'ok');
  };

  const takeIncoming=()=>{
    const inc=incoming; if(!inc) return;
    const id='lead'+Date.now();
    const newLead={...inc, id, owner:'Léo', column:'contacter', noShow:false, live:true, nextAction:'1er appel à passer',
      timeline:[{type:'note',when:'à l’instant',title:'Lead pris',text:`Tu es propriétaire de ce lead (course au lead remportée).`}]};
    setLeads(ls=>[newLead,...ls]);
    setIncoming(null);
    localStorage.setItem('iqcrm_sarahDone',JSON.stringify(true));
    toast(`Lead attribué · ${inc.prenom}`,'Atterri dans ta colonne Nouveau','ok');
    setScreen('leads');
  };

  const simulate=()=>{
    incomingIdx.current=(incomingIdx.current+1)%INCOMING_POOL.length;
    setIncoming({...INCOMING_POOL[incomingIdx.current]}); ping(); setShowSettings(false);
  };

  const resetData=()=>{
    setLeads(SEED); setSelId(null); setScreen('leads'); setShowSettings(false);
    localStorage.removeItem('iqcrm_sarahDone');
    toast('Données réinitialisées',null,'info');
  };

  const rappelerCount = useMemo(()=> leads.filter(l=>l.owner==='Léo' && ['contacter','r1','r2','r3','apayer'].includes(l.column) && (l.heat==='chaud'||l.noShow)).length,[leads]);
  const admToValidate = useMemo(()=> leads.filter(l=>l.column==='cpf' && l.admStatus!=='secured').length,[leads]);

  const navItems=[
    {id:'leads', label:'Mes leads', icon:I.leads, badge:rappelerCount},
    {id:'agenda', label:'Agenda', icon:I.agenda},
  ];
  const navActive = screen==='fiche'?'leads':screen;

  return (
    <div className="app">
      {/* RAIL */}
      <nav className="rail">
        <div className="logo">
          <svg className="logo-img" viewBox="0 0 208 58" role="img" aria-label="IQ Project — by IQ Education">
              <rect x="0" y="7" width="60" height="44" rx="9" fill="#f35c04"/>
              <text x="30" y="40" textAnchor="middle" fill="#fff" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="900" fontSize="30" letterSpacing="-1">IQ</text>
              <text x="69" y="40" fill="var(--t1)" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="800" fontSize="30" letterSpacing="-1">Project.</text>
              <text x="206" y="55" textAnchor="end" fill="#f35c04" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="700" fontSize="8.5" letterSpacing="1.5">BY IQ EDUCATION</text>
            </svg>
        </div>
        {navItems.map(n=>(
          <button key={n.id} className={`nav-item ${navActive===n.id?'active':''}`} onClick={()=>{setScreen(n.id);}}>
            {n.icon({})}<span>{n.label}</span>{n.badge?<span className="nav-badge">{n.badge}</span>:null}
          </button>
        ))}
        <div className="rail-spacer"></div>
        <div className="rail-tools">
          <button className="icon-btn" title="Thème" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?I.moon({}):I.sun({})}</button>
          <button className="icon-btn" title="Réglages" onClick={()=>setShowSettings(true)}>{I.gear({})}</button>
        </div>
        <div className="profile">
          <div className="avatar sz-sm">{(userEmail[0]||'L').toUpperCase()}</div>
          <div className="profile-meta" style={{flex:1,minWidth:0}}><b style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{userEmail}</b><span>Closer</span></div>
          <button className="icon-btn" title="Déconnexion" onClick={onLogout} style={{width:30,height:30}}>{I.logout({})}</button>
        </div>
      </nav>

      {/* WORK */}
      <main className="work">
        {screen==='leads' && <Board leads={leads} search={search} setSearch={setSearch}
            onOpenLead={openLead} onReorder={reorderLead} onRappeler={()=>setShowRappeler(true)} rappelerCount={rappelerCount}/>}
        {screen==='fiche' && sel && <Fiche lead={sel} onBack={()=>setScreen('leads')} onCall={()=>placeCall(sel)} onMove={(col)=>reorderLead(sel.id, col, null)} onEditNote={editNote} onDeleteNote={deleteNote}
            onPay={()=>setPayTarget({lead:sel})} onAction={doAction}/>}
        {screen==='fiche' && !sel && <div className="empty-screen"><I.leads/><p>Lead introuvable.</p><button className="btn btn-ghost" onClick={()=>setScreen('leads')}>Retour au board</button></div>}
        {screen==='agenda' && <Agenda leads={leads} onOpen={openLead}/>}
      </main>

      {/* OVERLAYS */}
      {callLead && <div className="backdrop" onClick={()=>hangup('',[])}><CallPanel lead={callLead} onHangup={hangup} onPay={()=>setPayTarget({lead:callLead})}/></div>}
      {confirmCall && <>
        <div className="backdrop" onClick={()=>setConfirmCall(null)}></div>
        <div className="callconfirm">
          <div className="cc-ic">{I.phone({})}</div>
          <h3>Appel lancé vers {confirmCall.prenom} {confirmCall.nom}</h3>
          <div className="cc-num">{confirmCall.tel}</div>
          <div className="cc-sub">Le dialer du Mac s'est ouvert. Une fois l'appel terminé, confirme pour l'enregistrer dans l'historique du lead.</div>
          <div className="cc-actions">
            <button className="btn btn-ghost" onClick={()=>closeCall('none')}>Pas appelé</button>
            <button className="btn btn-soft" onClick={()=>closeCall('nrp')}>NRP</button>
            <button className="btn btn-accent" onClick={()=>closeCall('appele')}>{I.check({style:{width:15,height:15,strokeWidth:2.6}})} Appelé</button>
          </div>
        </div>
      </>}
      {showRappeler && <div className="backdrop" onClick={()=>setShowRappeler(false)}><RappelerPanel leads={leads} onClose={()=>setShowRappeler(false)} onCall={(id)=>{setShowRappeler(false); placeCall(leads.find(l=>l.id===id));}} onOpen={(id)=>{setShowRappeler(false); openLead(id);}}/></div>}
      {showSettings && <div className="backdrop" onClick={()=>setShowSettings(false)}><Settings theme={theme} setTheme={setTheme} density={density} setDensity={setDensity} onSimulate={simulate} onReset={resetData} onClose={()=>setShowSettings(false)}/></div>}
      {payTarget && <PaymentModal lead={payTarget.lead} onClose={()=>setPayTarget(null)} onSend={sendPayment}/>}
      {slotTarget && <SlotPicker lead={slotTarget.lead} mode={slotTarget.mode} onClose={()=>setSlotTarget(null)} onConfirm={confirmSlot}/>}
      {incoming && <Incoming lead={incoming} onTake={takeIncoming} onDismiss={()=>{setIncoming(null); localStorage.setItem('iqcrm_sarahDone',JSON.stringify(true));}}/>}

      <Toasts toasts={toasts}/>
    </div>
  );
}

/* ====================== LOGIN ====================== */
function LoginScreen(){
  const [mode,setMode]=useState('login'); // login | signup
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [msg,setMsg]=useState(null);
  const [busy,setBusy]=useState(false);
  const submit=async(e)=>{
    e.preventDefault(); setMsg(null); setBusy(true);
    try{
      if(mode==='signup'){
        const {error}=await SB.auth.signUp({email,password:pwd});
        if(error) throw error;
        setMsg({t:'ok',m:'Compte créé. Vérifie ta boîte mail pour confirmer, puis connecte-toi.'});
        setMode('login');
      } else {
        const {error}=await SB.auth.signInWithPassword({email,password:pwd});
        if(error) throw error;
        // onAuthStateChange (Root) prend le relais
      }
    }catch(err){
      const m=err.message||'Erreur';
      setMsg({t:'err', m: /confirm/i.test(m)?'Email non confirmé — clique le lien reçu par mail.': /credential/i.test(m)?'Email ou mot de passe incorrect.':m});
    }finally{ setBusy(false); }
  };
  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <svg viewBox="0 0 208 58" className="login-logo" aria-label="IQ Project">
          <rect x="0" y="7" width="60" height="44" rx="9" fill="#f35c04"/>
          <text x="30" y="40" textAnchor="middle" fill="#fff" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="900" fontSize="30" letterSpacing="-1">IQ</text>
          <text x="69" y="40" fill="var(--t1)" fontFamily="Gabarito, system-ui, sans-serif" fontWeight="800" fontSize="30" letterSpacing="-1">Project.</text>
        </svg>
        <h2>{mode==='login'?'Connexion':'Créer un compte'}</h2>
        <p className="login-sub">Cockpit closing · accès closers</p>
        <input className="login-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus required/>
        <input className="login-input" type="password" placeholder="Mot de passe" value={pwd} onChange={e=>setPwd(e.target.value)} required minLength={6}/>
        {msg && <div className={`login-msg ${msg.t}`}>{msg.m}</div>}
        <button className="btn btn-accent" type="submit" disabled={busy} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
          {busy?'…':(mode==='login'?'Se connecter':'Créer mon compte')}
        </button>
        <button type="button" className="login-switch" onClick={()=>{setMode(m=>m==='login'?'signup':'login'); setMsg(null);}}>
          {mode==='login'?'Pas encore de compte ? Créer un compte':'Déjà un compte ? Se connecter'}
        </button>
      </form>
    </div>
  );
}

/* ====================== ROOT (auth gate) ====================== */
function Root(){
  const isDev = typeof location!=='undefined' && (location.hash.indexOf('dev')>=0 || location.search.indexOf('dev')>=0);
  const [session,setSession]=useState(isDev ? {user:{id:DEV_ID,email:'manager · dev'}} : undefined); // undefined=loading, null=déconnecté
  useEffect(()=>{
    if(isDev) return; // mode dev : pas d'auth Supabase
    SB.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub}=SB.auth.onAuthStateChange((_e,s)=>setSession(s||null));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div className="login-wrap"><div className="login-card" style={{textAlign:'center'}}>Chargement…</div></div>;
  if(session===null) return <LoginScreen/>;
  return <App session={session} onLogout={()=>SB.auth.signOut()}/>;
}

/* ===== Filet de sécurité : affiche l'erreur au lieu d'un écran noir ===== */
class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if(this.state.err){
      const e=this.state.err;
      return (<div style={{padding:'28px',fontFamily:'ui-monospace,Menlo,monospace',color:'#fff',background:'#1d1d1e',minHeight:'100vh',whiteSpace:'pre-wrap',lineHeight:1.5}}>
        <div style={{color:'#f35c04',fontSize:20,fontWeight:800,marginBottom:14}}>⚠️ Erreur CRM capturée (envoie-moi ce texte)</div>
        <div style={{fontSize:13}}>{String((e&&e.stack)||(e&&e.message)||e)}</div>
      </div>);
    }
    return this.props.children;
  }
}
// erreurs asynchrones (chargement / temps réel) qui n'atteignent pas React
function showFatal(label,detail){
  let el=document.getElementById('fatal-overlay');
  if(!el){ el=document.createElement('div'); el.id='fatal-overlay';
    el.setAttribute('style','position:fixed;left:0;right:0;bottom:0;max-height:45vh;overflow:auto;padding:16px 20px;background:#2a0f06;color:#ffd9c2;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;z-index:99999;border-top:3px solid #f35c04');
    document.body.appendChild(el); }
  el.textContent += '\n['+label+'] '+detail;
}
window.addEventListener('error',ev=>showFatal('JS', (ev.error&&ev.error.stack)||ev.message));
window.addEventListener('unhandledrejection',ev=>showFatal('PROMISE', (ev.reason&&(ev.reason.stack||ev.reason.message))||String(ev.reason)));

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
