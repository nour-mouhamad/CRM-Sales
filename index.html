function PaymentModal({lead, onClose, onSend}){
  const [offer,setOffer]=useState(null);
  const amount = offer?offer.amount:0;
  const link = offer ? (offer.link||'') : ''; // vrai Stripe Payment Link de l'offre
  const hasEmail = !!(lead.email||'').trim();
  const defSubject = 'Bootcamp IQ Project';
  const defBody = (o)=>
`Bonjour ${lead.prenom},

Ravi de notre échange. Comme convenu, voici ton lien sécurisé pour valider ta place à l'édition du 15 juin (8 sessions / 2 semaines, hybride — 136 rue d'Aboukir, Paris 2e + distanciel) :

${o.link||'[lien de paiement — à configurer]'}
Montant : ${eur(o.amount)}

À très vite,`;
  const [subject,setSubject]=useState(defSubject);
  const [body,setBody]=useState('');
  const pick=(o)=>{ setOffer(o); setSubject(defSubject); setBody(defBody(o)); };

  const [popErr,setPopErr]=useState(null);
  const ready = !!(offer && offer.link && hasEmail);
  // ouvre le COMPOSE GMAIL pré-rempli dans un nouvel onglet (fiable : pas de dépendance au gestionnaire mailto du navigateur).
  // On ne marque le lead « lien envoyé » QUE si Gmail s'est réellement ouvert (sinon faux « envoyé »).
  const send=()=>{
    if(!ready) return;
    const url='https://mail.google.com/mail/?view=cm&fs=1'
      +'&to='+encodeURIComponent(lead.email)
      +'&su='+encodeURIComponent(subject)
      +'&body='+encodeURIComponent(body);
    const w=window.open(url,'_blank');
    if(!w){ setPopErr('Ton navigateur a bloqué l’ouverture de Gmail — autorise les pop-ups pour ce site, puis réessaie.'); return; }
    onSend(amount, offer.tag);
  };

  return (
    <>
      <div className="backdrop" onClick={onClose}></div>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <button className="x-btn" onClick={onClose}><I.x/></button>
        <div className="m-fixhead">
          <span className="eyebrow m-eye">Lien de paiement · reste à charge CPF</span>
          <div className="m-amt" style={{fontSize:offer?40:26,color:offer?'var(--t1)':'var(--t3)'}}>{offer?eur(amount):'Choisis l’offre'}</div>
          <div className="m-for">pour {lead.prenom} {lead.nom}</div>
        </div>
        <div className="m-scroll">
          <span className="eyebrow" style={{display:'block',marginBottom:10}}>Choisis le lien à envoyer</span>
          <div className="pay-offers">
            {OFFERS.map(o=>(
              <button key={o.id} className={`pay-offer ${offer&&offer.id===o.id?'sel':''}`} onClick={()=>pick(o)}>
                <span className="po-amt">{eur(o.amount)}</span>
                <span className="po-tx"><b>{o.tag}</b><span>reste à charge · le CPF couvre le reste</span></span>
                <span className="po-check"><I.check/></span>
              </button>
            ))}
          </div>

          {offer && <>
            <div className="chan main" style={{marginTop:18}}>
              <span className="chan-ic"><I.mail/></span>
              <div className="chan-tx"><b>Email <span className="chan-main-pill">depuis ta boîte</span></b><span className="mono">{lead.email||'aucun email'}</span></div>
            </div>

            <div className="edit-field">
              <span className="eyebrow">Objet (modifiable)</span>
              <input className="edit-input" value={subject} onChange={e=>setSubject(e.target.value)}/>
            </div>
            <div className="edit-field">
              <span className="eyebrow">Corps du mail (modifiable)</span>
              <textarea className="edit-body" value={body} onChange={e=>setBody(e.target.value)}/>
            </div>
            {link
              ? <div className="link-tag"><I.euro style={{width:14,height:14,color:'var(--accent)'}}/><span className="mono">{link}</span></div>
              : <div className="rdv-err">⚠️ Lien Stripe non configuré pour cette offre — préviens l’admin avant d’envoyer.</div>}
            {!hasEmail && <div className="rdv-err">⚠️ Ce lead n’a pas d’email — impossible d’envoyer.</div>}
            <p className="modal-note">Ton client mail s’ouvre pré-rempli (objet + message + lien). Tu vérifies et tu cliques « Envoyer ». Le lead passe en « À encaisser ».</p>
            {popErr && <div className="rdv-err">⚠️ {popErr}</div>}
          </>}
        </div>
        <div className="m-fixfoot">
          <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
          <button className="btn btn-accent" disabled={!ready} onClick={send}><I.send/>{offer?`Ouvrir dans Gmail · ${eur(amount)}`:'Choisis une offre'}</button>
        </div>
      </div>
    </>
  );
}

/* formulaire de connexion : le closer colle son lien public CalendIQ */
function CalendiqConnect({ onConnect, onCancel, hero }){
  const [v,setV]=useState(''); const [busy,setBusy]=useState(false); const [err,setErr]=useState(null);
  const go=async()=>{ if(!v.trim()||busy) return; setBusy(true); setErr(null);
    try{ await onConnect(v); setV(''); if(onCancel) onCancel(); }
    catch(e){ setErr(e.message||'Connexion impossible'); } finally{ setBusy(false); } };
  return (
    <div className={'cq-connect'+(hero?' hero':'')}>
      <div className="cq-connect-ic">{I.calPlus({})}</div>
      <h3>Connecte ton CalendIQ</h3>
      <p>Colle ton lien public CalendIQ. Tes rendez-vous remontent automatiquement dans le CRM, rattachés à tes leads.</p>
      <input className="ag-input" placeholder="https://calendiq.lovable.app/cal/ton-nom" value={v} autoFocus
        onChange={e=>setV(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') go(); }}/>
      {err && <div className="rdv-err">{err}</div>}
      <div className="cq-connect-foot">
        <button className="btn btn-accent" disabled={busy||!v.trim()} onClick={go}>{busy?'Connexion…':'Connecter'}</button>
        {onCancel && <button className="btn btn-ghost" onClick={onCancel}>Annuler</button>}
      </div>
    </div>
  );
}
/* une ligne de rendez-vous CalendIQ — cliquable vers la fiche du lead si matché */
function CqMeetingRow({ m, isAdmin, onOpenLead, meetingLeadId }){
  const leadId = meetingLeadId ? meetingLeadId(m) : null;
  const past = new Date(m.start_at).getTime() < Date.now();
  const open=()=>{ if(leadId) onOpenLead(leadId); };
  return (
    <div className={'cq-ev'+(past?' past':'')+(leadId?' has-lead':'')} onClick={open} role={leadId?'button':undefined} tabIndex={leadId?0:undefined}
      onKeyDown={e=>{ if(leadId&&(e.key==='Enter'||e.key===' ')){ e.preventDefault(); open(); } }}>
      <div className="cq-ev-time"><b>{cqTime(m.start_at)}</b><span>{m.duration_minutes||30} min</span></div>
      <div className="cq-ev-main">
        <b>{m.booker_name||'Sans nom'}</b>
        <span>{m.title||'Rendez-vous'}{isAdmin&&m._closerName?(' · '+m._closerName):''}</span>
      </div>
      <div className="cq-ev-act" onClick={e=>e.stopPropagation()}>
        {m.meet_link && <a className="cq-pill" href={normMeet(m.meet_link)} target="_blank" rel="noreferrer" title="Ouvrir le lien visio">{I.video({})}Meet</a>}
        {leadId ? <span className="cq-pill lead">Fiche{I.arrowR({})}</span> : <span className="cq-pill ghost" title="Aucun lead CRM correspondant">Hors CRM</span>}
      </div>
    </div>
  );
}

function Agenda({ meetings, sources, loading, error, isAdmin, profile, onConnect, onDisconnect, onRefresh, onOpenLead, meetingLeadId }){
  const connected = !!(sources && sources.length);
  const ownConnected = !!(profile && profile.calendiq_organizer_id);
  const [tab,setTab]=useState('rdv');   // 'rdv' = liste CRM | 'cal' = dashboard CalendIQ (closer)
  const [manage,setManage]=useState(false);
  const now=Date.now();
  const upcoming = meetings.filter(m=>m.status==='confirmed' && new Date(m.start_at).getTime()>=now-3600000)
                           .sort((a,b)=>new Date(a.start_at)-new Date(b.start_at));
  const days = cqGroupByDay(upcoming);
  const sub = isAdmin
    ? ('Agenda de l’équipe · '+sources.length+' closer'+(sources.length>1?'s':'')+' connecté'+(sources.length>1?'s':''))
    : (ownConnected ? 'Tes rendez-vous CalendIQ' : 'Connecte ton agenda CalendIQ');

  return (
    <>
      <div className="screen-head">
        <div className="screen-title"><h1>Agenda</h1><p>{sub}</p></div>
        <div className="head-tools cq-tools">
          {connected && !isAdmin && (
            <div className="seg">
              <button className={tab==='rdv'?'on':''} onClick={()=>setTab('rdv')}>Mes RDV</button>
              <button className={tab==='cal'?'on':''} onClick={()=>setTab('cal')}>CalendIQ</button>
            </div>
          )}
          {connected && <button className="btn btn-soft" onClick={onRefresh} disabled={loading}>{loading?'…':'Rafraîchir'}</button>}
          {ownConnected && <button className="icon-btn" title="Gérer la connexion CalendIQ" onClick={()=>setManage(m=>!m)}>{I.gear({})}</button>}
        </div>
      </div>

      <div className="cq-wrap">
      {error && <div className="cq-banner err">CalendIQ indisponible : {error}</div>}

      {manage && ownConnected && (
        <div className="cq-manage">
          <div className="cq-manage-row">
            <span className="ag-dot"></span>
            <div className="ag-meta"><b>{profile.calendiq_name||profile.calendiq_slug}</b><span>{CALENDIQ.app+'/cal/'+profile.calendiq_slug}</span></div>
            <button className="btn btn-ghost" onClick={async()=>{ await onDisconnect(); setManage(false); }}>Déconnecter</button>
          </div>
          <div className="ag-sep"></div>
          <CalendiqConnect onConnect={onConnect} onCancel={()=>setManage(false)}/>
        </div>
      )}

      {/* pas encore connecté */}
      {!connected && !isAdmin && !manage && (
        <div className="cq-hero"><CalendiqConnect onConnect={onConnect} hero/></div>
      )}
      {!connected && isAdmin && (
        <div className="empty-screen"><I.agenda/><p>Aucun closer n’a connecté son CalendIQ.</p>
          <span style={{fontSize:13,color:'var(--t3)',maxWidth:400,textAlign:'center',lineHeight:1.5}}>Chaque closer connecte son agenda depuis son onglet Agenda. Leurs rendez-vous s’afficheront ici, agrégés et reliés aux leads.</span></div>
      )}

      {/* connecté · closer · dashboard CalendIQ embarqué */}
      {connected && !isAdmin && tab==='cal' && (
        <div className="cq-frame">
          <div className="cq-frame-note">{I.spark({})}<span>Gère tes créneaux, replanifie ou annule directement ici. Première fois ? Connecte-toi à CalendIQ dans le cadre — une seule fois.</span></div>
          <iframe className="cq-iframe" src={CALENDIQ.app+'/dashboard'} title="CalendIQ" allow="clipboard-read; clipboard-write"></iframe>
        </div>
      )}

      {/* connecté · liste des RDV (closer onglet RDV + admin agrégé) */}
      {connected && (isAdmin || tab==='rdv') && (
        <div className="cq-agenda">
          {isAdmin && (
            <div className="cq-closers">
              {sources.map(s=>{ const n=upcoming.filter(m=>m._closerId===s.id).length; return (
                <div className="cq-closer-chip" key={s.id}><span className="ag-dot"></span><b>{s.name}</b><span className="cq-closer-n">{n}</span></div>
              ); })}
            </div>
          )}
          {loading && !meetings.length ? <div className="cq-empty">Chargement de l’agenda…</div>
            : days.length===0 ? <div className="cq-empty">Aucun rendez-vous à venir.</div>
            : days.map(d=>(
              <div className="cq-day" key={d.key}>
                <div className="cq-day-h">{d.label}<span>{d.items.length} RDV</span></div>
                {d.items.map(m=>(
                  <CqMeetingRow key={m.id} m={m} isAdmin={isAdmin} onOpenLead={onOpenLead} meetingLeadId={meetingLeadId}/>
                ))}
              </div>
            ))}
        </div>
      )}
      </div>
    </>
  );
}

let audioCtx=null;
function ping(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    [880,1175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(audioCtx.destination);
      const t=now+i*0.13;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

/* ============================================================= ONBOARDING CLOSER
   1ère connexion d'un closer sans CalendIQ : on force la connexion en 2 écrans
   (Bienvenue + Connecter → Import + C'est prêt). Bam : il connecte, il a ses leads. */
function Onboarding({ profile, onConnect, loadCalendiq, myLeadsCount, onFinish, onLogout }){
  const [step,setStep]=useState('connect'); // 'connect' | 'done'
  const [v,setV]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);
  const [importing,setImporting]=useState(true);
  const first=((profile&&profile.name)||'').trim().split(' ')[0]||'closer';

  const connect=async()=>{
    if(!v.trim()||busy) return; setBusy(true); setErr(null);
    try{ await onConnect(v); setStep('done'); }
    catch(e){ setErr(e.message||'Connexion impossible'); setBusy(false); }
  };
  // écran 'done' : on récupère les RDV (et min. 1,4 s pour que ça respire)
  useEffect(()=>{
    if(step!=='done') return;
    let alive=true; setImporting(true);
    Promise.all([
      Promise.resolve(loadCalendiq&&loadCalendiq()).catch(()=>{}),
      new Promise(r=>setTimeout(r,1400)),
    ]).then(()=>{ if(alive) setImporting(false); });
    return ()=>{alive=false;};
  },[step,loadCalendiq]);

  const logo=(
<img className="onb-logo" src={LOGO_FULL} alt="IQ Project"/>
  );

  return (
    <div className="onb-wrap">
      <div className="onb-card">
        {logo}
        <div className="onb-steps">
          <span className={'onb-dot '+(step==='connect'?'on':'done')}></span>
          <span className={'onb-dot '+(step==='done'?'on':'')}></span>
        </div>

        {step==='connect' && (<>
          <div className="onb-ic">{I.calPlus({})}</div>
          <h2>Bienvenue, {first}</h2>
          <p>Une étape et c’est parti. Connecte ton agenda CalendIQ : tous tes rendez-vous et tes leads remontent ici, automatiquement.</p>
          <input className="login-input" placeholder="https://calendiq.lovable.app/cal/ton-nom" value={v} autoFocus
            onChange={e=>setV(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') connect(); }}/>
          {err && <div className="onb-err">{err}</div>}
          <button className="btn btn-accent" disabled={busy||!v.trim()} onClick={connect}>{busy?'Connexion…':'Connecter mon agenda'}</button>
          <div className="onb-hint">Ton lien est dans CalendIQ → <b>Partager</b>. <a href={CALENDIQ.app} target="_blank" rel="noreferrer">Ouvrir CalendIQ</a></div>
        </>)}

        {step==='done' && (importing ? (<>
          <div className="onb-spin"></div>
          <h2>On récupère tes rendez-vous…</h2>
          <p>Quelques secondes — on relie tes RDV CalendIQ à tes leads.</p>
        </>) : (<>
          <div className="onb-ic ok">{I.check({})}</div>
          <h2>Tout est prêt, {first}</h2>
          {myLeadsCount>0
            ? <p><span className="onb-count">{myLeadsCount}</span>lead{myLeadsCount>1?'s':''} {myLeadsCount>1?'t’attendent':'t’attend'} dans ton cockpit.</p>
            : <p>Ton cockpit est prêt. Tes prochains rendez-vous apparaîtront ici dès qu’ils sont pris dans CalendIQ.</p>}
          <button className="btn btn-accent" onClick={onFinish}>Entrer dans mon cockpit{I.arrowR({})}</button>
        </>))}

        <div className="onb-foot"><button onClick={onLogout}>Ce n’est pas toi ? Se déconnecter</button></div>
      </div>
    </div>
  );
}

/* ============================================================= PAGE « À FAIRE » (admin)
   Agrège, sur TOUS les leads : actions réelles (manuelles + recap, JAMAIS les défauts d'étape),
   RDV à venir, relances (no-show / lead chaud). Groupé par échéance, filtre + réassignation par closer,
   case à cocher bidirectionnelle avec la fiche. Lecture des leads existants : ne modifie aucune autre structure. */
const EyeOff=(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 3l18 18"/><path d="M10.6 6.2A9.8 9.8 0 0 1 12 6c5 0 9 4.5 10 6-.4.8-1.2 2-2.5 3.2"/><path d="M6.6 6.7C4 8.2 2.4 10.5 2 12c1 1.5 5 6 10 6 1.4 0 2.7-.3 3.9-.9"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>;
function AFaire({ leads, onOpenLead, onToggleAction, onToggleExtra, onToggleStar, onReassign, onHideAction, onUnhideAction, seasonFilter, setSeasonFilter, seasonCounts }){
  const [closers,setClosers]=React.useState([]);
  const [showHidden,setShowHidden]=React.useState(false); // vue « Masqués » (bascule via la pastille du haut)
  const [filter,setFilter]=React.useState('all');         // 'all' | closerId
  const [groupBy,setGroupBy]=React.useState('urgence');   // 'urgence' | 'domaine'
  const [panelOpen,setPanelOpen]=React.useState(false);   // panneau Filtres (saison + groupement + échéance)
  const [expanded,setExpanded]=React.useState({});        // leadId -> bool (déplier « +N autres »)
  const [collapsedSecs,setCollapsedSecs]=React.useState(()=>new Set()); // clés de section REPLIÉES (vide par défaut = tout ouvert)
  const ALL_DUE=['late','today','week','later','none'];
  const ALL_DOM=['rdv','appel','argent','suivi','admin'];
  const [dueFilter,setDueFilter]=React.useState(()=>new Set(ALL_DUE)); // échéances visibles (défaut : toutes)
  const [domFilter,setDomFilter]=React.useState(()=>new Set(ALL_DOM)); // domaines visibles (défaut : tous)
  // ANTI-FLICKER (même principe que Synchro HubSpot) : une action cochée entre en SUPPRESSION -> masquée tout de suite ;
  // purge UNIQUEMENT quand l'écriture est committée ET que le lead frais ne régénère plus la ligne (un reload stale ne peut plus la faire rebondir).
  const doneRef=React.useRef(new Set());        // clés d'items cochés (masqués)
  const committedRef=React.useRef(new Set());   // clés dont le saveLead a résolu (write committé)
  const [tick,bump]=React.useReducer(x=>x+1,0);
  React.useEffect(()=>{ let on=true; SB.from('profiles').select('id,name,role').then(({data})=>{ if(on) setClosers((data||[]).filter(p=>p.role==='closer')); }); return ()=>{on=false;}; },[]);

  // ===== Repères temps (calculés une fois) =====
  const T=React.useMemo(()=>{ const d=new Date(); const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); return {start:s, endToday:s+86400000, endWeek:s+7*86400000}; },[]);

  // ===== URGENCE TEMPORELLE = COULEUR (barre gauche de ligne + échéance teintée), dérivée de it.due réel =====
  const URG=['late','today','week','later','none'];        // index = rang (0 = plus urgent) ; au-delà d'une semaine -> 'later'
  // garde-fou : une échéance avant 2000 (epoch 1970…) ou invalide = PAS d'échéance -> jamais de faux "20619 j de retard"
  const vDue=(d)=>{ if(!d) return null; const t=new Date(d).getTime(); return (isNaN(t)||t<946684800000)?null:d; };
  const urgRank=(due)=>{ if(!due) return 4; const t=new Date(due).getTime(); if(t<T.start) return 0; if(t<T.endToday) return 1; if(t<T.endWeek) return 2; return 3; };
  const urgVar={late:'--danger',today:'--accent',week:'--warm',later:'--b3',none:'--b2'};
  const overdueDays=(due)=>{ if(!due) return 0; const t=new Date(due).getTime(); return t<T.start? Math.floor((T.start-t)/86400000) : 0; };
  const dueLabel=(due)=>{ if(!due) return 'Sans date'; const t=new Date(due).getTime(); return (t>=T.start && t<T.endToday) ? cqTime(due) : cqDayLabel(due); };

  // ===== DOMAINE = pastille colorée (catégorie dérivée du kind + column + mots-clés FR du libellé, ZÉRO champ inventé) =====
  const DOM={
    rdv:    {label:'RDV',       ic:I.agenda, tone:'rdv'},
    argent: {label:'Financier', ic:I.euro,   tone:'argent'},
    appel:  {label:'Appel',     ic:I.phone,  tone:'appel'},
    admin:  {label:'Admin',     ic:I.doc,    tone:'admin'},
    suivi:  {label:'Suivi',     ic:I.send,   tone:'suivi'},
  };
  const domainOf=(it)=>{
    if(it.kind==='rdv') return 'rdv';
    const l=it.lead, lab=(it.label||'').toLowerCase();
    if(l.column==='encaisser'||l.column==='won'||l.paid || /pai|encaiss|virement|acompte|facture|règl|regl|solde|cpf|€|euro|montant/.test(lab)) return 'argent';
    if(l.column==='atc' || /appel|appeler|rappel|rappeler|call|tél|tel|téléph|telephon|joindre|sonner|relance tel/.test(lab)) return 'appel';
    if(/contrat|cpf|doc|dossier|admin|inscription|inscri|admission|justif|devis|pièce|piece|formulaire|papier|brochure/.test(lab)) return 'admin';
    return 'suivi';
  };

  // ===== ITEMS : MIROIR EXACT DE LA FICHE (action principale réelle + extras non done + 1er RDV à venir) =====
  const items=React.useMemo(()=>{
    const now=Date.now(); const out=[];
    for(const l of (leads||[])){
      if(l.column==='lost' || l.column==='desabonne') continue; // lead abandonné -> aucune action
      const hSet=new Set(Array.isArray(l.hiddenActions)?l.hiddenActions:[]); // identifiants d'actions masquées de ce lead
      if(isRealAction(l.nextAction, l.column) && l.actionDoneFor!==l.nextAction)
        out.push({ key:l.id+':main', kind:'action', lead:l, label:l.nextAction, due:vDue(l.nextActionDue), hideId:'main', hidden:hSet.has('main'), onCheck:()=>onToggleAction(l,true) });
      (l.extraActions||[]).forEach((a,i)=>{ if(a&&a.label&&a.label.trim()&&!a.done){ const hid='x:'+(a.id||('i'+i));
        out.push({ key:l.id+':x'+i, kind:'action', lead:l, label:a.label, due:vDue(a.due_at), hideId:hid, hidden:hSet.has(hid), onCheck:()=>onToggleExtra(l,i) }); } });
      const allRdv=[];
      if(l.calendiqRdv && l.calendiqRdv.start_at) allRdv.push({ start_at:l.calendiqRdv.start_at, meet:l.calendiqRdv.meet_link||null, type:l.calendiqRdv.type });
      const rmeta=l.rdvMeta||{};
      for(const k in rmeta){ if(k.indexOf('m:')===0 && rmeta[k] && rmeta[k].start_at) allRdv.push({ start_at:rmeta[k].start_at, meet:rmeta[k].meet_link||null, type:rmeta[k].type }); }
      if(l.rdv_at) allRdv.push({ start_at:l.rdv_at, meet:l.rdvMeetLink||null, type:l.rdvType });
      const up=allRdv.filter(r=>new Date(r.start_at).getTime()>=now-3600000).sort((a,b)=>new Date(a.start_at)-new Date(b.start_at));
      const rdv=up[0]||null;
      if(rdv) out.push({ key:l.id+':rdv', kind:'rdv', lead:l, label:'RDV · '+cqTime(rdv.start_at), due:rdv.start_at, meet:rdv.meet||null });
      // ZÉRO relance auto, ZÉRO ligne inventée.
    }
    const f=(filter==='all') ? out : out.filter(it=>it.lead.owner===filter);
    f.forEach(it=>{ it._u=urgRank(it.due); it._d=domainOf(it); });
    return f;
  },[leads,filter,onToggleAction,onToggleExtra,T]);

  // PURGE anti-flicker : une clé cochée n'est retirée de la suppression QUE si son écriture est committée
  // ET que l'item frais ne la régénère plus (absent de `items`). Un patch optimiste seul (non committé) ne purge pas -> pas de rebond.
  React.useEffect(()=>{ if(!committedRef.current.size) return; const live=new Set(items.map(i=>i.key)); let ch=false;
    committedRef.current.forEach(k=>{ if(!live.has(k)){ committedRef.current.delete(k); doneRef.current.delete(k); ch=true; } });
    if(ch) bump();
  },[items]);
  // coche : masque tout de suite (suppression) + lance le toggle ; au commit du write -> marque committée (la purge fera le reste).
  const check=(it)=>{ doneRef.current.add(it.key); bump(); Promise.resolve(it.onCheck()).then(()=>{ committedRef.current.add(it.key); bump(); }).catch(()=>{ doneRef.current.delete(it.key); committedRef.current.delete(it.key); bump(); }); };
  // mode normal : actions visibles (non masquées) + tous les RDV. Mode « Masqués » : UNIQUEMENT les actions masquées.
  const visItems=React.useMemo(()=>items.filter(it=> (showHidden ? it.hidden : !it.hidden) && !doneRef.current.has(it.key)),[items,showHidden,tick]);
  const hiddenCount=React.useMemo(()=>items.reduce((n,it)=>n+(it.hidden?1:0),0),[items]); // nb total d'actions masquées (scope filtre/saison courant)
  React.useEffect(()=>{ if(showHidden && hiddenCount===0) setShowHidden(false); },[showHidden,hiddenCount]); // plus rien de masqué -> sortie auto de la vue

  // ===== REGROUPEMENT PAR LEAD : 1 carte = 1 lead, N lignes dedans ; tout est ordonné par urgence puis échéance =====
  const cards=React.useMemo(()=>{
    const map=new Map();
    for(const it of visItems){ const id=it.lead.id; if(!map.has(id)) map.set(id,{lead:it.lead, rows:[]}); map.get(id).rows.push(it); }
    const arr=[...map.values()];
    arr.forEach(c=>{
      c.rows.sort((a,b)=> (a._u-b._u) || (new Date(a.due||8.64e15)-new Date(b.due||8.64e15)));
      c.minU=c.rows.reduce((w,r)=>Math.min(w,r._u),4);   // urgence max (rang min) de la carte
      c.minDue=c.rows.reduce((m,r)=>Math.min(m, r.due?new Date(r.due).getTime():Infinity), Infinity);
      c.domTop=c.rows[0]?c.rows[0]._d:'suivi';            // domaine de la ligne la plus urgente
    });
    arr.sort((a,b)=> (a.minU-b.minU) || (a.minDue-b.minDue));
    return arr;
  },[visItems]);

  // ===== BARRE DE STATS (résumé chiffré instantané) =====
  const stats=React.useMemo(()=>({
    late:  visItems.filter(i=>i._u===0).length,
    today: visItems.filter(i=>i._u===1).length,
    rdv:   visItems.filter(i=>i.kind==='rdv').length,
    leads: cards.length,
  }),[visItems,cards]);

  // ===== RENDU — une ligne d'action / RDV (barre gauche = urgence, pastille = domaine, échéance teintée) =====
  const Row=(it)=>{ const dom=DOM[it._d]; const od=overdueDays(it.due); const u=URG[it._u];
    return (
      <div key={it.key} className="af-row" data-urg={u} style={{'--uc':'var('+urgVar[u]+')'}}
        onClick={()=>onOpenLead(it.lead.id)} role="button" tabIndex={0}
        onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); onOpenLead(it.lead.id); } }}>
        {showHidden
          ? <span className="af-rdvic muted" aria-hidden="true" title="Action masquée">{EyeOff({})}</span>
          : (it.kind==='action'
              ? <span className="af-chk" role="checkbox" aria-checked="false" tabIndex={0}
                  onClick={e=>{ e.stopPropagation(); check(it); }}
                  onKeyDown={e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); check(it); } }}
                  title="Marquer comme fait">{I.check({})}</span>
              : <span className="af-rdvic" aria-hidden="true">{I.agenda({})}</span>)}
        <span className="af-label">{it.label}</span>
        {it.kind==='rdv' && it.meet && <a className="af-meet" href={normMeet(it.meet)} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}>{I.video({})}<span>Rejoindre</span></a>}
        <span className={'af-dom '+dom.tone} title={dom.label}>{dom.ic({})}<em>{dom.label}</em></span>
        <span className={'af-due'+(it._u===0?' late':it._u===1?' today':it._u===2?' week':'')}>{od>0 ? od+'j de retard' : dueLabel(it.due)}</span>
        {it.kind==='action' && (showHidden
          ? <button className="af-unhide" onClick={e=>{ e.stopPropagation(); onUnhideAction&&onUnhideAction(it.lead, it.hideId); }} title="Réafficher dans À faire">{I.check({})}<span>Démasquer</span></button>
          : (onHideAction && <button className="af-hide" onClick={e=>{ e.stopPropagation(); onHideAction(it.lead, it.hideId); }} title="Masquer cette action" aria-label="Masquer cette action">{EyeOff({})}</button>))}
      </div>
    );
  };

  // ===== RENDU — une carte LEAD (en-tête neutre : identité + closer, RIEN d'autre) =====
  const Card=(c)=>{
    const l=c.lead; const open=!!expanded[l.id];
    const rows=open ? c.rows : c.rows.slice(0,3); const hidden=c.rows.length-3;
    const name=((l.prenom||'')+' '+(l.nom||'')).trim()||'Lead';
    return (
      <div key={l.id} className="af-card">
        <div className="af-head" role="button" tabIndex={0} onClick={()=>onOpenLead(l.id)}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); onOpenLead(l.id); } }}>
          <span className="avatar sz-sm">{initials(l)}</span>
          <div className="af-id">
            <b>{name}</b>
            <span className="af-sub">
              <i className="af-cdot" style={{background:COL_COLOR[l.column]||'var(--t3)'}}></i>
              <span className="af-col" style={{color:COL_COLOR[l.column]||'var(--t3)'}}>{COL_LABEL[l.column]||'—'}</span>
              {l.offer>0 && <em className="af-amt mono">{eur(l.offer)}</em>}
            </span>
          </div>
          <button className={'af-star'+(l.starred?' on':'')} onClick={e=>{ e.stopPropagation(); onToggleStar&&onToggleStar(l); }} title={l.starred?'Retirer du suivi':'Mettre en suivi'} aria-pressed={!!l.starred}>
            <svg viewBox="0 0 24 24" width="18" height="18" fill={l.starred?'currentColor':'none'} stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.9l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95z"/></svg>
          </button>
          <select className="af-closer" value={l.owner||''} onClick={e=>e.stopPropagation()} onChange={e=>onReassign(l.id, e.target.value||null)} title="Attribuer à un closer">
            <option value="">— non attribué —</option>
            {closers.map(x=><option key={x.id} value={x.id}>{x.name||'Closer'}</option>)}
          </select>
          <span className="af-go" aria-hidden="true">{I.arrowR({})}</span>
        </div>
        <div className="af-rows">{rows.map(Row)}</div>
        {hidden>0 && <button className="af-more" onClick={()=>setExpanded(s=>({...s,[l.id]:!open}))}>{open?'Réduire':'+ '+hidden+' autre'+(hidden>1?'s':'')}</button>}
      </div>
    );
  };

  // ===== SECTIONS : les DEUX groupements produisent de vraies sections (pastille + compteur) =====
  const SEC_URG={
    late:{t:'En retard',v:'--danger'}, today:{t:"Aujourd'hui",v:'--accent'},
    week:{t:'Cette semaine',v:'--warm'}, later:{t:'Plus tard',v:'--b3'}, none:{t:'Sans date',v:'--t4'},
  };
  const SEC_DOM={
    rdv:{t:'RDV',v:'--accent'}, appel:{t:'Appel',v:'--warm'}, argent:{t:'Financier',v:'--ok'},
    suivi:{t:'Suivi',v:'--t3'}, admin:{t:'Admin',v:'--t4'},
  };
  const sections=React.useMemo(()=>{
    const fcards=cards.filter(groupBy==='domaine' ? (c=>domFilter.has(c.domTop)) : (c=>dueFilter.has(URG[c.minU]))); // filtre par la dimension du groupement (échéance ou domaine)
    const head=[]; const starred=cards.filter(c=>c.lead.starred); // SUIVI = étoilés, en tête, indépendant du filtre échéance ; le lead reste AUSSI dans sa section normale
    if(starred.length) head.push({key:'__suivi', t:'★ Suivi', v:'--accent', cards:starred});
    if(groupBy==='domaine'){
      const order=['rdv','appel','argent','suivi','admin'];
      const by={}; order.forEach(k=>{ by[k]=[]; });
      fcards.forEach(c=>{ (by[c.domTop]||by.suivi).push(c); });
      return head.concat(order.filter(k=>by[k].length).map(k=>({key:k, ...SEC_DOM[k], cards:by[k]})));
    }
    const order=['late','today','week','later','none'];
    const by={late:[],today:[],week:[],later:[],none:[]};
    fcards.forEach(c=>{ by[order[c.minU]].push(c); });
    return head.concat(order.filter(k=>by[k].length).map(k=>({key:k, ...SEC_URG[k], cards:by[k]})));
  },[cards,groupBy,dueFilter,domFilter]);

  // chips d'échéance = filtres cliquables façon stats (point coloré + nombre + label). Compte par bucket = nb de leads (cartes), stable (indépendant du filtre).
  const bcount=React.useMemo(()=>{ const c={late:0,today:0,week:0,later:0,none:0}; cards.forEach(x=>{ c[URG[x.minU]]++; }); return c; },[cards]);
  const dcount=React.useMemo(()=>{ const c={rdv:0,appel:0,argent:0,suivi:0,admin:0}; cards.forEach(x=>{ c[x.domTop]=(c[x.domTop]||0)+1; }); return c; },[cards]);
  const total=cards.length;
  const DUE_OPTS=[['late','En retard','--danger'],['today',"Aujourd'hui",'--accent'],['week','Cette semaine','--warm'],['later','Plus tard','--t3'],['none','Sans date','--t4']];
  const DOM_OPTS=[['rdv','RDV','--accent'],['appel','Appel','--warm'],['argent','Financier','--ok'],['suivi','Suivi','--t3'],['admin','Admin','--t4']];
  // SÉLECTION UNIQUE : un clic affiche UNIQUEMENT ce bucket (jamais d'accumulation). « Tout » remet tout.
  const toggleDue=k=>setDueFilter(new Set([k]));
  const toggleDom=k=>setDomFilter(new Set([k]));
  const filtersActive = !!seasonFilter || groupBy!=='urgence' || dueFilter.size!==ALL_DUE.length || domFilter.size!==ALL_DOM.length;
  const SlidersIc=(p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M4 7h8M17.5 7H20M4 17h2.5M11 17h9"/><circle cx="14.5" cy="7" r="2.5"/><circle cx="8" cy="17" r="2.5"/></svg>;

  return (
    <div className="mgr-pad">
      <div className="screen-head">
        <div className="screen-title">
          <h1>À faire{showHidden && <span className="af-mode-tag">{EyeOff({})}Masqués</span>}</h1>
          <p>{showHidden ? 'Actions masquées — clique « Démasquer » pour la réafficher dans À faire.' : 'Une carte par lead — toutes ses actions regroupées, par '+(groupBy==='domaine'?'domaine':'urgence')}</p>
        </div>
        <div className="todo-filters">
          <button className={'todo-chip'+(filter==='all'?' on':'')} onClick={()=>setFilter('all')}>Tous</button>
          {closers.map(c=><button key={c.id} className={'todo-chip'+(filter===c.id?' on':'')} onClick={()=>setFilter(c.id)}>{c.name||'Closer'}</button>)}
        </div>
      </div>

      {items.length===0
        ? <div className="sync-ok">{I.check({})}<div><b style={{fontSize:16,color:'var(--t1)'}}>Rien à faire</b><div style={{fontSize:13,marginTop:4}}>Aucune action en attente. Ajoute une action sur une fiche, ou un RDV apparaîtra ici.</div></div></div>
        : <>
            <div className="af-bar" style={{justifyContent:'flex-start'}}>
              <span className="af-total">{total} lead{total>1?'s':''}{showHidden?' masqué'+(total>1?'s':''):''}</span>
              <div className="af-tools">
                {(hiddenCount>0 || showHidden) && <button className={'af-filter-btn af-hidden-btn'+(showHidden?' on':'')} onClick={()=>setShowHidden(s=>!s)} title={showHidden?'Revenir aux actions actives':'Voir les actions masquées'}>
                  {EyeOff({})}{showHidden?'Retour':'Masqués'}<span className="af-hidden-n">{hiddenCount}</span>
                </button>}
                <button className={'af-filter-btn'+(panelOpen?' on':'')+(filtersActive?' has':'')} onClick={()=>setPanelOpen(o=>!o)} aria-expanded={panelOpen}>
                  {SlidersIc({})}Filtres{filtersActive && <i className="af-filter-dot"></i>}
                </button>
                {panelOpen && <>
                  <div className="af-panel-bk" onClick={()=>setPanelOpen(false)}></div>
                  <div className="af-panel">
                    {setSeasonFilter && (
                      <div className="af-panel-row">
                        <span className="af-panel-lbl">Saison</span>
                        <select className="af-panel-sel" value={seasonFilter||''} onChange={e=>setSeasonFilter(e.target.value||null)} title="Filtre global par saison (même réglage que la barre latérale)">
                          <option value="">Toutes les saisons</option>
                          {SEASONS.filter(s=>seasonCounts&&seasonCounts[s.code]).map(s=><option key={s.code} value={s.code}>{s.label} ({seasonCounts[s.code]})</option>)}
                          {(seasonCounts&&seasonCounts.__none)?<option value="__none">Sans saison ({seasonCounts.__none})</option>:null}
                        </select>
                      </div>
                    )}
                    <div className="af-panel-row">
                      <span className="af-panel-lbl">Grouper par</span>
                      <div className="af-seg">
                        <button className={'af-seg-b'+(groupBy==='urgence'?' on':'')} onClick={()=>setGroupBy('urgence')}>Échéance</button>
                        <button className={'af-seg-b'+(groupBy==='domaine'?' on':'')} onClick={()=>setGroupBy('domaine')}>Domaine</button>
                      </div>
                    </div>
                    <div className="af-panel-row">
                      <div className="af-fchips">
                        {(()=>{ const dom=groupBy==='domaine'; const sel=dom?domFilter:dueFilter; const all=dom?ALL_DOM:ALL_DUE; const setF=dom?setDomFilter:setDueFilter; const allOn=sel.size===all.length; return (
                          <button className={'af-fchip af-fchip-all'+(allOn?' on':'')} onClick={()=>setF(new Set(all))} aria-pressed={allOn} title="Tout afficher">
                            <b>{total}</b><span>Tout</span>
                          </button>
                        ); })()}
                        {(groupBy==='domaine'?DOM_OPTS:DUE_OPTS).map(([k,lbl,col])=>{ const sel=groupBy==='domaine'?domFilter:dueFilter; const cnt=groupBy==='domaine'?dcount:bcount; const toggle=groupBy==='domaine'?toggleDom:toggleDue; return (
                          <button key={k} className={'af-fchip'+(sel.has(k)?' on':'')} style={{'--fc':'var('+col+')'}} onClick={()=>toggle(k)} aria-pressed={sel.has(k)} title={(sel.has(k)?'Masquer ':'Afficher ')+lbl}>
                            <i className="af-fchip-dot"></i><b>{cnt[k]||0}</b><span>{lbl}</span>
                          </button>
                        ); })}
                      </div>
                    </div>
                  </div>
                </>}
              </div>
            </div>

            {sections.map(s=>{ const col=collapsedSecs.has(s.key); return (
              <React.Fragment key={s.key}>
                <div className={'af-sec af-sec-btn'+(col?' af-col':'')} style={{'--sc':'var('+s.v+')'}} role="button" tabIndex={0}
                  onClick={()=>setCollapsedSecs(p=>{ const n=new Set(p); n.has(s.key)?n.delete(s.key):n.add(s.key); return n; })}
                  onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setCollapsedSecs(p=>{ const n=new Set(p); n.has(s.key)?n.delete(s.key):n.add(s.key); return n; }); } }}
                  title={col?'Déplier':'Replier'}>
                  <span className="af-sec-chev" aria-hidden="true">{I.chev({})}</span>
                  <span className="af-sec-dot"></span>
                  <span className="af-sec-t">{s.t}</span>
                  <span className="af-sec-n">{s.cards.length}</span>
                  <span className="af-sec-ln"></span>
                </div>
                {!col && s.cards.map(Card)}
              </React.Fragment>
            );})}
          </>}
    </div>
  );
}

// argent inline : clic -> input, Entrée/blur = save, Échap = annule
function BcMoney({value,onSave,ph}){
  const [ed,setEd]=useState(false); const [v,setV]=useState('');
  if(ed) return <input className="bc-in mono" autoFocus value={v} onChange={e=>setV(e.target.value)}
    onBlur={()=>{ setEd(false); const raw=String(v).replace(',','.').replace(/[^\d.]/g,''); if(v.trim()===''){ onSave(null); return; } const n=Number(raw); if(!Number.isNaN(n)) onSave(n); }}
    onKeyDown={e=>{ if(e.key==='Enter') e.currentTarget.blur(); if(e.key==='Escape') setEd(false); }}/>;
  return <button className="bc-cell mono" title="Cliquer pour modifier" onClick={()=>{ setV(value==null?'':String(value)); setEd(true); }}>{(value==null||value==='')?(ph||'—'):eur(Number(value))}</button>;
}
// texte inline : clic -> POPOVER façon cellule de tableur (texte ENTIER visible, auto-grandit). Entrée=save, Échap=annule.
function BcText({value,onSave,ph}){
  const [ed,setEd]=useState(null); // {top,left,width} | null
  const [v,setV]=useState('');
  const btnRef=React.useRef(null);
  const grow=(el)=>{ if(!el) return; el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,220)+'px'; };
  const open=()=>{ const r=btnRef.current.getBoundingClientRect(); const W=Math.max(300,Math.min(440,Math.round(r.width)+160));
    setV(value||''); setEd({ top:Math.max(8,Math.round(r.top-6)), left:Math.round(Math.max(8,Math.min(r.left-8, window.innerWidth-W-16))), width:W }); };
  const save=()=>{ setEd(null); onSave(v.trim()||null); };
  return (<>
    <button ref={btnRef} className="bc-cell bc-tx" title={value?value+'\n(cliquer pour voir/modifier)':'Cliquer pour ajouter'} onClick={open}>{value||<span className="bc-ph">{ph||'—'}</span>}</button>
    {ed && (<>
      <div className="bc-pop-ov" onClick={save}></div>
      <textarea className="bc-pop" style={{top:ed.top,left:ed.left,width:ed.width}} autoFocus value={v} rows={1}
        ref={grow}
        onChange={e=>{ setV(e.target.value); grow(e.target); }}
        onFocus={e=>{ const n=e.target.value.length; e.target.setSelectionRange(n,n); }}
        onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); save(); } if(e.key==='Escape'){ e.preventDefault(); setEd(null); } }}/>
    </>)}
  </>);
}
// Page BOOTCAMP (admin) : suivi des inscriptions par cohorte — KPI live, inscrits, prospects, ajout anti-doublon.
function BootcampScreen({enrollments, leads, closers, onOpenLead, onUpsert, onAdd, onRemove}){
  const [season,setSeason]=useState(()=>{ const s=persistedState('iqcrm_bcseason','S17'); return SEASONS.some(x=>x.code===s)?s:'S17'; });
  useEffect(()=>localStorage.setItem('iqcrm_bcseason',JSON.stringify(season)),[season]);
  const [addOpen,setAddOpen]=useState(false);
  const [q,setQ]=useState('');
  const leadById=useMemo(()=>{ const m=new Map(); for(const l of leads) m.set(l.id,l); return m; },[leads]);
  const seasonCounts=useMemo(()=>{ const m={}; for(const e of enrollments) m[e.saison]=(m[e.saison]||0)+1; return m; },[enrollments]);
  const rows=useMemo(()=>enrollments.filter(e=>e.saison===season)
    .sort((a,b)=> String(a.created_at||'').localeCompare(String(b.created_at||'')) || String(a.id).localeCompare(String(b.id))) // ordre FIGÉ (jamais de saut de ligne au clic)
    .map(e=>({...e,lead:leadById.get(e.lead_id)||null})),[enrollments,season,leadById]);
  const inscrits=rows.filter(bcActive), prospects=rows.filter(e=>e.statut==='prospect'), annules=rows.filter(e=>e.statut==='annule');
  // ----- KPI (inscrits + soldés uniquement) -----
  const caSigne=inscrits.reduce((s,e)=>s+(Number(e.prix)||0),0);
  const caPaye=inscrits.reduce((s,e)=>s+(Number(e.deja_paye)||0),0);
  const reste=inscrits.reduce((s,e)=>s+bcReste(e),0);
  const nbSet=inscrits.filter(e=>e.origine_rdv==='set').length;
  const commRows=useMemo(()=>{ const m=new Map();
    for(const e of inscrits){ const k=e.closer_id||''; m.set(k,(m.get(k)||0)+(Number(e.prix)||0)*BC_RATES.closerPct); }
    return Array.from(m.entries()).filter(([,v])=>v>0).map(([k,v])=>({ name:k?(((closers||[]).find(c=>c.id===k)||{}).name||'?'):'(sans closer)', v }));
  },[inscrits,closers]);
  const commTotal=commRows.reduce((s,r)=>s+r.v,0);
  const primesSetter=nbSet*BC_RATES.setterPrime;
  // ----- ajout : recherche d'un lead EXISTANT (anti-doublon), exclut ceux déjà dans la saison -----
  const already=useMemo(()=>new Set(rows.map(e=>e.lead_id)),[rows]);
  const results=useMemo(()=>{ const s=deburr(q.trim()); if(!s) return [];
    const out=[]; for(const l of leads){ if(already.has(l.id)) continue;
      if(deburr(`${l.prenom} ${l.nom} ${l.email}`).includes(s) || normTel(l.tel).includes(s.replace(/\s/g,''))){ out.push(l); if(out.length>=8) break; } }
    return out; },[q,leads,already]);

const SCREEN_LABEL = { leads:'Mes leads', agenda:'Agenda', todo:'À faire', team:'Closers', console:'Synchro HubSpot', bootcamp:'Bootcamp' };

/* Bannière de FRAÎCHEUR du sync CalendIQ : lit la ligne unique sync_health('calendiq') (écrite par calendiq-pull
   à chaque run du cron 60s) + realtime. Si le dernier succès date de > 5 min => le sync est décroché => bannière
   ROUGE + bouton Resynchroniser. Rend la péremption VISIBLE (fini le gel silencieux de 3 semaines). */
function SyncBanner(){
  const [h,setH]=React.useState(undefined);      // undefined=chargement, null=pas de ligne, objet=santé
  const [now,setNow]=React.useState(()=>Date.now());
  const [busy,setBusy]=React.useState(false);
  const load=React.useCallback(async()=>{ try{ const { data }=await SB.from('sync_health').select('last_success_at,last_error,consecutive_failures').eq('id','calendiq').maybeSingle(); setH(data||null); }catch(_e){ /* garde l'état précédent */ } },[]);
  React.useEffect(()=>{ load();
    const ch=SB.channel('sync-health').on('postgres_changes',{event:'*',schema:'public',table:'sync_health'},load).subscribe();
    // re-lecture périodique (robuste) : une bannière de fraîcheur ne doit JAMAIS se périmer elle-même si le realtime
    // hoquette -> on relit sync_health toutes les 30s en plus du realtime. Sinon faux « en retard » quand l'onglet reste ouvert.
    const t=setInterval(()=>{ setNow(Date.now()); load(); },30000);
    return ()=>{ SB.removeChannel(ch); clearInterval(t); };
  },[load]);
  if(!h || !h.last_success_at) return null;
  const ageMin=Math.floor((now-new Date(h.last_success_at).getTime())/60000);
  if(ageMin<5) return null; // frais (cron 60s) -> rien à signaler
  const resync=async()=>{ setBusy(true); try{ await SB.functions.invoke('calendiq-pull',{ body:{ force:true, source:'resync' } }); }catch(_e){} await load(); setNow(Date.now()); setBusy(false); };
  return (
    <div className="sync-banner" role="alert">
      <span className="sync-banner-dot"></span>
      <span className="sync-banner-tx">Synchro CalendIQ en retard depuis <b>{ageMin} min</b> — les RDV peuvent ne pas être à jour.</span>
      <button className="sync-banner-btn" onClick={resync} disabled={busy}>{busy?'Resync…':'Resynchroniser'}</button>
    </div>
  );
}

  const runUndo=useCallback((entry)=>{ const arr=undoRef.current; const i=entry?arr.indexOf(entry):arr.length-1; if(i<0){ toast('Rien à annuler',null,'info'); return; } const e=arr.splice(i,1)[0]; Promise.resolve(e.fn()).catch(()=>{}); toast('Action annulée',e.label,'ok'); },[toast]);
  // Cmd/Ctrl+Z : n'annule qu'une action TRÈS récente (≤15 s) ET du contexte affiché — sur une fiche : seulement

  const renameCol=useCallback((id,label)=>{ const v=String(label||'').trim(); if(!v) return; setColCfg(cs=>cs.map(c=>c.id===id?{...c,label:v}:c)); SB.from('crm_columns').update({label:v,updated_by:userId}).eq('id',id).then(({error})=>{ if(error) colWriteFail(); }); },[userId,colWriteFail]);

  const recolorRes=useCallback((id,color)=>{ if(!color) return; setResCfg(cs=>cs.map(c=>c.id===id?{...c,color}:c)); SB.from('crm_results').update({color,updated_by:userId}).eq('id',id).then(({error})=>{ if(error) resWriteFail(); }); },[userId,resWriteFail]);
  const reorderRes=useCallback((orderedIds)=>{ setResCfg(cs=>{ const by=Object.fromEntries(cs.map(c=>[c.id,c])); return orderedIds.map((id,i)=>by[id]&&({...by[id],position:i})).filter(Boolean); }); Promise.all(orderedIds.map((id,i)=>SB.from('crm_results').update({position:i,updated_by:userId}).eq('id',id))).then(rs=>{ if(rs.some(r=>r&&r.error)) resWriteFail(); }); },[userId,resWriteFail]);
  const addRes=useCallback((label,color)=>{ const v=String(label||'').trim()||'Nouvelle disposition'; const base=(deburr(v).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,24))||'disp'; let id; do{ id=base+'_'+Math.random().toString(36).slice(2,6); }while(SYSTEM_RESULT_IDS.has(id)||resCfg.some(c=>c.id===id)); const pos=Math.max(-1,...resCfg.map(c=>c.position))+1; const row={id,label:v,color:color||'var(--cold)',position:pos,is_system:false}; setResCfg(cs=>[...cs,{...row}]); SB.from('crm_results').insert({...row,updated_by:userId}).then(({error})=>{ if(error) resWriteFail(); }); return id; },[resCfg,userId,resWriteFail]);
  const deleteRes=useCallback(async(id)=>{ const r=resCfg.find(c=>c.id===id); if(!r||r.is_system) return; setResCfg(cs=>cs.filter(c=>c.id!==id)); const { error }=await SB.from('crm_results').delete().eq('id',id); if(error) resWriteFail(); else toast('Disposition supprimée',null,'info'); },[resCfg,toast,resWriteFail]);
  // AUTO-NETTOYAGE (admin) : un lead rattaché à un closer SUPPRIMÉ (owner sans profil) est libéré (owner -> null)
  // pour qu'il se ré-attribue normalement. Tourne 1× par session, avec garde-fou : si la lecture des profils

  const healedRef=useRef(false);

    })();

  /* ---------- CalendIQ : agendas externes des closers ---------- */
  const [cqMeetings,setCqMeetings]=useState([]);   // RDV (closer = les siens ; admin = tous, agrégés)
  const [cqSources,setCqSources]=useState([]);     // [{id,name,organizer,slug}]

  const loadCalendiq=useCallback(async()=>{

      // Pont CalendIQ -> CRM : la lecture anonyme directe de CalendIQ est (à juste titre) verrouillée.

        .in('organizer_id', orgIds);
      if(error) throw error;

      setCqMeetings(prev=> cqSameData(prev,next)?prev:next); setCqError(null); // poll sans changement = même tableau -> leadsCq/board intacts
    }catch(e){ setCqError(e.message||'lecture impossible'); }
    finally{ setCqLoading(false); }
  },[isAdmin,profile,userId]);
  useEffect(()=>{ loadCalendiq(); },[loadCalendiq]);
  // TEMPS RÉEL CalendIQ : le miroir calendiq_meetings est réécrit par calendiq-pull DÈS qu'un webhook CalendIQ
  // arrive (booking pris/déplacé/annulé) -> on relit le miroir à l'instant (debounce 300 ms), sans attendre le
  // poll 20 s. RDV d'un lead à jour en ~1-2 s sur TOUS les écrans (fiche, cockpit, agenda).
  const cqRtT=useRef(0);
  useEffect(()=>{
    const ch=SB.channel('cq-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'calendiq_meetings'},()=>{ clearTimeout(cqRtT.current); cqRtT.current=setTimeout(loadCalendiq,300); })
      .subscribe();
    return ()=>{ SB.removeChannel(ch); clearTimeout(cqRtT.current); };
  },[loadCalendiq]);

  // ===== BOOTCAMP : inscriptions par cohorte (table partagée bootcamp_enrollments, realtime) =====
  const [bcEnrollments,setBcEnrollments]=useState([]);
  const loadBc=useCallback(async()=>{
    // tri DÉTERMINISTE (created_at PUIS id) : des lignes insérées en lot partagent le même created_at ;
    // sans départage, Postgres renvoie les ex-æquo dans un ordre variable (un UPDATE déplace le tuple)
    // -> la ligne « sautait » dans le tableau à chaque clic. L'id fige l'ordre pour toujours.
    try{ const { data, error }=await SB.from('bootcamp_enrollments').select('*').order('created_at',{ascending:true}).order('id',{ascending:true}); if(error) throw error;
      const next=data||[];
      setBcEnrollments(prev=> JSON.stringify(prev)===JSON.stringify(next) ? prev : next); // identité préservée si rien n'a changé -> zéro re-render parasite
    }catch(e){ console.warn('loadBc',e); }
  },[]);
  useEffect(()=>{ loadBc();
    const ch=SB.channel('bc-live').on('postgres_changes',{event:'*',schema:'public',table:'bootcamp_enrollments'},loadBc).subscribe();
    return ()=>{ SB.removeChannel(ch); };
  },[loadBc]);
  const bcUpsert=useCallback(async(id,patch)=>{
    setBcEnrollments(list=>list.map(e=>e.id===id?{...e,...patch}:e)); // optimiste
    const { error }=await SB.from('bootcamp_enrollments').update(patch).eq('id',id);
    if(error){ toast('Échec enregistrement bootcamp', error.message, 'info'); loadBc(); }
  },[toast,loadBc]);
  const bcAdd=useCallback(async(leadId,saison,prefill)=>{

  const bcRemove=useCallback(async(id)=>{

  // rafraîchit l'agenda tant qu'on le regarde (RDV pris/déplacés dans CalendIQ)
  // RDV pris dans CalendIQ (ex : rush post-webi) → visibles dans le CRM en quelques secondes, sur TOUS les écrans.
  // Polling 20 s tant que l'onglet est visible + refresh instantané au focus ; en pause si onglet caché.
  useEffect(()=>{
    let timer=null;
    const start=()=>{ if(!timer) timer=setInterval(loadCalendiq,20000); };
    const stop=()=>{ if(timer){ clearInterval(timer); timer=null; } };
    const onVis=()=>{ if(document.visibilityState==='visible'){ loadCalendiq(); start(); } else stop(); };
    if(document.visibilityState==='visible') start();

  const connectCalendiq=useCallback(async(input)=>{
    const slug=cqParseSlug(input);

    const org=await cqResolveSlug(slug);

    const { error }=await SB.from('profiles').update(p).eq('id',userId);

  // index leads par email/téléphone -> id (pour relier un RDV CalendIQ à sa fiche)
  const leadIndex=useMemo(()=>{
    const em=new Map(), ph=new Map();
    for(const l of leads){ const e=(l.email||'').trim().toLowerCase(); if(e&&!em.has(e)) em.set(e,l.id); const k=cqPhoneKey(l.tel); if(k&&!ph.has(k)) ph.set(k,l.id); }
    return { em, ph };
  },[leads]);
  const meetingLeadId=useCallback((m)=>{ const e=(m.booker_email||'').trim().toLowerCase(); if(e&&leadIndex.em.has(e)) return leadIndex.em.get(e); const k=cqPhoneKey(m.booker_phone); if(k&&leadIndex.ph.has(k)) return leadIndex.ph.get(k); return null; },[leadIndex]);

  // leads enrichis de LEURS RDV CalendIQ (liste R1, R2…) + prochain RDV pour le badge kanban — sans toucher la DB.
  // lead.rdvs = liste triée des meetings confirmés matchés (chacun avec type chrono + statut depuis rdv_meta).
  const leadsCq=useMemo(()=>{
    if(!cqMeetings.length) return leads;
    const tnow=Date.now();
    const emM=new Map(), phM=new Map();
    for(const m of cqMeetings){ if(m.status!=='confirmed') continue;
      const e=(m.booker_email||'').trim().toLowerCase(); if(e){ if(!emM.has(e)) emM.set(e,[]); emM.get(e).push(m); }
      const k=cqPhoneKey(m.booker_phone); if(k){ if(!phM.has(k)) phM.set(k,[]); phM.get(k).push(m); }
    }
    const pickNext=arr=>{ const up=arr.filter(m=>new Date(m.start_at).getTime()>=tnow-3600000).sort((a,b)=>new Date(a.start_at)-new Date(b.start_at)); if(up.length) return up[0]; return arr.slice().sort((a,b)=>new Date(b.start_at)-new Date(a.start_at))[0]; };
    return leads.map(l=>{
      let cand=[]; const e=(l.email||'').trim().toLowerCase(); if(e&&emM.has(e)) cand=cand.concat(emM.get(e));
      const k=cqPhoneKey(l.tel); if(k&&phM.has(k)) cand=cand.concat(phM.get(k));
      if(!cand.length) return l;
      const seen=new Set(); cand=cand.filter(m=>seen.has(m.id)?false:(seen.add(m.id),true));
      // tri stable (start_at, puis id) → numérotation chrono r1/r2/r3 déterministe même à start_at égal
      cand.sort((a,b)=> (new Date(a.start_at)-new Date(b.start_at)) || (a.id<b.id?-1:a.id>b.id?1:0));
      const meta=l.rdvMeta||{};
      const rdvs=cand.map((m,i)=>{
        const mm=meta[m.id]||{};
        const type=mm.type || (i===0?'r1':i===1?'r2':'r3'); // override explicite (booking CRM) sinon ordre chrono
        // lien Meet : celui du meeting > celui qu'on a stocké > legacy single (UNIQUEMENT le meeting de même horaire)
        const legacy = (l.rdvMeetLink && l.rdv_at && Math.abs(new Date(m.start_at)-new Date(l.rdv_at))<60000) ? l.rdvMeetLink : null;
        return { id:m.id, source:'calendiq', type, start_at:m.start_at, duration_minutes:m.duration_minutes||null, meet_link:m.meet_link||mm.meet_link||legacy||null, outcome:(mm.outcome==='present'||mm.outcome==='no_show')?mm.outcome:null, organizer_id:m.organizer_id||null };
      });
      const next=pickNext(cand);
      return { ...l, rdvs, _cqCloserId: next?._closerId || null, calendiqRdv:{ ...next, meet_link: next.meet_link || l.rdvMeetLink || null } };
    });
  },[leads,cqMeetings]);
  const sel = leadsCq.find(l=>l.id===selId);
  // assigne/retire la disposition d'une entrée d'historique à la main (optimiste + écriture activites.result)
  // FILTRE SAISON GLOBAL : un seul réglage qui filtre TOUTES les vues liste (kanban, à faire, closers).

  const [seasonFilter,setSeasonFilter]=useState(()=>persistedState('iqcrm_season',null));

  const openLead=(id)=>{ if(screen!=='fiche') setOrigin(screen); setSelId(id); setScreen('fiche'); setSearch(''); loadTimelineFor(id); }; // mémorise la page d'origine + charge l'historique du lead (lazy)

  const reorderLead=(id,col,beforeId,opts)=>{
    const l=leads.find(x=>x.id===id); if(!l) return;
    const changedCol = l.column!==col;
    setLeads(ls=>{
      const dragged=ls.find(x=>x.id===id); if(!dragged) return ls;
      const moved={...dragged, column:col,
        nextAction: changedCol ? (NEXT_BY_COL[col] || dragged.nextAction) : dragged.nextAction};
      const rest=ls.filter(x=>x.id!==id);
      let at;
      if(beforeId && beforeId!==id){ at=rest.findIndex(x=>x.id===beforeId); if(at===-1) at=rest.length; }
      else { let last=-1; rest.forEach((x,i)=>{ if(x.column===col) last=i; }); at = last===-1?rest.length:last+1; }
      const out=[...rest]; out.splice(at,0,moved); return out;
    });
    if(changedCol){
      const na = NEXT_BY_COL[col] || null;
      const claim = (col==='rdv1' && !l.owner && !isAdmin);
      saveLead(id,{column:col, ...(na?{nextAction:na}:{}), ...(claim?{owner:userId}:{})});
      if(claim) patch(id,{owner:userId});
      const stTitle='Étape : '+(COL_LABEL[col]||col);
      const stActP=addActivite(id,'note',stTitle,null).catch(()=>null);
      patch(id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]}));
      if(!(opts && opts.silent)){
        const fromCol=l.column, fromNa=l.nextAction, fromOwner=l.owner;
        const entry=pushUndo(`Déplacement · ${(l.prenom||'')+' '+(l.nom||'')}`.trim(), async()=>{ patch(id,prev=>({column:fromCol, nextAction:fromNa, owner:fromOwner, timeline:prev.timeline.filter(e=>!(e.title===stTitle && !e.id))})); try{ const stActId=await stActP; if(stActId) await deleteActivite(stActId); }catch(e){} await saveLead(id,{column:fromCol, nextAction:fromNa, owner:fromOwner}); reload(); }, id);
        toast(`${l.prenom} → ${COL_LABEL[col]}`,'Carte déplacée','accent',{label:'Annuler', fn:()=>runUndo(entry)});
      }
    }
  };


  // VRAI appel : un clic -> ouvre le dialer du Mac (tel:). On NE log PAS ici :
  // le navigateur ne peut pas savoir si l'appel a vraiment eu lieu -> on demande confirmation.
  const placeCall=(l)=>{
    if(!l) return;
    const num=(l.tel||'').replace(/[^+\d]/g,'');
    if(!num){ toast('Pas de numéro',`${l.prenom||'Ce lead'} n’a pas de téléphone`,'info'); return; }
    const a=document.createElement('a'); a.href='tel:'+num; document.body.appendChild(a); a.click(); a.remove();

  // entrée d'historique depuis la modale Note : note écrite OU NRP (appel sans réponse)
  const addNote=async(type,title,text,extra)=>{
    if(!sel) return;
    const lid=sel.id;
    const optimistic={type,when:'à l’instant',at:new Date().toISOString(),title,text:text||'',result:extra?.result||null,conclusion:extra?.conclusion||null,callKind:extra?.call_kind||null};
    patch(lid,prev=>({timeline:[optimistic,...prev.timeline]})); // affichage instantané
    try{
      const id=await addActivite(lid, type, title, text||null, null, extra);
      if(id) patch(lid,prev=>({timeline:prev.timeline.map(e=>e===optimistic?{...e,id}:e)})); // attache l'id réel (édit/suppr avant reload)
      toast(type==='recap'?'Débrief enregistré':(type==='appel'?(title&&title.indexOf('NRP')===0?'NRP enregistré':'Appel enregistré'):'Note ajoutée'), title, 'ok');
    }catch(e){
      patch(lid,prev=>({timeline:prev.timeline.filter(e=>e!==optimistic)})); // rollback : on n'a pas menti
      toast('Échec de l’enregistrement', e.message||'Réessaie', 'info');
    }
