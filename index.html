                ); }
                const k='c:'+r.leadId; const ch=confl[r.leadId]||{}; return (
                <div key={k} className="syncrow" style={{display:'block'}}>
                  <div className="sync-main" style={{cursor:'default'}}><b>{r.name}</b><div className="sync-reasons"><span className="sync-chip" style={{background:'rgba(229,72,77,.12)',color:'var(--danger)'}}>Modifié des deux côtés</span></div></div>
                  <div className="confl-fields">
                    {(r.fields||[]).map((f,i)=>{ const pick=ch[f.k]||'crm'; return (
                      <div key={i} className="confl-f">
                        <div className="k">{SYNC_FK[f.k]||f.k}</div>
                        <div className="confl-opts">
                          <div className={'confl-opt'+(pick==='crm'?' on':'')} onClick={()=>setConfl(s=>({...s,[r.leadId]:{...(s[r.leadId]||{}),[f.k]:'crm'}}))}><span className="src">Ton CRM</span><b>{syncVal(f.k,f.mine)}</b></div>
                          <div className={'confl-opt'+(pick==='hubspot'?' on':'')} onClick={()=>setConfl(s=>({...s,[r.leadId]:{...(s[r.leadId]||{}),[f.k]:'hubspot'}}))}><span className="src">HubSpot</span><b>{syncVal(f.k,f.theirs)}</b></div>
                        </div>
                      </div>
                    );})}
                  </div>
                  <div className="sync-act" style={{marginTop:12,justifyContent:'flex-end'}}><button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([conflItem(r)],'Conflit résolu')}>{busy[k]?'…':'Valider'}</button></div>
                  {fails[k] && <div className="sync-fail">⚠️ Échec : {failMsg(fails[k])}</div>}
                </div>
              );})}
            </div>
          )
        )}

        {tab==='acreer' && (
          acreer.length===0 ? <div className="lb-empty">Aucun lead à créer. Les leads ajoutés dans le CRM (sans transaction HubSpot) apparaîtront ici.</div> : (<>
            <div className="sync-toolbar">
              <button className="btn btn-accent" disabled={!!bulk} onClick={createAllAcreer}>Tout créer ({acreer.filter(r=>!r.incomplete).length})</button>
              <span className="sync-prog">Chaque lead devient un contact + une transaction dans le pipe IQ Project après ton clic. Anti-doublon par email/téléphone.</span>
            </div>
            <div className="sync-list">
              {acreer.map(r=>{ const k='cr:'+r.leadId; return (
                <div key={k} className="syncrow" style={{display:'block'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
                    <div className="sync-main" onClick={()=>onOpenLead(r.leadId)}>
                      <b>{r.name}</b>
                      <div className="sync-reasons">
                        <span className="sync-chip">{r.colonne}</span>
                        {r.saison&&<span className="sync-chip note">{r.saison}</span>}
                        {r.incomplete&&<span className="sync-chip" style={{background:'var(--danger-tint)',color:'var(--danger)'}}>⚠️ email/tél manquant</span>}
                      </div>
                      {(r.email||r.phone)&&<div className="sync-chg"><span>{[r.email,r.phone].filter(Boolean).join(' · ')}</span></div>}
                    </div>
                    <div className="sync-act" style={{flexShrink:0}}>
                      <button className="btn btn-ghost" disabled={!!busy[k]} onClick={()=>onOpenLead(r.leadId)}>Éditer</button>
                      <button className="btn btn-ghost btn-danger" disabled={!!busy[k]} title="Ne jamais créer ce lead dans HubSpot (il reste dans le CRM)" onClick={()=>rejectCreate(r)}>Rejeter</button>
                      <button className="btn btn-accent" disabled={!!busy[k]} title={r.incomplete?'Lead sans email ni téléphone — risque de doublon non dédupliquable':'Créer le contact + la transaction dans HubSpot'} onClick={()=>push([createDealItem(r)],'Créé dans HubSpot')}>{busy[k]?'…':'Créer dans HubSpot'}</button>
                    </div>
                  </div>
                  {fails[k] && <div className="sync-fail">⚠️ Échec : {failMsg(fails[k])}</div>}
                </div>
              );})}
            </div>
          </>)
        )}

        {tab==='taches' && (
          taches.length===0 ? <div className="lb-empty">Aucune tâche à envoyer. Les actions que tu ajoutes dans une fiche apparaîtront ici.</div> : (<>
            <div className="sync-toolbar">
              <button className="btn btn-accent" disabled={!!bulk} onClick={createAllTaches}>Tout envoyer ({taches.length})</button>
              <span className="sync-prog">Chaque action devient une tâche sur la transaction HubSpot après ton clic. Rien ne part sans validation.</span>
            </div>
            <div className="sync-list">
              {taches.map(r=>{ const k='t:'+r.leadId+':'+r.actionId; return (
                <div key={k} className="syncrow" style={{display:'block'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
                    <div className="sync-main" onClick={()=>r.leadId&&onOpenLead(r.leadId)}>
                      <b>{r.name}</b>
                      <div className="sync-reasons">{r.op==='update'&&<span className="sync-chip">mise à jour</span>}{(r.reasons||[]).map((x,i)=><span key={i} className="sync-chip note">{x}</span>)}{r.done&&<span className="sync-chip" style={{background:'color-mix(in srgb, var(--ok) 14%, transparent)',color:'var(--ok)'}}>faite → COMPLETED</span>}</div>
                      {r.detail && <div className="sync-chg"><span>{r.detail}</span></div>}
                    </div>
                    <div className="sync-act" style={{flexShrink:0}}>
                      <button className="btn btn-ghost" disabled={!!busy[k]} onClick={()=>r.leadId&&onOpenLead(r.leadId)}>Éditer</button>
                      <button className="btn btn-soft" disabled={!!busy[k]} title="Garder dans le CRM, ne pas envoyer dans HubSpot" onClick={()=>refuseTache(r)}>{busy[k]?'…':'Refuser'}</button>
                      <button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([taskItem(r)],'Tâche créée dans HubSpot')}>{busy[k]?'…':(r.op==='update'?'Mettre à jour':'Envoyer dans HubSpot')}</button>
                    </div>
                  </div>
                  {fails[k] && <div className="sync-fail">⚠️ Échec : {failMsg(fails[k])}</div>}
                </div>
              );})}
            </div>
          </>)
        )}

        {tab==='disparus' && (
          disparus.length===0 ? <div className="lb-empty">Aucun lead supprimé de HubSpot.</div> : (<>
            <div className="sync-toolbar">
              <button className="btn btn-accent" disabled={!!bulk} onClick={deleteAllDisparus}>Tout supprimer ({disparus.length})</button>
              <span className="sync-prog">Leur deal n’existe plus dans HubSpot. Supprimer = retirer du CRM (réversible, 0 écriture HubSpot).</span>
            </div>
            <div className="sync-list">
              {disparus.map(r=>{ const k='d:'+r.leadId; return (
                <div key={k} className="syncrow danger" style={{display:'block'}}>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <div className="sync-main" onClick={()=>onOpenLead(r.leadId)}>
                      <b>{r.name}</b>
                      <div className="sync-reasons"><span className="sync-chip" style={{background:'var(--danger-tint)',color:'var(--danger)'}}>{r.reason}</span>{r.colonne&&<span className="sync-chip">{r.colonne}</span>}</div>
                    </div>
                    <div className="sync-act" style={{flexShrink:0}}>
                      <button className="btn btn-ghost" disabled={!!busy[k]} onClick={()=>onOpenLead(r.leadId)}>Voir</button>
                      <button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>{ if(window.confirm('Supprimer « '+r.name+' » du CRM ?\n\nSon deal a disparu de HubSpot. Suppression réversible, 0 écriture HubSpot.')) push([delItem(r)],'Supprimé du CRM'); }}>{busy[k]?'…':'Supprimer du CRM'}</button>
                    </div>
                  </div>
                  {fails[k] && <div className="sync-fail">⚠️ Échec : {failMsg(fails[k])}</div>}
                </div>
              );})}
            </div>
          </>)
        )}
      </>)}
    </div>
  );
}

/* ====================== LOGIN ====================== */
function LoginScreen({ inviteToken }){
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [name,setName]=useState('');
  const [msg,setMsg]=useState(null);
  const [busy,setBusy]=useState(false);
  const [invite,setInvite]=useState(inviteToken?{state:'loading'}:null); // null = connexion normale
  useEffect(()=>{ if(!inviteToken) return; SB.rpc('invite_info',{p_token:inviteToken}).then(({data,error})=>{
    const row=Array.isArray(data)?data[0]:data;
    if(error||!row){ setInvite({state:'invalid'}); }
    else if(!row.valid){ setInvite({state:'used'}); }
    else { setInvite({state:'valid'}); if(row.email) setEmail(row.email); if(row.name) setName(row.name); }
  }); },[inviteToken]);
  const isSignup = !!invite && invite.state==='valid';
  const submit=async(e)=>{
    e.preventDefault(); setMsg(null); setBusy(true);
    try{
      if(isSignup){
        const {data,error}=await SB.auth.signUp({email,password:pwd,options:{data:{name, invite:inviteToken}}});
        if(error) throw error;
        if(!data.session) setMsg({t:'ok',m:'Compte créé. Confirme ton email puis reviens te connecter.'});
        // si session → onAuthStateChange (Root) prend le relais
      } else {
        const {error}=await SB.auth.signInWithPassword({email,password:pwd});
        if(error) throw error;
      }
    }catch(err){
      const m=err.message||'Erreur';
      setMsg({t:'err', m: /confirm/i.test(m)?'Email non confirmé — clique le lien reçu par mail.': /credential/i.test(m)?'Email ou mot de passe incorrect.': /registered/i.test(m)?'Cet email a déjà un compte — connecte-toi.':m});
    }finally{ setBusy(false); }
  };
  const badInvite = invite && invite.state!=='valid' && invite.state!=='loading';
  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
<img className="login-logo" src={LOGO_FULL} alt="IQ Project"/>
        {invite && invite.state==='loading' ? (
          <><h2>Invitation</h2><p className="login-sub">Vérification du lien…</p></>
        ) : badInvite ? (
          <><h2>Invitation</h2><p className="login-sub">{invite.state==='used'?'Ce lien a déjà été utilisé.':'Lien d’invitation invalide.'}</p>
          <a className="login-switch" href={typeof location!=='undefined'?location.pathname:'#'}>Aller à la connexion</a></>
        ) : (<>
          <h2>{isSignup?'Crée ton compte closer':'Connexion'}</h2>
          <p className="login-sub">{isSignup?'Tu as été invité — choisis ton mot de passe':'Cockpit closing'}</p>
          {isSignup && <input className="login-input" type="text" placeholder="Ton nom" value={name} onChange={e=>setName(e.target.value)} autoFocus required/>}
          <input className="login-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus={!isSignup} required/>
          <input className="login-input" type="password" placeholder="Mot de passe" value={pwd} onChange={e=>setPwd(e.target.value)} required minLength={6}/>
          {msg && <div className={`login-msg ${msg.t}`}>{msg.m}</div>}
          <button className="btn btn-accent" type="submit" disabled={busy} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
            {busy?'…':(isSignup?'Créer mon compte':'Se connecter')}
          </button>
        </>)}
      </form>
    </div>
  );
}

/* ====================== ROOT (auth gate) ====================== */
function Root(){
  const isDev = typeof location!=='undefined' && (location.hash.indexOf('dev')>=0 || location.search.indexOf('dev')>=0);
  const [session,setSession]=useState(isDev ? {user:{id:DEV_ID,email:'manager · dev'}} : undefined); // undefined=loading, null=déconnecté
  useEffect(()=>{
    if(isDev) return; // mode dev : pas d'auth Supabase
    SB.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub}=SB.auth.onAuthStateChange((_e,s)=>setSession(s||null));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  const inviteToken = (typeof location!=='undefined') ? new URLSearchParams(location.search).get('invite') : null;
  if(session===undefined) return <div className="login-wrap"><div className="login-card" style={{textAlign:'center'}}>Chargement…</div></div>;
  if(session===null) return <LoginScreen inviteToken={inviteToken}/>;
  return <App session={session} onLogout={()=>SB.auth.signOut()}/>;
}

/* ===== Filet de sécurité : affiche l'erreur au lieu d'un écran noir ===== */
class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if(this.state.err){
      const e=this.state.err;
      return (<div style={{padding:'28px',fontFamily:'ui-monospace,Menlo,monospace',color:'#fff',background:'#1d1d1e',minHeight:'100vh',whiteSpace:'pre-wrap',lineHeight:1.5}}>
        <div style={{color:'#f35c04',fontSize:20,fontWeight:800,marginBottom:14}}>⚠️ Erreur CRM capturée (envoie-moi ce texte)</div>
        <div style={{fontSize:13}}>{String((e&&e.stack)||(e&&e.message)||e)}</div>
      </div>);
    }
    return this.props.children;
  }
}
// erreurs asynchrones (chargement / temps réel) qui n'atteignent pas React
function showFatal(label,detail){
  let el=document.getElementById('fatal-overlay');
  if(!el){ el=document.createElement('div'); el.id='fatal-overlay';
    el.setAttribute('style','position:fixed;left:0;right:0;bottom:0;max-height:45vh;overflow:auto;padding:16px 20px;background:#2a0f06;color:#ffd9c2;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;z-index:99999;border-top:3px solid #f35c04');
    document.body.appendChild(el); }
  el.textContent += '\n['+label+'] '+detail;
}
window.addEventListener('error',ev=>showFatal('JS', (ev.error&&ev.error.stack)||ev.message));
window.addEventListener('unhandledrejection',ev=>showFatal('PROMISE', (ev.reason&&(ev.reason.stack||ev.reason.message))||String(ev.reason)));

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
