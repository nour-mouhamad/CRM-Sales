  // ajout manuel d'un lead — annulable (Ctrl+Z / Annuler → corbeille douce)
  const addLead=async(fields)=>{
    const lead=await createLead(fields); setLeads(ls=>[lead,...ls]); setAddTarget(null);
    const name=(lead.prenom||lead.nom||lead.email||'').toString().trim();
    const entry=pushUndo(`Ajout · ${name}`, async()=>{ setLeads(ls=>ls.filter(x=>x.id!==lead.id)); await SB.from('leads').update({deleted_at:new Date().toISOString()}).eq('id',lead.id); }, lead.id);
    toast('Lead ajouté', name, 'ok', {label:'Annuler', fn:()=>runUndo(entry)});
  };
  // suppression d'un lead en 1 clic — corbeille DOUCE (deleted_at) → récupérable via Annuler / Ctrl+Z
  const deleteLead=async(id)=>{
    const l=leads.find(x=>x.id===id);
    setLeads(ls=>ls.filter(x=>x.id!==id));
    if(selId===id){ setSelId(null); setScreen(origin); }
    try{ const { error }=await SB.from('leads').update({deleted_at:new Date().toISOString()}).eq('id',id); if(error) throw error; }
    catch(e){ toast('Échec suppression', e.message, 'info'); reload(); return; }
    const name = l?(`${l.prenom||''} ${l.nom||''}`.trim()||l.email||''):'';
    const entry=pushUndo(`Suppression · ${name}`, async()=>{ if(l) setLeads(ls=> ls.some(x=>x.id===id)?ls:[l,...ls]); await SB.from('leads').update({deleted_at:null}).eq('id',id); reload(); }, id);
    toast('Lead supprimé', name, 'info', { label:'Annuler', fn:()=>runUndo(entry) });
  };

  // modifier / supprimer une entrée d'historique (optimiste local + Supabase)
  const editNote=(actId,text)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.map(e=> e.id===actId?{...e,text}:e)})); updateActivite(actId,text); };
  const deleteNote=(actId)=>{ if(sel) patch(sel.id,prev=>({timeline:prev.timeline.filter(e=> e.id!==actId)})); deleteActivite(actId); toast('Entrée supprimée',null,'info'); };
  // édition d'un champ de qualification (uiKey = champ local, saveKey = clé attendue par saveLead -> colonne DB)
  const editField=(uiKey,saveKey,value)=>{ if(!sel) return; patch(sel.id,{[uiKey]:value}); saveLead(sel.id,{[saveKey]:value}); };
  const setActions=(arr,persist)=>{ if(!sel) return; patch(sel.id,{extraActions:arr}); if(persist) saveLead(sel.id,{extraActions:arr}); };
  // versions PAR-LEAD (page « À faire » : agit sur n'importe quel lead, pas seulement la fiche ouverte). Retournent la promesse d'écriture (l'anti-flicker s'en sert pour purger une fois le write committé).
  const toggleActionFor=(lead,checked)=>{ const v=checked?(lead.nextAction||null):null; patch(lead.id,{actionDoneFor:v}); return saveLead(lead.id,{actionDoneFor:v}); };
  const toggleExtraFor=(lead,idx)=>{ const arr=(lead.extraActions||[]).map((x,j)=>j===idx?{...x,done:!x.done}:x); patch(lead.id,{extraActions:arr}); return saveLead(lead.id,{extraActions:arr}); };
  const toggleStar=(lead)=>{ const v=!lead.starred; patch(lead.id,{starred:v}); return saveLead(lead.id,{starred:v}); };
  // masquer/démasquer une action dans la page « À faire » (persisté par-lead, jsonb hidden_actions) — n'affecte QUE cette vue, jamais la fiche.
  const hideActionFor=(lead,hideId)=>{ const cur=Array.isArray(lead.hiddenActions)?lead.hiddenActions:[]; if(cur.includes(hideId)) return Promise.resolve(); const arr=[...cur,hideId]; patch(lead.id,{hiddenActions:arr}); return saveLead(lead.id,{hiddenActions:arr}); };
  const unhideActionFor=(lead,hideId)=>{ const cur=Array.isArray(lead.hiddenActions)?lead.hiddenActions:[]; const arr=cur.filter(x=>x!==hideId); patch(lead.id,{hiddenActions:arr}); return saveLead(lead.id,{hiddenActions:arr}); };
  const reassignOwner=(id,closerId)=>{ patch(id,{owner:closerId||null}); saveLead(id,{owner:closerId||null}); };
  // appropriation du lead par le closer connecté (toggle) — owner_closer_id = id de l'utilisateur auth
  // 3 états : libre -> je m'approprie ; à moi -> je libère ; à un autre closer -> bloqué (pas de vol)
  const claimLead=()=>{ if(!sel) return; const uid=session.user.id; if(sel.owner && sel.owner!==uid){ toast('Lead déjà approprié','Par un autre closer','info'); return; } const next=sel.owner?null:uid; patch(sel.id,{owner:next}); saveLead(sel.id,{owner:next}); toast(next?'Lead approprié':'Lead libéré', `${sel.prenom||''} ${sel.nom||''}`.trim()||null, next?'ok':'info'); };
  // Ajouter / reprogrammer un RDV : crée un VRAI RDV dans le CalendIQ du closer (insert + Meet + email).
  // Si replaceMeetingId fourni (reprogrammation) : on booke le nouveau PUIS on annule l'ancien (ordre sûr =
  // jamais de lead sans RDV). Reflète côté CRM (rdv_at + type + auto-claim R1 + note + refresh).
  const addCalendiqRdv=useCallback(async(type, durationMin, startIso, replaceMeetingId, organizerOverride)=>{
    if(!sel) return;
    // reprogrammation d'un RDV existant -> on rebooke sous l'organizer D'ORIGINE (reste sur l'agenda du bon closer, même si c'est l'admin qui édite).
    const orgId = organizerOverride || (profile && profile.calendiq_organizer_id);
    if(!orgId){ toast('Connecte ton CalendIQ d’abord','Onglet Agenda','info'); throw new Error('CalendIQ non connecté'); }
    const name=`${sel.prenom||''} ${sel.nom||''}`.trim()||sel.email||'Lead';
    // 1) booke le nouveau créneau (insert + event Google/Meet + email) — comme la page de booking
    const booked=await cqBookMeeting(orgId, { title:'IQ Project × '+(sel.prenom||name), description:null, start_at:startIso, duration_minutes:durationMin,
      booker_name:name, booker_email:sel.email||null, booker_phone:sel.tel||null, booker_timezone:'Europe/Paris' });
    // 2) reprogrammation : annule l'ancien RDV via CalendIQ (supprime event Google + email d'annulation)
    if(replaceMeetingId){ try{ await cqInvoke('cancel-meeting',{ meeting_id:replaceMeetingId }); }catch(e){ console.warn('cancel old',e); } setCqMeetings(ms=>ms.filter(m=>m.id!==replaceMeetingId)); }
    // admin : caler sur l'agenda d'un closer = attribuer le lead à ce closer. closer : auto-claim au R1 sur lead libre (inchangé).
    const bookedCloser = (cqSources||[]).find(s=>s.organizer===orgId) || null;
    const adminAssign = (isAdmin && bookedCloser) ? bookedCloser.id : null;
    const claim = type==='r1' && !sel.owner && !isAdmin;
    const ownerPatch = adminAssign ? { owner:adminAssign } : (claim ? { owner:userId } : {});
    const tgt = rdvTargetStage(type, sel.column); // RDV fixé → avance l'étape (R1→1er RDV pris, R2→Closing), jamais en arrière
    const stagePatch = tgt ? { column:tgt, nextAction:NEXT_BY_COL[tgt]||null } : {};
    // fige le TYPE choisi (R1/R2) + le Meet sur ce meeting précis (clé = id CalendIQ) → l'UI ne renumérote pas en cas d'annulation amont
    const baseMeta = sel.rdvMeta||{};
    const nextMeta = { ...baseMeta };
    if(replaceMeetingId) delete nextMeta[replaceMeetingId]; // reprogrammation : purge l'ancienne clé (cohérent avec cancelCalendiqRdv, zéro orphelin)
    nextMeta[booked.id] = { ...(baseMeta[booked.id]||{}), type, ...(booked.meet_link?{meet_link:booked.meet_link}:{}) };
    // le lien Meet est stocké dans crm-sales (rdvMeetLink) car l'UPDATE anon sur la base CalendIQ est bloqué
    // Le RDV est représenté par le MEETING CalendIQ matché (lead.rdvs) + le type figé dans rdvMeta[booked.id].
    // On N'ÉCRIT PAS le legacy rdv_at quand le lead est matchable (email/tél) : sinon DOUBLON (1 carte legacy + 1 carte CalendIQ).
    // Fallback legacy UNIQUEMENT si le lead n'a ni email ni tél (impossible à matcher → sans ça le RDV n'apparaîtrait pas).
    const matchable = !!(sel.email || sel.tel);
    const p = matchable
      ? { rdvMeta:nextMeta, ...ownerPatch, ...stagePatch }
      : { rdv_at:startIso, rdvType:type, rdvMeetLink:booked.meet_link||null, rdvMeta:nextMeta, ...ownerPatch, ...stagePatch };
    // reflet immédiat : on injecte le meeting fraîchement booké dans la liste CalendIQ (sans attendre le refetch ~20 s)
    setCqMeetings(ms=>[ ...ms.filter(x=>x.id!==booked.id),
      { id:booked.id, organizer_id:orgId, title:'IQ Project × '+(sel.prenom||name), start_at:startIso, duration_minutes:durationMin,
        booker_name:name, booker_email:sel.email||null, booker_phone:sel.tel||null, status:'confirmed',
        meet_link:booked.meet_link||null, _closerId:bookedCloser?bookedCloser.id:userId, _closerName:bookedCloser?bookedCloser.name:((profile&&profile.name)||'Moi') } ]);
    patch(sel.id,p);
    saveLead(sel.id,p);
    if(tgt){ const stTitle='Étape : '+(COL_LABEL[tgt]||tgt); addActivite(sel.id,'note',stTitle,null).catch(()=>null); patch(sel.id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]})); }
    const verb=replaceMeetingId?'reprogrammé':'calé';
    const title='RDV CalendIQ '+verb+' — '+(type||'r1').toUpperCase()+' · '+fmtRdv(startIso);
    const actP=addActivite(sel.id,'rdv',title,null).catch(()=>null);
    patch(sel.id,prev=>({timeline:[{type:'rdv',when:'à l’instant',title,text:''},...prev.timeline]}));
    loadCalendiq();
    const assignSuffix = adminAssign ? (' — attribué à '+(bookedCloser.name||'closer')) : (claim?' — lead approprié':'');
    if(booked.meet_link) toast((type||'r1').toUpperCase()+' '+verb+' + Meet'+assignSuffix, fmtRdv(startIso),'ok');
    else toast((type||'r1').toUpperCase()+' '+verb+' (sans Meet)', booked.meetError?('CalendIQ : '+booked.meetError):'Connecte Google dans CalendIQ pour le lien Meet','info');
    return actP;
  },[sel,profile,isAdmin,userId,toast,patch,loadCalendiq,cqSources]);
  // Annuler un RDV : passe par CalendIQ (cancel-meeting → supprime l'event Google + email), puis nettoie le CRM.
  const cancelCalendiqRdv=useCallback(async(meetingId)=>{
    if(!sel) return;
    try{ await cqInvoke('cancel-meeting',{ meeting_id:meetingId }); }
    catch(e){ toast('Annulation impossible', e.message, 'info'); return; }
    setCqMeetings(ms=>ms.filter(m=>m.id!==meetingId));
    const cBase=sel.rdvMeta||{}; const cNext={...cBase}; delete cNext[meetingId]; // pas d'orphelin dans rdv_meta
    patch(sel.id,{ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:cNext, calendiqRdv:null });
    saveLead(sel.id,{ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:cNext });
    const title='RDV CalendIQ annulé';
    addActivite(sel.id,'rdv',title,null).catch(()=>{});
    patch(sel.id,prev=>({timeline:[{type:'rdv',when:'à l’instant',title,text:''},...prev.timeline]}));
    loadCalendiq();
    toast('RDV annulé','CalendIQ a retiré le créneau','info');
  },[sel,toast,patch,loadCalendiq]);
  // RDV saisi à la main : CRM UNIQUEMENT (rdv_at/rdvType/rdvMeetLink). Aucun appel CalendIQ, aucun email, aucun Meet généré.
  // RDV manuel MULTIPLE : créneau legacy = rdv_at (clé 'manual:<id>') ; créneaux suivants = clés 'm:<rand>' dans rdv_meta {type,start_at,meet_link,outcome…}.
  // key absent = NOUVEAU créneau (on n'écrase rien) ; key fourni = reprogrammation de ce créneau (on purge sa présence).
  const setManualRdv=useCallback((type, iso, meetLink, key)=>{ if(!sel) return; const tgt=rdvTargetStage(type, sel.column);
    const base=sel.rdvMeta||{}; const nm={...base}; let p;
    if(key==='manual:'+sel.id){ // reprogrammation du créneau legacy
      if(nm[key]){ const e={...nm[key]}; delete e.outcome; delete e.outcome_at; delete e.by; if(Object.keys(e).length) nm[key]=e; else delete nm[key]; }
      p={ rdv_at:iso, rdvType:type, rdvMeetLink:meetLink||null, rdvMeta:nm };
    } else {
      const mk=(key && key.indexOf('m:')===0) ? key : ('m:'+Math.random().toString(36).slice(2)+Date.now().toString(36));
      nm[mk]={ ...(nm[mk]||{}), type, start_at:iso, meet_link:meetLink||null };
      if(key){ delete nm[mk].outcome; delete nm[mk].outcome_at; delete nm[mk].by; } // reprog d'un créneau existant -> repart à zéro
      p={ rdvMeta:nm };
    }
    if(tgt){ p.column=tgt; p.nextAction=NEXT_BY_COL[tgt]||null; }
    patch(sel.id,p); saveLead(sel.id,p);
    if(tgt){ const stTitle='Étape : '+(COL_LABEL[tgt]||tgt); addActivite(sel.id,'note',stTitle,null).catch(()=>null); patch(sel.id,prev=>({timeline:[{type:'note',when:'à l’instant',title:stTitle,text:''},...prev.timeline]})); }
    toast('Rendez-vous enregistré', (type||'r1').toUpperCase()+' · '+fmtRdv(iso),'ok'); },[sel,patch,toast]);
  const removeManualRdv=useCallback((key)=>{ if(!sel) return; const base=sel.rdvMeta||{}; const next={...base}; let p;
    if(!key || key==='manual:'+sel.id){ delete next['manual:'+sel.id]; p={ rdv_at:null, rdvType:null, rdvMeetLink:null, rdvMeta:next }; }
    else { delete next[key]; p={ rdvMeta:next }; }
    patch(sel.id,p); saveLead(sel.id,p); toast('Rendez-vous retiré',null,'info'); },[sel,patch,toast]);

  // ---- Résultat d'un RDV (présent / no-show) — fait structuré, SOURCE DE VÉRITÉ UNIQUE = leads.rdv_meta ----
  // rdvMetaRef = miroir SYNCHRONE du rdv_meta de chaque lead. On lit/écrit dessus dans le handler (ordre garanti),
  // donc deux marquages rapprochés (R1 puis R2, ou manuel + IA) FUSIONNENT au lieu de s'écraser → invariant #1 garanti.
  const rdvMetaRef=useRef({});
  useEffect(()=>{ const m={}; for(const l of leads) m[l.id]=l.rdvMeta||{}; rdvMetaRef.current=m; },[leads]);
  // saveLeadRdvMeta REMONTE l'erreur → rollback optimiste (ref + UI) + toast (jamais de faux « enregistré »).
  const writeRdvMeta=useCallback(async(leadId, mutator)=>{
    const prev = rdvMetaRef.current[leadId] || {};
    const next = mutator(prev);
    if(next===prev) return 'noop';
    rdvMetaRef.current = { ...rdvMetaRef.current, [leadId]:next }; // autorité synchrone (avant tout await)
    patch(leadId,{rdvMeta:next});                                  // reflet UI optimiste
    try{ await saveLeadRdvMeta(leadId, next); return true; }
    catch(e){ rdvMetaRef.current = { ...rdvMetaRef.current, [leadId]:prev }; patch(leadId,{rdvMeta:prev}); toast('Échec de l’enregistrement', e.message||'Réessaie','info'); return false; }
  },[patch,toast]);
  const setRdvOutcome=useCallback(async(rdv, outcome, by='manual')=>{
    if(!sel || !rdv) return;
    const id=sel.id, key=rdv.id;
    let changed=false;
    const res=await writeRdvMeta(id, m=>{
      const ex=m[key]||{};
      if(by==='ia' && new Date(rdv.start_at).getTime()>Date.now()) return m;                       // l'IA ne tague jamais un RDV à venir
      if(by==='ia' && ex.by==='manual' && (ex.outcome==='present'||ex.outcome==='no_show')) return m; // le manuel prime
      if(ex.outcome===outcome){                                                                     // déjà ce statut
        if(by==='manual' && ex.by!=='manual') return { ...m, [key]:{ ...ex, by:'manual' } };        // confirme = verrouille en manuel (silencieux)
        return m;                                                                                   // sinon no-op
      }
      changed=true;
      return { ...m, [key]:{ ...ex, outcome, outcome_at:new Date().toISOString(), by, ...(rdv.type?{type:rdv.type}:{}) } };
    });
    if(res===true && changed && by==='manual')
      toast(outcome==='present'?'RDV marqué présent':'RDV marqué no-show', (rdv.type||'r1').toUpperCase()+' · '+cqDayLabel(rdv.start_at), outcome==='present'?'ok':'info');
  },[sel,writeRdvMeta,toast]);
  const clearRdvOutcome=useCallback(async(rdv)=>{
    if(!sel || !rdv) return;
    const id=sel.id, key=rdv.id;
    await writeRdvMeta(id, m=>{
      const cur=m[key]; if(!cur || !cur.outcome) return m;
      const e={...cur}; delete e.outcome; delete e.outcome_at; delete e.by;
      const n={...m}; if(Object.keys(e).length) n[key]=e; else delete n[key]; return n;
    });
  },[sel,writeRdvMeta]);

  // payment send → À payer, then auto Payé (id capturé, transition garantie)
  const sendPayment=(amount,tag)=>{
    const l=payTarget.lead; const id=l.id; setPayTarget(null);
    patch(id,prev=>({column:'encaisser', offer:amount, nextAction:`${eur(amount)} envoyé — en attente`,
      timeline:[{type:'paiement',when:'à l’instant',title:`Lien de paiement envoyé — ${eur(amount)}`,text:`Email envoyé à ${l.email}. En attente de paiement.`},...prev.timeline]}));
    saveLead(id,{column:'encaisser', offer:amount, statut_paiement:'lien_envoye', nextAction:`${eur(amount)} envoyé — en attente`});
    addActivite(id,'paiement',`Lien de paiement envoyé — ${eur(amount)}`,`Email envoyé à ${l.email}. En attente de paiement.`,amount).catch(()=>{});
    toast(`Lien envoyé · ${eur(amount)}`,`Email parti à ${l.prenom}`,'accent');
  };

  const takeIncoming=()=>{
    const inc=incoming; if(!inc) return;
    const id='lead'+Date.now();
    const newLead={...inc, id, owner:'Léo', column:'contacter', noShow:false, live:true, nextAction:'1er appel à passer',
      timeline:[{type:'note',when:'à l’instant',title:'Lead pris',text:`Tu es propriétaire de ce lead (course au lead remportée).`}]};
    setLeads(ls=>[newLead,...ls]);
    setIncoming(null);
    localStorage.setItem('iqcrm_sarahDone',JSON.stringify(true));
    toast(`Lead attribué · ${inc.prenom}`,'Atterri dans ta colonne Nouveau','ok');
    setScreen('leads');
  };

  const simulate=()=>{
    incomingIdx.current=(incomingIdx.current+1)%INCOMING_POOL.length;
    setIncoming({...INCOMING_POOL[incomingIdx.current]}); ping(); setShowSettings(false);
  };

  const resetData=()=>{
    setLeads(SEED); setSelId(null); setScreen('leads'); setShowSettings(false);
    localStorage.removeItem('iqcrm_sarahDone');
    toast('Données réinitialisées',null,'info');
  };

  const rappelerCount = useMemo(()=> leads.filter(l=>l.owner===userId && ['contacter','perso','atc','rdv1','contacte','qualifie','closing','encaisser'].includes(l.column) && (l.heat==='chaud'||l.noShow)).length,[leads,userId]);

  // NOTIFICATION SYNCHRO : badge « changements en attente » (sortants + entrants + conflits + disparus) sur le nav.
  // Alimenté par le diff en cache + un rafraîchissement de fond (admin only, LECTURE SEULE HubSpot, throttlé 60s,
  // au focus + toutes les 5 min tant que l'onglet est visible). N'écrit JAMAIS dans HubSpot (action 'diff' = lecture).
  const [syncPending,setSyncPending]=useState(0);
  const [syncWarn,setSyncWarn]=useState(false);
  useEffect(()=>{
    if(!isAdmin) return;
    const recompute=()=>{ const d=CONSOLE_CACHE.data; if(!d){ setSyncPending(0); setSyncWarn(false); return; }
      const c=consoleCat(d,'conflits').length+consoleCat(d,'disparus').length;
      setSyncPending(consoleCat(d,'sortants').length+consoleCat(d,'acreer').length+consoleCat(d,'taches').length+consoleCat(d,'entrants').length+c); setSyncWarn(c>0); };
    CONSOLE_CACHE.subs.add(recompute); recompute();
    const tick=()=>{ if(document.visibilityState!=='visible') return; const now=Date.now(); if(now-(CONSOLE_CACHE.lastBg||0)<60000) return; CONSOLE_CACHE.lastBg=now; consoleLoad(true); };
    tick();
    const timer=setInterval(tick,300000);
    window.addEventListener('focus',tick); document.addEventListener('visibilitychange',tick);
    return ()=>{ CONSOLE_CACHE.subs.delete(recompute); clearInterval(timer); window.removeEventListener('focus',tick); document.removeEventListener('visibilitychange',tick); };
  },[isAdmin]);

  const navItems=[
    {id:'leads', label:'Mes leads', icon:I.leads, badge:rappelerCount},
    {id:'agenda', label:'Agenda', icon:I.agenda, soon:true},
    ...(isAdmin?[{id:'todo', label:'À faire', icon:I.check},{id:'bootcamp', label:'Bootcamp', icon:I.admission},{id:'team', label:'Closers', icon:I.users},{id:'console', label:'Synchro HubSpot', icon:I.sync, badge:syncPending||null, badgeWarn:syncWarn}]:[]),
  ];
  useEffect(()=>{ if(!isAdmin && (screen==='team'||screen==='console'||screen==='todo'||screen==='bootcamp')) setScreen('leads'); },[isAdmin,screen]);
  const navActive = screen==='fiche'?origin:screen;

  // splash bref UNIQUEMENT pendant la requête profil (évite un flash board/nav) ; ne bloque jamais après réponse
  if(!isDev && !profileLoaded) return <div className="onb-wrap"><div className="onb-spin"></div></div>;
  // gate onboarding : connexion CalendIQ obligatoire avant d'entrer
  if(onbActive) return <Onboarding profile={profile} onConnect={connectCalendiq} loadCalendiq={loadCalendiq}
    myLeadsCount={myLeadsCount} onLogout={onLogout}
    onFinish={()=>{ setView('mine'); setScreen('leads'); setOnbActive(false); setOnbDone(true); }}/>;

  return (
    <div className="app">
      {/* RAIL */}
      <nav className="rail">
        <div className="logo">
<img className="logo-img" src={LOGO_FULL} alt="IQ Project — by IQ Education"/>
        </div>
        {navItems.map(n=>(
          <button key={n.id} className={`nav-item ${navActive===n.id?'active':''} ${n.soon?'soon':''}`} onClick={()=>{ if(n.soon) return; setScreen(n.id); }} aria-disabled={n.soon?true:undefined} title={n.soon?'Bientôt disponible':undefined}>
            {n.icon({})}<span>{n.label}</span>{n.soon?<span className="nav-soon">Bientôt</span>:(n.badge?<span className={`nav-badge ${n.badgeWarn?'warn':''}`}>{n.badge}</span>:null)}
          </button>
        ))}
        <div className={'rail-season'+(seasonFilter?' on':'')}>
          <span className="rail-season-lbl">{I.leads({})}Saison{seasonFilter?<span className="rail-season-dot"></span>:null}</span>
          <select className="rail-season-sel" value={seasonFilter||''} onChange={e=>setSeasonFilter(e.target.value||null)} title="Filtrer toutes les vues par saison">
            <option value="">Toutes les saisons</option>
            {SEASONS.filter(s=>seasonCounts[s.code]).map(s=><option key={s.code} value={s.code}>{s.label} ({seasonCounts[s.code]})</option>)}
            {seasonCounts.__none?<option value="__none">Sans saison ({seasonCounts.__none})</option>:null}
          </select>
        </div>
        <div className="rail-spacer"></div>
        <div className="rail-tools">
          <button className="icon-btn" title="Thème" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?I.moon({}):I.sun({})}</button>
          <button className="icon-btn" title="Réglages" onClick={()=>setShowSettings(true)}>{I.gear({})}</button>
        </div>
        <div className="profile">
          <div className="avatar sz-sm">{(userEmail[0]||'L').toUpperCase()}</div>
          <div className="profile-meta" style={{flex:1,minWidth:0}}><b style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{userEmail}</b><span>{profile?(isAdmin?'Admin':'Closer'):'…'}</span></div>
          <button className="icon-btn" title="Déconnexion" onClick={onLogout} style={{width:30,height:30}}>{I.logout({})}</button>
        </div>
      </nav>

      {/* WORK */}
      <main className="work">
        <SyncBanner/>

/* ====================== ÉCRAN MANAGER : COCKPIT CLOSERS ====================== */
// statut dérivé d'un lead (aucune donnée inventée — vide reste vide)
const LB_LOST=['lost','perdu','desabonne','desabo'], LB_WON=['won','paye'], LB_CLOSING=['closing','encaisser','apayer','cpf'];
// faut-il caler un RDV ? (étape amont, aucun RDV à venir)
const RDV_TODO_COLS=['contacter','perso','atc','contacte'];
/* CERVEAU UNIFIÉ du cockpit : tout l'état d'un lead dérivé des FAITS (RDV fusionnés leadAllRdvs = même
   source que la fiche, verdicts rdv_meta, recap d'appel). Aucune donnée inventée — vide reste vide. */
function leadStatus(l, now, opts){
  now = now||Date.now();
  const col=l.column;
  // recap : timeline si la fiche a été ouverte (plus frais), sinon _recap chargé en masse par TeamScreen.
  // ignoreRecap=true (pastille STATUT) → on force le statut FACTUEL généré, identique board ↔ fiche (le board n'a pas le recap).
  const recap=(opts&&opts.ignoreRecap) ? null : ((l.timeline||[]).find(t=>t.type==='recap') || l._recap || null);
  // disposition du lead (étiquette unique) : pilotée par status_override quand c'est un id de disposition connu, sinon le recap.
  const ovDisp = RESULT_META[l.statusOverride] ? l.statusOverride : null;
  const result = ovDisp || ((recap && RESULT_META[recap.result]) ? recap.result : null);
  // la colonne TERMINALE prime sur un vieux verdict de call : un lead déplacé en Perdu avec un ancien
  // recap « close » est PERDU (sinon il gonflerait le CA à vie).
  const colWon=LB_WON.includes(col), colLost=LB_LOST.includes(col);
  const isWon = l.paid===true || colWon || (!colLost && result==='close');
  const isLost = !isWon && (colLost || result==='pas_interesse');
  const isClosing = !isWon && !isLost && (LB_CLOSING.includes(col) || result==='a_closer');
  // CA RÉEL : seuls comptent payé / colonne Closed Won. Un close VERBAL (result='close') marque le lead
  // « Closé » mais ne met JAMAIS un euro dans « encaissé » tant que rien n'est passé en banque.
  const caWon = (l.paid===true || colWon) ? (l.offer||0) : 0;
  // ----- RDV : liste fusionnée CalendIQ + manuels (la MÊME que la fiche) -----
  const rdvs=leadAllRdvs(l);
  const future=[], past=[]; let live=null;
  for(const r of rdvs){ const st=rdvState(r, now);
    if(st==='upcoming') future.push(r);
    else if(st==='live') live=r;
    else past.push(r); /* present / no_show / todo */ }
  const rdvNext=future[0]||null;
  const rdvLast=past.length?past[past.length-1]:null;
  const active=!isWon&&!isLost;
  // débrief manquant : RDV passé SANS verdict — leads ACTIFS seulement (un closé/perdu ne réclame rien).
  const toDebrief = active ? past.filter(r=>!r.outcome) : [];
  // présents / no-shows : comptés sur la LISTE AFFICHÉE (cohérent pastilles ↔ KPI ; évite les doublons
  // manual:/meeting-id et les verdicts orphelins de meetings annulés restés dans rdv_meta).
  let presents=0, noShows=0, presentsR1=0, presentsR2=0;
  for(const r of rdvs){
    if(r.outcome==='present'){ presents++; if(r.type==='r1') presentsR1++; else presentsR2++; }
    else if(r.outcome==='no_show') noShows++; }
  const noShowToFix = active && !rdvNext && !live && !!rdvLast && rdvLast.outcome==='no_show'; // no-show SANS RDV recalé
  const rdvToday = active && !!(live || (rdvNext && sameDayTs(rdvNext.start_at, now)));
  // « sans suivi » : lead actif, aucun RDV à venir, dernier signal (création / RDV / recap / verdict /
  // dernière activité loggée — appel, note, mail… chargée en masse par TeamScreen dans _lastAct) trop vieux
  let lastTouch=l.date_creation?new Date(l.date_creation).getTime():0;
  if(rdvLast) lastTouch=Math.max(lastTouch,new Date(rdvLast.start_at).getTime());
  if(recap&&recap.at) lastTouch=Math.max(lastTouch,new Date(recap.at).getTime());
  if(l._lastAct) lastTouch=Math.max(lastTouch,new Date(l._lastAct).getTime());
  { const t0=(l.timeline||[])[0]; if(t0&&t0.at) lastTouch=Math.max(lastTouch,new Date(t0.at).getTime()); }
  { const meta=l.rdvMeta||{}; for(const k in meta){ const v=meta[k]; if(v&&v.outcome_at){ const t=new Date(v.outcome_at).getTime(); if(t&&t<=now) lastTouch=Math.max(lastTouch,t); } } }
  const staleDays = (active && !rdvNext && !live && lastTouch>0) ? Math.max(0,Math.floor((now-lastTouch)/DAY_MS)) : 0;
  // ----- phrase d'état TOUJOURS présente : le recap (réel) prime, sinon générée depuis les faits -----
  let conclusion = recap ? (recap.conclusion||recap.text||'') : '';
  let generated=false;
  if(!conclusion){ generated=true;
    const T=r=>(r.type||'r1').toUpperCase();
    if(isWon) conclusion = 'Closé'+(l.paid?(l.offer?' — '+eur(l.offer)+' encaissé':''):(l.offer?' — '+eur(l.offer)+' à encaisser':''));
    else if(isLost) conclusion = 'Perdu';
    else if(live) conclusion = T(live)+' en cours';
    else if(noShowToFix) conclusion = 'No-show '+T(rdvLast)+' le '+rdvShort(rdvLast.start_at)+' — à recaler';
    else if(toDebrief.length){ const d=toDebrief[toDebrief.length-1]; conclusion = T(d)+' passé '+rdvShort(d.start_at)+' — débrief à faire'; }
    else if(rdvNext) conclusion = T(rdvNext)+' '+rdvShort(rdvNext.start_at,true)+(presents?' · '+presents+' RDV fait'+(presents>1?'s':''):'');
    else if(col==='encaisser') conclusion = (l.offer?eur(l.offer)+' ':'')+ (l.statut_paiement==='lien_envoye'?'— lien envoyé, en attente':'à encaisser');
    else if(rdvLast&&rdvLast.outcome==='present') conclusion = T(rdvLast)+' fait '+rdvShort(rdvLast.start_at)+' — suite à caler';
    else if(RDV_TODO_COLS.includes(col)) conclusion = 'Aucun RDV calé';
    else conclusion = '';
  }
  // RDV à venir / faits ventilés R1 vs R2 (R3+ comptés avec R2) — pour le cockpit closers.
  const upRdv = live || rdvNext; const upKind = upRdv ? (upRdv.type||'r1') : null;
  return { col, label:COL_LABEL[col]||col, color:COL_COLOR[col]||'var(--t3)',
    isWon, isLost, isClosing, rdvUpcoming:!!rdvNext, rdvType:(rdvNext?rdvNext.type:null)||l.rdvType||null, rdv_at:(rdvNext?rdvNext.start_at:null)||l.rdv_at||null,
    montant:l.offer||0, caWon,
    result, callKind: recap?(recap.callKind||null):null,
    conclusion, generated,
    rdvs, rdvNext, rdvLast, live, toDebrief, presents, noShows, presentsR1, presentsR2,
    upR1:(upKind==='r1'?1:0), upR2:((upKind&&upKind!=='r1')?1:0), noShowToFix, rdvToday, staleDays, now };
}
// niveau d'urgence de la puce de carte (couleur) dérivé du statut auto
function statusUrg(s){
  if(s.isWon) return 'ok';
  if(s.isLost) return 'idle';
  if(s.noShowToFix) return 'late';
  if(s.live||s.rdvToday||(s.toDebrief&&s.toDebrief.length)||s.col==='encaisser') return 'today';
  if(s.staleDays>=14) return 'late';
  if(s.staleDays>=7) return 'today';
  return 'idle';
}
// urgence d'une échéance de surcharge manuelle (passée = rouge, aujourd'hui = orange)
function dueUrg(due, now){ if(!due) return 'idle'; const t=new Date(due).getTime(); if(!t) return 'idle'; if(t<now-60000) return 'late'; if(sameDayTs(due, now)) return 'today'; return 'idle'; }
// urgence (puce) d'une disposition choisie ; la couleur réelle vient de RESULT_META (inline)
function dispUrg(id){ return id==='no_show'?'late':(id==='close'?'ok':(id==='pas_interesse'?'idle':'today')); }
// libellé de repli ACTIONNABLE par colonne quand aucun fait RDV/paiement (l'urgence reste portée par la puce colorée).
// On ne met QUE les colonnes où un libellé ajoute de l'info que l'entête ne donne pas (ex: ATC → « À recontacter »).
const STATUS_FALLBACK = { atc:'À recontacter' };
// STATUT COMPACT d'une carte = SOURCE UNIQUE (board ET fiche, donc toujours cohérents).
// Priorité : surcharge manuelle > affichage ARGENT (encaisser/won, formulation concise) > statut FACTUEL
// (leadStatus en ignoreRecap → identique partout, indépendant du recap chargé ou non) > repli colonne/âge.
// Retour: { text, amt?, urg, manual, money? } — money ∈ 'money'|'paid' pilote la couleur (€/✓).
function computeCardStatus(lead, now){
  now = now||Date.now();
  const ov=lead.statusOverride;
  if(ov){
    // disposition connue (Closé, Objection…) : préfixée du RDV courant + couleur de la disposition → « R2 Closé ».
    if(RESULT_META[ov]){
      const s=leadStatus(lead, now, {ignoreRecap:true});
      const r=(s.rdvLast||s.live||s.rdvNext); const tag=r?((r.type||'r1').toUpperCase()):null;
      return { text:(tag?tag+' ':'')+RESULT_META[ov].label, urg:dispUrg(ov), color:RESULT_META[ov].color, manual:true, money:null };
    }
    // surcharge texte libre
    const d=lead.statusOverrideDue;
    return { text: ov+(d?(' · '+rdvShort(d,true)):''), urg: dueUrg(d, now), manual:true, money:null };
  }
  const col=lead.column;
  if(col==='encaisser'){
    const t = lead.paid ? 'payé' : (lead.statut_paiement==='lien_envoye' ? 'lien envoyé — en attente' : 'à encaisser');
    return { text:t, amt:eur(lead.offer), urg:(lead.paid?'ok':'today'), manual:false, money:(lead.paid?'paid':'money') };
  }
  if(col==='won'){
    return { text:'gagné', amt:eur(lead.offer), urg:'ok', manual:false, money:'paid' };
  }
  const s=leadStatus(lead, now, {ignoreRecap:true});
  let text=s.conclusion;
  if(!text || text==='Aucun RDV calé'){
    if(STATUS_FALLBACK[col]) text = STATUS_FALLBACK[col];
    else { const created=lead.date_creation?new Date(lead.date_creation).getTime():0;
      if(created){ const dd=Math.max(0,Math.floor((now-created)/DAY_MS)); text = dd<=0?'Nouveau lead':('Créé il y a '+dd+' j'); }
      else text='À traiter'; }
  }
  return { text, urg: statusUrg(s), manual:false, money:null };
}
// tri par URGENCE manager (leads ACTIFS d'abord) : RDV du jour > no-show à recaler > débrief manquant > RDV à venir > closing > actifs > gagnés > perdus
function leadAttn(s){
  if(!s.isWon&&!s.isLost){
    if(s.live||s.rdvToday) return 0;
    if(s.noShowToFix) return 1;
    if(s.toDebrief.length) return 2;
    if(s.rdvNext) return 3;
    if(s.isClosing) return 4;
    return 5;
  }
  return s.isWon?6:7;
}

/* pastille d'un RDV du parcours : passé ✓/✗, à débriefer, en cours, à venir (jour + heure) */
function RdvChip({ rdv, now }){
  const st=rdvState(rdv, now);
  const T=(rdv.type||'r1').toUpperCase();
  if(st==='present')  return <span className="chip-rdv ok" title={'Présent · '+cqDayLabel(rdv.start_at)+' '+cqTime(rdv.start_at)}>{I.check({})}{T} · {rdvShort(rdv.start_at)}</span>;
  if(st==='no_show')  return <span className="chip-rdv bad" title={'No-show · '+cqDayLabel(rdv.start_at)+' '+cqTime(rdv.start_at)}>{I.noshow({})}{T} · {rdvShort(rdv.start_at)}</span>;
  if(st==='live')     return <span className="chip-rdv liv">{I.agenda({})}{T} · en cours</span>;
  if(st==='todo')     return <span className="chip-rdv deb" title={'RDV passé sans verdict · '+cqDayLabel(rdv.start_at)+' '+cqTime(rdv.start_at)}>{I.clock({})}{T} · {rdvShort(rdv.start_at)} · à débriefer</span>;
  return <span className="chip-rdv" title={cqDayLabel(rdv.start_at)+' '+cqTime(rdv.start_at)}>{I.agenda({})}{T} · {rdvShort(rdv.start_at,true)}</span>;
}

function ManagerLeadRow({ lead, onOpenLead, owner }){
  const s=leadStatus(lead);
  const todo = !s.rdvUpcoming && !s.live && !s.toDebrief.length && !s.noShowToFix && !s.isWon && !s.isLost && RDV_TODO_COLS.includes(s.col);
  return (
    <button className="cl-lead" onClick={()=>onOpenLead(lead.id)}>
      {owner!=null && <span className="cl-owner">{owner}</span>}
      <span className="cl-lead-name">{lead.prenom} {lead.nom}</span>
      <span className="chip" style={{color:s.color, background:'color-mix(in srgb, currentColor 12%, transparent)'}}><span className="cdot"></span>{s.label}</span>
      {s.rdvs.map(r=><RdvChip key={r.id} rdv={r} now={s.now}/>)}
      {s.result && (()=>{ const rk=RESULT_META[s.result]; return <span className="chip" style={{color:rk.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{s.callKind?(callKindLabel(s.callKind)+' · '):''}{rk.label}</span>; })()}
      {todo && <span className="chip-rdv todo">{I.clock({})}RDV à caler</span>}
      {s.staleDays>=7 && <span className={'chip-rdv '+(s.staleDays>=14?'bad':'deb')} title="Aucun signal (RDV, débrief, verdict) depuis ce nombre de jours">{I.clock({})}{s.staleDays} j sans suivi</span>}
      {s.montant>0 && <span className="cl-amt">{eur(s.montant)}</span>}
      {s.conclusion && <span className={'cl-concl'+(s.generated?' gen':'')}>{s.generated?s.conclusion:('« '+s.conclusion+' »')}</span>}
      <span className="cl-arrow">{I.chev({})}</span>
    </button>
  );
}

function CloserCard({ rank, name, leads, maxCa, onOpenLead, defaultOpen, closerId, onDelete, clock }){
  const [open,setOpen]=useState(!!defaultOpen);
  const [confirm,setConfirm]=useState(false);
  const [del,setDel]=useState(false);
  const doDelete=async()=>{ setDel(true); try{ await onDelete(closerId,name); }catch(e){ setDel(false); setConfirm(false); } };
  const m=useMemo(()=>{
    const now=clock||Date.now();
    let rdv=0,closing=0,won=0,ca=0,lost=0,faits=0,noShows=0,debrief=0,upR1=0,upR2=0,faitsR1=0,faitsR2=0;
    leads.forEach(l=>{ const s=leadStatus(l,now);
      if(s.isWon){ won++; ca+=s.caWon; }
      else if(s.isLost) lost++;
      else if(s.isClosing) closing++;
      if(s.rdvUpcoming||s.live) rdv++;
      upR1+=s.upR1; upR2+=s.upR2;
      faits+=s.presents; faitsR1+=s.presentsR1; faitsR2+=s.presentsR2; noShows+=s.noShows; debrief+=s.toDebrief.length;
    });
    return { n:leads.length, rdv, closing, won, ca, lost, faits, noShows, debrief, upR1, upR2, faitsR1, faitsR2, taux: leads.length?Math.round(won/leads.length*100):0 };
  },[leads,clock]);
  const sorted=useMemo(()=>{ const now=clock||Date.now(); return leads.slice().sort((a,b)=>leadAttn(leadStatus(a,now))-leadAttn(leadStatus(b,now))); },[leads,clock]);
  const caPct = maxCa>0 ? Math.max(4, Math.round(m.ca/maxCa*100)) : 0;
  return (
    <div className={'lb-card'+(open?' open':'')}>
      <button className="lb-head" onClick={()=>setOpen(o=>!o)}>
        <span className="lb-rank">{rank}</span>
        <div className="lb-id"><span className="avatar sz-sm">{((name||'?')[0]||'?').toUpperCase()}</span><b>{name}</b></div>
        <div className="lb-metrics">
          <div className="lb-m"><b>{m.n}</b><span>Leads</span></div>
          <div className={'lb-m'+(m.upR1?' warn':'')}><b>{m.upR1}</b><span>R1 à venir</span></div>
          <div className={'lb-m'+(m.upR2?' warn':'')}><b>{m.upR2}</b><span>R2 à venir</span></div>
          <div className="lb-m"><b>{m.faitsR1}</b><span>R1 faits</span></div>
          <div className="lb-m"><b>{m.faitsR2}</b><span>R2 faits</span></div>
          <div className={'lb-m'+(m.noShows?' bad':'')}><b>{m.noShows}</b><span>No-show</span></div>
          <div className="lb-m"><b>{m.closing}</b><span>En closing</span></div>
          <div className={'lb-m'+(m.won?' won':'')}><b>{m.won}</b><span>Closés</span></div>
          <div className="lb-m"><b>{m.taux}%</b><span>Taux close</span></div>
        </div>
        <div className="lb-ca">
          <div className="lb-ca-top"><b>{eur(m.ca)}</b><span>encaissé</span></div>
          <div className="lb-bar"><i style={{width:caPct+'%'}}></i></div>
        </div>
        <span className="lb-chev">{I.chev({})}</span>
      </button>
      {open && (
        <div className="lb-body">
          {sorted.length===0 ? <div className="lb-empty">Aucun lead attribué.</div>
            : sorted.map(l=><ManagerLeadRow key={l.id} lead={l} onOpenLead={onOpenLead}/>)}
          {onDelete && closerId && (
            <div className="cl-danger">
              {!confirm
                ? <button className="cl-del" onClick={()=>setConfirm(true)}>{I.trash({})}Supprimer l’accès de ce closer</button>
                : <>
                    <span className="cl-del-warn">Révoquer définitivement l’accès de <b>{name}</b> ? Son compte est supprimé (email ré-invitable) et ses leads sont libérés.</span>
                    <div className="cl-del-act">
                      <button className="btn btn-ghost" disabled={del} onClick={()=>setConfirm(false)}>Annuler</button>
                      <button className="cl-del-confirm" disabled={del} onClick={doDelete}>{del?'Suppression…':'Confirmer la suppression'}</button>
                    </div>
                  </>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TeamScreen({ userId, toast, leads, onOpenLead, cqPending }){
  const [profiles,setProfiles]=useState([]);
  const [invites,setInvites]=useState([]);
  const [busy,setBusy]=useState(false);
  const base = (typeof location!=='undefined') ? (location.origin+location.pathname) : '';
  const linkFor = t => base+'?invite='+t;
  const load=()=>{
    SB.from('profiles').select('id,name,role,created_at').order('created_at').then(({data})=>setProfiles(data||[]));
    SB.from('invites').select('token,email,name,role,used_at,created_at').order('created_at',{ascending:false}).then(({data})=>setInvites(data||[]));
  };
  useEffect(load,[]);
  const [inviteRole,setInviteRole]=useState('closer'); // rôle de la prochaine invitation (closer | admin)
  const gen=async()=>{ setBusy(true); try{
    const r=await callFn('admin-closer',{action:'create_invite',role:inviteRole});
    try{ await navigator.clipboard.writeText(linkFor(r.token)); }catch(e){}
    toast('Lien d’invitation créé','Copié — '+(inviteRole==='admin'?'invitation ADMIN':'invitation closer'),'ok'); load();
  }catch(e){ toast('Erreur', e.message, 'info'); } finally{ setBusy(false); } };
  // PROMOUVOIR / RÉTROGRADER (admin <-> closer) via l'edge admin-gated. 0 écriture HubSpot.
  const setMemberRole=async(id,role,nm)=>{ try{
    await callFn('admin-closer',{action:'set_role',targetId:id,role});
    toast(role==='admin'?'Passé admin':'Repassé closer',(nm||'')+' — accès mis à jour','ok'); load();
  }catch(e){ toast('Changement impossible', e.message, 'info'); } };
  const copy=t=>{ try{ navigator.clipboard.writeText(linkFor(t)); toast('Lien copié',null,'ok'); }catch(e){} };
  const delCloser=async(closerId,nm)=>{
    try{
      const r=await callFn('admin-closer',{action:'delete_closer',closerId});
      const n=r.unassigned||0;
      toast('Closer supprimé', (nm||'')+' — accès révoqué'+(n?(' · '+n+' lead'+(n>1?'s':'')+' libéré'+(n>1?'s':'')):''), 'ok');
      load();
    }catch(e){ toast('Suppression impossible', e.message, 'info'); throw e; } // rethrow -> CloserCard réinitialise
  };
  const pending = invites.filter(i=>!i.used_at);

  // horloge minute : sans elle, les useMemo (feed/KPIs) figeraient « aujourd'hui »/live/à débriefer
  // au dernier changement de données — un RDV qui se termine doit basculer tout seul.
  const [clock,setClock]=useState(()=>Date.now());
  useEffect(()=>{ const id=setInterval(()=>setClock(Date.now()),60000); return ()=>clearInterval(id); },[]);

  // ----- recaps + dernière activité en masse (la timeline n'est chargée qu'à l'ouverture d'une fiche,
  // sans ça le cockpit n'aurait NI verdict NI phrase NI vrai « sans suivi » pour les fiches jamais ouvertes) -----
  const [recaps,setRecaps]=useState(null);
  const [lastActs,setLastActs]=useState(null);
  useEffect(()=>{ let on=true;
    (async()=>{ try{
      const map={};
      for(let from=0;;from+=1000){
        const { data, error } = await SB.from('activites').select('lead_id,created_at,result,conclusion,contenu,call_kind')
          .eq('type','recap').order('created_at',{ascending:false}).order('id',{ascending:false}).range(from,from+999);
        if(error||!data||!data.length) break;
        for(const a of data){ if(a.lead_id && !map[a.lead_id]) map[a.lead_id]={type:'recap', result:a.result||null, conclusion:a.conclusion||null, text:a.contenu||'', callKind:a.call_kind||null, at:a.created_at||null}; }
        if(data.length<1000) break;
      }
      if(on) setRecaps(map);
    }catch(e){ if(on) setRecaps({}); } })();
    // dernière activité par lead (appel, note, mail… TOUS types) → vrai signal « sans suivi » :
    // un closer qui logge un NRP quotidien n'est pas « sans suivi », même sans RDV.
    (async()=>{ try{
      const map={};
      for(let from=0;;from+=1000){
        const { data, error } = await SB.from('activites').select('lead_id,created_at')
          .order('created_at',{ascending:false}).order('id',{ascending:false}).range(from,from+999);
        if(error||!data||!data.length) break;
        for(const a of data){ if(a.lead_id && !map[a.lead_id]) map[a.lead_id]=a.created_at; }
        if(data.length<1000) break;
      }
      if(on) setLastActs(map);
    }catch(e){ if(on) setLastActs({}); } })();
    return ()=>{ on=false; }; },[]);

  const all = useMemo(()=>(leads||[]).map(l=>{
    const r=recaps&&recaps[l.id], a=lastActs&&lastActs[l.id];
    return (r||a)?{...l, ...(r?{_recap:r}:null), ...(a?{_lastAct:a}:null)}:l;
  }),[leads,recaps,lastActs]);
  // roster : profils closer (même à 0 lead) ∪ propriétaires réels présents dans les leads ; le manager (userId) exclu
  const { rosterClosers, unassigned } = useMemo(()=>{
    const nameById={}; profiles.forEach(p=>{ nameById[p.id]=p.name; });
    const byKey={};
    profiles.filter(p=>p.role==='closer').forEach(p=>{ byKey[p.id]={key:p.id, name:p.name||'—', leads:[]}; });
    const un=[];
    all.forEach(l=>{
      if(!l.owner){ un.push(l); return; }
      if(l.owner===userId) return; // les leads du manager lui-même ne comptent pas comme « closer »
      // owner sans profil (closer supprimé) -> orphelin : traité comme non attribué, JAMAIS de carte UUID fantôme
      if(!Object.prototype.hasOwnProperty.call(nameById, l.owner)){ un.push(l); return; }
      if(!byKey[l.owner]) byKey[l.owner]={key:l.owner, name:nameById[l.owner]||'—', leads:[]};
      byKey[l.owner].leads.push(l);
    });
    return { rosterClosers:Object.values(byKey), unassigned:un };
  },[all,profiles,userId]);

  const ranked = useMemo(()=>rosterClosers.slice().sort((a,b)=>{
    const ca=x=>x.leads.reduce((t,l)=>t+leadStatus(l,clock).caWon,0);
    const wn=x=>x.leads.filter(l=>leadStatus(l,clock).isWon).length;
    return (ca(b)-ca(a)) || (wn(b)-wn(a)) || (b.leads.length-a.leads.length);
  }),[rosterClosers,clock]);
  const maxCa = useMemo(()=>Math.max(0,...ranked.map(c=>c.leads.reduce((t,l)=>t+leadStatus(l,clock).caWon,0))),[ranked,clock]);

  // KPIs équipe (tous les closers, hors leads du manager)
  const team = useMemo(()=>{
    const ls=ranked.flatMap(c=>c.leads);
    let rdv=0,closing=0,won=0,ca=0,noShows=0,upR1=0,upR2=0;
    ls.forEach(l=>{ const s=leadStatus(l,clock); if(s.isWon){won++;ca+=s.caWon;} else if(s.isClosing) closing++; if(s.rdvUpcoming||s.live) rdv++; upR1+=s.upR1; upR2+=s.upR2; noShows+=s.noShows; });
    return { n:ls.length, rdv, closing, won, ca, noShows, upR1, upR2 };
  },[ranked,clock]);

  // ----- feed « À traiter aujourd'hui » : ce qui exige une action MAINTENANT, tous closers confondus -----
  const [feedSel,setFeedSel]=useState(null); // null = auto (1re catégorie non vide) · 'none' = replié · sinon clé
  const feed = useMemo(()=>{
    const rows=ranked.flatMap(c=>c.leads.map(l=>({ l, closer:c.name, s:leadStatus(l,clock) })));
    const byAttn=(a,b)=>leadAttn(a.s)-leadAttn(b.s);
    return {
      today:   rows.filter(r=>r.s.live||r.s.rdvToday).sort((a,b)=>new Date((a.s.live||a.s.rdvNext).start_at)-new Date((b.s.live||b.s.rdvNext).start_at)),
      toFix:   rows.filter(r=>r.s.noShowToFix).sort(byAttn),
      debrief: rows.filter(r=>r.s.toDebrief.length>0).sort(byAttn),
      // « sans suivi » suspendu tant que le miroir CalendIQ n'a pas répondu (sinon on accuserait à tort
      // un lead dont le RDV n'est simplement pas encore chargé)
      stale:   cqPending?[]:rows.filter(r=>r.s.staleDays>=7).sort((a,b)=>b.s.staleDays-a.s.staleDays),
    };
  },[ranked,clock,cqPending]);
  const FEED_CATS=[
    {key:'today',   label:'RDV aujourd’hui',    cls:'acc',  icon:I.agenda},
    {key:'toFix',   label:'No-show à recaler',  cls:'bad',  icon:I.noshow},
    {key:'debrief', label:'RDV à débriefer',    cls:'warn', icon:I.clock},
    {key:'stale',   label:'Sans suivi 7 j+',    cls:'warn', icon:I.clock},
  ];
  const feedActive = feedSel==='none' ? null : (feedSel || (FEED_CATS.find(c=>feed[c.key].length)||{}).key || null);
  const feedTotal = FEED_CATS.reduce((t,c)=>t+feed[c.key].length,0);

  return (
    <div className="mgr-pad">
      <div className="mgr-head">
        <div><h1>Cockpit closers</h1><p>Vue manager — performance, pipeline et leads de chaque closer en un coup d’œil.</p></div>
      </div>

      <div className="mgr-kpis">
        <div className="kpi"><span className="kpi-ic">{I.leads({})}</span><div className="kpi-n">{team.n}</div><div className="kpi-l">Leads suivis</div></div>
        <div className="kpi accent"><span className="kpi-ic">{I.agenda({})}</span><div className="kpi-n">{team.upR1}</div><div className="kpi-l">R1 à venir</div></div>
        <div className="kpi accent"><span className="kpi-ic">{I.agenda({})}</span><div className="kpi-n">{team.upR2}</div><div className="kpi-l">R2 à venir</div></div>
        <div className={'kpi'+(team.noShows?' danger':'')}><span className="kpi-ic">{I.noshow({})}</span><div className="kpi-n">{team.noShows}</div><div className="kpi-l">No-show</div></div>
        <div className="kpi"><span className="kpi-ic">{I.euro({})}</span><div className="kpi-n">{team.closing}</div><div className="kpi-l">En closing</div></div>
        <div className="kpi ok"><span className="kpi-ic">{I.check({})}</span><div className="kpi-n">{team.won}</div><div className="kpi-l">Closés</div></div>
        <div className="kpi accent"><span className="kpi-ic">{I.euro({})}</span><div className="kpi-n">{eur(team.ca)}</div><div className="kpi-l">CA encaissé</div></div>
      </div>

      <div className="mgr-sec"><span className="eyebrow">À traiter aujourd’hui</span>{feedTotal>0 && <span className="mgr-count">{feedTotal}</span>}</div>
      <div className="feed-row">
        {FEED_CATS.map(c=>{ const n=feed[c.key].length; return (
          <button key={c.key} className={'feed-chip'+(n?' has '+c.cls:'')+(feedActive===c.key?' on':'')}
            onClick={()=>setFeedSel(feedActive===c.key?'none':c.key)}>
            {c.icon({})}{c.label}<b>{n}</b>
          </button>
        ); })}
      </div>
      {cqPending && <div className="feed-empty">Chargement des RDV CalendIQ…</div>}
      {feedTotal===0 && !cqPending
        ? <div className="feed-empty">Rien à traiter — tous les RDV sont suivis.</div>
        : (feedActive && feed[feedActive].length>0 && (
          <div className="feed-list">
            {feed[feedActive].map(r=><ManagerLeadRow key={r.l.id} lead={r.l} owner={r.closer} onOpenLead={onOpenLead}/>)}
          </div>
        ))}

      <div className="mgr-sec"><span className="eyebrow">Performance · classement</span><span className="mgr-count">{ranked.length}</span></div>
      <div className="lb-list">
        {ranked.length===0
          ? <div className="lb-card"><div className="lb-empty" style={{padding:'18px 16px'}}>Aucun closer pour l’instant. Clique « Inviter un closer » pour démarrer.</div></div>
          : ranked.map((c,i)=><CloserCard key={c.key} closerId={c.key} rank={i+1} name={c.name} leads={c.leads} maxCa={maxCa} clock={clock} onOpenLead={onOpenLead} onDelete={delCloser} defaultOpen={i===0&&ranked.length<=2}/>)}
      </div>

      <div className="mgr-sec"><span className="eyebrow">Accès & rôles</span><span className="mgr-count">{profiles.length}</span></div>
      <div className="lb-list">
        <div className="lb-card"><div className="lb-body" style={{borderTop:'none'}}>
          {profiles.length===0 ? <div className="lb-empty">Aucun membre.</div>
            : profiles.map(p=>(
              <div key={p.id} className="cl-lead" style={{cursor:'default'}}>
                <span style={{flex:1,fontWeight:600}}>{p.name||'—'}{p.id===userId && <em style={{color:'var(--t3)',fontWeight:500}}> (toi)</em>}</span>
                <span className={'role-badge'+(p.role==='admin'?' admin':'')}>{p.role==='admin'?'Admin':'Closer'}</span>
                {p.id!==userId && <button className="btn btn-soft" style={{padding:'5px 11px',fontSize:12}} onClick={()=>setMemberRole(p.id, p.role==='admin'?'closer':'admin', p.name)}>{p.role==='admin'?'Repasser closer':'Passer admin'}</button>}
              </div>
            ))}
        </div></div>
      </div>

      <div className="mgr-sec"><span className="eyebrow">Invitations en attente</span><span className="mgr-count">{pending.length}</span></div>
      <div className="lb-list">
        <div className="lb-card"><div className="lb-body" style={{borderTop:'none'}}>
          {pending.length===0 ? <div className="lb-empty">Aucun lien en attente. Clique « Inviter ».</div>
            : pending.map(i=>(
              <div key={i.token} className="cl-lead" style={{cursor:'default'}}>
                <span className="mono" style={{fontSize:12,color:'var(--t3)',flex:1}}>invite …{String(i.token).slice(-6)}{i.name?(' · '+i.name):''}</span>
                <span className={'role-badge'+(i.role==='admin'?' admin':'')}>{i.role==='admin'?'Admin':'Closer'}</span>
                <button className="btn btn-soft" style={{padding:'5px 11px',fontSize:12}} onClick={()=>copy(i.token)}>Copier le lien</button>
              </div>
            ))}
        </div></div>
      </div>

      <div className="mgr-sec"><span className="eyebrow">Inviter un membre</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <div className="af-seg" title="Rôle de l’invitation">
          <button className={'af-seg-b'+(inviteRole==='closer'?' on':'')} onClick={()=>setInviteRole('closer')}>Closer</button>
          <button className={'af-seg-b'+(inviteRole==='admin'?' on':'')} onClick={()=>setInviteRole('admin')}>Admin</button>
        </div>
        <button className="btn btn-accent" disabled={busy} onClick={gen}><I.plus style={{width:15,height:15}}/>Inviter {inviteRole==='admin'?'un admin':'un closer'}</button>
      </div>
    </div>
  );
}

/* ====================== CONSOLE SYNCHRO HUBSPOT (admin) ====================== */
// Page de contrôle : la fonction Edge 'hubspot-sync' calcule le diff (Sortants / Entrants / Conflits) et exécute
// les écritures. Ici on AFFICHE et on déclenche — le navigateur n'envoie que des décisions (jamais de champ brut).
const SYNC_FK = { dealstage:'Étape', colonne:'Étape', amount:'Montant', montant:'Montant', qui_paie:'Qui paie ?', qui_paie__:'Qui paie ?', saison:'Saison', quel_bootcamp_l_interesserait__:'Saison', firstname:'Prénom', prenom:'Prénom', lastname:'Nom', nom:'Nom', email:'Email', phone:'Téléphone', telephone:'Téléphone' };
const syncVal = (k,v)=> (v===null||v===undefined||v==='') ? '—' : ((k==='amount'||k==='montant') ? (v+' €') : (k==='saison' ? (SEASON_LABEL[v]||String(v)) : String(v)));
// message d'échec lisible à partir du résultat serveur (stage/error)
const failMsg = (res)=>{
  if(!res) return '';
  if(res.stale || res.stage==='concurrency') return 'Le deal a changé dans HubSpot entre-temps — clique « Rafraîchir » puis renvoie.';
  if(res.stage==='contact_conflict') return res.error || 'Email/téléphone déjà utilisé par un autre contact HubSpot.';
  if(res.stage==='pipeline_mismatch') return 'Ce deal n’est plus dans le pipeline IQ Project.';
  if(res.stage==='deal_alive') return res.error || 'Le deal existe encore dans HubSpot — rafraîchis.';
  if(res.stage==='hs_error') return res.error || 'Lecture HubSpot impossible — réessaie.';
  if(res.stage==='bad_mode') return 'Action non autorisée.';
  return res.error || 'Échec inconnu (réessaie ou rafraîchis).';
};

// cache HORS React : survit au démontage du composant -> la synchro ne se relance PAS à chaque retour sur la page.
// Le diff ne tourne qu'au 1er chargement ou via « Rafraîchir » (jamais automatiquement en changeant d'onglet).
// État partagé HORS React : data + abonnés. Le diff (lent) ne tourne qu'UNE fois ; le résultat est diffusé
// à toute instance montée via les abonnés. Naviguer pendant un chargement ne relance donc RIEN (et n'orpheline pas le résultat).
// KEYF : clé stable par item et par catégorie — MÊME schéma que push(okKeys) et le retrait optimiste. Source unique de vérité.
const CONSOLE_KEYF = {
  sortants: r=> r.mode==='lost'?'l:'+r.leadId:'s:'+r.leadId,
  acreer:   r=> 'cr:'+r.leadId,
  taches:   r=> 't:'+r.leadId+':'+r.actionId,
  entrants: r=> r.kind==='new'?'en:'+r.dealId : r.kind==='link'?'lk:'+r.dealId : 'eu:'+r.leadId,
  conflits: r=> r.kind==='dup_hs'?'cdup:'+r.dealId : r.kind==='partial'?'cpar:'+r.dealId : 'c:'+r.leadId,
  disparus: r=> 'd:'+r.leadId,
};
const CONSOLE_CACHE = { data:null, loaded:false, inflight:false, error:null, subs:new Set(), suppressed:new Set(), rerun:false };
const consoleNotify = ()=>{ CONSOLE_CACHE.subs.forEach(fn=>{ try{ fn(); }catch(e){} }); };
// Catégorie visible = diff brut MOINS les clés en suppression (items déjà traités avec succès, en attente de confirmation par un diff frais).
const consoleCat = (d, cat)=>{ const arr=(d&&d[cat])||[]; const sup=CONSOLE_CACHE.suppressed; return sup.size ? arr.filter(r=>!sup.has(CONSOLE_KEYF[cat](r))) : arr; };
// Toutes les clés présentes dans un résultat de diff (sert à purger la liste de suppression).
const consoleKeysOf = (d)=>{ const s=new Set(); if(!d) return s; for(const cat in CONSOLE_KEYF){ for(const r of (d[cat]||[])){ try{ s.add(CONSOLE_KEYF[cat](r)); }catch(e){} } } return s; };
async function consoleLoad(force){
  if(CONSOLE_CACHE.inflight){ if(force) CONSOLE_CACHE.rerun=true; return; } // un diff tourne déjà : si force -> on REJOUE après (sinon un diff stale, lancé avant l'écriture, écraserait le retrait optimiste)
  if(CONSOLE_CACHE.loaded && !force) return;     // déjà chargé -> ne relance QUE via Rafraîchir / reconciliation (force)
  CONSOLE_CACHE.inflight=true; CONSOLE_CACHE.error=null; consoleNotify();
  try{ const d=await callFn('hubspot-sync',{action:'diff'}); CONSOLE_CACHE.data=d; CONSOLE_CACHE.loaded=true;
    // PURGE : une clé supprimée ABSENTE du diff frais est confirmée partie -> on la sort de la suppression. Celle encore présente (diff stale) reste masquée.
    if(CONSOLE_CACHE.suppressed.size){ const present=consoleKeysOf(d); CONSOLE_CACHE.suppressed.forEach(k=>{ if(!present.has(k)) CONSOLE_CACHE.suppressed.delete(k); }); }
  }
  catch(e){ CONSOLE_CACHE.error=e.message||'Lecture impossible'; }
  finally{ CONSOLE_CACHE.inflight=false; const again=CONSOLE_CACHE.rerun; CONSOLE_CACHE.rerun=false; consoleNotify(); if(again) consoleLoad(true); }
}

function Console({ toast, onOpenLead, setSyncBusy, reloadLeads }){
  const [,bump]=React.useReducer(x=>x+1,0);
  const [op,setOp]=React.useState(false);        // seed / re-baseline en cours (≠ diff)
  const [tab,setTab]=React.useState('sortants');
  const [busy,setBusy]=React.useState({});      // key -> en cours
  const [colSel,setColSel]=React.useState({});   // dealId nouveau lead -> colonne choisie
  const [confl,setConfl]=React.useState({});     // leadId -> { champ: 'crm'|'hubspot' }
  const [bulk,setBulk]=React.useState(null);     // { done, total } pendant un envoi groupé
  const [noteEdits,setNoteEdits]=React.useState({}); // leadId -> texte de note édité inline (avant envoi)
  const [noteOpen,setNoteOpen]=React.useState({}); // leadId -> mode édition ouvert (sinon aperçu formaté)
  const [fails,setFails]=React.useState({});     // key -> { stage, error, stale } du dernier échec
  const oneCommit=React.useRef(false);

  // abonnement : toute mutation du cache (notify) re-rend cette instance. Désabo au démontage (pas de setState fantôme).
  React.useEffect(()=>{ CONSOLE_CACHE.subs.add(bump); return ()=>{ CONSOLE_CACHE.subs.delete(bump); }; },[]);
  // 1er montage : charge SI pas déjà chargé ni en cours. Sinon no-op -> réaffiche le cache, zéro rechargement au retour.
  React.useEffect(()=>{ consoleLoad(false); },[]);
  // si l'onglet courant est vide mais qu'un autre a des items -> on bascule auto (évite de tomber sur un onglet vide à l'ouverture)
  React.useEffect(()=>{ if(!CONSOLE_CACHE.data) return; const d=CONSOLE_CACHE.data; const c={sortants:(d.sortants||[]).length,acreer:(d.acreer||[]).length,taches:(d.taches||[]).length,entrants:(d.entrants||[]).length,conflits:(d.conflits||[]).length,disparus:(d.disparus||[]).length}; if(c[tab]===0){ const first=['sortants','acreer','taches','entrants','conflits','disparus'].find(t=>c[t]>0); if(first) setTab(first); } },[CONSOLE_CACHE.data]);

  const data=CONSOLE_CACHE.data, error=CONSOLE_CACHE.error, loading=CONSOLE_CACHE.inflight||op;
  const setData=(u)=>{ CONSOLE_CACHE.data = (typeof u==='function') ? u(CONSOLE_CACHE.data) : u; consoleNotify(); };
  const load=React.useCallback((silent)=>consoleLoad(true),[]); // Rafraîchir / reconciliation -> force un re-diff

  const doInit=async()=>{
    setOp(true); setSyncBusy(true);
    try{ const r=await callFn('hubspot-sync',{action:'seed'}); toast('Synchro initialisée',(r.seeded||0)+' leads photographiés (rien écrit dans HubSpot)','ok'); }
    catch(e){ toast('Initialisation échouée', e.message||'', 'info'); }
    finally{ setSyncBusy(false); setOp(false); await load(); }
  };
  // ré-aligne TOUTE la base de référence sur HubSpot (ex. après un changement de règles montants) — LIT HubSpot, 0 écriture HubSpot
  const doRebaseline=async()=>{
    if(!window.confirm('Ré-aligner toute la base sur HubSpot ?\n\nÇa relit HubSpot et adopte ses montants comme « Payé » dans le CRM. AUCUNE écriture dans HubSpot. Les changements non envoyés seront ré-évalués.')) return;
    setOp(true); setSyncBusy(true);
    try{ const r=await callFn('hubspot-sync',{action:'seed',force:true}); toast('Base ré-alignée',(r.seeded||0)+' leads (montants adoptés)','ok'); }
    catch(e){ toast('Échec', e.message||'', 'info'); }
    finally{ setSyncBusy(false); setOp(false); await load(); if(reloadLeads) reloadLeads(); }
  };

  // envoie une liste d'items à la fonction Edge (par paquets de 8), rafraîchit, garde les échecs visibles
  const push=React.useCallback(async(items,label)=>{
    if(!items.length) return;
    const keys=items.map(i=>i.key);
    setBusy(b=>{ const n={...b}; keys.forEach(k=>n[k]=true); return n; });
    setFails(f=>{ const n={...f}; keys.forEach(k=>delete n[k]); return n; }); // on retente -> on efface l'ancien échec
    setSyncBusy(true);
    let ok=0, fail=0; const okKeys=new Set(); const failInfo={};
    if(items.length>1) setBulk({done:0,total:items.length});
    try{
      for(let i=0;i<items.length;i+=8){
        const chunk=items.slice(i,i+8);
        const r=await callFn('hubspot-sync',{action:'push',items:chunk,confirmBulk:true});
        (r.results||[]).forEach(res=>{ if(res.ok){ ok++; if(res.key) okKeys.add(res.key); } else { fail++; if(res.key) failInfo[res.key]=res; } });
        if(items.length>1) setBulk({done:Math.min(i+chunk.length,items.length),total:items.length});
      }
    }catch(e){ toast('Envoi échoué', e.message||'', 'info'); fail+=items.length-ok-fail; }
    setBulk(null);
    setBusy(b=>{ const n={...b}; keys.forEach(k=>delete n[k]); return n; });
    if(ok) oneCommit.current=true;
    if(Object.keys(failInfo).length) setFails(f=>({...f,...failInfo})); // mémorise les échecs pour les afficher sur la ligne
    // RETRAIT OPTIMISTE ROBUSTE : les clés réussies entrent en liste de SUPPRESSION -> masquées partout IMMÉDIATEMENT et
    // un diff stale (lancé avant l'écriture) ne peut PLUS les faire réapparaître (fini le clignotement). Purge auto au diff frais.
    if(okKeys.size){ okKeys.forEach(k=>CONSOLE_CACHE.suppressed.add(k)); consoleNotify(); }
    setSyncBusy(false);
    toast(ok+' envoyé'+(ok>1?'s':'')+(fail?(' · '+fail+' échec'+(fail>1?'s':'')):''), label||null, fail?'info':'ok');
    // reconciliation en fond (ne bloque pas l'UI : les lignes sont déjà retirées)
    load(true).then(()=>{ if(reloadLeads) reloadLeads(); });
  },[load,reloadLeads,setSyncBusy,toast]);

  const sortItem = r => {
    if(r.mode==='lost') return { key:'l:'+r.leadId, mode:'lost', leadId:r.leadId, token:r.lastModified };

    return it;
  };
  // revenir à la note auto-générée (efface l'override côté serveur) — pousse vers HubSpot
  const resetNote = r => { setNoteEdits(s=>{ const n={...s}; delete n[r.leadId]; return n; }); push([{ key:'s:'+r.leadId, mode:'commit', leadId:r.leadId, token:r.lastModified, noteReset:true }],'Note revenue à l’auto'); };
  const entrItem = r => r.kind==='new'

    : { key:'eu:'+r.leadId, mode:'accept_entrant', leadId:r.leadId };
  const conflItem = r => ({ key:'c:'+r.leadId, mode:'conflict', leadId:r.leadId, conflict:(confl[r.leadId]||{}), token:r.lastModified });
  // Ignorer un conflit doublon/partiel : PERSISTANT. Marque le deal HubSpot ignoré pour ce lead -> jamais re-proposé. Masquage immédiat + écriture CRM (0 HubSpot).
  const ignoreConflit = r => { const k=CONSOLE_KEYF.conflits(r); CONSOLE_CACHE.suppressed.add(k); consoleNotify(); push([{ key:k, mode:'ignore_deal', leadId:r.leadId, dealId:r.dealId }],'Conflit ignoré — ne reviendra plus'); };
  // masquage de session seulement (pour les actions qui se résolvent toutes seules au prochain diff, ex. « Créer quand même »)

  const sortNormal=sortants.filter(r=>r.mode!=='lost'), sortLost=sortants.filter(r=>r.mode==='lost');

                      {r.fields&&r.fields.length>0 && <div className="sync-chg">{r.fields.map((f,i)=><span key={i}><span className="k">{SYNC_FK[f.k]||f.k} :</span> {syncVal(f.k,f.from)}<span className="ar">→</span>{syncVal(f.k,f.to)}</span>)}</div>}

                      <button className="btn btn-soft" disabled={!!busy[k]} onClick={()=>refuseSortant(r)} title="Garder ta version dans le CRM + celle de HubSpot dans HubSpot, ne plus reproposer (0 écriture)">{busy[k]?'…':'Refuser'}</button>
                      <button className="btn btn-accent" disabled={!!busy[k]} onClick={()=>push([sortItem(r)],'Envoyé vers HubSpot')}>{busy[k]?'…':'Envoyer'}</button>
                    </div>
                  </div>
                  {r.noteChanged && (()=>{ const base=r.note||''; const val=noteEdits[r.leadId]!==undefined?noteEdits[r.leadId]:base; const edited=noteEdits[r.leadId]!==undefined && noteEdits[r.leadId]!==base; const willDelete=edited && !val.trim(); const html=r.noteHtml||''; const editing=!!noteOpen[r.leadId]||edited||!html; return (

                          {edited && <button className="sync-note-link" onClick={()=>{ setNoteEdits(s=>{ const n={...s}; delete n[r.leadId]; return n; }); setNoteOpen(s=>{ const n={...s}; delete n[r.leadId]; return n; }); }}>Annuler mes modifs</button>}

                            : <div className="sync-note-render muted">Aperçu indisponible — clique « Modifier » pour voir/éditer le texte.</div>)}

                  {fails[k] && <div className="sync-fail">⚠️ Échec : {failMsg(fails[k])}</div>}

                      <div className="sync-act" style={{flexShrink:0}}><button className="btn btn-soft" disabled={!!busy[k]} onClick={()=>{ if(window.confirm('Marquer ce deal « Perdu » dans HubSpot ? (jamais supprimé)')) push([sortItem(r)],'Marqué Perdu'); }}>{busy[k]?'…':'Marquer Perdu'}</button></div>

        {tab==='entrants' && (

            <div className="sync-toolbar">

                <div key={k} className="syncrow" style={{display:'block'}}>

                    <div className="sync-act" style={{marginTop:12,justifyContent:'flex-end'}}>
