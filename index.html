<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Anti-cache : l'appli est un seul fichier HTML mis à jour souvent — on force le navigateur à toujours récupérer la dernière version (sinon code obsolète = RDV/automatisations qui ne chargent plus). -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Cockpit · CRM Closing IQ Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================== TOKENS ============================== */
:root{
  --page:#f7f7f8; --surface:#ffffff; --surface-2:#f7f7f8; --surface-3:#ececee;
  --b1:#ececee; --b2:#d2d2d4; --b3:#a8a8aa;
  --t1:#1d1d1e; --t2:#565658; --t3:#7a7a7c; --t4:#a8a8aa;
  --accent:#f35c04; --accent-h:#d45606; --on-accent:#ffffff;
  --accent-tint:rgba(243,92,4,.10); --accent-tint-2:rgba(243,92,4,.16);
  --hot:#f35c04; --warm:#ff9b40; --cold:#a8a8aa;
  --danger:#d4452a; --danger-tint:rgba(212,69,42,.10);
  --ok:#2e9e5b; --ok-tint:rgba(46,158,91,.12);
  --r-card:14px; --r-panel:18px; --r-pill:999px;
  --sh-card:0 1px 2px rgba(29,29,30,.06), 0 1px 3px rgba(29,29,30,.05);
  --sh-pop:0 18px 50px rgba(29,29,30,.18), 0 2px 8px rgba(29,29,30,.08);
  --sh-lift:0 8px 24px rgba(29,29,30,.12);
  --glow:0 10px 40px rgba(243,92,4,.30);
  --grad-brand:linear-gradient(96deg,#1d1d1e 0%,#1d1d1e 40%,#5a2e14 60%,#a8460c 78%,#e2580a 92%,#f86a06 100%);
  --rail:188px;
  --pad:14px;
  --speed:.22s; --ease:cubic-bezier(0.22,1,0.36,1);
}
[data-theme="dark"]{
  --page:#1d1d1e; --surface:#2c2c2e; --surface-2:#232324; --surface-3:#3a3a3c;
  --b1:rgba(255,255,255,.14); --b2:rgba(255,255,255,.20); --b3:rgba(255,255,255,.28);
  --t1:#ffffff; --t2:rgba(255,255,255,.66); --t3:rgba(255,255,255,.42); --t4:rgba(255,255,255,.30);
  --accent:#f35c04; --accent-h:#ff6f12; --on-accent:#ffffff;
  --accent-tint:rgba(243,92,4,.16); --accent-tint-2:rgba(243,92,4,.24);
  --hot:#ff7a00; --warm:#ff9b40; --cold:#7a7a7c;
  --danger:#f2685c; --danger-tint:rgba(242,104,92,.16);
  --ok:#6fcf8e; --ok-tint:rgba(111,207,142,.16);
  --sh-card:0 1px 2px rgba(0,0,0,.30), 0 1px 3px rgba(0,0,0,.25);
  --sh-pop:0 18px 50px rgba(0,0,0,.55), 0 2px 10px rgba(0,0,0,.4);
  --sh-lift:0 6px 20px rgba(0,0,0,.45);
  --glow:0 10px 40px rgba(243,92,4,.38);
}
[data-density="compact"]{ --pad:10px; }
[data-density="cozy"]{ --pad:18px; }

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:var(--page); color:var(--t1);
  font-size:14.5px; line-height:1.45; -webkit-font-smoothing:antialiased;
  letter-spacing:-.006em; overflow:hidden;
}
#root{height:100vh}
.mono{font-family:'JetBrains Mono',monospace; font-feature-settings:"tnum" 1; letter-spacing:-.01em}
h1,h2,h3,h4{font-family:'Gabarito',system-ui,sans-serif; letter-spacing:-.02em; line-height:1.08; font-weight:800}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
button:disabled{cursor:not-allowed}
input,textarea{font-family:inherit; color:inherit}
::selection{background:var(--accent-tint-2)}
:focus-visible{outline:2.5px solid var(--accent); outline-offset:2px; border-radius:6px}
::-webkit-scrollbar{height:11px; width:11px}
::-webkit-scrollbar-thumb{background:var(--b2); border-radius:99px; border:3px solid transparent; background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--b3); background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ============================== APP SHELL ============================== */
.app{display:grid; grid-template-columns:var(--rail) 1fr; height:100vh; overflow:hidden}

/* ----- nav rail ----- */
.rail{
  background:var(--surface); border-right:1px solid var(--b1);
  display:flex; flex-direction:column; padding:16px 12px; gap:3px; min-width:0;
}
.logo{display:flex; align-items:center; padding:4px 6px 18px}
.logo-img{width:100%; max-width:152px; height:auto; display:block}
[data-theme="light"] .logo-img,[data-theme="light"] .login-logo,[data-theme="light"] .onb-logo{background:#1d1d1e; border-radius:11px; padding:9px 12px; box-sizing:border-box}
.logo-mark{
  width:30px; height:30px; border-radius:9px; flex:none;
  display:grid; place-items:center;
  box-shadow:0 4px 14px rgba(255,122,0,.35);
}
.logo-txt{font-weight:800; font-size:14px; letter-spacing:-.03em}
.logo-txt span{display:block; font-size:10.5px; font-weight:500; color:var(--t3); letter-spacing:.02em}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:9px;
  color:var(--t2); font-weight:600; font-size:14px; width:100%; text-align:left;
  position:relative; transition:background var(--speed), color var(--speed);
}
.nav-item svg{width:18px; height:18px; flex:none; stroke-width:1.8}
.nav-item:hover{background:var(--surface-2); color:var(--t1)}
.nav-item.active{background:var(--accent-tint); color:var(--accent)}
.nav-item.active::before{
  content:''; position:absolute; left:-12px; top:8px; bottom:8px; width:3px;
  background:var(--accent); border-radius:0 3px 3px 0;
}
.nav-badge{margin-left:auto; font-size:11px; font-weight:700; background:var(--accent); color:var(--on-accent);
  border-radius:99px; min-width:19px; height:19px; padding:0 6px; display:grid; place-items:center}
.nav-badge.warn{background:var(--danger)}
.nav-item.soon{opacity:.4; cursor:not-allowed}
.nav-item.soon:hover{background:transparent; color:var(--t2)}
.nav-soon{margin-left:auto; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--t3); background:var(--surface-3); border-radius:6px; padding:2px 7px; opacity:0; transition:opacity var(--speed)}
.nav-item.soon:hover .nav-soon{opacity:1}
.rail-spacer{flex:1}
.rail-season{padding:10px 8px 4px; margin:6px 4px 0; border-top:1px solid var(--b1)}
.rail-season-lbl{display:flex; align-items:center; gap:6px; font-size:10.5px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px}
.rail-season-lbl svg{width:13px; height:13px}
.rail-season-dot{width:6px; height:6px; border-radius:99px; background:var(--accent); margin-left:auto}
.rail-season-sel{width:100%; padding:8px 9px; border-radius:9px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t2); font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer; transition:all var(--speed) var(--ease)}
.rail-season-sel:hover{border-color:var(--b3)}
.rail-season.on .rail-season-sel{border-color:var(--accent); color:var(--accent); background:var(--accent-tint); font-weight:700}
.rail-tools{display:flex; gap:6px; padding:0 4px 8px}
.icon-btn{
  width:34px; height:34px; border-radius:9px; display:grid; place-items:center; color:var(--t2);
  border:1px solid transparent; transition:all var(--speed);
}
.icon-btn:hover{background:var(--surface-2); color:var(--t1); border-color:var(--b1)}
.icon-btn svg{width:17px; height:17px; stroke-width:1.8}
.profile{
  display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; border:1px solid var(--b1);
  background:var(--surface-2); width:100%; text-align:left; transition:all var(--speed);
}
.profile:hover{border-color:var(--b2)}
.profile-meta{min-width:0}
.profile-meta b{font-size:13px; display:block; font-weight:700}
.profile-meta span{font-size:10.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; font-weight:600}

/* ----- avatar ----- */
.avatar{
  border-radius:9px; display:grid; place-items:center; font-weight:700; flex:none;
  font-size:12px; letter-spacing:-.02em; color:var(--accent); background:var(--accent-tint);
  border:1px solid var(--accent-tint-2);
}
.avatar.sz-sm{width:30px; height:30px; font-size:11px; border-radius:8px}
.avatar.sz-md{width:38px; height:38px}
.avatar.sz-lg{width:46px; height:46px; font-size:15px; border-radius:11px}
.avatar.muted{color:var(--t2); background:var(--surface-3); border-color:var(--b1)}

/* ----- work area ----- */
.work{min-width:0; min-height:0; display:flex; flex-direction:column; overflow:hidden; position:relative}
.screen-head{padding:20px 26px 14px; display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap}
.screen-title h1{font-size:23px}
.screen-title p{color:var(--t3); font-size:13px; margin-top:3px; font-weight:500}
.head-tools{margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.viewtog{display:inline-flex; background:var(--surface-2,rgba(127,127,127,.1)); border:1px solid var(--b1); border-radius:10px; padding:2px}
.viewtog button{border:0; background:transparent; color:var(--t3); font-size:12.5px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer}
.viewtog button.on{background:var(--accent); color:var(--on-accent)}

/* ----- inputs ----- */
.search{
  display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--b1);
  border-radius:9px; padding:8px 12px; min-width:230px; transition:border var(--speed), box-shadow var(--speed);
}
.search:focus-within{border-color:var(--b3); box-shadow:0 0 0 3px var(--accent-tint)}
.search svg{width:16px; height:16px; color:var(--t3); flex:none; stroke-width:1.9}
.search input{border:none; background:none; outline:none; width:100%; font-size:13.5px}
.search input::placeholder{color:var(--t4)}

.seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:3px; gap:2px}
.seg button{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font-size:12.5px; font-weight:600; color:var(--t2); transition:all var(--speed)}
.seg button svg{width:14px; height:14px; stroke-width:2}
.seg button.on{background:var(--surface); color:var(--t1); box-shadow:var(--sh-card)}

.btn{display:inline-flex; align-items:center; gap:8px; padding:10px 17px; border-radius:var(--r-pill); font-weight:700; font-size:13.5px; transition:all var(--speed); border:1px solid transparent}
.btn svg{width:16px; height:16px; stroke-width:2}
.btn-accent{background:var(--accent); color:var(--on-accent); box-shadow:var(--glow)}
.btn-accent:hover{background:var(--accent-h)}
.btn-ghost{background:var(--surface); border-color:var(--b1); color:var(--t1)}
.btn-ghost:hover{border-color:var(--b3); background:var(--surface-2)}
.btn-ghost.btn-danger{color:var(--danger)}
.btn-ghost.btn-danger:hover{border-color:var(--danger); background:var(--danger-tint)}
.btn-soft{background:var(--surface-2); color:var(--t1); border-color:var(--b1)}
.btn-soft:hover{background:var(--surface-3)}
.btn .dot{width:7px; height:7px; border-radius:99px; background:currentColor}
.pulse-dot{position:relative}
.pulse-dot::after{content:''; position:absolute; inset:-4px; border-radius:99px; border:1.5px solid currentColor; opacity:.6; animation:ring 1.6s ease-out infinite}
@keyframes ring{0%{transform:scale(.6); opacity:.7}100%{transform:scale(1.9); opacity:0}}

.hint{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; color:var(--t3); font-weight:500; padding:5px 11px; background:var(--surface-2); border:1px dashed var(--b2); border-radius:99px}
.hint svg{width:13px; height:13px; stroke-width:1.8}

/* ----- meta / mono labels ----- */
.eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:var(--t3)}
.src{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3)}


/* ----- badges ----- */
.tag{font-family:'JetBrains Mono',monospace; font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:3px 7px; border-radius:6px; display:inline-flex; align-items:center; gap:4px}
.tag-noshow{background:var(--danger-tint); color:var(--danger)}
.tag-saison{background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent); font-weight:800}
.tag-ok{background:var(--ok-tint); color:var(--ok)}
.tag-prefilled{background:var(--surface-3); color:var(--t2); border:1px solid var(--b1)}
.tag-wait{background:var(--accent-tint); color:var(--accent)}

/* ============================== KANBAN ============================== */
.board-wrap{flex:1; min-height:0; overflow-x:auto; overflow-y:hidden; padding:4px 26px 24px}
.board{display:flex; gap:16px; height:100%; min-height:0; width:max-content}
.col{
  width:282px; flex:none; display:flex; flex-direction:column; min-height:0;
  background:var(--surface-2); border:1px solid var(--b1); border-radius:var(--r-panel);
  transition:background var(--speed), border-color var(--speed), box-shadow var(--speed);
}
.col.drag-over{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); background:var(--accent-tint)}
.col-head{position:relative; display:flex; align-items:center; gap:8px; padding:13px 14px 10px}
.col-dot{width:8px; height:8px; border-radius:99px; background:var(--b3); flex:none}
.col-head h3,.col-name{font-size:13px; font-weight:700; letter-spacing:-.01em; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.col-name.editable{cursor:text; border-radius:6px; padding:1px 4px; margin:-1px -4px; transition:background var(--speed)}
.col-name.editable:hover{background:var(--surface)}
.col-name-inp{font-family:'Gabarito',system-ui,sans-serif; font-size:13px; font-weight:700; letter-spacing:-.01em; color:var(--t1); background:var(--surface); border:1px solid var(--accent); border-radius:7px; padding:2px 7px; width:142px; outline:none}
.col-name-inp.ghost{width:170px}
.col-count{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:1px 7px; flex:none}
.col-kebab{margin-left:auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:var(--t4); background:none; border:none; cursor:pointer; opacity:0; transition:all var(--speed)}
.col:hover .col-kebab{opacity:1}
.col-kebab:hover{background:var(--surface); color:var(--t1)}
.col-add{margin-left:auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:var(--t3)}
.col-add:hover{background:var(--surface); color:var(--t1)}
.col-add svg{width:15px; height:15px; stroke-width:2}
/* menu ⋯ de colonne (admin) */
.col-menu-ov{position:fixed; inset:0; z-index:40}
.col-menu{position:absolute; top:40px; right:8px; z-index:41; width:218px; background:var(--surface); border:1px solid var(--b1); border-radius:12px; box-shadow:var(--sh-pop); padding:7px}
.col-menu-sw{display:flex; gap:6px; padding:3px 4px 8px; border-bottom:1px solid var(--b1); margin-bottom:4px}
.col-menu-sw .sw{width:22px; height:22px; border-radius:7px; cursor:pointer; border:2px solid transparent; transition:transform var(--speed)}
.col-menu-sw .sw:hover{transform:scale(1.12)}
.col-menu-sw .sw.on{border-color:var(--t1)}
.col-menu-item{display:flex; align-items:center; gap:9px; width:100%; padding:8px 9px; border-radius:8px; font-size:13px; font-weight:600; color:var(--t1); background:none; border:none; cursor:pointer; text-align:left; transition:background var(--speed)}
.col-menu-item:hover:not(:disabled){background:var(--surface-2)}
.col-menu-item:disabled{opacity:.4; cursor:default}
.col-menu-item svg{width:15px; height:15px; color:var(--t3); flex:none}
.col-menu-item .cm-ar{width:15px; text-align:center; color:var(--t3); font-weight:800; flex:none}
.col-menu-item.danger{color:var(--danger)} .col-menu-item.danger svg{color:var(--danger)}
.col-menu-item.locked{color:var(--t3); cursor:default}
.col-menu-del{padding:6px 4px; display:flex; flex-direction:column; gap:8px}
.cm-del-tx{font-size:12.5px; font-weight:600; color:var(--t2)}
.cm-del-sel{width:100%; padding:7px 9px; border-radius:8px; border:1px solid var(--b2); background:var(--surface-2); color:var(--t1); font-size:13px; font-weight:600}
.cm-del-foot{display:flex; gap:7px; justify-content:flex-end}
.cm-del-foot .btn{padding:6px 12px; font-size:12.5px}
/* modale « Gérer les colonnes » */
.colmgr{position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:90; width:560px; max-width:94vw; max-height:86vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--b1); border-radius:18px; box-shadow:var(--sh-pop); overflow:hidden}
.colmgr-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 14px; border-bottom:1px solid var(--b1)}
.colmgr-head h3{font-size:18px; font-weight:800; margin-top:2px}
.colmgr-body{flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:6px}
.cm-row{display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; border:1px solid transparent; background:var(--surface-2); transition:border-color var(--speed),opacity var(--speed)}
.cm-row.over{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-tint)}
.cm-row.dragging{opacity:.4}
.cm-grip{cursor:grab; color:var(--t4); display:flex; flex:none} .cm-grip:active{cursor:grabbing}
.cm-sw-wrap{position:relative; flex:none}
.cm-sw{width:20px; height:20px; border-radius:6px; border:2px solid var(--surface); box-shadow:0 0 0 1px var(--b2); cursor:pointer}
.cm-sw-pop{position:absolute; top:27px; left:0; z-index:62; display:flex; gap:6px; padding:8px; background:var(--surface); border:1px solid var(--b1); border-radius:10px; box-shadow:var(--sh-pop)}
.cm-sw-pop .sw{width:22px; height:22px; border-radius:7px; cursor:pointer; border:2px solid transparent}
.cm-sw-pop .sw.on{border-color:var(--t1)}
.cm-label{flex:1; min-width:0; font-family:'Gabarito',system-ui,sans-serif; font-size:14px; font-weight:700; color:var(--t1); background:none; border:1px solid transparent; border-radius:7px; padding:5px 8px; transition:all var(--speed)}
.cm-label:hover{border-color:var(--b1)} .cm-label:focus{outline:none; border-color:var(--accent); background:var(--surface)}
.cm-count{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:2px 8px; flex:none}
.cm-lock{color:var(--t4); display:flex; flex:none; padding:5px}
.cm-del{color:var(--t4); background:none; border:none; cursor:pointer; padding:5px; border-radius:7px; flex:none; transition:all var(--speed)}
.cm-del:hover{color:var(--danger); background:var(--danger-tint)} .cm-del svg{width:15px; height:15px}
.colmgr-add{display:flex; gap:9px; padding:14px 16px; border-top:1px solid var(--b1)}
.cm-newinp{flex:1; font-size:14px; font-weight:600; color:var(--t1); background:var(--surface-2); border:1px solid var(--b2); border-radius:9px; padding:9px 12px; outline:none}
.cm-newinp:focus{border-color:var(--accent)}
.cm-confirm{position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:96; width:400px; max-width:92vw; background:var(--surface); border:1px solid var(--b1); border-radius:16px; box-shadow:var(--sh-pop); padding:22px}
.cm-confirm h4{font-size:17px; font-weight:800; margin:0 0 5px}
.cm-confirm p{color:var(--t2); font-size:13px; margin:0 0 14px}
/* sélecteur de disposition (pastille résultat de call, cliquable) */
.disp-wrap{position:relative; display:inline-flex}
.disp-chip{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; white-space:nowrap; border:none; cursor:pointer; transition:filter var(--speed)}
.disp-chip:hover{filter:brightness(1.12)}
.disp-chip .cdot{width:6px; height:6px; border-radius:99px; background:currentColor}
.disp-chip.empty{color:var(--t3); background:var(--surface-2); border:1px dashed var(--b2)}
.disp-chip.empty:hover{color:var(--t1); border-color:var(--accent)}
.disp-chip.empty svg{width:12px; height:12px}
.recap-ck{font-size:11px; font-weight:700; color:var(--t3)}
.disp-ov{position:fixed; inset:0; z-index:88}
.disp-menu{position:fixed; z-index:89; width:200px; max-height:60vh; overflow-y:auto; background:var(--surface); border:1px solid var(--b1); border-radius:11px; box-shadow:var(--sh-pop); padding:6px; display:flex; flex-direction:column; gap:2px}
.disp-item{display:flex; align-items:center; gap:9px; width:100%; padding:7px 9px; border-radius:8px; font-size:13px; font-weight:600; color:var(--t1); background:none; border:none; cursor:pointer; text-align:left; transition:background var(--speed)}
.disp-item:hover,.disp-item.on{background:var(--surface-2)}
.disp-item .disp-dot{width:9px; height:9px; border-radius:99px; flex:none}
.disp-item .disp-lbl{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis}
.disp-item .disp-check{display:inline-flex; color:var(--accent)} .disp-item .disp-check svg{width:14px; height:14px}
.disp-item.clear{color:var(--t3); border-top:1px solid var(--b1); margin-top:3px; padding-top:9px}
.disp-item.clear:hover{color:var(--danger)}
/* tuile fantôme « + Ajouter une colonne » */
.col-ghost{width:230px; background:transparent; border:1.5px dashed var(--b2); box-shadow:none; align-items:center; justify-content:center; padding:14px 10px}
.col-ghost-btn{display:inline-flex; align-items:center; gap:7px; color:var(--t3); font-weight:700; font-size:13px; padding:9px 13px; border-radius:9px; background:none; border:none; cursor:pointer; transition:all var(--speed)}
.col-ghost-btn:hover{color:var(--t1); background:var(--surface-2)}
.col-ghost-btn svg{width:15px; height:15px; stroke-width:2}
.col-body{flex:1; min-height:0; overflow-y:auto; padding:4px 10px 12px; display:flex; flex-direction:column; gap:9px}
.col-empty{margin:6px 4px; padding:18px 12px; border:1px dashed var(--b2); border-radius:10px; text-align:center; color:var(--t4); font-size:12px; font-weight:500}

.card{
  background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-card);
  padding:11px 12px; cursor:pointer; transition:transform var(--speed), box-shadow var(--speed), border-color var(--speed);
  box-shadow:var(--sh-card); position:relative;
}
.card:hover{border-color:var(--b3); box-shadow:var(--sh-lift); transform:translateY(-1px)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.35; transform:scale(.98)}
.card.drop-before::before,.card.drop-after::after{content:''; position:absolute; left:0; right:0; height:3px; background:var(--accent); border-radius:3px; box-shadow:0 0 0 3px var(--accent-tint)}
.card.drop-before::before{top:-6px}
.card.drop-after::after{bottom:-6px}
/* perf : les cartes hors écran skippent style/layout/paint (~90% des ~950 cartes) ; `auto` mémorise la taille réelle après 1er rendu */
.card{content-visibility:auto; contain-intrinsic-size:auto 100px}
/* exception OBLIGATOIRE : content-visibility implique contain:paint, qui clipperait l'indicateur de drop (::before/::after à -6px hors de la box) */
.card.dragging,.card.drop-before,.card.drop-after{content-visibility:visible}
.col-body{contain:layout style}
.card-top{display:flex; gap:10px; align-items:flex-start}
.card-id{min-width:0; flex:1}
.card-name{font-weight:700; font-size:14px; letter-spacing:-.02em; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.card-sub{display:flex; align-items:center; gap:7px; margin-top:3px}
.card-action{margin-top:10px; display:flex; align-items:center; gap:7px; font-size:12px; color:var(--t2); background:var(--surface-2); border-radius:8px; padding:6px 9px; font-weight:600}
.card-action .live{width:6px; height:6px; border-radius:99px; background:var(--accent); flex:none}
.card-action .live.idle{background:var(--b3)}
.card-action .live.today{background:var(--accent)}
.card-action .live.late{background:var(--danger)}
.card-action .live.ok{background:var(--ok)}
.card-action .ca-tx{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.card-action .ca-man{flex:none; font-size:9px; letter-spacing:.05em; text-transform:uppercase; color:var(--accent); background:var(--accent-tint); padding:1px 5px; border-radius:5px; font-weight:700}
.card-action.money{color:var(--accent)}
.card-action.paid{color:var(--ok)}
.card-action.confirmed{color:var(--ok)}
.card-action.confirmed .live{background:var(--ok)}
.card-action .amt{font-family:'JetBrains Mono',monospace; font-weight:700}
/* fiche — catégorie STATUT : badge auto-calculé, surchargeable inline (sans case à cocher) */
.statf{display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--b1); border-radius:10px; padding:10px 12px; cursor:pointer; transition:border-color .14s, box-shadow .14s}
.statf:hover{border-color:var(--accent)}
.statf-dot{width:8px; height:8px; border-radius:99px; background:var(--accent); flex:none; transition:background .2s}
.statf-dot.idle{background:var(--b3)} .statf-dot.late{background:var(--danger)} .statf-dot.ok{background:var(--ok)} .statf-dot.today{background:var(--accent)}
.statf-tx{flex:1; min-width:0; font-size:13.5px; font-weight:650; color:var(--t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.statf-amt{flex:none; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--t1)}
.statf-check{flex:none; display:flex; color:var(--ok)} .statf-check svg{width:15px; height:15px; stroke-width:2.4}
.statf.statf-money .statf-tx, .statf.statf-money .statf-amt{color:var(--accent)}
.statf.statf-paid .statf-tx, .statf.statf-paid .statf-amt{color:var(--ok)}
.statf-tag{flex:none; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; color:var(--t3)}
.statf.is-manual .statf-tag{color:var(--accent)}
.statf-pen{flex:none; display:flex; opacity:0; transition:opacity .14s; color:var(--t3)}
.statf-pen svg{width:14px; height:14px}
.statf:hover .statf-pen, .statf:focus-visible .statf-pen{opacity:1}
.statf-edit{cursor:default; gap:8px; border-color:var(--accent)}
.statf-input{flex:1; min-width:0; background:transparent; border:none; outline:none; color:var(--t1); font-size:13.5px; font-weight:650; font-family:inherit; padding:0}
.statf-ic{flex:none; display:flex; align-items:center; border:none; background:transparent; cursor:pointer; color:var(--t2); padding:2px}
.statf-ic:hover{color:var(--t1)} .statf-ic.ok{color:var(--accent)} .statf-ic svg{width:15px; height:15px}
.statf-link{margin-top:8px; background:none; border:none; padding:0; color:var(--accent); font-size:11.5px; font-weight:600; cursor:pointer}
.statf-link:hover{text-decoration:underline}
/* bannière fraîcheur sync CalendIQ (péremption visible) */
.sync-banner{display:flex; align-items:center; gap:10px; margin:0 0 14px; padding:10px 14px; border-radius:10px; background:var(--danger-tint); border:1px solid var(--danger); color:var(--danger); font-size:13px; font-weight:600}
.sync-banner-dot{width:8px; height:8px; border-radius:99px; background:var(--danger); flex:none; animation:sbpulse 1.6s ease-in-out infinite}
@keyframes sbpulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-banner-tx{flex:1; min-width:0}
.sync-banner-btn{flex:none; border:1px solid var(--danger); background:transparent; color:var(--danger); font-family:inherit; font-size:12px; font-weight:700; border-radius:8px; padding:6px 12px; cursor:pointer}
.sync-banner-btn:hover:not(:disabled){background:var(--danger); color:#fff}
.sync-banner-btn:disabled{opacity:.6; cursor:default}
/* ===== page BOOTCAMP ===== */
.bc-screen{padding:26px 30px; overflow-y:auto; height:100%}
.bc-head{display:flex; align-items:center; gap:14px; margin-bottom:18px}
.bc-head h1{font-size:22px; font-weight:800; letter-spacing:-.02em; margin:0}
.bc-season{background:var(--surface); border:1px solid var(--b1); border-radius:9px; color:var(--t1); font-family:inherit; font-size:13px; font-weight:650; padding:8px 10px; cursor:pointer}
.bc-kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:22px}
.bc-kpi{background:var(--surface); border:1px solid var(--b1); border-radius:13px; padding:13px 15px; display:flex; flex-direction:column; gap:3px; min-width:0}
.bc-kpi-n{font-size:19px; font-weight:800; letter-spacing:-.02em; color:var(--t1)}
.bc-kpi-l{font-size:11px; font-weight:650; color:var(--t3)}
.bc-kpi-sub{font-size:10.5px; color:var(--t3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.bc-kpi.ok .bc-kpi-n{color:var(--ok)} .bc-kpi.warn .bc-kpi-n{color:var(--accent)}
.bc-section{margin:18px 0 10px}
.bc-table{background:var(--surface); border:1px solid var(--b1); border-radius:14px; overflow-x:auto}
.bc-row{display:grid; grid-template-columns:minmax(140px,1.3fr) 96px 86px 86px 92px minmax(140px,1.1fr) 110px minmax(110px,.9fr) minmax(210px,1.2fr) minmax(120px,1fr) 34px; gap:8px; align-items:center; padding:9px 14px; border-bottom:1px solid var(--b1); min-width:1150px}
.bc-row>*{min-width:0} /* sans ça, un contenu long (commentaire) élargit la ligne au-delà de l'entête -> barre coupée */
.bc-row:last-child{border-bottom:none}
.bc-hrow{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--t3); background:var(--surface-2)}
.bc-prow{grid-template-columns:minmax(160px,1.2fr) minmax(220px,1.6fr) minmax(160px,1.2fr) 200px 34px}
.bc-name{background:none; border:none; padding:0; text-align:left; font-family:inherit; font-size:13px; font-weight:700; color:var(--t1); cursor:pointer}
.bc-name:hover{color:var(--accent)}
.bc-cell{background:none; border:none; padding:2px 4px; border-radius:6px; text-align:left; font-family:inherit; font-size:12.5px; color:var(--t1); cursor:pointer; min-height:22px}
.bc-cell:hover{background:var(--surface-2)}
.bc-tx{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%}
.bc-ph{color:var(--t3); font-weight:500}
.bc-in{width:100%; background:var(--bg); border:1px solid var(--accent); border-radius:6px; color:var(--t1); font-family:inherit; font-size:12.5px; padding:3px 6px; outline:none}
/* popover d'édition de texte (façon cellule de tableur : texte entier visible) */
.bc-pop-ov{position:fixed; inset:0; z-index:119}
.bc-pop{position:fixed; z-index:120; background:var(--surface); border:1.5px solid var(--accent); border-radius:10px; padding:9px 12px; color:var(--t1); font-family:inherit; font-size:12.5px; line-height:1.5; box-shadow:0 16px 40px rgba(0,0,0,.45); resize:none; outline:none; overflow-y:auto}
.bc-statut,.bc-sel{background:var(--surface-2); border:1px solid var(--b1); border-radius:7px; color:var(--t1); font-family:inherit; font-size:12px; font-weight:650; padding:4px 6px; cursor:pointer; max-width:100%}
.bc-reste{font-size:12.5px; font-weight:700}
.bc-reste.due{color:var(--accent)} .bc-reste.ok{color:var(--ok)}
.bc-fin{display:flex; flex-direction:column; gap:3px; min-width:0}
.bc-orig{display:flex; gap:4px}
.bc-onb{display:flex; gap:4px; flex-wrap:wrap}
.bc-onb-chip{background:none; border:1px solid var(--b1); border-radius:6px; color:var(--t3); font-family:inherit; font-size:10.5px; font-weight:650; padding:3px 6px; cursor:pointer; transition:all var(--speed); white-space:nowrap}
.bc-onb-chip:hover{color:var(--t1); border-color:var(--b2)}
.bc-onb-chip.on{color:var(--ok); border-color:color-mix(in srgb, var(--ok) 55%, transparent); background:var(--ok-tint)}
.bc-del{background:none; border:none; color:var(--t3); cursor:pointer; padding:4px; border-radius:6px; display:flex}
.bc-del:hover{color:var(--danger); background:var(--danger-tint)}
.bc-del svg{width:14px; height:14px}
.bc-empty{padding:16px; font-size:12.5px; color:var(--t3)}
.bc-crmstate{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--t2); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.bc-crmstate .live{width:6px; height:6px; border-radius:99px; background:var(--b3); flex:none}
.bc-crmstate .live.today{background:var(--accent)} .bc-crmstate .live.late{background:var(--danger)} .bc-crmstate .live.ok{background:var(--ok)}
.bc-promote{font-size:11.5px; padding:6px 10px}
.bc-results{display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto}
.bc-result{display:flex; flex-direction:column; gap:2px; text-align:left; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:9px 12px; cursor:pointer; font-family:inherit; color:var(--t1); transition:border-color var(--speed)}
.bc-result:hover{border-color:var(--accent)}
.bc-result b{font-size:13px} .bc-result span{font-size:11.5px; color:var(--t3)}
/* bloc bootcamp de la fiche */
.bc-fiche-row{display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--b1); flex-wrap:wrap}
.bc-fiche-row:last-of-type{border-bottom:none}
.bc-fiche-chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700}
.bc-fiche-chip .cdot{width:6px; height:6px; border-radius:99px; background:currentColor}
.bc-fiche-sub{font-size:11.5px; color:var(--t3)}
.bc-fiche-add{display:flex; gap:8px; align-items:center; margin-top:8px}

/* ============================== FICHE ============================== */
.fiche{flex:1; min-height:0; overflow-y:auto; padding:0 26px 30px}
.fiche-head{display:flex; align-items:center; gap:16px; padding:18px 0 16px; flex-wrap:wrap; border-bottom:1px solid var(--b1); margin-bottom:18px}
.back{display:inline-flex; align-items:center; gap:6px; color:var(--t2); font-weight:600; font-size:13px; padding:6px 10px; border-radius:8px}
.back:hover{background:var(--surface-2); color:var(--t1)}
.back svg{width:15px; height:15px; stroke-width:2}
.fiche-id h1{font-size:22px; display:flex; align-items:center; gap:9px}
/* édition inline du nom (titre fiche) */
.name-h1 .name-txt{cursor:text; border-radius:7px; padding:1px 3px; margin:-1px -3px; transition:background var(--speed)}
.name-h1 .name-txt:hover{background:var(--surface-2)}
.name-edit-btn{display:inline-flex; align-items:center; justify-content:center; background:none; border:none; padding:4px; cursor:pointer; color:var(--t4); border-radius:6px; opacity:0; transition:all var(--speed)}
.name-h1:hover .name-edit-btn{opacity:1}
.name-edit-btn:hover{color:var(--accent); background:var(--surface-2)}
.name-edit-btn svg{width:15px; height:15px; color:inherit}
.name-add{display:inline-flex; align-items:center; gap:8px; cursor:pointer; color:var(--t3); font-weight:700; font-size:18px; transition:color var(--speed)}
.name-add:hover{color:var(--t1)}
.name-add svg{width:16px; height:16px}
.name-edit{display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap}
.name-inp{font-family:'Gabarito',system-ui,sans-serif; font-weight:800; font-size:22px; letter-spacing:-.02em; line-height:1.08; color:var(--t1); background:var(--surface-2); border:1px solid var(--b2); border-radius:9px; padding:3px 10px; min-width:5ch; max-width:42vw; transition:border-color var(--speed),background var(--speed)}
.name-inp:focus{outline:none; border-color:var(--accent); background:var(--surface)}
.name-inp::placeholder{color:var(--t4); font-weight:700}
.name-save{display:inline-flex; align-items:center; justify-content:center; background:var(--accent); color:var(--on-accent); border:none; padding:6px; cursor:pointer; border-radius:8px; transition:background var(--speed)}
.name-save:hover{background:var(--accent-h)}
.name-save svg{width:16px; height:16px; stroke-width:2.4}
.fiche-contacts{display:flex; align-items:center; gap:14px; margin-top:6px; flex-wrap:wrap}
.contact{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--t2); font-weight:500}
.contact svg{width:14px; height:14px; stroke-width:1.9; color:var(--t3)}
.contact.phone{cursor:pointer; color:var(--t1)}
.contact.phone:hover{color:var(--accent)}
.contact.phone:hover svg{color:var(--accent)}
.contact .mono{color:var(--t1); font-weight:500}
.status-pill{margin-left:auto; display:inline-flex; align-items:center; gap:7px; padding:7px 13px; border-radius:99px; background:var(--surface-2); border:1px solid var(--b1); font-weight:700; font-size:12.5px}
.status-pill .sdot{width:8px; height:8px; border-radius:99px}

.fiche-grid{display:grid; grid-template-columns:1fr 1.15fr .9fr; gap:16px; align-items:start}
@media(max-width:1180px){.fiche-grid{grid-template-columns:1fr 1fr}}
.panel{background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-panel); overflow:hidden}
.panel-head{display:flex; align-items:center; justify-content:space-between; gap:8px; min-height:55px; box-sizing:border-box; padding:10px 16px; border-bottom:1px solid var(--b1); background:var(--surface-2)}
.panel-head .eyebrow{font-size:10.5px}
.panel-head .btn-soft{background:var(--surface); border-color:var(--b2)}
.panel-head .btn-soft:hover{background:var(--surface-3); border-color:var(--b3)}
.panel-body{padding:6px 16px 16px}

.field{padding:13px 0; border-bottom:1px solid var(--b1)}
.field:last-child{border-bottom:none}
.field .eyebrow{display:block; margin-bottom:5px}
.field .val{font-size:15px; font-weight:600}
.field .val-sub{font-size:12.5px; color:var(--t3); margin-top:3px; font-weight:500}
.todo-line{display:flex; align-items:center; gap:9px; font-size:13px; color:var(--t2); padding:4px 0; font-weight:500}
.todo-dot{width:13px; height:13px; border-radius:5px; border:1.5px solid var(--b3); flex:none}
.field .val.big{font-size:21px; font-weight:800; letter-spacing:-.03em}
.field .val.mono{font-family:'JetBrains Mono',monospace}
.field .val .unit{font-size:13px; color:var(--t3); font-weight:600; margin-left:5px}
/* catégorie Action (panneau Situation) — action éditable + case « réalisée » */
.action-row{display:flex; align-items:center; gap:11px; padding:2px 0}
.action-box{flex:none; width:20px; height:20px; border-radius:6px; border:2px solid var(--b3); display:grid; place-items:center; cursor:pointer; transition:all var(--speed)}
.action-box svg{width:12px; height:12px; stroke-width:3.2; color:var(--on-accent); opacity:0; transform:scale(.5); transition:all var(--speed)}
.action-box:hover{border-color:var(--accent)}
.action-row.done .action-box{background:var(--accent); border-color:var(--accent)}
.action-row.done .action-box svg{opacity:1; transform:scale(1)}
.action-tx{flex:1; min-width:0; font-size:14px; font-weight:600; color:var(--t1); line-height:1.4; cursor:pointer; padding:3px 6px; margin:-3px -6px; border-radius:6px; transition:background var(--speed)}
.action-tx:hover{background:var(--surface-2)}
.action-row.done .action-tx{color:var(--t3); text-decoration:line-through}
.action-edit{flex:1; min-width:0; background:var(--surface); border:1px solid var(--accent); border-radius:7px; padding:5px 9px; color:var(--t1); font-size:14px; font-weight:600; font-family:inherit; outline:none}
.action-edit-li{flex:1; min-width:0; background:none; border:1px solid transparent; border-radius:7px; padding:5px 6px; margin:-1px -6px; color:var(--t1); font-size:14px; font-weight:600; font-family:inherit; outline:none; transition:border-color var(--speed)}
.action-edit-li::placeholder{color:var(--t4)}
.action-edit-li:hover{border-color:var(--b1)}
.action-edit-li:focus{border-color:var(--accent); background:var(--surface)}
.action-row.done .action-edit-li{color:var(--t3); text-decoration:line-through}
.action-del{flex:none; width:22px; height:22px; border-radius:6px; display:grid; place-items:center; color:var(--t4); cursor:pointer; background:none; opacity:0; transition:all var(--speed)}
.action-row:hover .action-del{opacity:1}
.action-del:hover{color:var(--danger); background:var(--surface-2)}
.action-del svg{width:13px; height:13px}
.action-add{margin-top:6px; font-size:12.5px; color:var(--accent); background:none; cursor:pointer; font-weight:600; padding:4px 2px}
.action-add:hover{text-decoration:underline}
.action-add:disabled{color:var(--t3); cursor:not-allowed; text-decoration:none; opacity:.7}
/* cartes action (format rectangle, comme les notes Historique) */
.actlist{display:flex; flex-direction:column; gap:8px}
.actcard{display:flex; align-items:flex-start; gap:10px; padding:9px 11px; border:1px solid var(--b1); border-radius:10px; background:var(--surface-2); transition:border-color var(--speed)}
.actcard:hover{border-color:var(--b3)}
.actcard.done{opacity:.6}
.actcard.done .actcard-tx{text-decoration:line-through; color:var(--t3)}
.actcard-box{width:22px; height:22px; flex:none; margin-top:1px; border-radius:7px; border:1.8px solid var(--b3); display:grid; place-items:center; color:transparent; cursor:pointer; transition:background var(--speed),border-color var(--speed)}
.actcard-box svg{width:13px; height:13px; stroke-width:3}
.actcard:hover .actcard-box{border-color:var(--accent)}
.actcard.done .actcard-box{background:var(--accent); border-color:var(--accent); color:var(--on-accent)}
.actcard-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; cursor:text; padding-top:2px}
.actcard-tx{font-size:13.5px; font-weight:600; color:var(--t1); line-height:1.45; overflow-wrap:anywhere; white-space:pre-wrap}
.actcard-due{display:inline-flex; align-items:center; gap:5px; align-self:flex-start; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-tint); border-radius:999px; padding:3px 5px 3px 8px; letter-spacing:.01em}
.actcard-due svg{width:12px; height:12px}
.actcard-due-x{display:grid; place-items:center; width:15px; height:15px; border-radius:50%; background:none; border:none; color:var(--accent); cursor:pointer; opacity:.6; padding:0; transition:opacity var(--speed),background var(--speed)}
.actcard-due-x:hover{opacity:1; background:rgba(0,0,0,.18)}
.actcard-due-x svg{width:10px; height:10px; stroke-width:2.6}
.actcard-tools{display:flex; align-items:center; gap:2px; flex:none}
.actcard-btn{position:relative; width:26px; height:26px; flex:none; border-radius:7px; display:grid; place-items:center; color:var(--t3); background:none; border:none; cursor:pointer; opacity:0; transition:opacity var(--speed),color var(--speed),background var(--speed)}
.actcard:hover .actcard-tools .actcard-btn{opacity:1}
.actcard-btn:hover{color:var(--t1); background:var(--surface)}
.actcard-btn.del:hover{color:var(--danger)}
.actcard-btn svg{width:14px; height:14px; stroke-width:2}
.actcard-btn.cal input{position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:pointer; color-scheme:dark}
/* mode édition : textarea auto-extensible (tout le texte reste visible) */
.actcard.editing{align-items:flex-end; padding:8px 9px; gap:7px}
.actcard-input{flex:1; min-width:0; background:var(--surface); border:1.5px solid var(--accent); border-radius:8px; padding:8px 10px; color:var(--t1); font-size:13.5px; font-weight:600; line-height:1.45; font-family:inherit; outline:none; resize:none; overflow-y:auto; box-sizing:border-box; min-height:36px; max-height:200px}
.actcard-editbtns{display:flex; gap:4px; flex:none}
.actcard.editing .actcard-btn{opacity:1}
.actcard-btn.ok{color:var(--accent)}
/* ===== PAGE À FAIRE ===== */
/* ===== PAGE À FAIRE — 1 carte = 1 lead ; urgence = barre gauche de LIGNE + échéance teintée ; domaine = pastille ===== */

/* barre d'outils : stats chiffrées + bouton Filtres (saison + groupement) */
.af-bar{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:6px 0 16px}
.af-stats{display:flex; align-items:center; gap:16px; flex-wrap:wrap}
.af-stat{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--t2)}
.af-stat i{width:9px; height:9px; border-radius:50%; flex:none}
.af-stat.late{color:var(--danger)} .af-stat.late i{background:var(--danger)}
.af-stat.today{color:var(--accent)} .af-stat.today i{background:var(--accent)}
.af-stat.rdv{color:var(--t2)} .af-stat.rdv svg{width:15px; height:15px; color:var(--accent)}
.af-stat.sub{color:var(--t3); font-weight:600}
.af-seg{display:inline-flex; align-items:center; gap:2px; background:var(--surface-2); border:1px solid var(--b1); border-radius:10px; padding:3px}
.af-seg-b{padding:6px 13px; border-radius:8px; border:none; background:none; color:var(--t2); font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:all var(--speed) var(--ease)}
.af-seg-b:hover{color:var(--t1)}
.af-seg-b.on{background:var(--surface); color:var(--accent); box-shadow:var(--sh-card)}

/* bouton Filtres + panneau (saison + grouper par) */
.af-tools{position:relative}
.af-filter-btn{display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:10px; border:1px solid var(--b1); background:var(--surface); color:var(--t2); font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:all var(--speed) var(--ease)}
.af-filter-btn svg{width:14px; height:14px}
.af-filter-btn:hover{border-color:var(--b3); color:var(--t1)}
.af-filter-btn.on,.af-filter-btn.has{border-color:var(--accent); color:var(--accent)}
.af-filter-dot{width:6px; height:6px; border-radius:99px; background:var(--accent)}
.af-panel-bk{position:fixed; inset:0; z-index:40}
.af-panel{position:absolute; top:calc(100% + 8px); left:0; z-index:41; min-width:300px; background:var(--surface); border:1px solid var(--b2); border-radius:13px; box-shadow:var(--sh-lift); padding:13px 14px; display:flex; flex-direction:column; gap:12px}
.af-panel-row{display:flex; flex-direction:column; gap:6px}
.af-panel-lbl{font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--t3)}
.af-panel-sel{width:100%; padding:8px 10px; border-radius:9px; border:1.5px solid var(--b1); background:var(--surface-2); color:var(--t1); font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer}
.af-panel-sel:hover{border-color:var(--b3)}
/* total leads (barre du haut, à gauche du bouton Filtres) */
.af-total{font-size:13px; font-weight:700; color:var(--t3); font-variant-numeric:tabular-nums}
/* chips de filtre = stats cliquables (point + nombre + label). ÉTEINT = gris plat. ALLUMÉ = pastille pleine de sa couleur (état évident). */
.af-fchips{display:flex; flex-wrap:wrap; gap:7px}
.af-fchip{display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border-radius:10px; border:1.5px solid var(--b1); background:var(--surface-2); cursor:pointer; font-family:inherit; transition:all var(--speed) var(--ease)}
.af-fchip .af-fchip-dot{width:8px; height:8px; border-radius:50%; background:var(--b3); flex:none; transition:background var(--speed) var(--ease)}
.af-fchip b{font-size:13.5px; font-weight:800; color:var(--t3); font-variant-numeric:tabular-nums; line-height:1}
.af-fchip span{font-size:12px; font-weight:700; color:var(--t3)}
.af-fchip:hover{border-color:var(--b3); background:var(--surface-3)}
.af-fchip.on{border-color:var(--fc); background:color-mix(in srgb, var(--fc) 16%, var(--surface)); box-shadow:inset 0 0 0 1px var(--fc)}
.af-fchip.on .af-fchip-dot{background:var(--fc)}
.af-fchip.on b, .af-fchip.on span{color:var(--fc)}
/* "Tout" : pas de point, couleur accent */
.af-fchip-all{--fc:var(--accent)}

/* en-tête de section agrégée (urgence OU domaine) : pastille + compteur + ligne. Cliquable = repli/dépli (menu déroulant). */
.af-sec{display:flex; align-items:center; gap:9px; margin:22px 0 10px}
.af-sec:first-of-type{margin-top:6px}
.af-sec-btn{cursor:pointer; user-select:none; outline:none}
.af-sec-chev{display:inline-flex; align-items:center; color:var(--sc); opacity:.65; transform:rotate(90deg); transition:transform var(--speed) var(--ease), opacity var(--speed) var(--ease)}
.af-sec-chev svg{width:13px; height:13px; stroke-width:2.6}
.af-sec-btn:hover .af-sec-chev{opacity:1}
.af-sec.af-col .af-sec-chev{transform:rotate(0deg)}
.af-sec-dot{width:8px; height:8px; border-radius:50%; background:var(--sc); flex:none; box-shadow:0 0 0 3px color-mix(in srgb, var(--sc) 18%, transparent)}
.af-sec-t{font-size:11.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--sc)}
.af-sec-n{background:var(--surface-3); color:var(--t2); border-radius:20px; padding:1px 9px; font-size:11px; font-weight:700}
.af-sec-ln{flex:1; height:1px; background:var(--b1)}

/* ---- CARTE = 1 LEAD : neutre (AUCUN bord coloré — la couleur d'urgence vit sur les LIGNES) ---- */
.af-card{background:var(--surface); border:1px solid var(--b1); border-radius:var(--r-card); margin-bottom:11px; overflow:hidden; transition:border-color var(--speed) var(--ease), box-shadow var(--speed) var(--ease)}
.af-card:hover{border-color:var(--b3); box-shadow:var(--sh-card)}

/* en-tête de carte : identité lead affichée UNE seule fois */
.af-head{display:flex; align-items:center; gap:11px; padding:calc(var(--pad) - 1px) 14px; cursor:pointer; border-bottom:1px solid var(--b1); transition:background var(--speed) var(--ease)}
.af-head:hover{background:var(--surface-2)}
.af-head:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.af-id{flex:1; min-width:0}
.af-id b{display:block; font-family:'Gabarito',sans-serif; font-size:15px; font-weight:800; letter-spacing:-.01em; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.af-sub{display:flex; align-items:center; gap:7px; margin-top:2px; min-width:0}
.af-cdot{width:7px; height:7px; border-radius:50%; flex:none}
.af-col{font-size:11.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0}
.af-amt{font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; font-size:11.5px; font-weight:600; font-style:normal; color:var(--t3); flex:none; margin-left:1px}
.af-star{flex:none; display:grid; place-items:center; width:30px; height:30px; border-radius:8px; border:none; background:none; color:var(--t3); cursor:pointer; transition:color var(--speed) var(--ease), background var(--speed) var(--ease)}
.af-star:hover{color:var(--warm); background:var(--surface-2)}
.af-star.on{color:#f5a623}
.af-closer{flex:none; background:var(--surface-2); border:1px solid var(--b1); color:var(--t2); border-radius:8px; padding:5px 8px; font-size:12px; max-width:128px; font-family:inherit; cursor:pointer; transition:border-color var(--speed) var(--ease)}
.af-closer:hover{border-color:var(--b3)}
.af-go{flex:none; color:var(--t4); display:grid; place-items:center; width:16px; transition:color var(--speed) var(--ease), transform var(--speed) var(--ease)}
.af-go svg{width:15px; height:15px}
.af-head:hover .af-go{color:var(--accent); transform:translateX(2px)}

/* ---- LIGNE = 1 action/RDV ; colonnes à position FIXE pour scan vertical ; border-left = urgence de la ligne ---- */
.af-rows{display:flex; flex-direction:column}
.af-row{display:flex; align-items:center; gap:11px; padding:9px 14px 9px 11px; cursor:pointer; border-left:3px solid var(--uc); border-top:1px solid color-mix(in srgb, var(--b1) 60%, transparent); transition:background var(--speed) var(--ease)}
.af-row:first-child{border-top:none}
.af-row:hover{background:var(--surface-2)}
.af-row:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.af-row[data-urg="later"],.af-row[data-urg="none"]{border-left-color:transparent}

/* checkbox bidirectionnelle (mute le même état que la fiche) / marqueur RDV */
.af-chk{width:20px; height:20px; border-radius:6px; border:2px solid var(--b2); display:grid; place-items:center; flex:none; color:transparent; cursor:pointer; transition:all var(--speed) var(--ease)}
.af-chk:hover{border-color:var(--accent); color:var(--accent); background:var(--accent-tint)}
.af-chk:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.af-chk svg{width:13px; height:13px; stroke-width:2.8}
.af-rdvic{width:20px; height:20px; border-radius:6px; display:grid; place-items:center; flex:none; color:var(--accent); background:var(--accent-tint)}
.af-rdvic svg{width:13px; height:13px}

.af-label{flex:1; min-width:0; font-size:13.5px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.35}

/* CANAL 3 — DOMAINE = pastille catégorielle (tint désaturé + icône), 1 max/ligne, position fixe à droite */
.af-dom{display:inline-flex; align-items:center; gap:5px; flex:none; font-size:11px; font-weight:700; padding:3px 9px; border-radius:var(--r-pill); color:var(--t2); background:var(--surface-3)}
.af-dom svg{width:13px; height:13px}
.af-dom em{font-style:normal; letter-spacing:-.01em}
.af-dom.rdv{color:var(--accent); background:var(--accent-tint)}
.af-dom.argent{color:var(--ok); background:var(--ok-tint)}
.af-dom.appel{color:var(--warm); background:color-mix(in srgb, var(--warm) 14%, transparent)}
.af-dom.admin{color:var(--t2); background:var(--surface-3)}
.af-dom.suivi{color:var(--t2); background:color-mix(in srgb, var(--t3) 12%, transparent)}

/* bouton Rejoindre (RDV) */
.af-meet{display:inline-flex; align-items:center; gap:5px; flex:none; font-size:11.5px; font-weight:700; color:var(--accent); background:var(--accent-tint); padding:5px 9px; border-radius:8px; text-decoration:none; transition:background var(--speed) var(--ease)}
.af-meet:hover{background:var(--accent-tint-2)}
.af-meet svg{width:13px; height:13px}

/* date : label court teinté par l'urgence, aligné flush-right en colonne scannable */
.af-due{font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; font-size:11.5px; font-weight:600; color:var(--t3); width:96px; text-align:right; flex:none; white-space:nowrap}
.af-due.late{color:var(--danger); font-weight:800}
.af-due.today{color:var(--accent); font-weight:700}
.af-due.week{color:var(--warm); font-weight:700}

/* repli « +N autres » par carte (cap la hauteur des leads chargés) */
.af-more{display:block; width:100%; text-align:left; padding:8px 14px; border:none; border-top:1px solid var(--b1); background:var(--surface-2); color:var(--t2); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:color var(--speed) var(--ease)}
.af-more:hover{color:var(--accent)}
/* masquer / démasquer une action (page « À faire ») */
.af-hide{flex:none; display:grid; place-items:center; width:26px; height:26px; border-radius:7px; border:none; background:none; color:var(--t4); cursor:pointer; opacity:0; transition:all var(--speed) var(--ease)}
.af-hide svg{width:15px; height:15px}
.af-row:hover .af-hide{opacity:1}
.af-hide:hover{color:var(--accent); background:var(--surface-3)}
.af-hide:focus-visible{opacity:1; outline:2px solid var(--accent); outline-offset:-2px}
.af-unhide{flex:none; display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:8px; border:1px solid var(--accent); background:var(--accent-tint); color:var(--accent); font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:all var(--speed) var(--ease)}
.af-unhide svg{width:13px; height:13px; stroke-width:2.8}
.af-unhide:hover{background:var(--accent); color:#fff}
.af-rdvic.muted{color:var(--t4); background:var(--surface-3)}
.af-hidden-btn.on{border-color:var(--accent); color:var(--accent); background:var(--accent-tint)}
.af-hidden-n{display:inline-grid; place-items:center; min-width:18px; height:18px; padding:0 5px; border-radius:9px; background:var(--surface-3); color:var(--t2); font-size:11px; font-weight:800; font-variant-numeric:tabular-nums}
.af-hidden-btn.on .af-hidden-n{background:var(--accent); color:#fff}
.af-mode-tag{display:inline-flex; align-items:center; gap:5px; margin-left:10px; padding:3px 9px; border-radius:var(--r-pill); background:var(--accent-tint); color:var(--accent); font-size:12px; font-weight:700; vertical-align:middle}
.af-mode-tag svg{width:13px; height:13px}

/* densité compacte : icône seule pour domaine + resserrement */
[data-density="compact"] .af-dom em{display:none}
[data-density="compact"] .af-dom{padding:3px 7px}
[data-density="compact"] .af-row{padding-top:7px; padding-bottom:7px}
[data-density="compact"] .af-due{width:80px}

/* responsive étroit : domaine en icône seule, meet en icône, owner court */
@media(max-width:760px){
  .af-dom em{display:none}
  .af-meet span{display:none}
  .af-due{width:70px}
  .af-closer{max-width:104px}
}

.todo-filters{display:flex; gap:7px; flex-wrap:wrap}
.todo-chip{padding:7px 14px; border-radius:9px; border:1px solid var(--b1); background:var(--surface); color:var(--t2); font-size:13px; font-weight:600; cursor:pointer; transition:all var(--speed)}
.todo-chip:hover{border-color:var(--b3)}
.todo-chip.on{background:var(--accent); border-color:var(--accent); color:#fff}
.todo-sec{display:flex; align-items:center; gap:10px; margin:20px 0 9px; font-size:11.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--t3)}
.todo-sec.late{color:var(--danger)}
.todo-sec .n{background:var(--b1); color:var(--t2); border-radius:20px; padding:1px 9px; font-size:11px}
.todo-sec .ln{flex:1; height:1px; background:var(--b1)}
.todo-row{display:flex; align-items:center; gap:13px; padding:12px 15px; background:var(--surface); border:1px solid var(--b1); border-radius:13px; margin-bottom:8px; cursor:pointer; transition:border-color var(--speed)}
.todo-row:hover{border-color:var(--b3)}
.todo-row.rel{border-left:3px solid var(--danger)}
.todo-chk{width:22px; height:22px; border-radius:7px; border:2px solid var(--b2); display:grid; place-items:center; flex:none; color:transparent; transition:all var(--speed)}
.todo-chk:hover{border-color:var(--accent); color:var(--accent)}
.todo-chk svg{width:14px; height:14px; stroke-width:2.4}
.todo-ic{width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:15px; flex:none; background:var(--surface-2)}
.todo-main{flex:1; min-width:0}
.todo-main b{display:block; font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.todo-main span{font-size:12.5px; color:var(--t2)}
.todo-meet{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--accent); background:var(--accent-tint); padding:5px 9px; border-radius:8px; flex:none; text-decoration:none}
.todo-meet svg{width:14px; height:14px}
.todo-closer{flex:none; background:var(--surface-2); border:1px solid var(--b1); color:var(--t2); border-radius:8px; padding:5px 8px; font-size:12px; max-width:130px; font-family:inherit; cursor:pointer}
.todo-due{font-size:12.5px; color:var(--t3); width:78px; text-align:right; flex:none}
.todo-due.late{color:var(--danger); font-weight:700}
.todo-due.today{color:var(--accent); font-weight:700}
.todo-go{color:var(--t3); flex:none; width:16px; text-align:center}
/* Parcours — historique des étapes du lead */
.parcours{padding:14px 0 2px; border-top:1px solid var(--b1); margin-top:14px}
.parcours .eyebrow{display:block; margin-bottom:9px}
.parcours-list{display:flex; flex-direction:column; gap:7px}
.parcours-step{display:flex; align-items:center; gap:10px}
.parcours-dot{flex:none; width:8px; height:8px; border-radius:50%; background:var(--accent)}
.parcours-lbl{flex:1; min-width:0; font-size:13px; font-weight:600; color:var(--t1)}
.parcours-when{font-size:11.5px; color:var(--t3); font-weight:500; white-space:nowrap}
.parcours-step.current .parcours-lbl{color:var(--accent); font-weight:700}
.parcours-step.current .parcours-dot{box-shadow:0 0 0 3px var(--accent-tint)}
/* Appropriation du lead par le closer */
.claim{display:flex; align-items:center; gap:11px; cursor:pointer; padding:7px 9px; margin:0 -9px; border-radius:9px; border:1px solid transparent; transition:all var(--speed)}
.claim:hover{background:var(--surface-2); border-color:var(--b1)}
.claim-box{flex:none; width:20px; height:20px; border-radius:6px; border:2px solid var(--b3); display:grid; place-items:center; color:transparent; transition:all var(--speed)}
.claim:hover .claim-box{border-color:var(--accent)}
.claim-box.on{background:var(--accent); border-color:var(--accent); color:#fff}
.claim-box svg{width:13px; height:13px; stroke-width:3}
.claim-tx{display:flex; flex-direction:column; line-height:1.3}
.claim-tx b{font-size:14px; font-weight:600; color:var(--t1)}
.claim-tx span{font-size:11.5px; color:var(--t3); font-weight:500}
.claim.done .claim-tx b{color:var(--accent)}
.claim.other{cursor:default}
.claim.other:hover{background:none; border-color:transparent}
.claim.other .claim-box.on{background:var(--t3); border-color:var(--t3)}
.claim.other .claim-tx b{color:var(--t2)}
/* Rendez-vous (saisie manuelle) */
.rdv-set{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
.rdv-badge{flex:none; font-size:11px; font-weight:800; letter-spacing:.04em; color:#fff; background:var(--accent); border-radius:6px; padding:3px 8px}
.rdv-when{font-size:14px; font-weight:600; color:var(--t1)}
.rdv-link{font-size:12px; color:var(--t3); background:none; cursor:pointer; font-weight:600; padding:2px}
.rdv-link:hover{color:var(--accent); text-decoration:underline}
.rdv-link.del:hover{color:var(--danger)}
.rdv-edit{display:flex; flex-direction:column; gap:9px}
.rdv-types{display:inline-flex; gap:6px}
.rdv-types button{flex:1; padding:7px 0; border-radius:8px; border:1.5px solid var(--b2); background:var(--surface); color:var(--t2); font-weight:700; font-size:13px; cursor:pointer; transition:all var(--speed)}
.rdv-types button.on{border-color:var(--accent); background:var(--accent); color:#fff}
.rdv-input{width:100%; box-sizing:border-box; background:var(--surface); border:1.5px solid var(--b2); border-radius:9px; padding:9px 11px; color:var(--t1); font-size:14px; font-family:inherit; outline:none}
.rdv-input:focus{border-color:var(--accent)}
.rdv-foot{display:flex; gap:8px}
.rdv-foot .btn{padding:7px 13px; font-size:12.5px}
/* Écran Closers (admin) */
.team-pad{padding:26px 30px; max-width:1080px; width:100%; box-sizing:border-box; height:100%; overflow:auto}
.team-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px}
.team-head h1{font-size:24px; font-weight:800; letter-spacing:-.02em}
.team-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start}
@media(max-width:900px){.team-grid{grid-template-columns:1fr}}
.team-row{display:flex; align-items:center; gap:11px; padding:10px 2px; border-bottom:1px solid var(--b1)}
.team-row:last-child{border-bottom:none}
.team-tag{font-size:11px; font-weight:700; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:2px 8px}
.team-tok{font-size:12px; color:var(--t3); flex:1; min-width:0}

/* ===== Cockpit manager ===== */
.mgr-pad{padding:24px 30px 40px; max-width:1240px; width:100%; box-sizing:border-box; height:100%; overflow:auto}
.mgr-head{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:18px}
.mgr-head h1{font-size:25px; font-weight:800; letter-spacing:-.02em}
.mgr-head p{color:var(--t3); font-size:13px; margin-top:3px; font-weight:500}
.mgr-kpis{display:grid; grid-template-columns:repeat(7,1fr); gap:12px; margin-bottom:20px}
@media(max-width:1000px){.mgr-kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface); border:1px solid var(--b1); border-radius:14px; padding:14px 15px; position:relative; overflow:hidden}
.kpi .kpi-ic{position:absolute; top:12px; right:12px; width:16px; height:16px; color:var(--t4); stroke-width:1.9}
.kpi .kpi-n{font-family:'Gabarito',sans-serif; font-size:26px; font-weight:800; letter-spacing:-.02em; line-height:1}
.kpi .kpi-l{font-size:11.5px; color:var(--t3); font-weight:600; margin-top:6px; text-transform:uppercase; letter-spacing:.04em}
.kpi.danger .kpi-n{color:var(--danger)}
.kpi.accent .kpi-n{color:var(--accent)} .kpi.ok .kpi-n{color:var(--ok)}
.mgr-sec{display:flex; align-items:center; gap:9px; margin:4px 0 12px}
.mgr-sec .eyebrow{color:var(--t3)}
.mgr-sec .mgr-count{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t3); background:var(--surface); border:1px solid var(--b1); border-radius:6px; padding:1px 8px}
.lb-list{display:flex; flex-direction:column; gap:10px; margin-bottom:28px}
.lb-card{background:var(--surface); border:1px solid var(--b1); border-radius:14px; overflow:hidden; transition:border-color var(--speed) var(--ease)}
.lb-card.open{border-color:var(--b3)}
.lb-head{display:flex; align-items:center; gap:14px; padding:13px 16px; width:100%; text-align:left; cursor:pointer}
.lb-head:hover{background:var(--surface-2)}
.lb-rank{font-family:'Gabarito',sans-serif; font-weight:800; font-size:15px; color:var(--t4); width:20px; text-align:center; flex:none}
.lb-card:first-child .lb-rank{color:var(--accent)}
.lb-id{display:flex; align-items:center; gap:11px; width:170px; min-width:0; flex:none}
.lb-id b{font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.lb-metrics{display:flex; gap:16px; flex:1; min-width:0}
@media(max-width:1150px){.lb-metrics{display:none}}
.lb-m{display:flex; flex-direction:column; gap:2px}
.lb-m b{font-family:'Gabarito',sans-serif; font-size:17px; font-weight:800; letter-spacing:-.02em; line-height:1}
.lb-m span{font-size:10px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap}
.lb-m.warn b{color:var(--warm)} .lb-m.won b{color:var(--ok)} .lb-m.bad b{color:var(--danger)}
.lb-ca{display:flex; flex-direction:column; gap:5px; width:150px; flex:none}
.lb-ca-top{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
.lb-ca-top b{font-family:'Gabarito',sans-serif; font-size:17px; font-weight:800; color:var(--accent); letter-spacing:-.02em}
.lb-ca-top span{font-size:10px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em}
.lb-bar{height:5px; background:var(--surface-3); border-radius:99px; overflow:hidden}
.lb-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--accent-h),var(--accent)); border-radius:99px}
.lb-chev{color:var(--t4); transition:transform var(--speed) var(--ease); flex:none}
.lb-chev svg{width:18px; height:18px}
.lb-card.open .lb-chev{transform:rotate(90deg)}
.lb-body{border-top:1px solid var(--b1); padding:8px 10px; background:var(--surface-2)}
.lb-empty{font-size:12.5px; color:var(--t3); padding:12px 8px}
.cl-danger{margin-top:6px; padding:10px 10px 4px; border-top:1px dashed var(--b2); display:flex; flex-direction:column; gap:9px}
.cl-del{display:inline-flex; align-items:center; gap:7px; align-self:flex-start; background:none; color:var(--t3); font-size:12.5px; font-weight:600; padding:6px 8px; border-radius:8px; cursor:pointer; transition:all var(--speed)}
.cl-del svg{width:15px; height:15px}
.cl-del:hover{color:var(--danger); background:var(--danger-tint)}
.cl-del-warn{font-size:12.5px; color:var(--t2); line-height:1.5}
.cl-del-act{display:flex; gap:8px}
.cl-del-confirm{background:var(--danger); color:#fff; border:none; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:9px; cursor:pointer}
.cl-del-confirm:disabled{opacity:.6; cursor:default}
.role-badge{font-size:10.5px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; padding:3px 9px; border-radius:20px; background:var(--surface-3); color:var(--t2); flex:none}
.role-badge.admin{background:var(--accent-tint); color:var(--accent)}
.cl-lead{display:flex; align-items:center; gap:10px; row-gap:4px; flex-wrap:wrap; width:100%; text-align:left; padding:9px 34px 9px 10px; border-radius:9px; cursor:pointer; position:relative; transition:background var(--speed) var(--ease)}
.cl-lead:hover{background:var(--surface)}
.cl-lead-name{font-size:13.5px; font-weight:700; width:150px; flex:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.chip{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap; flex:none; display:inline-flex; align-items:center; gap:5px}
.chip .cdot{width:6px; height:6px; border-radius:99px; background:currentColor}
.chip.sm{font-size:10px; padding:1px 7px; gap:4px}
.chip-rdv{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap; flex:none; background:var(--accent-tint); color:var(--accent); display:inline-flex; align-items:center; gap:5px}
.chip-rdv svg{width:11px; height:11px; stroke-width:2}
.chip-rdv.todo{background:var(--surface-3); color:var(--warm)}
/* parcours RDV : présent ✓ / no-show ✗ / à débriefer / en cours */
.chip-rdv.ok{background:color-mix(in srgb, var(--ok) 13%, transparent); color:var(--ok)}
.chip-rdv.bad{background:color-mix(in srgb, var(--danger) 13%, transparent); color:var(--danger)}
.chip-rdv.deb{background:color-mix(in srgb, var(--warm) 15%, transparent); color:var(--warm)}
.chip-rdv.liv{background:color-mix(in srgb, var(--accent) 18%, transparent); color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset}
.cl-amt{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--t1); flex:none}
.cl-concl{font-size:12px; color:var(--t3); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic}
.cl-concl.gen{font-style:normal; color:var(--t4)}
/* feed manager « À traiter aujourd'hui » */
.feed-row{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 12px}
.feed-chip{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; padding:7px 13px; border-radius:99px; cursor:pointer; background:var(--surface-2); color:var(--t3); border:1px solid var(--b1); transition:all var(--speed) var(--ease)}
.feed-chip b{font-family:'Gabarito',sans-serif; font-size:14px; font-weight:800}
.feed-chip svg{width:13px; height:13px; stroke-width:2}
.feed-chip.has{color:var(--t1)}
.feed-chip.has.warn{color:var(--warm); border-color:color-mix(in srgb, var(--warm) 35%, transparent)}
.feed-chip.has.bad{color:var(--danger); border-color:color-mix(in srgb, var(--danger) 35%, transparent)}
.feed-chip.has.acc{color:var(--accent); border-color:color-mix(in srgb, var(--accent) 35%, transparent)}
.feed-chip.on{background:var(--surface-3); border-color:var(--b3)}
.feed-list{background:var(--surface-2); border:1px solid var(--b1); border-radius:13px; padding:8px 10px; margin:0 0 14px}
.feed-list .cl-owner{font-size:10.5px; color:var(--t4); font-weight:700; text-transform:uppercase; letter-spacing:.04em; flex:none; width:74px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.feed-empty{font-size:12.5px; color:var(--t3); padding:10px 4px 18px}
.cl-arrow{color:var(--t4); flex:none; position:absolute; right:10px; top:50%; transform:translateY(-50%)} .cl-arrow svg{width:15px; height:15px}
.cl-lead:hover .cl-arrow{color:var(--accent)}

/* timeline */
.tl{display:flex; flex-direction:column; gap:10px}
.tl-empty{font-size:12.5px; color:var(--t3); padding:4px 2px}
.tl-when{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--t3); flex:none}
.tl-author{font-size:10.5px; color:var(--t2); font-weight:700; flex:none; padding:1px 7px; border-radius:99px; background:var(--surface-2); border:1px solid var(--b1)}
.tl-card-text{font-size:13px; color:var(--t2); line-height:1.5; white-space:pre-wrap; word-break:break-word}
.tl-granola{margin-top:8px; background:var(--surface-2); border:1px solid var(--b1); border-radius:9px; padding:10px 11px}
.tl-granola .g-head{display:flex; align-items:center; gap:7px; margin-bottom:6px}
.tl-granola .g-head .eyebrow{color:var(--accent)}
.tl-granola .g-line{font-size:12.5px; color:var(--t2); display:flex; gap:7px; padding:2px 0}
.tl-granola .g-line b{color:var(--t1); font-weight:600}
/* ---- édition inline d'une entrée d'historique ---- */
.tl-edit{margin-top:2px}
.tl-edit textarea{width:100%; min-height:58px; resize:vertical; background:var(--surface); border:1.5px solid var(--b2); border-radius:9px; padding:9px 11px; color:var(--t1); font-size:13px; font-family:inherit; line-height:1.5; box-sizing:border-box}
.tl-edit textarea:focus{border-color:var(--accent); outline:none}
.tl-edit-actions{display:flex; gap:8px; margin-top:8px}
.tl-edit-actions .btn{padding:7px 13px; font-size:12.5px}

/* actions column */
.actions{display:flex; flex-direction:column; gap:9px}
.act{
  display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:11px;
  border:1px solid var(--b1); background:var(--surface-2); text-align:left; width:100%;
  transition:all var(--speed); position:relative;
}
.act:hover{border-color:var(--b3); background:var(--surface-3)}
.act:disabled{opacity:.45; cursor:not-allowed}
.act:disabled:hover{border-color:var(--b1); background:var(--surface-2)}
.act-ic{width:34px; height:34px; border-radius:9px; display:grid; place-items:center; background:var(--surface); border:1px solid var(--b1); flex:none}
.act-ic svg{width:17px; height:17px; stroke-width:1.9; color:var(--t2)}
.act-tx b{display:block; font-weight:700; font-size:14px}
.act-tx span{font-size:11.5px; color:var(--t3); font-weight:500}
.act .chev{margin-left:auto; color:var(--t3)}
.act .chev svg{width:16px; height:16px; stroke-width:2}
.act.primary{background:var(--accent); border-color:var(--accent); box-shadow:var(--glow)}
.act.primary .act-ic{background:rgba(255,255,255,.16); border-color:transparent}
.act.primary .act-ic svg{color:var(--on-accent)}
.act.primary .act-tx b{color:var(--on-accent)}
.act.primary .act-tx span{color:rgba(255,255,255,.78)}
.act.primary:hover{background:var(--accent-h)}

/* ============================== OVERLAYS ============================== */
.backdrop{position:fixed; inset:0; background:rgba(30,20,8,.42); backdrop-filter:blur(2px); z-index:80; animation:fade .2s ease}
[data-theme="dark"] .backdrop{background:rgba(0,0,0,.6)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0; transform:translateY(8px) scale(.985)}to{opacity:1; transform:none}}
@keyframes popcenter{from{opacity:0; transform:translate(-50%,-50%) scale(.97)}to{opacity:1; transform:translate(-50%,-50%) scale(1)}}
@keyframes slideR{from{transform:translateX(24px); opacity:0}to{transform:none; opacity:1}}

/* dropdown (offre menu) */
.menu{
  position:absolute; z-index:70; background:var(--surface); border:1px solid var(--b2); border-radius:var(--r-panel);
  box-shadow:var(--sh-pop); padding:8px; min-width:268px; animation:pop .16s ease;
}
.menu-h{padding:6px 8px 8px}
.menu-item{display:flex; align-items:center; justify-content:space-between; padding:10px 11px; border-radius:9px; width:100%; transition:background var(--speed)}
.menu-item:hover{background:var(--surface-2)}
.menu-item .amt{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px}
.menu-item .tg{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--t3); font-weight:500}
.menu-sep{height:1px; background:var(--b1); margin:6px 4px}
.menu-custom{display:flex; align-items:center; gap:8px; padding:10px 11px; border-radius:9px; color:var(--t2); font-weight:600; font-size:13px; width:100%}
.menu-custom:hover{background:var(--surface-2); color:var(--t1)}
.menu-custom svg{width:15px; height:15px; stroke-width:2}

/* payment modal */
.modal{position:fixed; z-index:90; left:50%; top:50%; transform:translate(-50%,-50%);
  width:480px; max-width:calc(100vw - 40px); background:var(--surface); border:1px solid var(--b2);
  border-radius:18px; box-shadow:var(--sh-pop); padding:26px 26px 22px; animation:popcenter .18s ease}
.modal .m-eye{margin-bottom:10px}
.modal .m-amt{font-family:'JetBrains Mono',monospace; font-size:44px; font-weight:700; letter-spacing:-.04em; line-height:1}
.modal .m-for{color:var(--t3); font-size:13.5px; margin-top:6px; font-weight:500}
.amt-input{font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:700; letter-spacing:-.04em; width:200px; border:none; border-bottom:2px solid var(--b2); background:none; outline:none; padding:0 0 4px}
.amt-input:focus{border-color:var(--accent)}

.chan{display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--b1); border-radius:11px; background:var(--surface-2); margin-top:10px}
.chan.main{border-color:var(--b3); background:var(--surface)}
.chan.soon{opacity:.6}
.chan-ic{width:36px; height:36px; border-radius:9px; background:var(--surface); border:1px solid var(--b1); display:grid; place-items:center; flex:none}
.chan-ic svg{width:18px; height:18px; stroke-width:1.9; color:var(--t2)}
.chan-tx{min-width:0; flex:1}
.chan-tx b{display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px}
.chan-tx span{font-size:12px; color:var(--t3); display:block}
.chan-tx .mono{color:var(--t2)}
.soon-pill{font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--surface-3); color:var(--t3); padding:2px 7px; border-radius:99px; border:1px solid var(--b1)}
.chan-main-pill{font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--accent-tint); color:var(--accent); padding:2px 7px; border-radius:99px}

.mail-prev{margin-top:14px; border:1px solid var(--b1); border-radius:11px; overflow:hidden}
.mail-prev .mp-bar{display:flex; align-items:center; gap:7px; padding:9px 12px; background:var(--surface-2); border-bottom:1px solid var(--b1)}
.mail-prev .mp-bar .eyebrow{font-size:9.5px}
.mail-prev .mp-body{padding:12px 14px; font-size:12.5px; color:var(--t2); line-height:1.6; max-height:172px; overflow:auto; white-space:pre-line}
.mail-prev .mp-subj{font-weight:700; color:var(--t1); font-size:13px; margin-bottom:8px}
.mail-prev .mp-link{color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:11.5px; word-break:break-all}
.modal-note{margin-top:14px; font-size:11.5px; color:var(--t3); text-align:center; font-weight:500}
.modal-foot{display:flex; gap:10px; margin-top:14px}
.modal-foot .btn{flex:1; justify-content:center; padding:12px}
.x-btn{position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--t3)}
.x-btn:hover{background:var(--surface-2); color:var(--t1)}
.x-btn svg{width:16px; height:16px; stroke-width:2}

/* recap call (IA) */
.head-btns{display:flex; align-items:center; gap:8px}
.modal.recap-modal{width:580px; max-height:90vh; overflow-y:auto}
.recap-ta{min-height:200px}
.recap-loading{display:flex; flex-direction:column; align-items:center; gap:14px; padding:44px 0; color:var(--t2); font-size:13.5px; font-weight:500}
.recap-spin{width:30px; height:30px; border:3px solid var(--b2); border-top-color:var(--accent); border-radius:50%; animation:recap-rot .8s linear infinite}
@keyframes recap-rot{to{transform:rotate(360deg)}}
.recap-err{margin-top:14px; padding:12px 14px; border-radius:11px; background:var(--surface-2); border:1px solid var(--b2); color:var(--t1); font-size:13px}
.recap-type{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; background:var(--accent-tint); color:var(--accent); padding:3px 9px; border-radius:99px; margin-bottom:12px}
.recap-concl{margin-bottom:13px}
.recap-concl .eyebrow{display:block; margin-bottom:7px}
.recap-concl-row{display:flex; align-items:center; gap:11px; flex-wrap:wrap}
.recap-concl-tx{font-size:13.5px; color:var(--t1); font-weight:600}
.recap-box{border:1px solid var(--b1); border-radius:12px; padding:14px 16px; max-height:240px; overflow:auto; background:var(--surface-2)}
.recap-md{font-size:13px; color:var(--t2); line-height:1.6}
.recap-h{font-weight:800; color:var(--t1); font-size:13px; margin:11px 0 4px; letter-spacing:-.01em}
.recap-h:first-child{margin-top:0}
.recap-p{margin:3px 0}
.recap-li{margin:2px 0 2px 15px; position:relative}
