// ===== RÉSULTAT D'UN RDV (présence) — fait structuré, stocké chez nous (CalendIQ = lecture seule) =====
// présent = le prospect était là (« RDV terminé ») · no-show = absent. C'est la DONNÉE qui pilote l'UI.
const OUTCOME_META = {
  present: {label:'Présent', color:'var(--ok)'},
  no_show: {label:'No-show', color:'var(--danger)'},
};
const RDV_DEBRIEF_DELAY_MIN = 0; // le bloc « à traiter » apparaît DÈS la fin du RDV (pas pendant le call)
// fin estimée d'un RDV (start + durée). CalendIQ fournit duration_minutes ; sinon fallback par type.
function rdvEndMs(rdv){ const s=new Date(rdv.start_at).getTime(); const d=rdv.duration_minutes||RDV_DUR[rdv.type]||45; return s + d*60000; }
// machine d'états d'une carte RDV : outcome (présent/no_show) prime ; sinon dérivé du temps.
//  upcoming (avant l'heure) · live (en cours + 10 min de grâce après la fin) · todo (à traiter)
function rdvState(rdv, now){
  if(rdv.outcome==='present'||rdv.outcome==='no_show') return rdv.outcome;
  const s=new Date(rdv.start_at).getTime();
  if(now < s) return 'upcoming';
  if(now < rdvEndMs(rdv) + RDV_DEBRIEF_DELAY_MIN*60000) return 'live';
  return 'todo';
}
// quel RDV un débrief concerne : on cible le RDV passé du bon type (sinon le plus récent passé), jamais à l'aveugle.
function pickRecapTargetRdv(rdvs, callKind){
  if(!rdvs || !rdvs.length) return null;
  const now=Date.now();
  const past=rdvs.filter(r=>new Date(r.start_at).getTime()<=now);
  if(!past.length) return null; // un débrief concerne un RDV PASSÉ — jamais auto-taguer un créneau à venir
  const typed=callKind?past.filter(r=>r.type===callKind):[];
  const cand=typed.length?typed:past;
  return cand.slice().sort((a,b)=>new Date(b.start_at)-new Date(a.start_at))[0]||null;
}

/* ===== SOURCE DE VÉRITÉ UNIQUE des RDV d'un lead — partagée fiche / cockpit / feed =====
   Fusionne : RDV CalendIQ (lead.rdvs, posés par leadsCq) + RDV manuel legacy (rdv_at) + RDV manuels
   multiples (rdvMeta['m:*']). Anti-doublon ±90 s : un meeting CalendIQ et un créneau manuel au même
   horaire = le MÊME RDV (seule la version CalendIQ est gardée). Tri chrono stable (start_at puis id). */
function leadAllRdvs(lead){
  const list=(lead.rdvs||[]).slice();
  const cqTimes=list.map(r=>new Date(r.start_at).getTime());
  const dupOfCq=(iso)=>{ const t=new Date(iso).getTime(); return cqTimes.some(ct=>Math.abs(ct-t)<90000); };
  const meta=lead.rdvMeta||{};
  if(lead.rdv_at && !dupOfCq(lead.rdv_at)){ const mk='manual:'+lead.id; const mm=meta[mk]||{};
    list.push({ id:mk, source:'manual', type:lead.rdvType||'r1', start_at:lead.rdv_at, duration_minutes:RDV_DUR[lead.rdvType||'r1']||45, meet_link:lead.rdvMeetLink||null, outcome:(mm.outcome==='present'||mm.outcome==='no_show')?mm.outcome:null }); }
  for(const k in meta){ if(k.indexOf('m:')===0){ const e=meta[k]||{};
    if(e.start_at && !dupOfCq(e.start_at)) list.push({ id:k, source:'manual', type:e.type||'r1', start_at:e.start_at, duration_minutes:RDV_DUR[e.type||'r1']||45, meet_link:e.meet_link||null, outcome:(e.outcome==='present'||e.outcome==='no_show')?e.outcome:null }); } }
  list.sort((a,b)=> (new Date(a.start_at)-new Date(b.start_at)) || (a.id<b.id?-1:a.id>b.id?1:0));
  return list;
}

function CopyField({value, icon, copyVal, title, kind, onSave, addLabel}){
  const [done,setDone]=useState(false);
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState('');
  const inp=useRef(null);
  const finished=useRef(false);
  const raw=String(copyVal!=null?copyVal:(value||'')||'');
  useEffect(()=>{ if(editing&&inp.current){ inp.current.focus(); inp.current.select(); } },[editing]);
  const copy=()=>{ try{ navigator.clipboard.writeText(raw); }catch(e){} setDone(true); setTimeout(()=>setDone(false),1400); };
  const start=()=>{ if(!onSave) return; finished.current=false; setVal(raw); setEditing(true); };
  const commit=()=>{ if(finished.current) return; finished.current=true; setEditing(false); const v=val.trim(); if(v!==raw.trim()&&onSave) onSave(v||null); };
  const cancel=()=>{ if(finished.current) return; finished.current=true; setEditing(false); };
  if(editing){
    return (
      <span className="contact edit">
        {icon({})}
        <input ref={inp} className="contact-inp" type={kind==='email'?'email':'tel'} value={val} placeholder={addLabel||''}
          onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault(); commit();} else if(e.key==='Escape'){e.preventDefault(); cancel();} }}
          onBlur={commit}/>
      </span>
    );
  }
  if(!raw){
    if(!onSave) return null;
    return (
      <span className="contact add" onClick={start} tabIndex={0} role="button"
        onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); start();}}} title={addLabel||'Ajouter'}>
        {icon({})}<span>{addLabel||'Ajouter'}</span>
      </span>
    );
  }
  return (
    <span className={`contact copy ${done?'copied':''}`}>
      <span className="copy-main" onClick={copy} tabIndex={0} role="button"
        onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); copy();}}}
        title={title||'Cliquer pour copier'}>
        {icon({})}<span className="mono">{value}</span>{done?<I.check className="copy-ic"/>:<I.copy className="copy-ic"/>}
      </span>
      {onSave && <button type="button" className="copy-edit" onClick={start} title="Modifier" tabIndex={0}><I.pencil/></button>}
    </span>
  );
}

function NameEdit({ lead, onEditField }){
  const [editing,setEditing]=useState(false);
  const [p,setP]=useState('');
  const [n,setN]=useState('');
  const pRef=useRef(null);
  const done=useRef(false);
  const prenom=lead.prenom||'', nom=lead.nom||'';
  const full=`${prenom} ${nom}`.trim();
  useEffect(()=>{ if(editing&&pRef.current){ pRef.current.focus(); pRef.current.select(); } },[editing]);
  const start=()=>{ done.current=false; setP(prenom); setN(nom); setEditing(true); };
  const commit=()=>{ if(done.current) return; done.current=true; setEditing(false);
    const np=p.trim(), nn=n.trim();
    if(np!==prenom.trim()) onEditField('prenom','prenom', np||null);
    if(nn!==nom.trim()) onEditField('nom','nom', nn||null);
  };
  const cancel=()=>{ if(done.current) return; done.current=true; setEditing(false); };
  // ne committe au blur que si le focus quitte VRAIMENT le groupe (et pas en passant prénom -> nom)
  const onBlur=(e)=>{ if(e.relatedTarget && e.currentTarget.contains(e.relatedTarget)) return; commit(); };
  const onKey=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } else if(e.key==='Escape'){ e.preventDefault(); cancel(); } };
  if(editing){
    return (
      <div className="name-edit" onBlur={onBlur}>
        <input ref={pRef} className="name-inp" value={p} placeholder="Prénom" size={Math.max(p.length,6)} onChange={e=>setP(e.target.value)} onKeyDown={onKey}/>
        <input className="name-inp" value={n} placeholder="Nom" size={Math.max(n.length,5)} onChange={e=>setN(e.target.value)} onKeyDown={onKey}/>
        <button type="button" className="name-save" title="Enregistrer (Entrée)" onClick={commit}>{I.check({})}</button>
      </div>
    );
  }
  return (
    <h1 className="name-h1">
      {full
        ? <><span className="name-txt" onClick={start} tabIndex={0} role="button" title="Modifier le nom"
              onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); start(); } }}>{prenom} {nom}</span>
           <button type="button" className="name-edit-btn" onClick={start} title="Modifier le nom" tabIndex={0}><I.pencil/></button></>
        : <span className="name-add" onClick={start} tabIndex={0} role="button" title="Nommer ce lead"
              onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); start(); } }}><I.pencil/> Nommer ce lead</span>}
    </h1>
  );
}

function fmtRdv(iso){ try{ const s=new Date(iso).toLocaleString('fr-FR',{weekday:'short',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}); return s.replace(':',' h '); }catch(e){ return ''; } }

function fmtDay(d){ try{ return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return ''; } }
// normalise pour la recherche : minuscules + sans accents (é→e, ô→o…) -> recherche insensible accents/casse
const deburr = (s)=> String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
// normalise un numéro de tél pour la recherche : ne garde que les chiffres et ramène les préfixes FR
// (+33 / 0033 / 33 international / 0 national) à une forme canonique sans le préfixe.
// => "+33 7 68 07 87 00", "07.68.07.87.00", "0033768078700", "0768078700" donnent TOUS "768078700"
//    -> espaces/points/parenthèses et format +33 vs 07 n'empêchent plus le match (recherche partielle incluse).
function normTel(s){
  const raw=String(s==null?'':s);
  let d=raw.replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('0033')) d=d.slice(4);                                   // 0033… -> …
  else if(raw.replace(/[^\d+]/g,'').startsWith('+33')) d=d.replace(/^33/,'');// +33… -> …
  else if(d.startsWith('33') && d.length>=11) d=d.slice(2);                // 33XXXXXXXXX (intl sans +) -> …
  if(d.startsWith('0')) d=d.slice(1);                                      // 0 national de tête -> …
  return d;
}

const DTP_WD=['lun','mar','mer','jeu','ven','sam','dim'];
const DTP_WDKEY=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DTP_MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function DateTimePicker({ organizerId, duration, value, onChange }){
  const v0 = value? new Date(value) : null;
  const [day,setDay]=useState(v0? new Date(v0.getFullYear(),v0.getMonth(),v0.getDate()) : null);
  const [hm,setHm]=useState(v0? {h:v0.getHours(),m:v0.getMinutes()} : null);
  const base0 = day||v0||new Date();
  const [vy,setVy]=useState(base0.getFullYear());
  const [vm,setVm]=useState(base0.getMonth());
  const [avail,setAvail]=useState(null);   // {monday:{enabled,start,end},…} (null = pas encore chargé)
  const [busy,setBusy]=useState([]);        // [{start,end}] du jour sélectionné
  const [loading,setLoading]=useState(false);

  // horaires de travail de l'organizer (1 fois)
  useEffect(()=>{ if(!organizerId) return; let on=true;
    cqGet('profiles?id=eq.'+encodeURIComponent(organizerId)+'&select=availability').then(r=>{ if(on&&r&&r[0]) setAvail(r[0].availability||{}); }).catch(()=>{ if(on) setAvail({}); });
    return ()=>{on=false;};
  },[organizerId]);
  // émet la valeur combinée
  useEffect(()=>{ onChange( (day&&hm)? `${day.getFullYear()}-${dtpPad(day.getMonth()+1)}-${dtpPad(day.getDate())}T${dtpPad(hm.h)}:${dtpPad(hm.m)}` : '' ); },[day,hm]);
  // créneaux occupés du jour sélectionné (Google + RDV existants)
  useEffect(()=>{ if(!day||!organizerId){ setBusy([]); return; } let on=true; setLoading(true);
    const ds=`${day.getFullYear()}-${dtpPad(day.getMonth()+1)}-${dtpPad(day.getDate())}`;
    cqInvoke('google-busy-slots',{ organizer_id:organizerId, date:ds, organizer_timezone:'Europe/Paris' })
      .then(r=>{ if(on) setBusy((r&&r.busy)||[]); }).catch(()=>{ if(on) setBusy([]); }).finally(()=>{ if(on) setLoading(false); });
    return ()=>{on=false;};
  },[day,organizerId]);

  const today=new Date(); today.setHours(0,0,0,0);
  const winFor=(dt)=>{ const a=avail&&avail[DTP_WDKEY[dt.getDay()]]; return (a&&a.enabled!==false)?a:null; };
  const dayDisabled=(d)=>{ const dt=new Date(vy,vm,d); if(dt<today) return true; if(avail) return !winFor(dt); return false; };
  const first=new Date(vy,vm,1); const lead=(first.getDay()+6)%7; const dim=new Date(vy,vm+1,0).getDate();
  const cells=[]; for(let i=0;i<lead;i++) cells.push(null); for(let d=1;d<=dim;d++) cells.push(d);
  const isSelDay=d=> day && day.getFullYear()===vy && day.getMonth()===vm && day.getDate()===d;
  const isTodayCell=d=> +new Date(vy,vm,d)===+today;
  const canPrev = +new Date(vy,vm,1) > +new Date(today.getFullYear(),today.getMonth(),1);
  const prevMonth=()=>{ if(vm<=0){ setVm(11); setVy(vy-1); } else setVm(vm-1); };
  const nextMonth=()=>{ if(vm>=11){ setVm(0); setVy(vy+1); } else setVm(vm+1); };

  // créneaux libres = fenêtre de travail × pas(durée) − occupés − passé
  const slots = useMemo(()=>{
    if(!day) return [];
    const win = winFor(day) || { start:'09:00', end:'18:00' }; // fallback si dispo absente
    const [sh,sm]=win.start.split(':').map(Number); const [eh,em]=win.end.split(':').map(Number);
    const wStart=new Date(day); wStart.setHours(sh,sm,0,0);
    const wEnd=new Date(day); wEnd.setHours(eh,em,0,0);
    const now=Date.now(), step=Math.max(15,duration)*60000;
    const bz=busy.map(b=>[+new Date(b.start),+new Date(b.end)]);
    const out=[];
    for(let t=+wStart; t+duration*60000<=+wEnd+1; t+=step){
      const s=t, e=t+duration*60000;
      if(s<=now) continue;
      if(bz.some(([bs,be])=> s<be && e>bs)) continue;
      const d=new Date(s); out.push({h:d.getHours(),m:d.getMinutes()});
    }
    return out;
  },[day,busy,duration,avail]);
  // si l'heure choisie n'est plus libre (durée changée, RDV repris) → on la déselectionne
  useEffect(()=>{ if(hm && !slots.some(s=>s.h===hm.h&&s.m===hm.m)) setHm(null); },[slots]);

  return (
    <div className="dtp">
      <div className="dtp-cal">
        <div className="dtp-head">
          <button type="button" className="dtp-nav" disabled={!canPrev} onClick={prevMonth} aria-label="Mois précédent">‹</button>
          <span className="dtp-title">{DTP_MONTHS[vm]} {vy}</span>
          <button type="button" className="dtp-nav" onClick={nextMonth} aria-label="Mois suivant">›</button>
        </div>
        <div className="dtp-wd">{DTP_WD.map(w=><span key={w}>{w}</span>)}</div>
        <div className="dtp-grid">
          {cells.map((d,i)=> d===null
            ? <span key={i} className="dtp-empty"></span>
            : <button type="button" key={i} disabled={dayDisabled(d)} onClick={()=>{ setHm(null); setDay(new Date(vy,vm,d)); }}
                className={'dtp-day'+(isSelDay(d)?' sel':'')+(isTodayCell(d)?' today':'')}>{d}</button>)}
        </div>
      </div>
      <div className="dtp-times">
        {!day ? <div className="dtp-hint">Choisis un jour</div>
          : loading ? <div className="dtp-hint">Chargement des créneaux…</div>
          : slots.length===0 ? <div className="dtp-hint">Aucun créneau libre ce jour</div>
          : slots.map(({h,m})=> <button type="button" key={h+':'+m}
              className={'dtp-time'+(hm&&hm.h===h&&hm.m===m?' sel':'')} onClick={()=>setHm({h,m})}>{dtpPad(h)}:{dtpPad(m)}</button>)}
      </div>
    </div>
  );
}
const RDV_DUR = { r1:45, r2:30, r3:45 };
function AddRdvModal({ lead, initial, organizerId, closers, pickCloser, onClose, onAdd }){
  const editing=!!initial;
  const [type,setType]=useState((initial&&initial.type)||'r1');
  const [dur,setDur]=useState((initial&&initial.dur)|| RDV_DUR[(initial&&initial.type)||'r1']);
  const [dt,setDt]=useState((initial&&initial.dt)||'');
  const [organizer,setOrganizer]=useState((initial&&initial.organizer_id)||organizerId||null); // agenda cible (admin : choix du closer)
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);
  const showPicker = pickCloser && (closers||[]).length>0;
  const pickType=(t)=>{ setType(t); setDur(RDV_DUR[t]); };
  const save=async()=>{ if(!dt||busy) return;
    if(showPicker && !organizer){ setErr('Choisis le closer dont l’agenda recevra le RDV.'); return; }
    setBusy(true); setErr(null);
    try{ await onAdd(type, dur, new Date(dt).toISOString(), organizer); onClose(); }
    catch(e){ setErr(e.message||'Opération impossible'); } finally{ setBusy(false); } };
  const name=`${lead.prenom||''} ${lead.nom||''}`.trim()||lead.email||'Lead';
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="rdvm" onClick={e=>e.stopPropagation()}>

            <Avatar lead={lead} size="sz-sm"/>
            <div className="rdvm-pf-tx"><b>{name}</b><span>{lead.email||'—'}{lead.tel?(' · '+fmtPhone(lead.tel)):''}</span></div>
          </div>
          {showPicker && <>
            <label className="rdvm-lbl">Closer (agenda CalendIQ)</label>

              {(closers||[]).map(c=><option key={c.id} value={c.organizer}>{c.name}</option>)}
            </select>
            <div className="rdvm-hint">Le RDV part sur l’agenda de ce closer et le lead lui est attribué.</div>

            <button className={type==='r1'?'on':''} onClick={()=>pickType('r1')}>R1</button>

          {err && <div className="rdv-err">{err}</div>}

        <div className="rdvm-foot">
          <button className="btn btn-accent" disabled={!dt||busy} onClick={save}>{busy?(editing?'Reprogrammation…':'Création…'):(editing?'Reprogrammer':'Créer dans CalendIQ')}</button>

  );

/* Carte RDV unique — machine d'états présent/no-show. Présentation pure : tous les faits viennent de `rdv`,
   toutes les actions remontent via props. Partagée par RdvList (CalendIQ) et ManualRdvField (saisie manuelle). */
function RdvCard({ rdv, onModify, onCancel, onOutcome, onClearOutcome }){
  const [tick,setTick]=useState(0);
  // re-render PILE au prochain seuil (début / fin+10min) sans interval global → zéro jank sur le board.
  useEffect(()=>{
    if(rdv.outcome==='present'||rdv.outcome==='no_show') return; // figé : aucun timer
    const now=Date.now();
    const thr=[new Date(rdv.start_at).getTime(), rdvEndMs(rdv)+RDV_DEBRIEF_DELAY_MIN*60000].filter(t=>t>now);
    if(!thr.length) return;
    const ms=Math.min(Math.min(...thr)-now+500, 2147483000);
    const id=setTimeout(()=>setTick(n=>n+1), ms);
    return ()=>clearTimeout(id);
  },[rdv.start_at, rdv.duration_minutes, rdv.outcome, tick]);
  const st=rdvState(rdv, Date.now());
  const settled = st==='present'||st==='no_show';
  const oc = settled ? OUTCOME_META[st] : null;
  const typeLabel=(rdv.type||'r1').toUpperCase();
  const dur=rdv.duration_minutes||RDV_DUR[rdv.type]||45;
  const canJoin = rdv.meet_link && (st==='upcoming'||st==='live');
  const showTools = (onModify||onCancel) && st!=='present';
  const cls='rdvcard'+(st==='live'?' rdv-live':'')+(st==='todo'?' rdv-todo':'')+(st==='present'?' rdv-present':'')+(st==='no_show'?' rdv-noshow':'');
  return (
    <div className={cls}>
      <div className="rdvcard-top">
        <span className="rdvcard-ic">{settled ? (st==='present'?I.check({}):I.noshow({})) : I.agenda({})}</span>
        <div className="rdvcard-info">
          <b>{typeLabel} · {cqDayLabel(rdv.start_at)}</b>
          <span>{I.clock({})}{cqTime(rdv.start_at)} · {dur} min{st==='live'?' · en cours':''}</span>
        </div>
        {oc && <span className="rdv-verdict" style={{color:oc.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{oc.label}</span>}
      </div>
      {st==='todo' && <div className="rdv-ask">Ce RDV est passé — que s’est-il passé ?</div>}
      <div className="rdvcard-actions">
        {canJoin && <a className="rdvcard-join" href={normMeet(rdv.meet_link)} target="_blank" rel="noreferrer" title="Rejoindre le Google Meet">{I.video({})}Rejoindre</a>}
        {!settled && (
          <div className={'rdv-oc'+(st==='todo'?' prom':'')}>
            <button className="rdv-oc-btn present" onClick={()=>onOutcome('present')} title="Le prospect était présent (RDV terminé)">{I.check({})}Présent</button>
            <button className="rdv-oc-btn noshow" onClick={()=>onOutcome('no_show')} title="Le prospect ne s’est pas présenté">{I.noshow({})}No-show</button>
          </div>
        )}
        {settled && onClearOutcome && <button className="rdv-redo" onClick={onClearOutcome} title="Corriger le résultat">{I.pencil({})}Modifier</button>}
        {showTools && (
          <div className="rdvcard-tools">
            {onModify && <button className="rdvcard-btn" title="Reprogrammer" onClick={()=>onModify(rdv)}>{I.pencil({})}</button>}
            {onCancel && <button className="rdvcard-btn del" title="Annuler ce RDV" onClick={()=>onCancel(rdv)}>{I.trash({})}</button>}
          </div>
        )}
      </div>
    </div>
  );
}

function ManualRdvField({ lead, calendiqRdvs, onCalModify, onCalCancel, onSave, onRemove, onOutcome, onClearOutcome }){

/* Carte action (format rectangle, comme les notes Historique) : cocher (réalisée) + éditer + supprimer */
function ActionCard({ label, done, editing, onToggle, onEditStart, onEditCancel, onEditSave, onDelete, placeholder, due, onDate }){
  const [v,setV]=useState(label||'');
  const taRef=React.useRef(null);
  // auto-grow : la hauteur du textarea suit le contenu → tout le texte reste visible (plafonné à 200px puis scroll)
  const grow=(el)=>{ if(!el) return; el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; };
  useEffect(()=>{ if(!editing) return; setV(label||''); requestAnimationFrame(()=>{ const el=taRef.current; if(!el) return; grow(el); el.focus(); const n=el.value.length; el.setSelectionRange(n,n); }); },[editing]);
  if(editing){
    return (
      <div className="actcard editing">
        <textarea ref={taRef} className="actcard-input" rows={1} value={v} placeholder={placeholder}
          onChange={e=>{ setV(e.target.value); grow(e.target); }}
          onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); onEditSave(v.trim()); } if(e.key==='Escape'){ e.preventDefault(); onEditCancel(); } }}/>
        <div className="actcard-editbtns">
          <button className="actcard-btn ok" title="Valider (Entrée)" onClick={()=>onEditSave(v.trim())}>{I.check({})}</button>
          <button className="actcard-btn" title="Annuler (Échap)" onClick={onEditCancel}>{I.x({})}</button>
        </div>
      </div>
    );
  }
  return (
    <div className={'actcard'+(done?' done':'')}>
      <span className="actcard-box" onClick={onToggle} role="checkbox" aria-checked={done} title={done?'Marquer non fait':'Marquer comme fait'}>{I.check({})}</span>
      <div className="actcard-body" onClick={onEditStart}>
        <span className="actcard-tx" title="Cliquer pour modifier">{label||placeholder}</span>
        {due && <span className="actcard-due" onClick={e=>e.stopPropagation()}>{I.agenda({})}{fmtWhen(due)}
          {onDate && <button className="actcard-due-x" title="Retirer l’échéance" onClick={()=>onDate(null)}>{I.x({})}</button>}
        </span>}
      </div>
      <div className="actcard-tools">
        {onDate && <label className="actcard-btn cal" title={due?'Modifier l’échéance':'Ajouter une échéance'} onClick={e=>e.stopPropagation()}>{I.agenda({})}
          <input type="datetime-local" value={due?toLocalInput(due):''} onChange={e=>onDate(e.target.value?new Date(e.target.value).toISOString():null)}/>
        </label>}
        <button className="actcard-btn" title="Modifier" onClick={onEditStart}>{I.pencil({})}</button>
        <button className="actcard-btn del" title="Supprimer" onClick={onDelete}>{I.trash({})}</button>
      </div>
    </div>
  );
}

/* Catégorie STATUT (en haut de la fiche) = ÉTIQUETTE UNIQUE du lead. AUTO par défaut (RDV daté, no-show,
   paiement, âge). Au clic → menu des DISPOSITIONS (même picker fluide que les récaps : Intéressé · À closer ·

  const startCustom=()=>{ setMenu(null); setV((lead.statusOverride && !RESULT_META[lead.statusOverride]) ? lead.statusOverride : ''); setCustom(true); requestAnimationFrame(()=>{ const el=inRef.current; if(el) el.focus(); }); };
  if(custom){

          <button className="statf-ic ok" title="Enregistrer (Entrée)" onClick={()=>{ onCustom(v.trim()); setCustom(false); }}>{I.check({})}</button>
          <button className="statf-ic" title="Annuler (Échap)" onClick={()=>setCustom(false)}>{I.x({})}</button>
        </div>

  }
  return (
    <div className="field">
      <span className="eyebrow">Statut</span>
      <div ref={pillRef} className={'statf'+(st.manual?' is-manual':'')+(st.money?(' statf-'+st.money):'')} onClick={openMenu} role="button" tabIndex={0}
        title="Statut du lead — cliquer pour changer la disposition"
        onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openMenu(); } }}>
        {st.money==='paid' ? <span className="statf-check">{I.check({})}</span> : <span className={'statf-dot '+(st.color?'':st.urg)} style={st.color?{background:st.color}:undefined}></span>}
        {st.amt && <span className="statf-amt">{st.amt}</span>}
        <span className="statf-tx" style={st.color?{color:st.color}:undefined}>{st.text||'—'}</span>
        <span className="statf-tag">{st.manual?'manuel':'auto'}</span>

      </div>
      {menu && (<>
        <div className="disp-ov" onClick={()=>setMenu(null)}></div>
        <div className="disp-menu" style={{top:menu.top, left:menu.left}}>
          {RESULT_LIST.map(r=>(
            <button key={r.id} className={'disp-item'+(lead.statusOverride===r.id?' on':'')} onClick={()=>{ onSetDisp(r.id); setMenu(null); }}>
              <span className="disp-dot" style={{background:r.color}}></span><span className="disp-lbl">{r.label}</span>{lead.statusOverride===r.id&&<span className="disp-check">{I.check({})}</span>}
            </button>
          ))}
          <button className="disp-item" onClick={startCustom}><span className="disp-dot" style={{background:'var(--t3)'}}></span><span className="disp-lbl">Personnalisé…</span></button>
          {st.manual && <button className="disp-item clear" onClick={()=>{ onClear(); setMenu(null); }}>↺ Revenir au statut automatique</button>}
        </div>
      </>)}
    </div>
  );
}

// couleur déterministe par closer (même id -> toujours la même couleur ; sert badge + chips-légende)
const CLOSER_COLORS=['#e8833a','#3a86e8','#36c08a','#c065d8','#e85a7a','#d9a441','#5ad0d8','#8a7de8'];
function closerColor(id){ if(!id) return null; let h=0; const s=String(id); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return CLOSER_COLORS[h%CLOSER_COLORS.length]; }
function initialsFromName(name){ const clean=String(name||'').replace(/\([^)]*\)/g,' ').trim(); const p=clean.split(/[\s\-]+/).filter(Boolean); if(!p.length) return '?'; if(p.length===1) return p[0].slice(0,2).toUpperCase(); return ((p[0][0]||'')+(p[p.length-1][0]||'')).toUpperCase(); }
// popover (portal fixed) pour choisir un closer — partagé par le badge carte ET la barre d'action masse
function CloserPicker({ closers, currentId, anchor, onPick, onClose }){

    <>
      <div className="cp-ov" onMouseDown={e=>e.stopPropagation()} onClick={onClose}></div>
      <div className="cp-menu" style={{position:'fixed', left, top, zIndex:200}} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>

            {currentId===c.id && <span className="cp-check">{I.check({})}</span>}
          </button>
        ))}
      </div>
    </>, document.body);
}

/* ============================================================= LEAD CARD */
const LeadCard = React.memo(function LeadCard({lead, onOpen, onDragStart, onDragEnd, dragging, onCardDragOver, dropPos, onDelete, ownerName, ownerColor, closers, onAssign, isAdmin, selecting, selected, onToggleSelect, colVer, clock}){
  const col = lead.column;
  const [menu,setMenu]=React.useState(null);
  const canAssign = isAdmin && closers && closers.length>0;
  const clickCard=(e)=>{ if(selecting){ onToggleSelect(lead.id, e.shiftKey); } else { onOpen(lead.id); } };
  // statut compact recalculé (RDV/paiement/relance, daté) ; surcharge manuelle prioritaire. Mémoïsé : 1 calcul par carte
  // et par minute (clock = bucket minute), pas à chaque render → board fluide même à ~950 cartes.
  const cardStatus = React.useMemo(()=>computeCardStatus(lead, clock?clock*60000:Date.now()), [lead, clock]);
  const actionEl = (
    <div className={'card-action'+(cardStatus.money?(' '+cardStatus.money):'')}>
      {cardStatus.money==='paid' && <I.check style={{width:13,height:13,strokeWidth:2.4}}/>}
      {!cardStatus.money && <span className={'live '+(cardStatus.color?'':cardStatus.urg)} style={cardStatus.color?{background:cardStatus.color}:undefined}></span>}
      {cardStatus.amt && <span className="amt">{cardStatus.amt}</span>}
      <span className="ca-tx" style={cardStatus.color?{color:cardStatus.color}:undefined}>{cardStatus.text}</span>
      {cardStatus.manual && <span className="ca-man">manuel</span>}
    </div>
  );
  return (
    <div className={`card ${dragging?'dragging':''} ${dropPos?('drop-'+dropPos):''} ${selecting?'selecting':''} ${selected?'selected':''}`} draggable={!selecting}
         onDragStart={()=>onDragStart(lead.id)} onDragEnd={onDragEnd}
         onDragOver={e=>{ e.preventDefault(); e.stopPropagation();
           const r=e.currentTarget.getBoundingClientRect();
           onCardDragOver(lead.id, (e.clientY-r.top)<r.height/2?'before':'after', col); }}
         onClick={clickCard} tabIndex={0} role="button"
         onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); clickCard(e);}}}>
      {selecting && <span className="card-sel" title="Sélectionner (Maj+clic = plage)" onClick={e=>{ e.stopPropagation(); onToggleSelect(lead.id, e.shiftKey); }}>{I.check({})}</span>}
      <div className="card-tr">
        {!selecting && <button className="card-del" title="Supprimer ce lead" aria-label="Supprimer ce lead" draggable={false}
              onClick={e=>{ e.stopPropagation(); onDelete(lead.id); }} onKeyDown={e=>e.stopPropagation()}>{I.trash({})}</button>}
        {canAssign && (
          <button className={'owner-badge'+(lead.owner?'':' pool')} draggable={false}
            style={lead.owner?{background:(ownerColor||'#888')+'22', color:ownerColor||undefined, borderColor:(ownerColor||'#888')+'66'}:undefined}
            title={lead.owner?('Closer : '+(ownerName||'?')+' · cliquer pour réassigner'):'Non attribué · cliquer pour assigner à un closer'}
            onClick={e=>{ e.stopPropagation(); setMenu({x:e.clientX,y:e.clientY}); }}>
            {lead.owner ? initialsFromName(ownerName) : <span className="ob-plus">+</span>}
          </button>
        )}
      </div>
      <div className={'card-top'+(canAssign?' has-owner':'')}>
        <Avatar lead={lead} size="sz-sm"/>
        <div className="card-id">
          <div className="card-name">{lead.prenom} {lead.nom}
            {lead.noShow && <span className="tag tag-noshow">No-show</span>}
            {lead.saison && <span className="tag tag-saison" title={SEASON_LABEL[lead.saison]||lead.saison}>{lead.saison}</span>}
          </div>
          <div className="card-sub"><Src source={lead.source} eng={lead.webiEngagement}/></div>
        </div>
      </div>
      {actionEl}
      {menu && <CloserPicker closers={closers} currentId={lead.owner} anchor={menu} onClose={()=>setMenu(null)} onPick={(cid)=>{ onAssign(lead.id, cid); setMenu(null); }}/>}
    </div>
  );
});

/* ============================================================= KANBAN BOARD */
// En-tête de colonne kanban. Lecture seule pour les closers ; pour un admin : pastille couleur cliquable,
// titre renommable en place, menu ⋯ (couleur / renommer / déplacer ◄ ► / supprimer avec garde anti-orphelins).
function ColHead({ col, color, isSystem, count, isAdmin, onAddLead, onRename, onRecolor, onMove, onDelete, otherCols, canLeft, canRight }){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState('');
  const [menu,setMenu]=useState(false);
  const [del,setDel]=useState(false);
  const [tgt,setTgt]=useState('');
  const inp=useRef(null);
  const origRef=useRef(''); // label au DÉBUT de l'édition -> évite d'écraser un renommage concurrent (autre admin, temps réel)
  useEffect(()=>{ if(editing&&inp.current){ inp.current.focus(); inp.current.select(); } },[editing]);
  const start=()=>{ if(!isAdmin) return; origRef.current=col.label; setVal(col.label); setMenu(false); setEditing(true); };
  const commit=()=>{ setEditing(false); const v=val.trim(); if(v && v!==origRef.current) onRename(col.id,v); };
  return (
    <div className="col-head">
      <span className="col-dot" style={{background:color}}></span>
      {editing
        ? <input ref={inp} className="col-name-inp" value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();commit();} else if(e.key==='Escape'){e.preventDefault();setEditing(false);} }} onBlur={commit}/>
        : <h3 className={'col-name'+(isAdmin?' editable':'')} onClick={start} title={isAdmin?'Renommer la colonne':undefined}>{col.label}</h3>}
      <span className="col-count">{count}</span>
      {isAdmin && <button className="col-kebab" title="Options de colonne" onClick={()=>setMenu(m=>!m)}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg></button>}
      <button className="col-add" title="Ajouter un lead" aria-label="Ajouter un lead" onClick={onAddLead}><I.plus/></button>
      {isAdmin && menu && (<>
        <div className="col-menu-ov" onClick={()=>{setMenu(false);setDel(false);}}></div>
        <div className="col-menu">
          {!del ? (<>
            <div className="col-menu-sw">{COL_PALETTE.map(c=>(
              <button key={c} className={'sw'+(color===c?' on':'')} style={{background:c}} title="Couleur" onClick={()=>onRecolor(col.id,c)}/>
            ))}</div>
            <button className="col-menu-item" onClick={start}>{I.pencil({})}Renommer</button>
            <button className="col-menu-item" disabled={!canLeft} onClick={()=>{ onMove(col.id,-1); setMenu(false); }}><span className="cm-ar">←</span>Déplacer à gauche</button>
            <button className="col-menu-item" disabled={!canRight} onClick={()=>{ onMove(col.id,1); setMenu(false); }}><span className="cm-ar">→</span>Déplacer à droite</button>
            {isSystem
              ? <div className="col-menu-item locked" title="Colonne système (logique métier attachée) — non supprimable"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>Colonne système</div>
              : <button className="col-menu-item danger" onClick={()=>{ if(count>0){ setTgt(''); setDel(true); } else { onDelete(col.id,null); setMenu(false); } }}>{I.trash({})}Supprimer</button>}
          </>) : (
            <div className="col-menu-del">
              <div className="cm-del-tx">Déplacer {count} lead{count>1?'s':''} vers :</div>
              <select className="cm-del-sel" value={tgt} onChange={e=>setTgt(e.target.value)}>
                <option value="">— choisir —</option>
                {otherCols.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
              </select>
              <div className="cm-del-foot">
                <button className="btn btn-ghost" onClick={()=>setDel(false)}>Annuler</button>
                <button className="btn btn-accent" disabled={!tgt} onClick={()=>{ onDelete(col.id,tgt); setMenu(false); setDel(false); }}>Supprimer</button>
              </div>
            </div>
          )}
        </div>
      </>)}
    </div>
  );
}
// tuile fantôme « + Ajouter une colonne » en bout de board (admin) — style Notion
function AddColTile({ onAdd }){
  const [open,setOpen]=useState(false);
  const [val,setVal]=useState('');
  const inp=useRef(null);
  useEffect(()=>{ if(open&&inp.current) inp.current.focus(); },[open]);
  const save=()=>{ const v=val.trim(); if(v) onAdd(v); setVal(''); setOpen(false); };
  return (
    <div className="col col-ghost">
      {open
        ? <input ref={inp} className="col-name-inp ghost" placeholder="Nom de la colonne" value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();save();} else if(e.key==='Escape'){e.preventDefault();setOpen(false);setVal('');} }} onBlur={save}/>
        : <button className="col-ghost-btn" onClick={()=>setOpen(true)}><I.plus/> Ajouter une colonne</button>}
    </div>
  );
}

function Board({leads, search, setSearch, onOpenLead, onReorder, onAddLead, onDelete, view, setView, userId, isAdmin, closers, onAssign, colVer, renameCol, recolorCol, reorderCols, addCol, deleteCol}){
  // déplacement d'une colonne d'un cran (◄/►) -> recalcule l'ordre courant et persiste
  const moveCol=useCallback((id,dir)=>{ const ids=COLUMNS.map(c=>c.id); const i=ids.indexOf(id), j=i+dir; if(i<0||j<0||j>=ids.length) return; const arr=ids.slice(); arr[i]=ids[j]; arr[j]=ids[i]; reorderCols&&reorderCols(arr); },[reorderCols]);
  // valeur de recherche différée : l'<input> reste contrôlé par `search` (frappe instantanée),
  // mais le filtrage + re-render des ~950 cartes part de `dq` -> rendu interruptible (React 18 concurrent),
  // donc la barre reste fluide et cliquable même quand la liste est lourde.
  const dq = React.useDeferredValue(search);
  const [dragId, setDragId] = useState(null);
  const [overCol, setOverCol] = useState(null);
  const [over, setOver] = useState(null); // {cardId, pos}
  // rendu progressif : nb max de cartes montées par colonne (monte par paliers — cf. effet plus bas)
  const [cap, setCap] = useState(40);
  // horloge MINUTE (bucket) : fait vivre les pastilles de statut (« ajd 14h » → « en cours » → « à débriefer »)
  // sans tick inutile — setClock avec la même valeur ne re-render pas. ~1 re-render/minute des cartes.
  const [clock, setClock] = useState(()=>Math.floor(Date.now()/60000));
  useEffect(()=>{ const id=setInterval(()=>setClock(Math.floor(Date.now()/60000)),30000); return ()=>clearInterval(id); },[]);
  // ATC est désormais une COLONNE à part entière -> retiré du filtre source
  const SRC_TABS=[{k:'all',label:'Tous'}, ...LEAD_SOURCES]; // « Tous » + sources réelles (source de vérité unique)
  const [src, setSrc] = useState(()=>{ const s=persistedState('iqcrm_src','all'); return SRC_TABS.some(o=>o.k===s)?s:'all'; }); // filtre par source (persiste)
  const [srcOpen, setSrcOpen] = useState(false); // menu du sélecteur ouvert
  useEffect(()=>localStorage.setItem('iqcrm_src',JSON.stringify(src)),[src]);
  // sous-filtre ENGAGEMENT webi (Participé / Inscrit / tous) — actif seulement quand src='webinaire', persiste avec garde
  const [srcEng, setSrcEng] = useState(()=>{ const s=persistedState('iqcrm_srceng','all'); return (s==='participe'||s==='inscrit')?s:'all'; });
  useEffect(()=>localStorage.setItem('iqcrm_srceng',JSON.stringify(srcEng)),[srcEng]);
  useEffect(()=>{ if(src!=='webinaire' && srcEng!=='all') setSrcEng('all'); },[src]); // quitter Webinaire réinitialise le sous-filtre

  // ---- attribution closer (admin) : filtre par owner + mode sélection multiple ----
  const [ownerFilter, setOwnerFilter] = useState(()=>persistedState('iqcrm_owner','all')); // 'all' | 'pool' | closerId
  useEffect(()=>localStorage.setItem('iqcrm_owner',JSON.stringify(ownerFilter)),[ownerFilter]);
  const [selecting, setSelecting] = useState(false);
  const [selectedIds, setSelectedIds] = useState(()=>new Set());
  const [bulkMenu, setBulkMenu] = useState(null); // {x,y} ancre du popover masse
  const [ofOpen, setOfOpen] = useState(false); // menu du filtre closer ouvert
  const closerById = useMemo(()=>{ const m=new Map(); (closers||[]).forEach(c=>m.set(c.id,c)); return m; },[closers]);
  // refs : sélection par plage (Maj+clic) + handler d'attribution STABLES -> ne cassent pas le React.memo des ~950 cartes
  const colItemsRef = useRef({});       // colId -> leads affichés (ordre courant) pour calculer les plages
  const lastSelRef = useRef(null);      // {colId, idx} dernier clic
  const assignRef = useRef(onAssign); assignRef.current=onAssign;
  const assignCard = useCallback((id,cid)=>{ if(assignRef.current) assignRef.current(id,cid); },[]);
  const toggleSelect = useCallback((id, shift)=>{
    const disp=colItemsRef.current||{}; let colId=null, idx=-1, arr=null;
    for(const k in disp){ const a=disp[k]; const i=a.findIndex(x=>x.id===id); if(i!==-1){ colId=k; idx=i; arr=a; break; } }
    setSelectedIds(prev=>{ const next=new Set(prev); const last=lastSelRef.current;
      if(shift && last && last.colId===colId && arr){ const lo=Math.min(last.idx,idx), hi=Math.max(last.idx,idx); for(let i=lo;i<=hi;i++){ if(arr[i]) next.add(arr[i].id); } }
      else { if(next.has(id)) next.delete(id); else next.add(id); }
      return next; });
    lastSelRef.current={colId,idx};
  },[]);
  const clearSel = ()=>setSelectedIds(new Set());
  const exitSel = ()=>{ setSelecting(false); setSelectedIds(new Set()); lastSelRef.current=null; };
  const doBulkAssign = (cid)=>{ Array.from(selectedIds).forEach(id=>assignRef.current && assignRef.current(id,cid)); setBulkMenu(null); clearSel(); };

  // compteurs par source — calculés sur la SEULE colonne « Lead à contacter ».
  // Clés dérivées de LEAD_SOURCES (source de vérité unique) + compteurs d'engagement webi pour les sous-chips.
  const srcCounts = useMemo(()=>{
    const base = leads.filter(l=>l.column==='contacter');
    const c={all:base.length, _wp:0, _wi:0};
    for(const s of LEAD_SOURCES) c[s.k]=0;
    base.forEach(l=>{ if(c[l.source]!==undefined) c[l.source]++;
      if(l.source==='webinaire'){ if(l.webiEngagement==='participe') c._wp++; else if(l.webiEngagement==='inscrit') c._wi++; } });
    return c;
  },[leads]);

  // index de recherche pré-normalisé : 1 deburr par lead par changement de DATA (au lieu de ~950 par frappe) — mêmes 5 champs (texte)
  const hay = useMemo(()=>{ const m=new Map(); for(const l of leads) m.set(l, deburr(`${l.prenom} ${l.nom} ${l.metier} ${l.email} ${l.tel}`)); return m; },[leads]);
  // index téléphone normalisé (préfixe/espaces neutralisés) : permet de chercher par +33… comme par 07…, avec ou sans espaces
  const telIdx = useMemo(()=>{ const m=new Map(); for(const l of leads) m.set(l, normTel(l.tel)); return m; },[leads]);
  const visible = useMemo(()=>{
    const raw = dq.trim();
    const q = raw ? deburr(raw) : '';        // requête texte (nom/métier/email, insensible casse+accents)
    const qtel = raw ? normTel(raw) : '';    // requête téléphone normalisée ('' si aucun chiffre)
    return leads.filter(l=>{
      // vue « Mes leads » = lead qui m'appartient OU dont un RDV CalendIQ est calé avec moi (option B)
      if(view==='mine' && !(l.owner===userId || l._cqCloserId===userId)) return false;
      // filtre par closer (admin) : 'pool' = non attribué, sinon un closer précis
      if(ownerFilter!=='all'){ if(ownerFilter==='pool'){ if(l.owner) return false; } else if(l.owner!==ownerFilter) return false; }
      // match si le texte OU le téléphone normalisé correspond (téléphone : format/préfixe sans incidence)
      if(q){ const okTxt=hay.get(l).includes(q); const okTel=qtel && telIdx.get(l).includes(qtel); if(!okTxt && !okTel) return false; }
      return true;
    });
  },[leads,hay,telIdx,dq,view,userId,ownerFilter]);

  // handlers STABLES (useCallback) + regroupement mémoïsé : avec ~949 cartes, seules
  // les cartes réellement concernées (carte tirée / survolée) se re-rendent pendant un drag.
  // guard d'égalité : dragover fire à 60-125/s — sans lui, chaque événement pousse un objet NEUF
  // (même cardId/pos) -> re-render complet du Board par événement = LE lag du drag. Mêmes valeurs, zéro render redondant.
  const handleCardDragOver=useCallback((cardId,pos,colId)=>{ setOver(o=>(o&&o.cardId===cardId&&o.pos===pos)?o:{cardId,pos}); setOverCol(c=>c!==colId?colId:c); },[]);
  const startDrag=useCallback((id)=>setDragId(id),[]);
  const endDrag=useCallback(()=>{ setDragId(null); setOverCol(null); setOver(null); },[]);
  // latest-ref : openCard/delCard gardent la MÊME identité même quand App re-rend (frappe, toast, poll)
  // -> le React.memo des ~950 cartes tient (openLead/deleteLead sont recréés à chaque render d'App).
  const onOpenRef=useRef(onOpenLead); onOpenRef.current=onOpenLead;
  const onDeleteRef=useRef(onDelete); onDeleteRef.current=onDelete;
  const openCard=useCallback((id)=>onOpenRef.current(id),[]);
  const delCard=useCallback((id)=>onDeleteRef.current(id),[]);
  // ordre chronologique d'apparition : le plus RÉCENT d'abord, dans TOUTES les colonnes (tri par date_creation desc, id en départage)
  // timestamps précalculés : 1 Date.parse par lead au lieu d'1 par comparaison du sort — ordre strictement identique
  const byCol=useMemo(()=>{
    const ts=new Map(); for(const l of visible) ts.set(l, l.date_creation?Date.parse(l.date_creation):0);
    const byDateDesc=(a,b)=>{ const da=ts.get(a), db=ts.get(b); if(db!==da) return db-da; return String(b.id).localeCompare(String(a.id)); };
    const m={}; for(const c of COLUMNS) m[c.id]=[]; visible.forEach(l=>{ (m[l.column]||(m[l.column]=[])).push(l); }); for(const k in m) m[k].sort(byDateDesc); return m;
  },[visible]);

  const dropOn=(e,colId)=>{
    e.preventDefault();
    if(dragId){
      let beforeId=null;
      if(over && over.cardId && over.cardId!==dragId){
        const colItems = visible.filter(l=>l.column===colId && l.id!==dragId);
        const idx = colItems.findIndex(l=>l.id===over.cardId);
        if(idx!==-1) beforeId = over.pos==='before' ? over.cardId : (colItems[idx+1]?colItems[idx+1].id:null);
      }
      onReorder(dragId, colId, beforeId);
    }
    setDragId(null); setOverCol(null); setOver(null);
  };

  // items réellement affichés par colonne (filtre source appliqué) — partagé entre le rendu et la sélection par plage
  const displayedByCol={};
  for(const c of COLUMNS){ const ci=byCol[c.id]||[]; displayedByCol[c.id]=(c.id==='contacter'&&src!=='all'&&!dq.trim())?ci.filter(l=>l.source===src && (src!=='webinaire'||srcEng==='all'||l.webiEngagement===srcEng)):ci; }
  colItemsRef.current=displayedByCol;

  // ---- RENDU PROGRESSIF (anti-gel à l'ouverture) ----
  // Le gel de quelques secondes au chargement = le COMMIT React synchrone de ~950 cartes d'un coup
  // (~14 000 nœuds DOM). startTransition/useDeferredValue n'accélèrent QUE la phase render, jamais le
  // commit : c'est lui qui bloque le thread, d'où « je clique, rien, puis 3 s plus tard tout apparaît
  // avec ce que j'avais tapé ». Parade : ne committer qu'un petit lot par colonne au 1er paint (barre
  // de recherche cliquable tout de suite), puis monter le reste par paliers sur les frames suivantes —
  // le thread rend la main au navigateur entre chaque palier, clics + frappe restent fluides.
  let maxRender=0; for(const c of COLUMNS){ const n=(displayedByCol[c.id]||[]).length; if(n>maxRender) maxRender=n; }
  const hasData = leads.length>0;
  // on repart d'un petit lot à chaque nouvelle vue lourde montée à neuf (chargement, ET effacement de
  // la recherche qui re-monte les ~950 cartes). Pendant la frappe le résultat est petit -> 40 suffit,
  // aucun palier visible. Une MAJ temps réel ne change pas dq -> cartes déjà montées, commit quasi nul.
  useEffect(()=>{ setCap(40); },[dq]);
  useEffect(()=>{
    if(!hasData || cap>=maxRender) return;
    let id2; // double rAF : on attend que le palier précédent ait peint avant de monter le suivant
    const id1=requestAnimationFrame(()=>{ id2=requestAnimationFrame(()=>setCap(c=>c>=maxRender?c:c+120)); });
    return ()=>{ cancelAnimationFrame(id1); if(id2) cancelAnimationFrame(id2); };
  },[cap,hasData,maxRender]);

  const showOwnerTools = isAdmin && (closers||[]).length>0;

  return (
    <>
      <div className="screen-head">
        <div className="screen-title">
          <h1>Mes leads</h1>
        </div>
        <div className="head-tools">
          <div className="viewtog">
            <button className={view==='mine'?'on':''} onClick={()=>setView('mine')}>Mes leads</button>
            <button className={view==='global'?'on':''} onClick={()=>setView('global')}>Global</button>
          </div>
          <div className="search">
            <I.search/><input placeholder="Rechercher un lead…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
      </div>
      {showOwnerTools && (()=>{
        const ofColor=(ownerFilter!=='all'&&ownerFilter!=='pool')?closerColor(ownerFilter):null;
        const ofLabel=ownerFilter==='all'?'Tous':ownerFilter==='pool'?'Pool':((closerById.get(ownerFilter)||{}).name||'Closer');
        return (
        <div className="ownerbar">
          <div className="clf">
            <button className="clf-btn" onClick={()=>setOfOpen(o=>!o)}>
              <span className="clf-pre">Closer</span>
              {ownerFilter!=='all' && <span className={'clf-dot'+(ownerFilter==='pool'?' pool':'')} style={ofColor?{background:ofColor}:undefined}></span>}
              <span>{ofLabel}</span>
              <svg className="clf-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            {ofOpen && (<>
              <div className="clf-ov" onClick={()=>setOfOpen(false)}></div>
              <div className="clf-menu">
                <button className={'cp-item'+(ownerFilter==='all'?' active':'')} onClick={()=>{ setOwnerFilter('all'); setOfOpen(false); }}>Tous{ownerFilter==='all'&&<span className="cp-check">{I.check({})}</span>}</button>
                {(closers||[]).map(c=>(
                  <button key={c.id} className={'cp-item'+(ownerFilter===c.id?' active':'')} onClick={()=>{ setOwnerFilter(c.id); setOfOpen(false); }}>
                    <span className="cp-dot" style={{background:closerColor(c.id)}}></span>{c.name||'Closer'}{ownerFilter===c.id&&<span className="cp-check">{I.check({})}</span>}
                  </button>
                ))}

                          <button key={o.k} className={'srceng-chip'+(srcEng===o.k?' on':'')} onClick={()=>setSrcEng(o.k)}>{o.label} <span className="n">{o.n}</span></button>

                <div className="col-body">

                      onCardDragOver={handleCardDragOver}
                      onOpen={openCard}
                      onDragStart={startDrag}
                      onDragEnd={endDrag}

                      isAdmin={isAdmin} closers={closers} onAssign={assignCard}

        </div>
      </div>
      {showOwnerTools && selecting && (
        <div className="bulkbar">
          <span className="bulkbar-n">{selectedIds.size} sélectionné{selectedIds.size>1?'s':''}</span>
          <button className="btn btn-accent" disabled={!selectedIds.size} onClick={e=>setBulkMenu({x:e.clientX,y:e.clientY})}>Assigner à…</button>

      {bulkMenu && <CloserPicker closers={closers} currentId={null} anchor={bulkMenu} onPick={doBulkAssign} onClose={()=>setBulkMenu(null)}/>}

}

// Liste « Qui paie ? » — valeurs IDENTIQUES à l'enum HubSpot qui_paie__ (sinon la synchro casse)
const QUI_PAIE_OPTS = ["Entreprise","OPCO","UGAP","Chorus","Lingueo","Autre (précisez dans les notes)"];

// Champ montant éditable inline (clic → input €). vide = non renseigné (≠ 0).
function MoneyField({label, value, onSave, accent}){
  const [editing,setEditing]=useState(false);
  const [v,setV]=useState('');
  const start=()=>{ setV(value===''||value==null?'':String(value)); setEditing(true); };
  const save=()=>{ const t=v.trim(); onSave(t===''?'':Number(t.replace(',','.'))); setEditing(false); };
  const has = value!=='' && value!=null;
  return (
    <div className="pay-cell">
      <span className="pay-lbl">{label}</span>
      {editing
        ? <input className="pay-inp" type="number" inputMode="decimal" autoFocus value={v}
            onChange={e=>setV(e.target.value)} onBlur={save}
            onKeyDown={e=>{ if(e.key==='Enter') save(); if(e.key==='Escape') setEditing(false); }}/>
        : <button className={`pay-val ${accent&&has?'pay-accent':''} ${!has?'pay-empty':''}`} onClick={start} title="Modifier">
            {has?eur(Number(value)):'—'}
          </button>}
    </div>
  );
}

// appel d'une Edge Function avec le jeton Supabase de l'utilisateur connecté (validé côté serveur)
const FN_URL = SUPABASE_URL + '/functions/v1';
async function callFn(name, body){
  let token = SUPABASE_ANON;
  try{ const { data } = await SB.auth.getSession(); if(data && data.session) token = data.session.access_token; }catch(e){}
  const r = await fetch(`${FN_URL}/${name}`, { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'apikey':SUPABASE_ANON, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
  let j={}; try{ j = await r.json(); }catch(e){}
  if(!r.ok) throw new Error(j.error || ('Erreur '+name+' ('+r.status+')'));
  return j;
}
function NoteModal({ mode, onClose, onNote }){

// rendu markdown léger (gras, titres ##, puces) — pas de HTML brut, on construit du React.
function mdInline(s){
  return String(s).split(/(\*\*[^*]+\*\*)/g).map((p,i)=> p.startsWith('**')&&p.endsWith('**') ? <b key={i}>{p.slice(2,-2)}</b> : p);
}
const escHtml = (s)=> String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// markdown IA (##, **, -) -> HTML simple pour l'éditeur riche
function mdToHtml(md){
  return String(md||'').split('\n').map(ln=>{
    const t=ln.trim();
    if(!t) return '<div><br></div>';
    if(t.startsWith('## ')) return '<div><b>'+escHtml(t.slice(3))+'</b></div>';
    if(t.startsWith('# ')) return '<div><b>'+escHtml(t.slice(2))+'</b></div>';
    const bold = s=> escHtml(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    if(t.startsWith('- ')||t.startsWith('• ')||t.startsWith('* ')) return '<div>• '+bold(t.replace(/^(-|•|\*)\s*/,''))+'</div>';
    return '<div>'+bold(t)+'</div>';
  }).join('');
}
// styles inline autorisés (visuels only, aucun vecteur d'exécution) — préserve gras/listes/alinéa/taille
const SAFE_STYLE_PROP=/^(font-size|font-weight|font-style|text-decoration|text-decoration-line|text-align|margin-left|padding-left|text-indent)$/;
function safeStyle(str){ const out=[]; String(str||'').split(';').forEach(d=>{ const i=d.indexOf(':'); if(i<0) return; const p=d.slice(0,i).trim().toLowerCase(), v=d.slice(i+1).trim(); if(!SAFE_STYLE_PROP.test(p)) return; if(/url\(|expression|javascript:|@import|<|>/i.test(v)) return; out.push(p+':'+v); }); return out.join('; '); }
// Sanitisation par WHITELIST DOM : toute balise/attribut hors liste est dénoué (unwrap) ou supprimé.
// Sert l'éditeur de notes (HTML auteur) ET le rendu des notes HubSpot importées.
function sanitizeHtml(html){
  try{
    const TAGS={B:1,STRONG:1,I:1,EM:1,U:1,UL:1,OL:1,LI:1,H1:1,H2:1,H3:1,H4:1,BR:1,DIV:1,SPAN:1,P:1,A:1,FONT:1,BLOCKQUOTE:1};
    const DROP={SCRIPT:1,STYLE:1,IFRAME:1,OBJECT:1,EMBED:1,NOSCRIPT:1,TEMPLATE:1,TITLE:1,TEXTAREA:1,LINK:1,META:1,SVG:1};
    const tpl=document.createElement('template'); tpl.innerHTML=String(html||'');
    const walk=(node)=>{ Array.prototype.slice.call(node.childNodes).forEach((el)=>{
      if(el.nodeType===3) return;                          // texte : OK
      if(el.nodeType!==1){ el.remove(); return; }          // commentaires/autres : out
      if(DROP[el.tagName]){ el.remove(); return; }         // dangereux : supprimé AVEC son contenu
      if(!TAGS[el.tagName]){                                // balise non whitelistée -> unwrap (garde le texte)
        const p=el.parentNode; while(el.firstChild) p.insertBefore(el.firstChild,el); p.removeChild(el); return; }
      Array.prototype.slice.call(el.attributes).forEach((a)=>{ const n=a.name.toLowerCase();
        if(n==='href' && el.tagName==='A'){ const v=(a.value||'').trim(); if(!/^(https?:|mailto:)/i.test(v)) el.removeAttribute('href'); else { el.setAttribute('rel','noopener noreferrer'); el.setAttribute('target','_blank'); } }
        else if(n==='size' && el.tagName==='FONT'){ if(!/^[1-7]$/.test((a.value||'').trim())) el.removeAttribute('size'); }
        else if(n==='style'){ const s=safeStyle(a.value); el.removeAttribute('style'); if(s) el.setAttribute('style',s); }
        else el.removeAttribute(a.name);                   // tue on*, srcset, javascript:, data-*, class, etc.
      });
      walk(el);
    }); };
    walk(tpl.content);
    return tpl.innerHTML;
  }catch(e){ // filet de sécurité si DOM indispo
    return String(html||'').replace(/<\/?(script|style|iframe|object|embed)[^>]*>/gi,'').replace(/ on\w+="[^"]*"/gi,'').replace(/ on\w+='[^']*'/gi,'');
  }
}
const isHtml = (s)=> /<[a-z!/][\s\S]*>/i.test(String(s||''));
// vrai si le HTML de l'éditeur est vide (que des balises/espaces) -> évite d'enregistrer une note blanche
const htmlIsEmpty = (h)=> !String(h||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/gi,' ').replace(/\u00a0/g,' ').trim();
function MdText({ text }){
  if(isHtml(text)) return <div className="recap-md" dangerouslySetInnerHTML={{__html: sanitizeHtml(text)}}/>;
  const lines=String(text||'').split('\n');
  return (<div className="recap-md">{lines.map((ln,i)=>{
    const t=ln.trim();
    if(!t) return <div key={i} className="recap-sp"/>;
    if(t.startsWith('## ')) return <div key={i} className="recap-h">{t.slice(3)}</div>;
    if(t.startsWith('# ')) return <div key={i} className="recap-h">{t.slice(2)}</div>;
    if(t.startsWith('- ')||t.startsWith('• ')||t.startsWith('* ')) return <div key={i} className="recap-li">{mdInline(t.slice(2))}</div>;
    return <div key={i} className="recap-p">{mdInline(t)}</div>;
  })}</div>);
}
// éditeur WYSIWYG (contentEditable) : gras/italique/souligné, titre, listes puces+numéros, alinéa, taille.
// Valeur = HTML. Uncontrolled (init innerHTML une seule fois) -> le curseur n'est jamais réinitialisé.
function RichText({ html, onChange, placeholder, autoFocus }){
  const ref=React.useRef(null);
  React.useEffect(()=>{ if(!ref.current) return; if(ref.current.innerHTML!==(html||'')) ref.current.innerHTML=html||''; if(autoFocus){ ref.current.focus(); } },[]); // init une seule fois
  const sync=()=>{ if(ref.current) onChange(ref.current.innerHTML); };
  const cmd=(c,v)=>{ try{ document.execCommand('styleWithCSS',false,true); }catch(e){} document.execCommand(c,false,v||null); if(ref.current) ref.current.focus(); sync(); };
  // raccourcis markdown en début de ligne, déclenchés sur espace : "- "/"* " -> puces, "1. " -> numéros
  const mdShortcut=()=>{ try{
    const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
    const node=sel.anchorNode; if(!node||node.nodeType!==3) return;
    const t=node.textContent;
    if(/^[-*]\s$/.test(t)){ node.textContent=''; cmd('insertUnorderedList'); }
    else if(/^1\.\s$/.test(t)){ node.textContent=''; cmd('insertOrderedList'); }
  }catch(e){} };
  const onInput=(e)=>{ if(e.nativeEvent && e.nativeEvent.data===' ') mdShortcut(); sync(); };
  const onKeyDown=(e)=>{
    if(e.metaKey||e.ctrlKey){ const k=e.key.toLowerCase();
      if(k==='b'){ e.preventDefault(); cmd('bold'); return; }
      if(k==='i'){ e.preventDefault(); cmd('italic'); return; }
      if(k==='u'){ e.preventDefault(); cmd('underline'); return; } }
    if(e.key==='Tab'){ e.preventDefault(); cmd(e.shiftKey?'outdent':'indent'); }
  };
  const Btn=({on,t,children,style})=> <button type="button" className="rt-b" style={style} title={t} onMouseDown={e=>e.preventDefault()} onClick={on}>{children}</button>;
  return (
    <div className="rt">
      <div className="rt-bar">
        <Btn on={()=>cmd('bold')} t="Gras (⌘B)"><b>B</b></Btn>
        <Btn on={()=>cmd('italic')} t="Italique (⌘I)"><i>I</i></Btn>
        <Btn on={()=>cmd('underline')} t="Souligné (⌘U)"><u>S</u></Btn>
        <span className="rt-sep"/>
        <Btn on={()=>cmd('formatBlock','H3')} t="Titre">Titre</Btn>
        <Btn on={()=>cmd('insertUnorderedList')} t="Liste à puces">• Liste</Btn>
        <Btn on={()=>cmd('insertOrderedList')} t="Liste numérotée">1. Liste</Btn>
        <span className="rt-sep"/>
        <Btn on={()=>cmd('outdent')} t="Diminuer l’alinéa (⇧Tab)">⇤</Btn>
        <Btn on={()=>cmd('indent')} t="Augmenter l’alinéa (Tab)">⇥</Btn>
        <span className="rt-sep"/>
        <Btn on={()=>cmd('fontSize','2')} t="Petit" style={{fontSize:11}}>A</Btn>
        <Btn on={()=>cmd('fontSize','4')} t="Normal" style={{fontSize:14}}>A</Btn>
        <Btn on={()=>cmd('fontSize','6')} t="Grand" style={{fontSize:17}}>A</Btn>
      </div>
      <div className="rt-edit" ref={ref} contentEditable suppressContentEditableWarning
        data-ph={placeholder||''} onInput={onInput} onKeyDown={onKeyDown} onBlur={sync}/>
    </div>
  );
}

// Colle un transcript -> Edge Function `recap` (Gemini) -> récap adaptatif.
// Auto-applique : remplit les champs VIDES, signale les conflits sans écraser,
// sauve le récap en note datée, fait avancer l'étape R1/R2 UNIQUEMENT si un RDV est calé.
function RecapModal({ lead, onClose, onEditField, onNote, onAdvanceStage, onSetRdvOutcome }){
  const [text,setText]=useState('');
  const [phase,setPhase]=useState('input'); // input | loading | result | error
  const [result,setResult]=useState(null);
  const [applied,setApplied]=useState({filled:[], stage:{msg:''}});
  const [recapText,setRecapText]=useState('');
  const [editActions,setEditActions]=useState([]);
  const [err,setErr]=useState('');
  const [callKind,setCallKind]=useState(()=>inferCallKind(lead,null)||'r1'); // type de call choisi MANUELLEMENT (prime sur la détection IA)
  const alive=useRef(true);
  useEffect(()=>()=>{ alive.current=false; },[]);
  const norm=s=>(s==null?'':String(s)).trim().toLowerCase();

  async function analyze(){
    const tx=text.trim();
    if(tx.length<20) return;
    setPhase('loading'); setErr('');
    try{
      const out=await callFn('recap',{ transcript:tx, lead:{prenom:lead.prenom, nom:lead.nom, source:(lead.source==='webinaire'&&lead.webiEngagement)?('webinaire ('+lead.webiEngagement+')'):lead.source, column:lead.column} });
      if(!alive.current) return; // modale fermée pendant l'analyse -> on n'applique rien
      const F=out.fields||{};
      const filled=[], conflicts=[];
      const consider=(newVal, uiKey, saveKey, label, isNum)=>{
        if(newVal==null || newVal==='' || (isNum && !Number(newVal))) return;
        const cur = isNum ? (lead[uiKey]||0) : (lead[uiKey]||'');
        const curEmpty = isNum ? !cur : !String(cur).trim();
        if(curEmpty){ onEditField(uiKey, saveKey, newVal); filled.push({label, value:newVal}); }
        else if(isNum ? Number(cur)!==Number(newVal) : norm(cur)!==norm(newVal)){
          conflicts.push({label, uiKey, saveKey, cur, neu:newVal, isNum});
        }
      };
      consider(F.metier,'metier','metier','Métier',false);
      consider(F.objectif,'veut','objectif','Objectif',false);
      consider(F.cpf,'cpf','cpf','CPF dispo',true);
      consider(F.budget,'budget','budget','Budget',false);
      // récap + actions -> état ÉDITABLE (la sauvegarde en note se fait au clic "Confirmer")
      setRecapText(mdToHtml((out.recap_markdown||'').trim())); // markdown IA -> HTML pour l'éditeur riche
      setEditActions((out.actions||[]).map(a=>({label:a.label, priority:a.priority||'moyenne'})));
      // étape : avance UNIQUEMENT contacter/atc -> R1 si un RDV est calé (rdv_at présent).
      // Un seul champ rdv_at ne permet pas de certifier qu'un R2 distinct est calé :
      // le passage en R2 (et toute avancée depuis un état déjà avancé) reste donc manuel.
      let stage={msg:''};
      const sg=out.suggested_stage;
      const earlyCols=['contacter','perso','atc'];
      if((sg==='r1'||sg==='r2') && earlyCols.includes(lead.column)){
        if(lead.rdv_at){ onAdvanceStage('rdv1'); stage={msg:'Étape → 1er RDV pris 🗓️'}; }
        else stage={msg:'Avancée non appliquée : aucun RDV calé (à faire à la main).', warn:true};
      }
      setApplied({filled, stage});
      setResult(out); setPhase('result');
    }catch(e){ if(!alive.current) return; setErr(e.message||'Erreur inconnue'); setPhase('error'); }
  }

  // "Confirmer" : enregistre le récap ÉDITÉ (résumé + actions) en note datée, puis ferme.
  function confirm(){
    const acts=editActions.filter(a=>a.label.trim());
    // récap = HTML (éditeur riche) -> on ajoute les actions en HTML aussi
    const actTxt = acts.length ? ('<div><br></div><div><b>— Actions —</b></div>'+acts.map(a=>'<div>• '+escHtml(a.label.trim())+(a.priority==='haute'?' (prioritaire)':'')+'</div>').join('')) : '';
    const body=(recapText.trim()+actTxt).trim();
    const res = (result && RESULT_META[result.result]) ? result.result : null;
    const concl = (result && result.conclusion) || (res ? RESULT_META[res].label : null);
    const call_kind = callKind; // sélection manuelle (R1/R2) — prime sur la détection IA
    if(body || res) onNote('recap', 'Récap · '+((result&&result.call_type_label)||'Call'), body, {result:res, conclusion:concl, call_kind});
    // la disposition IA devient l'ÉTIQUETTE UNIQUE du lead (plus de pastille par récap)
    if(res) onEditField('statusOverride','statusOverride', res);
    // AUTO-TAG présence : un verdict (sauf no_show) ⇒ le prospect était présent. On pose le statut sur le BON RDV.
    // Le manuel prime (le handler ignore l'IA si un statut a déjà été posé à la main). Rien si verdict absent / aucune cible.
    if(res && onSetRdvOutcome){
      const rdvs = (lead.rdvs && lead.rdvs.length) ? lead.rdvs
        : (lead.rdv_at ? [{id:'manual:'+lead.id, source:'manual', type:lead.rdvType||'r1', start_at:lead.rdv_at}] : []);
      const target = pickRecapTargetRdv(rdvs, call_kind);
      if(target) onSetRdvOutcome(target, res==='no_show'?'no_show':'present');
    }
    // l'action prioritaire du call devient l'Action du lead (catégorie Action + carte board)
    const prio = acts.find(a=>a.priority==='haute') || acts[0];
    if(prio) onEditField('nextAction','nextAction', prio.label.trim());
    onClose();
  }

  return (<>
    <div className="backdrop" onClick={onClose}></div>
    <div className="modal recap-modal" onClick={e=>e.stopPropagation()}>
      <button className="x-btn" onClick={onClose}><I.x/></button>
      <div className="m-fixhead"><div style={{fontSize:20,fontWeight:800,letterSpacing:'-.02em'}}>Récap IQ</div></div>
      <div style={{display:'flex',alignItems:'center',gap:10,margin:'2px 0 14px'}}>
        <span className="eyebrow">Type de call</span>
        <div className="seg">
          <button className={callKind==='setting'?'on':''} onClick={()=>setCallKind('setting')}>Setting</button>
          <button className={callKind==='r1'?'on':''} onClick={()=>setCallKind('r1')}>R1</button>
          <button className={callKind==='r2'?'on':''} onClick={()=>setCallKind('r2')}>R2</button>
        </div>
      </div>
      {phase==='input' && (<>
        <textarea className="note-ta recap-ta" autoFocus placeholder="Colle ici le transcript du call (Granola, Zoom, notes…)" value={text} onChange={e=>setText(e.target.value)}/>
        <div className="modal-note">L'IA détecte le type de call, remplit les champs vides et propose les actions.</div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-accent" disabled={text.trim().length<20} onClick={analyze}>Résumer le call</button></div>
      </>)}
      {phase==='loading' && <div className="recap-loading"><div className="recap-spin"></div>Analyse du call en cours…</div>}
      {phase==='error' && (<>
        <div className="recap-err">{err}</div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={()=>setPhase('input')}>Réessayer</button><button className="btn btn-accent" onClick={onClose}>Fermer</button></div>
      </>)}
      {phase==='result' && result && (<>
        {(()=>{ const rk=RESULT_META[result.result]; const ck=callKind; return (
          <div className="recap-concl">
            <span className="eyebrow">Conclusion</span>
            <div className="recap-concl-row">
              {rk
                ? <span className="chip" style={{color:rk.color, background:'color-mix(in srgb, currentColor 14%, transparent)'}}><span className="cdot"></span>{ck?(callKindLabel(ck)+' · '):''}{rk.label}</span>
                : <span className="recap-type">{result.call_type_label||'Call'}</span>}
              {result.conclusion && <span className="recap-concl-tx">{result.conclusion}</span>}
            </div>
          </div>); })()}
        <RichText html={recapText} onChange={setRecapText} placeholder="Résumé du call (modifiable)…"/>
        <div className="recap-actions">
          <div className="recap-actions-h">Actions</div>
          {editActions.map((a,i)=>(
            <div key={i} className="recap-action-edit">
              <span className="ra-dot" style={{background: a.priority==='haute'?'var(--bad,#e5484d)':(a.priority==='basse'?'var(--t4)':'var(--accent)')}}></span>
              <input value={a.label} onChange={e=>setEditActions(arr=>arr.map((x,j)=>j===i?{...x,label:e.target.value}:x))} placeholder="Action…"/>
              <button className="ra-del" title="Retirer" onClick={()=>setEditActions(arr=>arr.filter((_,j)=>j!==i))}><I.x/></button>
            </div>
          ))}
          <button className="recap-add" onClick={()=>setEditActions(arr=>[...arr,{label:'',priority:'moyenne'}])}>+ Ajouter une action</button>
        </div>
        {applied.filled.length>0 && <div className="recap-meta"><b>Champs remplis :</b> {applied.filled.map(f=>f.label).join(', ')}</div>}
        {applied.stage.msg && <div className={`recap-stage ${applied.stage.warn?'warn':''}`}>{applied.stage.msg}</div>}
        <div className="modal-foot"><button className="btn btn-accent" onClick={confirm}>Confirmer</button></div>
      </>)}
    </div>
  </>);
}

// Entrée d'historique "Récap IA" : accordéon repliable, rendu markdown structuré (via MdText).
// carte d'historique unifiée : MÊME structure pour tous les types (note, NRP/appel, récap, paiement…).
// En-tête toujours = chevron (si contenu) + icône + titre + heure + actions. Corps pliable si contenu.

function TlCard({ ev, onEditNote, onDeleteNote }){
  const isRecap = ev.type === 'recap'; // par TYPE (aligné sur leadStatus) — pas par titre
  const hasBody = isRecap || !!ev.text || !!ev.granola;
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState('');
  const tone = isRecap ? 'accent' : (tlTone[ev.type] || (ev.paid?'ok':''));
  const Icon = isRecap ? I.spark : (tlIcon[ev.type] || I.note);
  const canEdit = !!ev.id && !ev.readOnly; // récap éditable aussi (éditeur riche), pas seulement les notes
  // édition : récap = texte markdown tel quel ; note = HTML (on convertit l'ancien texte brut pour garder sauts de ligne / échapper < >)
  const startEdit=(e)=>{ e.stopPropagation(); setDraft(isRecap ? (ev.text||'') : (ev.text ? (isHtml(ev.text)?ev.text:escHtml(ev.text).replace(/\n/g,'<br>')) : '')); setEditing(true); setOpen(true); };
  const save=()=>{ onEditNote(ev.id, isRecap ? draft.trim() : (htmlIsEmpty(draft)?'':draft)); setEditing(false); };
  const toggle=()=>{ if(editing) return; if(hasBody) setOpen(o=>!o); };
  return (
    <div className={`tl-recap ${tone}`}>
      <div className={`tl-recap-head ${open?'open':''} ${hasBody?'':'nochev'}`} onClick={toggle}>
        <svg className="tl-recap-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6"><path d="m9 18 6-6-6-6"/></svg>
        <span className="tl-recap-ic">{Icon({})}</span>
        <span className="tl-recap-title">{ev.title}</span>
        <span className={'tl-src '+(ev._src==='hs'?'hs':'crm')}>{ev._src==='hs'?'HubSpot':'CRM'}</span>
        <span className="tl-recap-right">
          <span className="tl-when">{ev.when}</span>
          {ev.author && <span className="tl-author" title={'Par '+ev.author}>{ev.author}</span>}
          {ev.id && !ev.readOnly && <span className="tl-recap-actions">
            {canEdit && <button title="Modifier" onClick={startEdit}>{I.pencil({})}</button>}
            <button className="del" title="Supprimer" onClick={e=>{ e.stopPropagation(); onDeleteNote(ev.id); }}>{I.trash({})}</button>
          </span>}
        </span>
      </div>
      {(editing || (open && hasBody)) && (
        <div className="tl-recap-body">
          {editing ? (
            <div className="tl-edit">
              {isRecap
                ? <RichText html={draft} onChange={setDraft} placeholder="Résumé du call (modifiable)…"/>
                : <RichText html={draft} onChange={setDraft} autoFocus placeholder="Ta note… — gras, listes, alinéa (⌘B/I/U)"/>}
              <div className="tl-edit-actions">
                <button className="btn btn-accent" onClick={save}>Enregistrer</button>
                <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Annuler</button>
              </div>
            </div>
          ) : isRecap ? (<>
            {(ev.conclusion || ev.callKind) && (()=>{ const ck=ev.callKind; return (
              <div className="recap-concl" style={{marginBottom:11}}>
                <div className="recap-concl-row">
                  {ck && <span className="recap-ck">{callKindLabel(ck)} ·</span>}
                  {ev.conclusion && <span className="recap-concl-tx">{ev.conclusion}</span>}
                </div>
              </div>); })()}
            {ev.text && <MdText text={ev.text}/>}
            {ev.granola && (
              <div className="tl-granola">
                <div className="g-head"><I.spark style={{width:13,height:13,strokeWidth:2,color:'var(--accent)'}}/><span className="eyebrow">Recap Granola</span></div>
                <div className="g-line"><b>Contexte —</b> {ev.granola.contexte}</div>
                <div className="g-line"><b>Pain point —</b> {ev.granola.pain}</div>
                <div className="g-line"><b>Angle —</b> {ev.granola.angle}</div>
              </div>
            )}
          </>) : (<>
            {ev.text && ((ev.html || isHtml(ev.text)) ? <MdText text={ev.text}/> : <div className="tl-card-text">{ev.text}</div>)}
            {ev.granola && (
              <div className="tl-granola">
                <div className="g-head"><I.spark style={{width:13,height:13,strokeWidth:2,color:'var(--accent)'}}/><span className="eyebrow">Recap Granola</span></div>
                <div className="g-line"><b>Contexte —</b> {ev.granola.contexte}</div>
                <div className="g-line"><b>Pain point —</b> {ev.granola.pain}</div>
                <div className="g-line"><b>Angle —</b> {ev.granola.angle}</div>
              </div>
            )}
          </>)}
        </div>
      )}
    </div>
  );
}

function AddLeadModal({ column, defaultSource, defaultEng, onClose, onAdd }){
  const [f,setF]=useState({prenom:'',nom:'',email:'',telephone:'',source:defaultSource||'',webiEngagement:(defaultSource==='webinaire'&&(defaultEng==='participe'||defaultEng==='inscrit'))?defaultEng:null});
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState(null);
  const set=(k)=>(e)=>setF(s=>({...s,[k]:e.target.value, ...(k==='source'&&e.target.value!=='webinaire'?{webiEngagement:null}:{})}));
  const submit=async(e)=>{ e.preventDefault(); if(saving) return;
    if(!f.prenom.trim() && !f.nom.trim() && !f.email.trim()){ setErr('Renseigne au moins un nom ou un email.'); return; }
    setSaving(true); setErr(null);
    try{ await onAdd({...f, column}); }catch(ex){ setErr(ex.message); setSaving(false); } };
  return (<>
    <div className="backdrop" onClick={onClose}></div>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <button className="x-btn" onClick={onClose}><I.x/></button>
      <div className="m-fixhead"><span className="eyebrow m-eye">Nouveau lead · {COL_LABEL[column]}</span><div style={{fontSize:20,fontWeight:800,letterSpacing:'-.02em',marginTop:6}}>Ajouter un lead</div></div>
      <form className="addlead-form" onSubmit={submit}>
        <div className="addlead-row"><input placeholder="Prénom" value={f.prenom} onChange={set('prenom')} autoFocus/><input placeholder="Nom" value={f.nom} onChange={set('nom')}/></div>
        <input type="email" placeholder="Email" value={f.email} onChange={set('email')}/>
        <input placeholder="Téléphone (ex : +33…)" value={f.telephone} onChange={set('telephone')}/>
        <select className={'addlead-sel'+(f.source?'':' empty')} value={f.source} onChange={set('source')}>
          <option value="">Source — non précisée</option>
          {LEAD_SOURCES.map(o=><option key={o.k} value={o.k}>{o.label}</option>)}
        </select>
        {f.source==='webinaire' && (
          <div className="srceng">
            {[{k:'participe',label:'Participé'},{k:'inscrit',label:'Inscrit'},{k:null,label:'—'}].map(o=>(
              <button type="button" key={String(o.k)} className={'srceng-chip'+((f.webiEngagement||null)===o.k?' on':'')} title={o.k?null:'Présence inconnue'}
                onClick={()=>setF(s=>({...s,webiEngagement:o.k}))}>{o.label}</button>
            ))}
          </div>
        )}
        {err && <div className="rdv-err">{err}</div>}
        <div className="addlead-foot">
          <button type="button" className="btn btn-ghost" onClick={onClose}>Annuler</button>
          <button type="submit" className="btn btn-accent" disabled={saving}>{saving?'Ajout…':'Ajouter le lead'}</button>
        </div>
      </form>
    </div>
  </>);
}
